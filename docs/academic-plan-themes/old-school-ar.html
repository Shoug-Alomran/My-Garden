<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=roadmap-ar.html">
  <title>الخطة الأكاديمية</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f4ed;
      --ink: #211c17;
      --muted: #6b6257;
      --panel: #fffaf0;
      --border: #d9cbb5;
      --accent: #146c74;
      --accent-ink: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171615;
        --ink: #f4eadb;
        --muted: #b7aa98;
        --panel: #211f1c;
        --border: #40382f;
        --accent: #4fb5bd;
        --accent-ink: #071113;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
    }

    main {
      width: min(100%, 560px);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(33, 28, 23, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
    }

    a.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
    }
  </style>
  <script>
    window.location.replace('roadmap-ar.html');
  </script>
</head>
<body>
  <main>
    <h1>يتم فتح الخطة الأكاديمية</h1>
    <p>نسخة الطريقة التقليدية العربية غير جاهزة بعد، لذلك سيتم فتح نسخة خارطة الطريق العربية السريعة بدل الصفحة الفارغة.</p>
    <div class="actions">
      <a class="primary" href="roadmap-ar.html">افتح خارطة الطريق</a>
      <a href="old-school.html" lang="en" dir="ltr">Open old-school in English</a>
    </div>
  </main>
</body>
</html>
