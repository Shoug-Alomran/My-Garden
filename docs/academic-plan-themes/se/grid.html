<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/assets/favicon.png?v=2">
  <title>Software Engineering Grid // SHOUG.TECH</title>
  <meta property="og:title" content="Software Engineering Grid // SHOUG.TECH">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shoug-tech.com/academic-plan-themes/se/grid.html">
  <meta property="og:image" content="https://shoug-tech.com/assets/og-banner.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://shoug-tech.com/assets/og-banner.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --border: #c9ccd3;
      --text: #222;
      --muted: #6b7280;
      --term-badge: #2f5fa8;
      --term-badge-text: #fff;
      --summer-badge: #c07a1f;
      --gap-badge: #5b6472;
      --elective-badge: #3a3f4a;

      --not-taken-bg: #8a2b2b;
      --not-taken-text: #fff;
      --not-taken-border: #6e1f1f;

      --current-bg: #ffffff;
      --current-text: #222;
      --current-border: #2f5fa8;

      --completed-bg: #3f7d3f;
      --completed-text: #fff;
      --completed-border: #2c5c2c;

      --locked-bg: #4a4a52;
      --locked-text: #fff;
      --locked-border: #2e2e33;
    }

    :root[data-theme="dark"] {
      --bg: #0e0f12;
      --panel: #17181c;
      --border: #33353c;
      --text: #e7e7ea;
      --muted: #9a9ca3;
      --term-badge: #3f6fc0;
      --gap-badge: #7a828f;
      --not-taken-bg: #5c2323;
      --not-taken-border: #3f1717;
      --current-bg: #1f2126;
      --current-text: #f0f0f0;
      --completed-bg: #2f5c30;
      --completed-border: #1f3f20;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0e0f12;
        --panel: #17181c;
        --border: #33353c;
        --text: #e7e7ea;
        --muted: #9a9ca3;
        --term-badge: #3f6fc0;
        --gap-badge: #7a828f;
        --not-taken-bg: #5c2323;
        --not-taken-border: #3f1717;
        --current-bg: #1f2126;
        --current-text: #f0f0f0;
        --completed-bg: #2f5c30;
        --completed-border: #1f3f20;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      padding: 28px 16px 80px;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }

    header.page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 10px;
    }

    header.page-head h1 {
      font-size: 18px;
      font-weight: 800;
    }

    .sub {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .actions button {
      font-family: 'Tajawal', sans-serif;
      font-size: 12.5px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 7px;
      cursor: pointer;
      transition: .15s;
    }

    .actions button:hover {
      border-color: var(--term-badge);
      color: var(--term-badge);
    }

    .actions button.add-summer:hover {
      border-color: var(--summer-badge);
      color: var(--summer-badge);
    }

    .actions button.add-gap:hover {
      border-color: var(--gap-badge);
      color: var(--gap-badge);
    }

    .progress-bar {
      height: 8px;
      border-radius: 5px;
      background: var(--border);
      overflow: hidden;
      margin-top: 2px;
    }

    .progress-fill {
      height: 100%;
      background: var(--completed-bg);
      width: 0%;
      transition: width .25s;
    }

    .progress-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 200px;
    }

    .plan {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .term-row {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
    }

    .term-row:last-child {
      border-bottom: none;
    }

    .term-row.summer .term-label {
      background: var(--summer-badge);
    }

    .term-row.gap .term-label {
      background: var(--gap-badge);
    }

    .gap-note {
      align-self: center;
      margin: 0 auto;
      padding: 10px 14px;
      color: var(--muted);
      font-size: 12px;
      font-style: italic;
    }

    .term-row.elective-row .term-label {
      background: var(--elective-badge);
      font-size: 12.5px;
    }

    .term-label {
      flex: 0 0 108px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--term-badge);
      color: var(--term-badge-text);
      font-weight: 800;
      font-size: 14px;
      text-align: center;
      padding: 8px;
      gap: 4px;
      position: relative;
    }

    .term-remove {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: rgba(0, 0, 0, .25);
      color: #fff;
      border: none;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .term-remove:hover {
      background: rgba(0, 0, 0, .45);
    }

    .term-courses {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      background: var(--border);
      min-height: 60px;
      transition: background .12s;
    }

    .term-courses.drag-over {
      background: var(--term-badge);
    }

    .term-courses.drag-invalid {
      background: var(--not-taken-bg);
    }

    .course {
      background: var(--not-taken-bg);
      color: var(--not-taken-text);
      border-inline-start: 4px solid var(--not-taken-border);
      padding: 9px 10px;
      cursor: pointer;
      user-select: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      min-height: 58px;
      flex: 1 1 150px;
      max-width: 220px;
      transition: filter .12s, transform .08s, opacity .12s;
    }

    .course:hover {
      filter: brightness(1.08);
    }

    .course:active {
      transform: scale(.98);
    }

    .course.dragging {
      opacity: .35;
    }

    .course[draggable="true"] {
      cursor: grab;
    }

    .course.state-current {
      background: var(--current-bg);
      color: var(--current-text);
      border-inline-start-color: var(--current-border);
    }

    .course.state-completed {
      background: var(--completed-bg);
      color: var(--completed-text);
      border-inline-start-color: var(--completed-border);
    }

    .course.locked {
      background: var(--locked-bg);
      color: var(--locked-text);
      border-inline-start-color: var(--locked-border);
      cursor: grab;
    }

    .course.locked.state-completed {
      background: var(--completed-bg);
      border-inline-start-color: var(--completed-border);
    }

    .course.locked.state-current {
      background: var(--current-bg);
      color: var(--current-text);
      border-inline-start-color: var(--current-border);
    }

    .course .code-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .course .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      opacity: .9;
    }

    .course .lock-icon {
      font-size: 11px;
      opacity: .85;
    }

    .course .icon-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .exam-tick {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      border-radius: 3px;
      border: 1.5px solid rgba(255, 255, 255, .55);
      background: transparent;
      color: transparent;
      font-size: 11px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .exam-tick:hover {
      border-color: #fff;
    }

    .exam-tick.checked {
      background: #2f5fa8;
      border-color: #2f5fa8;
      color: #fff;
    }

    .move-tick {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      border-radius: 4px;
      border: 1.5px solid rgba(255, 255, 255, .55);
      background: transparent;
      color: currentColor;
      font-size: 12px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .move-tick:hover,
    .move-tick.active {
      background: var(--term-badge);
      border-color: var(--term-badge);
      color: #fff;
    }

    .course.move-selected {
      outline: 3px solid var(--summer-badge);
      outline-offset: -3px;
      filter: brightness(1.08);
    }

    .term-courses.move-target {
      box-shadow: inset 0 0 0 2px rgba(192, 122, 31, .45);
      cursor: copy;
    }

    .term-label.move-target-label,
    .add-course-tile.move-target-label {
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, .45);
      cursor: copy;
    }

    .course.locked .exam-tick {
      border-color: rgba(255, 255, 255, .4);
    }

    .course.exempted .name {
      text-decoration: line-through;
      text-decoration-color: currentColor;
      text-decoration-thickness: 1.5px;
    }

    .course .name {
      font-size: 12.5px;
      font-weight: 500;
      line-height: 1.35;
    }

    .add-course-tile {
      flex: 0 0 44px;
      width: 44px;
      min-height: 58px;
      background: transparent;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      transition: .12s;
    }

    .add-course-tile:hover {
      border-color: var(--term-badge);
      color: var(--term-badge);
    }

    .lang-toggle {
      font-family: 'JetBrains Mono', monospace !important;
      font-weight: 700;
      min-width: 42px;
    }

    .lang-toggle:hover {
      border-color: var(--summer-badge) !important;
      color: var(--summer-badge) !important;
    }

    .lang-toggle.active {
      background: var(--term-badge) !important;
      border-color: var(--term-badge) !important;
      color: #fff !important;
    }

    .course.view-only {
      cursor: default;
    }

    .compare-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      display: none;
      z-index: 60;
    }

    .compare-overlay.open {
      display: block;
    }

    .compare-panel {
      position: fixed;
      top: 4%;
      left: 50%;
      transform: translateX(-50%);
      width: min(1180px, 94vw);
      max-height: 90vh;
      overflow-y: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: none;
      z-index: 61;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .45);
    }

    .compare-panel.open {
      display: block;
    }

    .walk-panel {
      position: fixed;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, 92vw);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: none;
      z-index: 61;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .45);
    }

    .walk-panel.open {
      display: block;
    }

    .summer-panel {
      width: min(640px, 92vw);
    }

    .summer-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      max-height: min(54vh, 430px);
      overflow-y: auto;
      margin-top: 16px;
      padding-inline-end: 4px;
    }

    .summer-option {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 12px;
      text-align: start;
      cursor: pointer;
      transition: border-color .14s ease, background .14s ease, transform .14s ease;
    }

    .summer-option:hover {
      border-color: var(--summer-badge);
      background: rgba(205, 130, 24, .12);
      transform: translateY(-1px);
    }

    .gap-panel .summer-option:hover {
      border-color: var(--gap-badge);
      background: rgba(91, 100, 114, .16);
      transform: translateY(-1px);
    }

    .summer-option-title {
      display: block;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .summer-option-meta {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .summer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .summer-actions button {
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 7px;
      cursor: pointer;
    }

    .summer-actions button:hover {
      border-color: var(--summer-badge);
      color: var(--summer-badge);
    }

    .walk-step-count {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      margin: 12px 0 8px;
    }

    .walk-step-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .walk-step-body {
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.55;
      min-height: 44px;
    }

    .walk-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }

    .walk-actions button {
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 7px;
      cursor: pointer;
    }

    .walk-actions button:last-child {
      border-color: var(--term-badge);
      background: var(--term-badge);
      color: #fff;
    }

    .compare-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .compare-header h2 {
      font-size: 16px;
      font-weight: 800;
    }

    .compare-close {
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .compare-close:hover {
      border-color: var(--term-badge);
      color: var(--term-badge);
    }

    .grad-form {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      margin: 10px 0 18px;
    }

    .grad-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .grad-field label {
      font-size: 11.5px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .grad-field select,
    .grad-field input {
      font-family: 'Tajawal', sans-serif;
      font-size: 13.5px;
      padding: 8px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      min-width: 140px;
    }

    .grad-calc-btn {
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 18px;
      border-radius: 7px;
      border: 1px solid var(--term-badge);
      background: var(--term-badge);
      color: #fff;
      cursor: pointer;
    }

    .grad-calc-btn:hover {
      filter: brightness(1.1);
    }

    .grad-results {
      display: none;
      flex-wrap: wrap;
      gap: 14px;
    }

    .grad-results.show {
      display: flex;
    }

    .grad-card {
      flex: 1 1 220px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .grad-card-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    .grad-card-value {
      font-size: 18px;
      font-weight: 800;
    }

    .grad-status-ahead .grad-card-value {
      color: var(--completed-bg);
    }

    .grad-status-behind .grad-card-value {
      color: var(--not-taken-bg);
    }

    .grad-status-ontrack .grad-card-value {
      color: var(--term-badge);
    }

    .grad-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    .legend {
      display: flex;
      gap: 22px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 13px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .swatch {
      width: 20px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .swatch.red {
      background: var(--not-taken-bg);
    }

    .swatch.white {
      background: var(--current-bg);
      border-color: var(--current-border);
    }

    .swatch.green {
      background: var(--completed-bg);
    }

    .swatch.locked {
      background: var(--locked-bg);
    }

    footer.hint {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: .2s;
      z-index: 999;
      max-width: 90vw;
      text-align: center;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 900px) {
      body {
        padding: 18px 12px 72px;
      }

      .wrap {
        max-width: none;
      }

      header.page-head {
        align-items: stretch;
        padding: 12px;
      }

      header.page-head>div:first-child,
      .progress-row,
      .actions {
        width: 100%;
      }

      .actions {
        display: grid;
        grid-template-columns: repeat(6, minmax(42px, 1fr));
      }

      .actions button {
        min-height: 42px;
        padding: 8px 10px;
      }

      .actions .add-summer,
      .actions .add-gap,
      .actions #resetBtn {
        grid-column: span 2;
      }

      .course {
        flex-basis: 170px;
        max-width: none;
        min-height: 64px;
      }

      .compare-panel {
        inset: 12px;
        width: auto;
        max-height: calc(100dvh - 24px);
        transform: none;
        left: auto;
        top: auto;
        padding: 14px;
      }

      .walk-panel {
        inset-inline: 12px;
        top: max(12px, env(safe-area-inset-top));
        width: auto;
        max-height: calc(100dvh - 24px);
        overflow-y: auto;
        transform: none;
        left: auto;
        padding: 16px;
      }

      .grad-form,
      .grad-results.show {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grad-field select,
      .grad-field input,
      .grad-calc-btn {
        width: 100%;
        min-width: 0;
      }
    }

    @media (max-width: 720px) {
      .term-row {
        flex-direction: column;
      }

      .term-label {
        flex: none;
        min-height: 42px;
        padding: 8px;
      }

      .term-courses {
        min-height: 54px;
      }

      .course {
        flex: 1 1 calc(50% - 1px);
      }

      .add-course-tile {
        width: 100%;
        flex: 0 0 42px;
        min-height: 42px;
      }

      .legend {
        justify-content: flex-start;
        gap: 12px;
      }
    }

    @media (max-width: 520px) {

    // Mirrors the blue "اختياري X - Y" badges on the official plan: X = hours completed so far, Y = hours required from that block.
    const ELECTIVE_GROUPS = [
      {
        id: 'grp-a',
        label: 'Math Elective - choose 1',
        required: 3
      },
      {
        id: 'grp-b',
        label: 'General Electives - choose 4',
        required: 12
      },
      {
        id: 'grp-c',
        label: 'Physical Education - choose 1',
        required: 1
      }
    ];

    /* ---------- State ---------- */
    const STORAGE_KEY = 'shoug_academic_plan_grid_se_v1';
    const STATES = ['not-taken', 'current', 'completed'];
    let statusMap = {};      // code -> status
    let assignments = {};    // code -> location id (a term id or an elective group id)
    let extraTerms = [];     // user-added summer terms {id,labelAr,labelEn,order,isSummer}
    let customCourses = [];  // user-added courses (same shape as COURSES entries)
    let examMap = {};        // code -> true if waived via a promotion/placement test (examEligible courses only)
    let selectedMoveCode = null; // tap-to-move support for touch devices

    function courseIndex() {
      const all = COURSES.concat(customCourses);
      const map = {};
      all.forEach(c => map[c.code] = c);
      return map;
    }

    function coopCourse(map = courseIndex()) {
      return Object.values(map).find(c => {
        const name = `${c.nameEn || c.name || ''}`.toLowerCase();
        return c.term === 't8' && (name.includes('cooperative training') || /492$/.test(c.code));
      }) || map.SE492 || map.CS492 || map.IS492 || null;
    }

    function defaultLocation(course) {
      return course.term || course.group || (ELECTIVE_GROUPS[ELECTIVE_GROUPS.length - 1] || {}).id || 'grp-culture';
    }

    // A course is "critical" (locked, non-draggable) if it's a prerequisite for at least one other course —
    // moving it could silently break that course's requirement chain.
    // General-ed / Arabic / Islamic courses students can take alongside the preparatory year in practice —
    // never lock these even if the plan lists them as a prerequisite for something later.
    const NEVER_LOCK = new Set([
      'ENG101', 'ENG103', 'MATH111', 'MATH113', 'PHY105', 'PHY205', 'PSY101',
      'ARAB101', 'ARAB103', 'ARAB203', 'ISC101', 'ISC103', 'ISC105', 'ISC203',
    ]);

    // Still enforced as critical-path (move-earlier-only), just without the ⬆ badge cluttering the card.
    const NO_CRITICAL_ICON = new Set(['PE001', 'PDS001', 'MATH001', 'ENG020', 'ENG010', 'CMP011', 'CS101', 'CS102']);

    function computeGatewaySet(map) {
      const gateways = new Set();
      Object.values(map).forEach(c => (c.prereqs || []).forEach(p => gateways.add(p)));
      NEVER_LOCK.forEach(code => gateways.delete(code));
      return gateways;
    }

    function allTerms() {
      return BASE_TERMS.concat(extraTerms).sort((a, b) => a.order - b.order);
    }
    function isGroupId(id) {
      return ELECTIVE_GROUPS.some(g => g.id === id);
    }
    function termLabel(term) {
      return lang === 'ar' ? term.labelAr : term.labelEn;
    }

    function loadState() {
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { saved = {}; }
      statusMap = saved.statusMap || {};
      extraTerms = saved.extraTerms || [];
      customCourses = saved.customCourses || [];
      examMap = saved.examMap || {};
      gradState = saved.gradState || gradState;
      const map = courseIndex();
      assignments = saved.assignments || {};
      Object.keys(map).forEach(code => {
        if (!(code in assignments)) assignments[code] = defaultLocation(map[code]);
      });
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ statusMap, assignments, extraTerms, customCourses, examMap, gradState }));
    }

    function toggleExam(code) {
      examMap[code] = !examMap[code];
      saveState();
      render();
    }

    /* ---------- Toast ---------- */
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
    }

    /* ---------- Status cycling ---------- */
    function cycleStatus(code) {
      const cur = statusMap[code] || 'not-taken';
      statusMap[code] = STATES[(STATES.indexOf(cur) + 1) % STATES.length];
      saveState();
      render();
    }

    /* ---------- Prereq-aware drag validation ---------- */
    function dependentsOf(code, map) {
      return Object.values(map).filter(c => (c.prereqs || []).includes(code));
    }

    function validateMove(code, targetId) {
      if (targetId === 'pool' || isGroupId(targetId)) return { ok: true };
      const map = courseIndex();
      const course = map[code];
      const terms = allTerms();
      const targetTerm = terms.find(term => term.id === targetId);
      const targetOrder = targetTerm.order;

      if (targetTerm.isGap) {
        return { ok: false, reason: t().gapNoCourses };
      }

      if (course.noPrepSummer && (targetTerm.isPrep || targetTerm.isSummer)) {
        return { ok: false, reason: t().moveBlockedNoPrepSummer(code) };
      }

      for (const preCode of (course.prereqs || [])) {
        const preLoc = assignments[preCode];
        if (!preLoc || preLoc === 'pool' || isGroupId(preLoc)) continue;
        const preTerm = terms.find(term => term.id === preLoc);
        if (preTerm && preTerm.order >= targetOrder) {
          return { ok: false, reason: t().moveBlockedPrereq(code, preCode) };
        }
      }
      for (const dep of dependentsOf(code, map)) {
        const depLoc = assignments[dep.code];
        if (!depLoc || depLoc === 'pool' || isGroupId(depLoc)) continue;
        const depTerm = terms.find(term => term.id === depLoc);
        if (depTerm && depTerm.order <= targetOrder) {
          return { ok: false, reason: t().moveBlockedDependent(code, dep.code) };
        }
      }

      // Critical-path courses (something else depends on them) can be pulled earlier — e.g. CS175 has no
      // prereqs so it's fine to take it in the 1st term instead of its usual 2nd — but never pushed later
      // than their listed term, since that would delay everything that depends on them.
      const gateways = computeGatewaySet(map);
      if (gateways.has(code) && !NEVER_LOCK.has(code) && course.term) {
        const defaultTerm = BASE_TERMS.find(term => term.id === course.term);
        if (defaultTerm && targetOrder > defaultTerm.order) {
          return { ok: false, reason: t().moveBlockedCritical(code) };
        }
      }

      return { ok: true };
    }

    /* ---------- Drag & drop wiring ---------- */
    let draggingCode = null;
    let suppressClick = false;

    // Swallow the stray click a browser fires on the element left under the cursor
    // right after a drop re-renders the DOM (was mis-firing the "add course" prompt).
    document.addEventListener('click', e => {
      if (suppressClick) {
        e.stopPropagation();
        e.preventDefault();
        suppressClick = false;
      }
    }, true);

    function courseEl(course, locked, readOnly) {
      const div = document.createElement('div');
      const st = statusMap[course.code] || 'not-taken';
      const exempted = course.examEligible && !!examMap[course.code];
      div.className = 'course'
        + (exempted ? ' state-completed exempted' : st === 'current' ? ' state-current' : st === 'completed' ? ' state-completed' : '')
        + (locked && !readOnly ? ' locked' : '')
        + (selectedMoveCode === course.code && !readOnly ? ' move-selected' : '')
        + (readOnly ? ' view-only' : '');
      const displayName = (lang === 'ar' ? course.name : (course.nameEn || course.name));

      const codeRow = document.createElement('div');
      codeRow.className = 'code-row';
      const codeSpan = document.createElement('span');
      codeSpan.className = 'code';
      codeSpan.textContent = course.code;
      codeRow.appendChild(codeSpan);

      if (!readOnly) {
        const icons = document.createElement('span');
        icons.className = 'icon-row';
        const moveBtn = document.createElement('button');
        moveBtn.type = 'button';
        moveBtn.className = 'move-tick' + (selectedMoveCode === course.code ? ' active' : '');
        moveBtn.textContent = '↔';
        moveBtn.title = t().moveCourseTitle;
        moveBtn.addEventListener('click', e => {
          e.stopPropagation();
          toggleMoveSelection(course.code);
        });
        icons.appendChild(moveBtn);
        if (course.examEligible) {
          const tick = document.createElement('button');
          tick.type = 'button';
          tick.className = 'exam-tick' + (exempted ? ' checked' : '');
          tick.textContent = '✓';
          tick.title = t().examTickTitle;
          tick.addEventListener('click', e => {
            e.stopPropagation();
            toggleExam(course.code);
          });
          icons.appendChild(tick);
        }
        if (locked && !NO_CRITICAL_ICON.has(course.code)) {
          const lockIcon = document.createElement('span');
          lockIcon.className = 'lock-icon';
          lockIcon.textContent = '⬆';
          lockIcon.title = t().criticalTitle;
          icons.appendChild(lockIcon);
        }
        codeRow.appendChild(icons);
      }

      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      nameSpan.textContent = displayName;

      div.appendChild(codeRow);
      div.appendChild(nameSpan);

      if (readOnly) return div;

      div.addEventListener('click', e => {
        e.stopPropagation();
        cycleStatus(course.code);
      });

      div.draggable = true;
      div.addEventListener('dragstart', e => {
        draggingCode = course.code;
        div.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', course.code);
      });
      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        draggingCode = null;
      });

      return div;
    }

    function toggleMoveSelection(code) {
      if (selectedMoveCode === code) {
        selectedMoveCode = null;
        toast(t().moveCourseCancelled);
      } else {
        selectedMoveCode = code;
        toast(t().moveCourseSelected(code));
      }
      render();
    }

    function moveSelectedCourse(locationId) {
      if (!selectedMoveCode) return false;
      const code = selectedMoveCode;
      const v = validateMove(code, locationId);
      if (!v.ok) { toast(v.reason); return true; }
      assignments[code] = locationId;
      selectedMoveCode = null;
      saveState();
      render();
      toast(t().moveCourseDone(code));
      return true;
    }

    function wireDropZone(el, locationId) {
      el.dataset.termId = locationId;
      if (selectedMoveCode) el.classList.add('move-target');
      el.addEventListener('click', e => {
        if (!selectedMoveCode) return;
        e.preventDefault();
        e.stopPropagation();
        moveSelectedCourse(locationId);
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });
      el.addEventListener('dragenter', e => {
        e.preventDefault();
        if (!draggingCode) return;
        const v = validateMove(draggingCode, locationId);
        el.classList.add(v.ok ? 'drag-over' : 'drag-invalid');
      });
      el.addEventListener('dragleave', () => {
        el.classList.remove('drag-over', 'drag-invalid');
      });
      el.addEventListener('drop', e => {
        e.preventDefault();
        el.classList.remove('drag-over', 'drag-invalid');
        const code = e.dataTransfer.getData('text/plain') || draggingCode;
        if (!code) return;
        const v = validateMove(code, locationId);
        if (!v.ok) { toast(v.reason); return; }
        assignments[code] = locationId;
        saveState();
        suppressClick = true;
        setTimeout(() => { suppressClick = false; }, 400);
        render();
      });
    }

    /* ---------- Add course / add summer term ---------- */
    function addCourseToTerm(locationId) {
      if (suppressClick) { suppressClick = false; return; }
      const targetTerm = allTerms().find(term => term.id === locationId);
      if (targetTerm && targetTerm.isGap) { toast(t().gapNoCourses); return; }
      const code = prompt(t().addCoursePromptCode);
      if (!code) return;
      const cleanCode = code.trim().toUpperCase();
      const map = courseIndex();
      if (map[cleanCode]) { toast(t().addCourseDup); return; }
      const nameInput = prompt(t().addCoursePromptName);
      const name = (nameInput && nameInput.trim()) ? nameInput.trim() : cleanCode;
      customCourses.push({ code: cleanCode, name, nameEn: name, term: isGroupId(locationId) ? null : locationId, group: isGroupId(locationId) ? locationId : null, prereqs: [] });
      assignments[cleanCode] = locationId;
      saveState();
      render();
    }

    function addSummerTerm() {
      toggleSummerPicker(true);
    }

    function toggleSummerPicker(force) {
      const overlay = document.getElementById('summerOverlay');
      const panel = document.getElementById('summerPanel');
      const shouldOpen = typeof force === 'boolean' ? force : !panel.classList.contains('open');
      overlay.classList.toggle('open', shouldOpen);
      panel.classList.toggle('open', shouldOpen);
      if (shouldOpen) renderSummerOptions();
    }

    function renderSummerOptions() {
      const s = t();
      const options = document.getElementById('summerOptions');
      const baseSorted = BASE_TERMS.slice().sort((a, b) => a.order - b.order);
      options.innerHTML = '';
      baseSorted.forEach(term => {
        const label = termLabel(term);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'summer-option';
        const title = document.createElement('span');
        title.className = 'summer-option-title';
        title.textContent = s.addSummerAfter(label);
        const meta = document.createElement('span');
        meta.className = 'summer-option-meta';
        meta.textContent = s.addSummerMeta(label);
        btn.append(title, meta);
        btn.addEventListener('click', () => confirmAddSummerTerm(term));
        options.appendChild(btn);
      });
    }

    function confirmAddSummerTerm(afterTerm) {
      const countSoFar = extraTerms.filter(term => term.isSummer).length + 1;
      const id = 'summer-' + Date.now();
      const labelAr = 'صيفي ' + countSoFar;
      const labelEn = 'Summer ' + countSoFar;
      extraTerms.push({
        id,
        labelAr,
        labelEn,
        order: afterTerm.order + 0.5,
        isSummer: true,
      });
      toggleSummerPicker(false);
      saveState();
      render();
      toast(t().addSummerAdded(lang === 'ar' ? labelAr : labelEn));
    }

    function removeExtraTerm(termId) {
      const hasCourses = Object.values(assignments).includes(termId);
      if (hasCourses) { toast(t().removeSummerBlocked); return; }
      extraTerms = extraTerms.filter(term => term.id !== termId);
      saveState();
      render();
    }

    function addGapTerm() {
      toggleGapPicker(true);
    }

    function toggleGapPicker(force) {
      const overlay = document.getElementById('gapOverlay');
      const panel = document.getElementById('gapPanel');
      const shouldOpen = typeof force === 'boolean' ? force : !panel.classList.contains('open');
      overlay.classList.toggle('open', shouldOpen);
      panel.classList.toggle('open', shouldOpen);
      if (shouldOpen) renderGapOptions();
    }

    function renderGapOptions() {
      const s = t();
      const options = document.getElementById('gapOptions');
      const baseSorted = BASE_TERMS.slice().sort((a, b) => a.order - b.order);
      options.innerHTML = '';
      baseSorted.forEach(term => {
        const label = termLabel(term);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'summer-option';
        const title = document.createElement('span');
        title.className = 'summer-option-title';
        title.textContent = s.addGapAfter(label);

    function walkthroughSteps(map) {

      const hasCustomLayout = summerCount > 0 || gapCount > 0 || movedCount > 0 || customCourses.length > 0;
      return hasCustomLayout
        ? s.walkCustomSteps(summerCount, movedCount)
        : (doneCount > 0 || currentCount > 0 ? s.walkProgressSteps(doneCount, currentCount) : s.walkBlankSteps);

    // Counting every elective as its own slot (98 total) wildly overstates what's left — most electives are
    // interchangeable options where only ONE satisfies the requirement (e.g. any single PE course covers the
    // whole PE group). This counts against the real required course count instead: every core/prep course,
    // plus one slot per elective group that actually carries required hours (satisfied once any course in
    // that group is completed/waived) — matching the same total used by the "Remaining to graduate" card.
    function updateProgress(map) {
      const startTermId = (gradState && gradState.startTerm) || 'prep1';
      const totals = totalPlanRequirements(startTermId);
      let done = 0;
      Object.values(map).forEach(c => {
        if (!c.term || !termMeetsStartScope(c, startTermId)) return;
        if (statusMap[c.code] === 'completed' || (c.examEligible && examMap[c.code])) done++;
      });
      ELECTIVE_GROUPS.forEach(g => {
        if (g.required <= 0) return;
        const completedHours = Object.values(map)
          .filter(c => c.group === g.id && isCourseDone(c))
          .reduce((sum, c) => sum + (c.hours || 0), 0);
        if (completedHours >= g.required) done++;
      });
      const pct = totals.courses ? Math.round((done / totals.courses) * 100) : 0;
      document.getElementById('progressText').textContent = t().progress(done, totals.courses, pct);
      document.getElementById('progressFill').style.width = pct + '%';
    }

    // Read-only static course tile for the comparison panel: same status colors, no drag/lock affordances.

    function stepWalkthrough(delta) {
      const steps = walkthroughSteps(courseIndex());
      const nextStep = walkStep + delta;
      if (nextStep >= steps.length) {
        toggleWalkthrough(false);
        return;
      }
      walkStep = Math.max(0, nextStep);

    }

    /* ---------- Graduation timeline ---------- */
    // PSU runs two regular terms a year: Fall (odd term order) and Spring (even term order) — prep1=-1(Fall),
    // prep2=0(Spring), 1st=1(Fall), 2nd=2(Spring), ... 8th=8(Spring). Prep is counted as its own
    // academic year when the student selects Prep 1st / Prep 2nd as the entry point.
    let gradState = { startTerm: 'prep1', startYear: null };

    function semesterTypeForOrder(order) {
      return order % 2 === 0 ? 'spring' : 'fall';
    }

    // Keep the visible plan order and the calendar order identical. If a student selects Prep 1st, that means
    // they started in the preparatory year, so Prep 1st/Prep 2nd must not be collapsed onto 1st/2nd semester.
    function calendarOrder(order) {
      return order;
    }

    // Display Spring by the Gregorian year it mostly belongs to: Fall 2023 -> Spring 2024 -> Fall 2024.
    // That matches the user's "Year (Gregorian)" input and makes Prep 1st 2023 graduate in Spring 2028
    // for a five-year path: one prep year plus four major years.
    function advanceSemester(year, semester) {
      return semester === 'fall' ? { year: year + 1, semester: 'spring' } : { year, semester: 'fall' };
    }

    function stepsBetween(fromYear, fromSemester, toYear, toSemester) {
      let y = fromYear, s = fromSemester, steps = 0;
      while ((y !== toYear || s !== toSemester) && steps < 60) {
        const next = advanceSemester(y, s);
        y = next.year; s = next.semester;
        steps++;
      }
      return steps;
    }

    // Fall runs ~Aug-Nov. Spring runs ~Dec-Apr and is labeled by the following Gregorian year; May-Jul is
    // the summer break/session, counted as having just finished that year's Spring.
    function currentAcademicSemester() {
      const now = new Date();
      const m = now.getMonth() + 1;
      const y = now.getFullYear();
      if (m >= 8 && m <= 11) return { year: y, semester: 'fall' };
      if (m === 12) return { year: y + 1, semester: 'spring' };
      if (m <= 4) return { year: y, semester: 'spring' };
      return { year: y, semester: 'spring' }; // May-Jul summer break
    }

    function psuTermCode(termRef) {
      const academicYear = termRef.semester === 'fall' ? termRef.year : termRef.year - 1;
      const yearCode = String(academicYear % 100).padStart(2, '0');
      const semesterCode = termRef.semester === 'fall' ? '1' : termRef.semester === 'spring' ? '2' : '3';
      return yearCode + semesterCode;
    }

    function psuTermLabel(termRef) {
      const s = t();
      const name = termRef.semester === 'fall'
        ? s.termFirst
        : termRef.semester === 'spring'
          ? s.termSecond
          : s.termSummer;
      return `${name} ${psuTermCode(termRef)}`;
    }

    function nextDegreeTermAfter(coopTerm) {
      if (coopTerm.semester === 'spring') return { year: coopTerm.year, semester: 'summer' };
      if (coopTerm.semester === 'fall') return { year: coopTerm.year + 1, semester: 'spring' };
      return { year: coopTerm.year + 1, semester: 'fall' };
    }

    // Your "current position" is the last term reached by walking CONSECUTIVELY from the start — not just
    // the highest order that has any single course marked done. A stray/leftover mark in a much later term
    // (e.g. from earlier testing) shouldn't make you look "ahead" while everything in between is untouched;
    // that term only counts once every term before it is actually complete.
    function furthestReachedOrder(startTermId) {
      const map = courseIndex();
      const startTerm = BASE_TERMS.find(bt => bt.id === startTermId);
      const startOrder = startTerm ? startTerm.order : -Infinity;
      const terms = allTerms().slice().sort((a, b) => a.order - b.order);
      const isDone = code => {
        const course = map[code];
        if (!course) return false;
        return isCourseDone(course);
      };
      const isTouched = code => isDone(code) || statusMap[code] === 'current';

      let lastFullyDoneOrder = null;
      for (const term of terms) {
        if (term.order < startOrder) continue;
        const termCourses = Object.keys(assignments).filter(code => assignments[code] === term.id && map[code]);
        if (termCourses.length === 0) continue;
        if (termCourses.every(isDone)) {
          lastFullyDoneOrder = { raw: term.order, calendar: calendarOrder(term.order) };
          continue;
        }
        if (termCourses.some(isTouched)) return { raw: term.order, calendar: calendarOrder(term.order) }; // currently in this term
        break; // first untouched term — stop here, ignore anything further out
      }
      return lastFullyDoneOrder;
    }


    function isCourseDone(course) {
      return statusMap[course.code] === 'completed' || (course.examEligible && examMap[course.code]);
    }

    function termMeetsStartScope(course, startTermId) {
      if (!course.term) return false;
      const courseTerm = BASE_TERMS.find(bt => bt.id === course.term);
      const startTerm = BASE_TERMS.find(bt => bt.id === startTermId);
      if (!courseTerm || !startTerm) return true;
      return courseTerm.order >= startTerm.order;
    }

    function completedElectiveProgress(map) {
      let courses = 0, hours = 0;
      ELECTIVE_GROUPS.forEach(g => {
        if (g.required <= 0) return;
        const completedHours = Object.values(map)
          .filter(c => c.group === g.id && isCourseDone(c))
          .reduce((sum, c) => sum + (c.hours || 0), 0);
        hours += Math.min(completedHours, g.required);
        if (completedHours >= g.required) courses++;
      });
      return { courses, hours };
    }

    // How many courses/hours a student pacing normally would have finished by "expectedOrder", vs.
    // how many the student has actually marked done (completed or exam-waived).
    function courseAndHourProgress(expectedOrder, startTermId) {
      const map = courseIndex();
      let expectedCourses = 0, expectedHours = 0, actualCourses = 0, actualHours = 0;

      Object.values(map).forEach(course => {
        const hours = course.hours || 0;
        if (course.term && termMeetsStartScope(course, startTermId)) {
          const termDef = BASE_TERMS.find(bt => bt.id === course.term);
          if (termDef && calendarOrder(termDef.order) <= expectedOrder) {
            expectedCourses++;
            expectedHours += hours;
          }
        }
        // PSU's own registrar plan reports "hours passed" separately from "hours registered" (in-progress,
        // ungraded) — e.g. a course you're currently taking shows up under "credit hours registered," not
        // under "credit hours passed." Match that: only fully completed/waived courses count as earned here.
        if (course.term && termMeetsStartScope(course, startTermId) && isCourseDone(course)) {
          actualCourses++;
          actualHours += hours;
        }
      });

      if (expectedOrder >= BASE_TERMS.find(bt => bt.id === 't8').order) {
        ELECTIVE_GROUPS.forEach(g => {
          if (g.required <= 0) return;
          expectedCourses++;
          expectedHours += g.required;
        });
      }

      const electiveProgress = completedElectiveProgress(map);
      actualCourses += electiveProgress.courses;
      actualHours += electiveProgress.hours;

      return { expectedCourses, expectedHours, actualCourses, actualHours };
    }

    // The official plan totals 134 credit hours (per the registrar PDF), covering every core/prep course
    // plus exactly one course from each elective group that actually carries required hours (the
    // culture/language group is a free 0-hour elective and doesn't count toward the 134).
    function totalPlanRequirements(startTermId) {
      let hours = 0, courses = 0;
      COURSES.forEach(c => {
        if (c.term && (!startTermId || termMeetsStartScope(c, startTermId))) {
          hours += c.hours || 0;
          courses++;
        }
      });
      ELECTIVE_GROUPS.forEach(g => {
        if (g.required > 0) {
          hours += g.required;
          courses += 1;
        }
      });
      return { hours, courses };
    }

    function calculateGraduation() {
      const s = t();
      const termId = document.getElementById('gradStartTerm').value;
      const yearRaw = document.getElementById('gradStartYear').value;
      const year = parseInt(yearRaw, 10);
      const results = document.getElementById('gradResults');
      const note = document.getElementById('gradNote');

      if (!year || year < 2000 || year > 2100) {
        results.classList.remove('show');
        note.textContent = s.gradInvalid;
        return;
      }

      gradState = { startTerm: termId, startYear: year };
      saveState();

      const startTerm = BASE_TERMS.find(bt => bt.id === termId);
      const t8 = BASE_TERMS.find(bt => bt.id === 't8');
      const startSemester = semesterTypeForOrder(startTerm.order);

      const now = currentAcademicSemester();
      const stepsElapsed = stepsBetween(year, startSemester, now.year, now.semester);
      // Uncapped: how many order-steps have really elapsed since your start, with no ceiling at t8. Capping
      // this at the plan length used to hide just how far behind a badly-delayed student actually is (it
      // made "now" freeze at the plan's own end once you were even one term late).
      const expectedOrder = calendarOrder(startTerm.order) + stepsElapsed;
      const actualPosition = furthestReachedOrder(termId);

      const progress = courseAndHourProgress(expectedOrder, termId);
      const courseDiff = progress.actualCourses - progress.expectedCourses;
      const hourDiff = progress.actualHours - progress.expectedHours;

      const map = courseIndex();
      updateProgress(map);
      const planTerms = allTerms();
      const currentPositionOrder = actualPosition !== null ? actualPosition.raw : (startTerm.order - 1);
      const remainingTermsList = planTerms
        .filter(term => term.order > currentPositionOrder)
        .filter(term => Object.values(map).some(c => assignments[c.code] === term.id && !isCourseDone(c)));
      const coopRemaining = remainingTermsList.some(term => term.id === 't8') ? 1 : 0;
      const regularRemaining = remainingTermsList.filter(term => !term.isSummer && term.id !== 't8').length;
      const summerCount = remainingTermsList.filter(term => term.isSummer).length;
      const totalsForPace = totalPlanRequirements(termId);

      // Expected graduation is anchored at "now" (expectedOrder) and walked forward by however many regular/
      // co-op term-slots your current layout still has pending (summers don't count — they're squeezed into
      // breaks, not an extra fall/spring slot). That reflects real progress in both directions: fewer slots
      // left than the standard plan pulls the date earlier (e.g. only co-op remaining), more slots left pushes
      // it later — instead of a catalog target that never moved and a "behind" push that could land in the past.
      const stepsNatural = t8.order - calendarOrder(startTerm.order);
      let grad = { year, semester: startSemester };
      if (actualPosition === null) {
        for (let i = 0; i < stepsNatural; i++) grad = advanceSemester(grad.year, grad.semester);
      } else {
        const remainingCount = regularRemaining + coopRemaining;
        const projectedOrder = expectedOrder + remainingCount;
        const orderSteps = Math.max(0, projectedOrder - startTerm.order);
        for (let i = 0; i < orderSteps; i++) grad = advanceSemester(grad.year, grad.semester);
      }
      const degreeTerm = nextDegreeTermAfter(grad);

      document.getElementById('gradExpectedValue').textContent =
        `${grad.semester === 'fall' ? s.gradFall : s.gradSpring} ${grad.year}`;
      if (actualPosition === null) {
        document.getElementById('gradExpectedNote').textContent = '';
      } else {
        const projectedOrder = expectedOrder + regularRemaining + coopRemaining;
        const deltaFromStandard = Math.round(projectedOrder - t8.order);
        document.getElementById('gradExpectedNote').textContent =
          deltaFromStandard > 0 ? s.gradExpectedDelayed(deltaFromStandard)
          : deltaFromStandard < 0 ? s.gradExpectedEarly(Math.abs(deltaFromStandard))
          : '';
      }
      document.getElementById('gradCoopTermValue').textContent = psuTermLabel(grad);
      document.getElementById('gradDegreeTermValue').textContent = psuTermLabel(degreeTerm);

      const statusCard = document.getElementById('gradStatusCard');
      const statusValue = document.getElementById('gradStatusValue');
      statusCard.classList.remove('grad-status-ahead', 'grad-status-behind', 'grad-status-ontrack');

      const coursesCard = document.getElementById('gradCoursesCard');
      const coursesValue = document.getElementById('gradCoursesValue');
      coursesCard.classList.remove('grad-status-ahead', 'grad-status-behind', 'grad-status-ontrack');
      if (courseDiff === 0) {
        coursesCard.classList.add('grad-status-ontrack');
        coursesValue.textContent = s.gradOnTrack;
      } else if (courseDiff > 0) {
        coursesCard.classList.add('grad-status-ahead');
        coursesValue.textContent = s.gradAheadCourses(courseDiff);
      } else {
        coursesCard.classList.add('grad-status-behind');
        coursesValue.textContent = s.gradBehindCourses(Math.abs(courseDiff));
      }

      const hoursCard = document.getElementById('gradHoursCard');
      const hoursValue = document.getElementById('gradHoursValue');
      hoursCard.classList.remove('grad-status-ahead', 'grad-status-behind', 'grad-status-ontrack');
      if (hourDiff === 0) {
        hoursCard.classList.add('grad-status-ontrack');
        hoursValue.textContent = s.gradOnTrack;
      } else if (hourDiff > 0) {
        hoursCard.classList.add('grad-status-ahead');
        hoursValue.textContent = s.gradAheadHours(hourDiff);
      } else {
        hoursCard.classList.add('grad-status-behind');
        hoursValue.textContent = s.gradBehindHours(Math.abs(hourDiff));
      }

      const remainingHours = Math.max(0, totalsForPace.hours - progress.actualHours);
      const remainingCourses = Math.max(0, totalsForPace.courses - progress.actualCourses);
      document.getElementById('gradRemainingValue').textContent =
        s.gradRemainingValue(remainingHours, remainingCourses, totalsForPace.hours);

      const coop = coopCourse(map);
      const coopCode = coop ? coop.code : '';
      const coopDone = coop ? isCourseDone(coop) : false;
      const coopHours = (coop || {}).hours || 10;
      document.getElementById('gradCoopNote').textContent =
        coopDone ? s.gradCoopDone(coopCode) : s.gradCoopPending(coopHours, coopCode);

      if (actualPosition === null) {
        statusValue.textContent = '—';
        note.textContent = s.gradNoProgress;
      } else {
        const diff = actualPosition.calendar - expectedOrder;
        if (diff === 0) {
          statusCard.classList.add('grad-status-ontrack');
          statusValue.textContent = s.gradOnTrack;
        } else if (diff > 0) {
          statusCard.classList.add('grad-status-ahead');
          statusValue.textContent = s.gradAhead(diff);
        } else {
          statusCard.classList.add('grad-status-behind');
          statusValue.textContent = s.gradBehind(Math.abs(diff));
        }
        const breakdownParts = [];
        if (regularRemaining > 0) breakdownParts.push(s.gradPartRegular(regularRemaining));
        if (summerCount > 0) breakdownParts.push(s.gradPartSummer(summerCount));
        if (coopRemaining > 0) breakdownParts.push(s.gradPartCoop(coopCode));
        const totalTerms = regularRemaining + summerCount + coopRemaining;
        note.textContent = breakdownParts.length
          ? s.gradBasisTotal(breakdownParts.join(s.gradPartJoin), totalTerms)
          : s.gradBasisDone;
      }

      results.classList.add('show');
    }

    function toggleGrad(open) {
      const overlay = document.getElementById('gradOverlay');
      const panel = document.getElementById('gradPanel');
      const shouldOpen = open !== undefined ? open : !panel.classList.contains('open');
      overlay.classList.toggle('open', shouldOpen);
      panel.classList.toggle('open', shouldOpen);
      if (shouldOpen) {
        document.getElementById('gradStartTerm').value = gradState.startTerm || 'prep1';
        document.getElementById('gradStartYear').value = gradState.startYear || '';
        if (gradState.startYear) calculateGraduation();
      }
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (confirm(t().resetConfirm)) {
        statusMap = {};
        examMap = {};
        extraTerms = [];
        customCourses = [];
        assignments = {};
        const map = courseIndex();
        Object.keys(map).forEach(code => { assignments[code] = defaultLocation(map[code]); });
        saveState();
        render();
      }
    });
    document.getElementById('addSummerBtn').addEventListener('click', addSummerTerm);
    document.getElementById('summerCloseBtn').addEventListener('click', () => toggleSummerPicker(false));
    document.getElementById('summerCancelBtn').addEventListener('click', () => toggleSummerPicker(false));
    document.getElementById('summerOverlay').addEventListener('click', () => toggleSummerPicker(false));
    document.getElementById('addGapBtn').addEventListener('click', addGapTerm);
    document.getElementById('gapCloseBtn').addEventListener('click', () => toggleGapPicker(false));
    document.getElementById('gapCancelBtn').addEventListener('click', () => toggleGapPicker(false));
    document.getElementById('gapOverlay').addEventListener('click', () => toggleGapPicker(false));
    document.getElementById('langBtn').addEventListener('click', () => {
      lang = lang === 'ar' ? 'en' : 'ar';
      localStorage.setItem(LANG_KEY, lang);
      render();
    });
    document.getElementById('viewModeBtn').addEventListener('click', () => {
      viewMode = !viewMode;
      if (viewMode) selectedMoveCode = null;
      localStorage.setItem(VIEW_MODE_KEY, viewMode ? '1' : '0');
      render();
    });
    document.getElementById('themeBtn').addEventListener('click', () => {
      const next = currentTheme() === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
      renderStaticText();
    });
    document.getElementById('walkBtn').addEventListener('click', () => toggleWalkthrough());
    document.getElementById('walkCloseBtn').addEventListener('click', () => toggleWalkthrough(false));
    document.getElementById('walkOverlay').addEventListener('click', () => toggleWalkthrough(false));
    document.getElementById('walkPrevBtn').addEventListener('click', () => stepWalkthrough(-1));
    document.getElementById('walkNextBtn').addEventListener('click', () => stepWalkthrough(1));
    document.getElementById('eyeBtn').addEventListener('click', () => toggleCompare());
    document.getElementById('compareCloseBtn').addEventListener('click', () => toggleCompare(false));
    document.getElementById('compareOverlay').addEventListener('click', () => toggleCompare(false));
    document.getElementById('gradBtn').addEventListener('click', () => toggleGrad());
    document.getElementById('gradCloseBtn').addEventListener('click', () => toggleGrad(false));
    document.getElementById('gradOverlay').addEventListener('click', () => toggleGrad(false));
    document.getElementById('gradCalcBtn').addEventListener('click', calculateGraduation);

    loadState();
    render();
  </script>

</body>

</html>
