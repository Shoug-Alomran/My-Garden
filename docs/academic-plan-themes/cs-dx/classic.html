  <style>
    :root {
      color-scheme: dark;
      --bg: #05020a;
      --surface: #0a0514;
      --ink: #f7f3ff;
      --muted: #9a90aa;
      --purple: #b829ea;
      --red: #ff2a4b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;

      width: min(720px, 100%);
      border: 1px solid rgba(184, 41, 234, .35);
      background: var(--surface);
      padding: 34px;
    }

    .eyebrow {
      color: var(--purple);
      font: 700 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .18em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.05;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      color: var(--red);
      text-decoration: none;
      font: 700 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

</head>
