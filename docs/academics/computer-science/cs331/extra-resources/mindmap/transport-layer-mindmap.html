      }
      function updateButtons(theme) {
        document.querySelectorAll('#themeToggle, #themeBtn').forEach(function (button) {
          buttonLabel(button, theme);
        });
      }
      function applyTheme(theme, persist) {
        theme = normalize(theme) || 'dark';
        root.dataset.theme = theme;
        root.setAttribute('data-theme', theme);
            try { localStorage.setItem('shoug-theme', document.documentElement.getAttribute('data-theme')); } catch(_e) {}
        if (persist) keys.forEach(function (key) { localStorage.setItem(key, theme); });
        updateButtons(theme);
      }
      function currentTheme() {
        return normalize(root.dataset.theme || root.getAttribute('data-theme')) || 'dark';
      }
      applyTheme(parentTheme() || savedTheme() || currentTheme(), false);
      document.querySelectorAll('#themeToggle, #themeBtn').forEach(function (button) {
        button.addEventListener('click', function () {
          window.setTimeout(function () { applyTheme(currentTheme(), true); }, 0);
        });
      });
      try {
        if (window.parent && window.parent !== window && window.parent.document) {
          var parentRoot = window.parent.document.documentElement;
          new MutationObserver(function () {
            var theme = parentTheme();
            if (theme) applyTheme(theme, false);
          }).observe(parentRoot, { attributes: true, attributeFilter: ['data-md-color-scheme', 'data-theme'] });
        }
      } catch (e) {}
    })();
  </script>
</body>
