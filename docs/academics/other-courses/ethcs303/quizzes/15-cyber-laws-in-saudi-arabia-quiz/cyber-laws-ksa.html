<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <link rel="icon" type="image/png" href="/assets/favicon.png?v=2">
    <link rel="shortcut icon" href="/assets/favicon.png?v=2">
    <link rel="apple-touch-icon" href="/assets/favicon.png?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Laws in Saudi Arabia — Exam Prep Quiz</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f6f3ee;
            --surface: #ffffff;
            --surface2: #f0ece4;
            --surface3: #fbf9f5;
            --border: rgba(42, 35, 25, 0.12);
            --border-strong: rgba(42, 35, 25, 0.22);
            --txt: #211d18;
            --txt2: #625a50;
            --txt3: #91887c;
            --accent: #28645b;
            --accent-light: #e5f2ef;
            --accent2: #b9782f;
            --accent2-light: #fff1dc;
            --hero-start: #f7fbf8;
            --hero-end: #fff4e5;
            --correct: #2d6a4f;
            --correct-bg: #e9f7ef;
            --correct-border: #94d2ad;
            --wrong: #9b2226;
            --wrong-bg: #fff0f0;
            --wrong-border: #e8a5a7;
            --partial: #8a5a12;
            --partial-bg: #fff7e6;
            --partial-border: #e9c46a;
            --radius: 12px;
            --radius-lg: 18px;
            --shadow: 0 14px 38px rgba(67, 48, 22, 0.08);
        }

        [data-theme="dark"] {
            --bg: #101722;
            --surface: #182233;
            --surface2: #212d42;
            --surface3: #151e2d;
            --border: rgba(226, 232, 240, 0.12);
            --border-strong: rgba(226, 232, 240, 0.22);
            --txt: #eef3f8;
            --txt2: #b7c2cf;
            --txt3: #7f8da0;
            --accent: #83d0af;
            --accent-light: rgba(131, 208, 175, 0.13);
            --accent2: #f4b66e;
            --accent2-light: rgba(244, 182, 110, 0.14);
            --hero-start: #1d3551;
            --hero-end: #24304a;
            --correct: #94d2bd;
            --correct-bg: rgba(45, 106, 79, 0.24);
            --correct-border: rgba(148, 210, 173, 0.42);
            --wrong: #ffb4a8;
            --wrong-bg: rgba(155, 34, 38, 0.22);
            --wrong-border: rgba(255, 180, 168, 0.36);
            --partial: #ffd27d;
            --partial-bg: rgba(233, 196, 106, 0.16);
            --partial-border: rgba(255, 210, 125, 0.35);
            --shadow: 0 24px 55px rgba(0, 0, 0, 0.28);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            background:
                radial-gradient(circle at top left, rgba(40, 100, 91, 0.10), transparent 28rem),
                radial-gradient(circle at top right, rgba(185, 120, 47, 0.10), transparent 26rem),
                var(--bg);
            color: var(--txt);
            line-height: 1.65;
            min-height: 100vh;
            transition: background .3s, color .3s;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: color-mix(in srgb, var(--surface) 88%, transparent);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--txt);
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent2);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-pill {
            font-size: 12px;
            font-weight: 500;
            color: var(--txt2);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            min-width: 80px;
            text-align: center;
        }

        #theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-strong);
            background: var(--surface2);
            color: var(--txt);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background .2s, transform .2s;
        }

        #theme-btn:hover {
            background: var(--accent-light);
            transform: rotate(20deg);
        }

        .progress-track {
            height: 3px;
            background: var(--surface2);
            position: sticky;
            top: 60px;
            z-index: 99;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .4s cubic-bezier(.4, 0, .2, 1);
        }

        main {
            max-width: 920px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        .hero {
            margin-bottom: 2.25rem;
            padding: clamp(1.4rem, 4vw, 2.25rem);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            background:
                linear-gradient(135deg, var(--hero-start), var(--hero-end));
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -5rem -7rem auto;
            width: 18rem;
            height: 18rem;
            border-radius: 50%;
            background: rgba(131, 208, 175, 0.18);
            pointer-events: none;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(30px, 5vw, 52px);
            font-weight: 600;
            color: var(--txt);
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: .75rem;
            position: relative;
            z-index: 1;
        }

        .hero p {
            max-width: 62ch;
            font-size: 16px;
            color: var(--txt2);
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            margin-top: 1.25rem;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .stat-chip {
            font-size: 13px;
            font-weight: 700;
            color: var(--txt);
            background: color-mix(in srgb, var(--surface) 88%, transparent);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 7px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }

        .stat-chip .dot.amber {
            background: var(--accent2);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 2.5rem 0 1rem;
        }

        .section-letter {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        [data-theme="dark"] .section-letter {
            color: var(--bg);
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--txt2);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: clamp(1.1rem, 2.5vw, 1.6rem);
            margin-bottom: 1.1rem;
            box-shadow: var(--shadow);
            transition: border-color .2s, transform .2s;
        }

        .q-card:hover {
            border-color: var(--border-strong);
            transform: translateY(-1px);
        }

        .q-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: .6rem;
        }

        .q-num {
            font-size: 11px;
            color: var(--txt3);
            font-weight: 500;
        }

        .q-tag {
            font-size: 11px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 5px;
            padding: 2px 8px;
            font-weight: 500;
        }

        .q-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--txt);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .opt-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .15s;
            font-size: 14px;
            color: var(--txt);
            background: var(--surface3);
        }

        .opt-label:hover {
            background: var(--accent-light);
            border-color: var(--border-strong);
            transform: translateX(2px);
        }

        .opt-label input[type="radio"] {
            margin-top: 3px;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .opt-label.c-correct {
            background: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: var(--correct);
        }

        .opt-label.c-wrong {
            background: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: var(--wrong);
        }

        .tf-group {
            display: flex;
            gap: 8px;
        }

        .tf-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface3);
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
        }

        .tf-btn:hover {
            background: var(--surface2);
            border-color: var(--border-strong);
        }

        .tf-btn.active {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tf-btn.c-correct {
            background: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: var(--correct) !important;
        }

        .tf-btn.c-wrong {
            background: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: var(--wrong) !important;
        }

        .fill-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface3);
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color .15s;
            outline: none;
        }

        .fill-input:focus {
            border-color: var(--accent);
        }

        textarea.fill-input {
            resize: vertical;
            min-height: 90px;
            line-height: 1.55;
        }

        .match-pair {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .match-term {
            font-size: 13px;
            font-weight: 500;
            color: var(--txt);
            background: var(--accent-light);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 12px;
            flex: 0 0 155px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-arrow {
            color: var(--txt3);
            font-size: 14px;
            flex-shrink: 0;
        }

        .match-select {
            flex: 1;
            padding: 7px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface3);
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .match-select:focus {
            border-color: var(--accent);
        }

        .feedback {
            margin-top: 1rem;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13.5px;
            line-height: 1.6;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
            color: var(--correct);
        }

        .feedback.wrong {
            background: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
            color: var(--wrong);
        }

        .feedback.partial {
            background: var(--partial-bg);
            border: 1px solid var(--partial-border);
            color: var(--partial);
        }

        .feedback strong {
            font-weight: 500;
        }

        .model-ans {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid currentColor;
            opacity: .7;
            font-style: italic;
        }

        .kw-chips {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .kw-chip {
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            border: 1px solid currentColor;
            opacity: .7;
        }

        .submit-zone {
            margin: 2.5rem 0 1rem;
            text-align: center;
        }

        #submit-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 48px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: .01em;
            transition: opacity .2s, transform .15s;
            box-shadow: 0 4px 16px rgba(45, 74, 62, 0.25);
        }

        [data-theme="dark"] #submit-btn {
            box-shadow: none;
        }

        #submit-btn:hover {
            opacity: .88;
            transform: translateY(-1px);
        }

        #submit-btn:active {
            transform: translateY(0);
        }

        #submit-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        #score-card {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .score-pct {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
            margin-bottom: .25rem;
        }

        .score-sub {
            font-size: 14px;
            color: var(--txt2);
            margin-bottom: 1rem;
        }

        .score-msg {
            font-size: 15px;
            color: var(--txt);
            margin-bottom: 1.25rem;
        }

        .score-bar-wrap {
            background: var(--surface2);
            border-radius: 4px;
            height: 6px;
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 4px;
            transition: width 1s cubic-bezier(.4, 0, .2, 1);
        }

        #retry-btn {
            background: var(--surface2);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: 10px 28px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--txt);
            cursor: pointer;
            transition: background .15s;
        }

        #retry-btn:hover {
            background: var(--accent-light);
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem;
            text-align: center;
            font-size: 13px;
            color: var(--txt3);
        }

        footer strong {
            color: var(--txt2);
            font-weight: 500;
        }

        footer .accent {
            color: var(--accent2);
        }

        @media (max-width: 500px) {
            header {
                padding: 0 1rem;
            }

            main {
                padding: 1.5rem 1rem 3rem;
            }

            .match-term {
                flex: 0 0 110px;
                font-size: 12px;
            }

            .hero h1 {
                font-size: 22px;
            }
        }

        html[data-parent-theme="dark"][data-theme="dark"] body {
            background:
                radial-gradient(circle at top left, rgba(131, 208, 175, 0.11), transparent 28rem),
                radial-gradient(circle at top right, rgba(244, 182, 110, 0.10), transparent 26rem),
                var(--bg) !important;
            color: var(--txt) !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] header,
        html[data-parent-theme="dark"][data-theme="dark"] main,
        html[data-parent-theme="dark"][data-theme="dark"] footer,
        html[data-parent-theme="dark"][data-theme="dark"] .q-card,
        html[data-parent-theme="dark"][data-theme="dark"] #score-card {
            background: var(--surface) !important;
            color: var(--txt) !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] main {
            background: transparent !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] .hero {
            background: linear-gradient(135deg, var(--hero-start), var(--hero-end)) !important;
            color: var(--txt) !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] .opt-label,
        html[data-parent-theme="dark"][data-theme="dark"] .tf-btn,
        html[data-parent-theme="dark"][data-theme="dark"] .fill-input,
        html[data-parent-theme="dark"][data-theme="dark"] .match-select {
            background: var(--surface3) !important;
            color: var(--txt) !important;
            border-color: var(--border) !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] .stat-chip,
        html[data-parent-theme="dark"][data-theme="dark"] .progress-pill,
        html[data-parent-theme="dark"][data-theme="dark"] #theme-btn,
        html[data-parent-theme="dark"][data-theme="dark"] .q-tag,
        html[data-parent-theme="dark"][data-theme="dark"] .match-term {
            background: var(--accent-light) !important;
            color: var(--txt) !important;
            border-color: var(--border) !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] #submit-btn {
            background: var(--accent) !important;
            color: #07130f !important;
            border-color: transparent !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] #retry-btn {
            background: var(--surface2) !important;
            color: var(--txt) !important;
            border-color: var(--border-strong) !important;
        }

        html[data-parent-theme="dark"][data-theme="dark"] h1,
        html[data-parent-theme="dark"][data-theme="dark"] h2,
        html[data-parent-theme="dark"][data-theme="dark"] h3,
        html[data-parent-theme="dark"][data-theme="dark"] p,
        html[data-parent-theme="dark"][data-theme="dark"] li,
        html[data-parent-theme="dark"][data-theme="dark"] label,
        html[data-parent-theme="dark"][data-theme="dark"] span {
            color: inherit !important;
        }
    </style>

        <div class="logo">Cyber Laws <span>KSA</span></div>
        <div class="header-right">
            <div class="progress-pill" id="prog-pill">0 / 35</div>
            <button id="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
        </div>

    <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>

    <main>
        <div class="hero">
            <h1>Exam prep quiz</h1>
            <p>Cyber Laws in Saudi Arabia — cybercrime types, the Anti-Cyber Crime Law, and KSA articles. Past exam
                questions included.</p>
            <div class="stats-row">
                <div class="stat-chip"><span class="dot"></span> 35 questions</div>
                <div class="stat-chip"><span class="dot amber"></span> 5 question types</div>
                <div class="stat-chip"><span class="dot"></span> Article-level detail</div>
            </div>
        </div>

        <div id="score-card">
            <div class="score-pct" id="sc-pct">—</div>
            <div class="score-sub" id="sc-pts">0 / 0 points</div>
            <div class="score-bar-wrap">
                <div class="score-bar-fill" id="sc-bar" style="width:0%"></div>
            </div>
            <div class="score-msg" id="sc-msg"></div>

    <script>
        const SECTIONS = [
            {
                id: 'A', label: 'Multiple choice — cybercrime types', qs: [
                    { type: 'mcq', text: 'Which of the following is the correct definition of a cyber-crime?', opts: ['A crime that only involves financial fraud online', 'A crime that involves a computer and a network', 'Any illegal activity conducted using a mobile phone', 'Unauthorized access to government databases only'], ans: 1, exp: 'The chapter defines a cyber-crime simply as a crime that involves a computer and a network.', tag: 'Definition' },
                    { type: 'mcq', text: 'Cybercrimes are broadly categorized into how many categories?', opts: ['Two', 'Four', 'Three', 'Five'], ans: 2, exp: 'The chapter classifies cybercrimes into three categories: against individuals, against property, and against government.', tag: 'Classification' },
                    { type: 'mcq', text: 'Which of the following is a cybercrime against an INDIVIDUAL?', opts: ['DDOS attack', 'Software piracy', 'Cyber stalking', 'Logic bombing'], ans: 2, exp: 'Cyberstalking — using electronic means to harass an individual — is classified as a cybercrime against an individual.', tag: 'Against individual' },
                    { type: 'mcq', text: 'Which of the following is a cybercrime against PROPERTY?', opts: ['Cyber terrorism', 'Email bombing', 'Identity theft', 'Denial of service attack'], ans: 2, exp: 'Identity theft is listed as a cybercrime against property. DoS, email bombing, and cyber terrorism are crimes against government.', tag: 'Against property' },
                    { type: 'mcq', text: 'Which of the following is a cybercrime against GOVERNMENT?', opts: ['Phishing', 'Credit card skimming', 'Email spoofing', 'Logic bombing'], ans: 3, exp: 'Logic bombing is classified under cybercrimes against government. Phishing, credit card skimming, and email spoofing target individuals or property.', tag: 'Against government' },
                    { type: 'mcq', text: 'Phishing is best described as:', opts: ['Sending large volumes of unsolicited email', 'Forcefully taking over control of a website', 'Attempting to obtain sensitive information by disguising as a trustworthy entity', 'Inserting malicious code into a system triggered by a condition'], ans: 2, exp: 'Phishing attempts to obtain sensitive information such as usernames, passwords, and credit card details by disguising as a trustworthy entity in an electronic communication.', tag: 'Phishing' },
                    { type: 'mcq', text: 'Data Diddling is:', opts: ['Sending huge volumes of email to overflow a mailbox', 'Unauthorized altering of data before or during entry into a system, then changing it back after processing', 'Forging an email header to disguise the sender', 'Stealing credit card information using a small skimming device'], ans: 1, exp: 'Data diddling is unauthorized altering of data before or during entry into a computer system, then changing it back after processing is done. It is one of the simplest computer crime methods.', tag: 'Data diddling' },
                    { type: 'mcq', text: 'A salami attack is characterized by:', opts: ['Sending a flood of requests to crash a server', 'Making financial alterations so small they go completely unnoticed in any single case', 'Taking over a website by cracking its password', 'Installing keyloggers to capture banking credentials'], ans: 1, exp: 'A salami attack involves making tiny, unnoticeable alterations — like deducting SAR 2/month from many accounts — so no individual victim notices while the attacker accumulates significant gains.', tag: 'Salami attack' },
                    { type: 'mcq', text: 'Web jacking refers to:', opts: ['Intercepting web traffic between two parties', 'Sending unsolicited bulk email advertisements', 'Forcefully taking control of a website by cracking and changing its password', 'Logging keystrokes of users during online banking sessions'], ans: 2, exp: 'Web jacking is forcefully taking control of a website (by cracking the password and then changing it), analogous to conventional hijacking, often for ransom.', tag: 'Web jacking' },
                    { type: 'mcq', text: 'An email bomb is:', opts: ['A malicious code triggered by a specific condition', 'Sending huge volumes of email to overflow a mailbox or overwhelm a server', 'Forging an email header to hide the true sender', 'A phishing email that impersonates a bank'], ans: 1, exp: 'An email bomb floods an address with huge volumes of email in an attempt to overflow the mailbox or overwhelm the server — a form of denial-of-service attack.', tag: 'Email bombing' },
                    { type: 'mcq', text: 'A logic bomb is:', opts: ['A virus that spreads via email attachments', 'A piece of code intentionally inserted into software that triggers a malicious function when specified conditions are met', 'Software that records all keystrokes a user makes', 'A denial-of-service attack using multiple compromised systems'], ans: 1, exp: 'A logic bomb is a piece of code intentionally inserted into a software system that sets off a malicious function when specified conditions are met.', tag: 'Logic bomb' },
                    { type: 'mcq', text: 'Email spoofing is:', opts: ['Sending mass unsolicited advertising emails', 'Using a keylogger to capture email credentials', 'The forgery of an email header so the message appears to come from a different source', 'Publishing false statements about someone online'], ans: 2, exp: 'Email spoofing is the forgery of an email header so that the message appears to have originated from someone or somewhere other than the actual source.', tag: 'Email spoofing' },
                    { type: 'mcq', text: 'An attacker who deducts SAR 2 per month from every bank customer\'s account using a hidden program is committing which type of attack?', opts: ['Web jacking', 'Data diddling', 'Salami attack', 'Email bombing'], ans: 2, exp: 'This is the classic salami attack example from the chapter. The alteration is so small no single customer notices, but the cumulative amount is significant.', tag: 'Salami attack' },
                    { type: 'mcq', text: 'Which attack specifically involves a keylogger installed on an online banking computer?', opts: ['Salami attack', 'Trojan/keylogger attack', 'Data diddling', 'Logic bomb'], ans: 1, exp: 'Keyloggers (trojans) log all keystrokes a victim makes on the keyboard. This is particularly dangerous when installed on computers used for online banking.', tag: 'Trojans' },
                    { type: 'mcq', text: 'Cybersquatting is:', opts: ['Illegally accessing a website and changing its design', 'Registering, selling, or using a domain name with bad-faith intent to profit from someone else\'s trademark', 'Sending threatening messages through electronic means', 'Stealing credit card data using a physical skimming device'], ans: 1, exp: 'Cybersquatting is the practice of registering a domain name that matches or is confusingly similar to someone else\'s trademark, hoping to resell it at a profit.', tag: 'Cybersquatting' }
                ]
            },
            {
                id: 'B', label: 'Multiple choice — Saudi Anti-Cyber Crime Law', qs: [
                    { type: 'mcq', text: 'The Saudi Anti-Cyber Crime Law was issued by Royal Decree Number M/17, dated:', opts: ['26th March 2005', '26th March 2007', '14th February 2009', '1st January 2010'], ans: 1, exp: 'The Saudi Anti-Cybercrime Law was issued by Royal Decree Number M/17, dated 26th March 2007.', tag: 'Law overview' },
                    { type: 'mcq', text: 'How many provisions/articles does the Saudi Anti-Cyber Crime Law consist of?', opts: ['10', '12', '14', '16'], ans: 3, exp: 'The law consists of 16 provisions/articles, which set out key definitions, scope, objectives, sentences, and fines.', tag: 'Law overview' },
                    { type: 'mcq', text: 'Which article of the Saudi Anti-Cyber Crime Law covers unlawful access with intent to threaten or blackmail, invasion of privacy, and defamation, with a penalty of up to 1 year imprisonment and SAR 500,000 fine?', opts: ['Article 3', 'Article 4', 'Article 5', 'Article 6'], ans: 0, exp: 'Article 3 covers spying, interception, unauthorized access with intent to threaten/blackmail, website hacking, invasion of privacy via camera phones, and defamation. Penalty: up to 1 year and SAR 500,000.', tag: 'Article 3' },
                    { type: 'mcq', text: 'Under Article 4, illegally accessing bank or credit data with the intent to obtain financial information carries a penalty of:', opts: ['Up to 1 year and SAR 500,000', 'Up to 3 years and SAR 2 million', 'Up to 4 years and SAR 3 million', 'Up to 5 years and SAR 3 million'], ans: 1, exp: 'Article 4 penalties are imprisonment up to 3 years and a fine up to SAR 2 million, or both.', tag: 'Article 4' },
                    { type: 'mcq', text: 'Which article covers unlawful access with intent to delete, erase, destroy, leak, or alter private data, with a penalty up to 4 years and SAR 3 million?', opts: ['Article 3', 'Article 4', 'Article 5', 'Article 7'], ans: 2, exp: 'Article 5 addresses unauthorized access to delete, erase, destroy, leak, damage, alter, or redistribute private data, as well as causing network halts. Penalty: up to 4 years and SAR 3 million.', tag: 'Article 5' },
                    { type: 'mcq', text: 'Production, preparation, transmission, or storage of material impinging on public order, religious values, or public morals through an information network falls under:', opts: ['Article 4', 'Article 5', 'Article 6', 'Article 7'], ans: 2, exp: 'Article 6 covers content that violates public order, religious values, public morals, or privacy, as well as pornography, gambling, human trafficking, and drug-related websites. Penalty: up to 5 years and SAR 3 million.', tag: 'Article 6' },
                    { type: 'mcq', text: 'Which article carries the highest penalty in the law, covering terrorist organizations\' websites and threats to national security?', opts: ['Article 5', 'Article 6', 'Article 7', 'Article 9'], ans: 2, exp: 'Article 7 covers facilitating terrorist organizations and accessing data jeopardizing national security. Penalty: up to 10 years and SAR 5 million — the highest in the law.', tag: 'Article 7' },
                    { type: 'mcq', text: 'Article 9 of the Saudi Anti-Cyber Crime Law deals with:', opts: ['Penalties for data diddling specifically', 'Incitement, assistance, or collaboration in committing cyber crimes', 'Protection of intellectual property online', 'Penalties for phishing attacks'], ans: 1, exp: 'Article 9 specifies that anyone who incites, assists, or collaborates in committing a listed cybercrime faces punishment up to the maximum penalty if the crime is committed, or up to half if it is not.', tag: 'Article 9' },
                    { type: 'mcq', text: 'Which of the following is NOT listed as an objective of the Saudi Anti-Cyber Crime Law?', opts: ['Enhancement of information security', 'Protection of public interest and morals', 'Protection of the national economy', 'Promotion of free speech online'], ans: 3, exp: 'The law\'s four objectives are: enhancement of information security, protection of rights for legitimate computer use, protection of public interest/morals/values, and protection of the national economy. Free speech promotion is not an objective.', tag: 'Law objectives' },
                    { type: 'mcq', text: 'A person who builds a website to facilitate human trafficking through an information network violates which article?', opts: ['Article 3', 'Article 4', 'Article 5', 'Article 6'], ans: 3, exp: 'Article 6 specifically includes construction or publicizing of a website to promote or facilitate human trafficking. Penalty: up to 5 years and SAR 3 million.', tag: 'Article 6' },
                    { type: 'mcq', text: 'Johar gains unauthorized access to a system, changes passwords, and alters files causing subscriber losses. Which articles most likely apply?', opts: ['Article 3 only', 'Article 5 only', 'Articles 3 and 5', 'Article 7 only'], ans: 2, exp: 'Article 3 covers unauthorized access; Article 5 covers unauthorized access with intent to delete, alter, or damage data and obstruct services. Both apply when someone unlawfully enters and then modifies or deletes data.', tag: 'Case application' }
                ]
            },
            {
                id: 'C', label: 'True or false', qs: [
                    { type: 'tf', text: 'The Saudi Anti-Cyber Crime Law was issued in 2007 and consists of 16 articles.', ans: true, exp: 'Correct. The law was issued by Royal Decree M/17 on 26th March 2007 and consists of 16 provisions/articles.', tag: 'Law overview' },
                    { type: 'tf', text: 'Data diddling is one of the most complex methods of committing a computer-related crime.', ans: false, exp: 'The chapter states data diddling is one of the SIMPLEST methods of committing a computer-related crime — it involves altering data before or during entry and changing it back after processing.', tag: 'Data diddling' },
                    { type: 'tf', text: 'Email bombing is a form of denial-of-service attack.', ans: true, exp: 'Correct. An email bomb floods a mailbox with huge volumes of email in an attempt to overflow it or overwhelm the server — this is a denial-of-service attack.', tag: 'Email bombing' },
                    { type: 'tf', text: 'Article 7 of the Saudi Anti-Cyber Crime Law carries a maximum penalty of 5 years imprisonment.', ans: false, exp: 'Article 7 carries the highest penalty: up to 10 years imprisonment and SAR 5 million fine. Article 6 carries up to 5 years.', tag: 'Article 7' },
                    { type: 'tf', text: 'Spamming is the sending of unsolicited email, generally an advertisement, to someone who has not requested it.', ans: true, exp: 'Correct. Spamming is the sending of unsolicited email — typically an ad — to recipients who have not requested that communication.', tag: 'Spamming' },
                    { type: 'tf', text: 'A keylogger is dangerous primarily because it records all keystrokes, including those made during online banking.', ans: true, exp: 'Correct. Keyloggers log all keystrokes, which is particularly threatening when installed on a computer used for online banking or financial transactions.', tag: 'Trojans' },
                    { type: 'tf', text: 'Under Article 9, a person who assists in a cybercrime but the crime is not actually committed faces the full maximum penalty.', ans: false, exp: 'Article 9 specifies that if the crime is NOT committed, the collaborator/assistant faces up to HALF the maximum penalty — not the full maximum.', tag: 'Article 9' },
                    { type: 'tf', text: 'Cyber defamation is a specific criminal offense listed separately under Saudi law.', ans: false, exp: 'The chapter notes that cyber defamation is not a specific criminal offense but rather defamation or slander conducted via digital media. However, it is covered under Article 3 in the Saudi law.', tag: 'Cyber defamation' },
                    { type: 'tf', text: 'The Saudi Anti-Cyber Crime Law has been amended to allow legal proceedings against social networking sites that host content promoting adultery or homosexuality.', ans: true, exp: 'Correct. The law was amended to allow proceedings against social networking sites like Twitter for accounts posting or dealing with adultery and acts of homosexuality.', tag: 'Law amendments' }
                ]
            },
            {
                id: 'D', label: 'Fill in the blank', qs: [
                    { type: 'fill', text: '_______ is unauthorized altering of data before or during entry into a computer system, and then changing it back after processing is done.', ans: 'Data diddling', kw: ['data diddling', 'diddling'], exp: 'Data diddling modifies expected input/output and is difficult to track.' },
                    { type: 'fill', text: '_______ attacks deduct tiny, unnoticeable amounts from many accounts so that no single victim detects the theft.', ans: 'Salami', kw: ['salami'], exp: 'The name "salami attack" comes from the analogy of slicing data thinly, like salami.' },
                    { type: 'fill', text: '_______ is the forgery of an email header so the message appears to have originated from someone other than the actual source.', ans: 'Email spoofing', kw: ['email spoofing', 'spoofing'], exp: 'Email spoofing disguises the true sender, often used in phishing and social engineering attacks.' },
                    { type: 'fill', text: '_______ is a security event where an attacker prevents legitimate users from accessing targeted systems, devices, or network resources.', ans: 'Denial of service (DoS)', kw: ['denial of service', 'dos'], exp: 'A DoS attack prevents authorized users from accessing systems or resources they are entitled to use.' },
                    { type: 'fill', text: 'The Saudi Anti-Cyber Crime Law was issued by Royal Decree Number _______, dated 26th March 2007.', ans: 'M/17', kw: ['m/17', 'm17'], exp: 'Royal Decree Number M/17 is a commonly tested fact about the origin of the KSA anti-cybercrime legislation.' },
                    { type: 'fill', text: 'Under Article _______ of the Saudi law, building a website for terrorist organizations carries a penalty of up to 10 years imprisonment and SAR 5 million.', ans: '7', kw: ['7', 'article 7'], exp: 'Article 7 covers the most serious offenses — facilitating terrorist organizations and threatening national security — and carries the heaviest penalties.' },
                    { type: 'fill', text: '_______ is the practice of registering or using a domain name with bad-faith intent of profiting from someone else\'s trademark.', ans: 'Cybersquatting', kw: ['cybersquatting'], exp: 'Cybersquatting involves bad-faith registration and resale of domain names that belong to or are associated with a known brand or trademark.' }
                ]
            },
            {
                id: 'E', label: 'Matching — articles and penalties', qs: [
                    {
                        type: 'match', text: 'Match each Saudi Anti-Cyber Crime Law article to its key offense or penalty.', pairs: [
                            { term: 'Article 3', def: 'Spying, blackmail, defamation — up to 1 year, SAR 500K' },
                            { term: 'Article 4', def: 'Bank/credit data fraud — up to 3 years, SAR 2M' },
                            { term: 'Article 5', def: 'Deleting or altering private data — up to 4 years, SAR 3M' },
                            { term: 'Article 6', def: 'Immoral/illegal content online — up to 5 years, SAR 3M' },
                            { term: 'Article 7', def: 'Terrorism, national security — up to 10 years, SAR 5M' }
                        ], tag: 'Law articles'
                    },
                    {
                        type: 'match', text: 'Match each cybercrime term to its correct description.', pairs: [
                            { term: 'Phishing', def: 'Obtaining sensitive info by posing as a trusted entity' },
                            { term: 'Logic bomb', def: 'Code that triggers malicious function when conditions are met' },
                            { term: 'Web jacking', def: 'Forcibly taking control of a website for ransom' },
                            { term: 'Keylogger', def: 'Records all keystrokes made by a victim' },
                            { term: 'Email bomb', def: 'Flooding an inbox with huge email volumes to cause DoS' }
                        ], tag: 'Cybercrime terms'
                    }
                ]
            },
            {
                id: 'F', label: 'Short answer', qs: [
                    { type: 'short', text: 'Explain the three main categories of cybercrime and give one example of each.', kw: ['individual', 'property', 'government', 'phishing', 'stalking', 'identity', 'ddos', 'terrorism', 'piracy', 'credit'], modelAns: '(1) Cybercrimes against individuals — target personal rights and privacy, e.g., phishing, cyberstalking, email spoofing, or cyber defamation. (2) Cybercrimes against property — target financial or intellectual assets, e.g., credit card skimming, identity theft, software piracy, or cybersquatting. (3) Cybercrimes against government — threaten public institutions or national security, e.g., DoS attacks, cyber terrorism, logic bombing, or accessing confidential government information.', tag: 'Classification' },
                    { type: 'short', text: 'What are the four main objectives of the Saudi Anti-Cyber Crime Law?', kw: ['information security', 'rights', 'legitimate', 'public interest', 'morals', 'national economy', 'economy'], modelAns: '(1) Enhancement of information security. (2) Protection of rights pertaining to the legitimate use of computers and information networks. (3) Protection of public interest, morals, and common values. (4) Protection of the national economy.', tag: 'Law objectives' },
                    { type: 'short', text: 'A victim receives an email appearing to be from their bank asking them to click a link and confirm their password. Which type of cybercrime is this, and which Saudi law article may apply? State the penalty.', kw: ['phishing', 'article 4', 'bank', 'credit', 'fraud', '3 years', '2 million', 'sensitive', 'identity'], modelAns: 'This is a phishing attack targeting bank credentials. It may fall under Article 4, which covers illegally accessing bank or credit data through fraud or false identity. Penalty: imprisonment up to 3 years and a fine up to SAR 2 million, or both. Article 3 may also apply for unauthorized access and use of false identity.', tag: 'Law application' },
                    { type: 'short', text: 'Explain the difference between a salami attack and data diddling. Why are both difficult to detect?', kw: ['salami', 'insignificant', 'small', 'unnoticed', 'data diddling', 'alter', 'before', 'entry', 'change back', 'processing'], modelAns: 'A salami attack makes financial alterations so tiny (e.g., SAR 2 per account per month) that no individual victim notices, while the total theft is large. Data diddling alters data before or during entry into a system, then changes it back after processing — making the output appear normal. Both are difficult to detect because the changes are either too small (salami) or are reversed before anyone checks (data diddling).', tag: 'Attack comparison' },
                    { type: 'short', text: 'Under Article 9 of the Saudi Anti-Cyber Crime Law, what is the liability of a person who assists in a cybercrime? Does it matter whether the crime actually occurred?', kw: ['incite', 'assist', 'collaborate', 'maximum', 'half', 'committed', 'not committed', 'punishment'], modelAns: 'Article 9 holds that anyone who incites, assists, or collaborates in a cybercrime is subject to a punishment not exceeding the maximum penalty for that crime if it is actually committed. If the intended crime is NOT committed, the person faces punishment not exceeding half the maximum penalty. So yes — whether the crime occurred significantly affects the sentence.', tag: 'Article 9' }
                ]
            }
        ];

        let submitted = false;
        let tfState = {};
        let matchState = {};
        let totalQ = 0;

        function buildQuiz() {
            const body = document.getElementById('quiz-body');
            body.innerHTML = '';
            tfState = {}; matchState = {}; submitted = false;
            totalQ = 0;
            let qNum = 0;

            SECTIONS.forEach(sec => {
                const sh = document.createElement('div');
                sh.className = 'section-header';
                sh.innerHTML = `<div class="section-letter">${sec.id}</div><div class="section-label">${sec.label}</div><div class="section-line"></div>`;
                body.appendChild(sh);

                sec.qs.forEach((q, qi) => {
                    qNum++; totalQ++;
                    const sid = `${sec.id}-${qi}`;
                    const card = document.createElement('div');
                    card.className = 'q-card';
                    card.id = `card-${sid}`;
                    card.innerHTML = `<div class="q-meta"><span class="q-num">Q${qNum}</span><span class="q-tag">${q.tag}</span></div><div class="q-text">${q.text}</div><div class="q-input" id="inp-${sid}"></div><div class="feedback" id="fb-${sid}"></div>`;
                    body.appendChild(card);

                    const inp = document.getElementById(`inp-${sid}`);
                    if (q.type === 'mcq') buildMCQ(inp, q, sid);
                    else if (q.type === 'tf') buildTF(inp, q, sid);
                    else if (q.type === 'fill') buildFill(inp, sid);
                    else if (q.type === 'match') buildMatch(inp, q, sid);
                    else if (q.type === 'short') buildShort(inp, sid);
                });
            });

            document.getElementById('prog-pill').textContent = `0 / ${totalQ}`;
            updateProgress();
        }

        function buildMCQ(el, q, sid) {
            const d = document.createElement('div'); d.className = 'options';
            q.opts.forEach((o, oi) => {
                const lbl = document.createElement('label');
                lbl.className = 'opt-label'; lbl.id = `lbl-${sid}-${oi}`;
                lbl.innerHTML = `<input type="radio" name="mcq-${sid}" value="${oi}" onchange="updateProgress()"> ${o}`;
                d.appendChild(lbl);
            });
            el.appendChild(d);
        }

        function buildTF(el, q, sid) {
            tfState[sid] = null;
            el.innerHTML = `<div class="tf-group"><button class="tf-btn" id="tf-t-${sid}" onclick="setTF('${sid}',true)">True</button><button class="tf-btn" id="tf-f-${sid}" onclick="setTF('${sid}',false)">False</button></div>`;
        }
        function setTF(sid, val) {
            if (submitted) return;
            tfState[sid] = val;
            document.getElementById(`tf-t-${sid}`).classList.toggle('active', val === true);
            document.getElementById(`tf-f-${sid}`).classList.toggle('active', val === false);
            updateProgress();
        }

        function buildFill(el, sid) {
            el.innerHTML = `<input class="fill-input" type="text" id="fill-${sid}" placeholder="Type your answer…" oninput="updateProgress()">`;
        }

        function buildMatch(el, q, sid) {
            matchState[sid] = {};
            const defs = [...q.pairs.map(p => p.def)].sort(() => Math.random() - .5);
            let html = '';
            q.pairs.forEach((p, pi) => {
                const opts = defs.map(d => `<option value="${d}">${d}</option>`).join('');
                html += `<div class="match-pair"><div class="match-term" title="${p.term}">${p.term}</div><div class="match-arrow">→</div><select class="match-select" onchange="setMatch('${sid}',${pi},this.value)" id="ms-${sid}-${pi}"><option value="">— select —</option>${opts}</select></div>`;
            });
            el.innerHTML = html;
        }
        function setMatch(sid, pi, val) {
            if (submitted) return;
            matchState[sid][pi] = val;
            updateProgress();
        }

        function buildShort(el, sid) {
            el.innerHTML = `<textarea class="fill-input" id="short-${sid}" placeholder="Write your answer here…" rows="4" oninput="updateProgress()"></textarea>`;
        }

        function updateProgress() {
            let answered = 0;
            SECTIONS.forEach(sec => {
                sec.qs.forEach((q, qi) => {
                    const sid = `${sec.id}-${qi}`;
                    if (q.type === 'mcq') { if (document.querySelector(`input[name="mcq-${sid}"]:checked`)) answered++; }
                    else if (q.type === 'tf') { if (tfState[sid] !== null && tfState[sid] !== undefined) answered++; }
                    else if (q.type === 'fill') { const v = document.getElementById(`fill-${sid}`); if (v && v.value.trim()) answered++; }
                    else if (q.type === 'match') { const keys = Object.values(matchState[sid] || {}); if (keys.length >= q.pairs.length && keys.every(v => v)) answered++; }
                    else if (q.type === 'short') { const v = document.getElementById(`short-${sid}`); if (v && v.value.trim().length > 8) answered++; }
                });
            });
            const pct = Math.round(answered / totalQ * 100);
            document.getElementById('prog-fill').style.width = pct + '%';
            document.getElementById('prog-pill').textContent = `${answered} / ${totalQ}`;
        }

        function submitAll() {
            if (submitted) return;
            submitted = true;
            document.getElementById('submit-btn').disabled = true;
            let pts = 0, maxPts = 0;

            SECTIONS.forEach(sec => {
                sec.qs.forEach((q, qi) => {
                    const sid = `${sec.id}-${qi}`;
                    const fb = document.getElementById(`fb-${sid}`);

                    if (q.type === 'mcq') {
                        maxPts++;
                        const r = document.querySelector(`input[name="mcq-${sid}"]:checked`);
                        const chosen = r ? parseInt(r.value) : -1;
                        q.opts.forEach((_, oi) => {
                            const lbl = document.getElementById(`lbl-${sid}-${oi}`);
                            if (!lbl) return;
                            if (oi === q.ans) lbl.classList.add('c-correct');
                            else if (oi === chosen && chosen !== q.ans) lbl.classList.add('c-wrong');
                        });
                        if (chosen === q.ans) { pts++; showFB(fb, 'correct', '✓ Correct.', q.exp); }
                        else { showFB(fb, 'wrong', chosen === -1 ? 'No answer selected.' : `✗ Incorrect. Correct: "${q.opts[q.ans]}"`, q.exp); }
                    }
                    else if (q.type === 'tf') {
                        maxPts++;
                        const chosen = tfState[sid];
                        const tBtn = document.getElementById(`tf-t-${sid}`);
                        const fBtn = document.getElementById(`tf-f-${sid}`);
                        if (q.ans) { if (tBtn) tBtn.classList.add('c-correct'); } else { if (fBtn) fBtn.classList.add('c-correct'); }
                        if (chosen === true && !q.ans && tBtn) tBtn.classList.add('c-wrong');
                        if (chosen === false && q.ans && fBtn) fBtn.classList.add('c-wrong');
                        if (chosen === q.ans) { pts++; showFB(fb, 'correct', '✓ Correct.', q.exp); }
                        else { showFB(fb, 'wrong', chosen === null ? 'No answer selected.' : `✗ Incorrect. This is <strong>${q.ans ? 'True' : 'False'}</strong>.`, q.exp); }
                    }
                    else if (q.type === 'fill') {
                        maxPts++;
                        const inp = document.getElementById(`fill-${sid}`);
                        const val = (inp ? inp.value : '').trim().toLowerCase();
                        const ok = q.kw.some(k => val.includes(k));
                        if (inp) inp.disabled = true;
                        if (ok) { pts++; showFB(fb, 'correct', '✓ Correct.', `Model answer: <strong>${q.ans}</strong>. ${q.exp}`); }
                        else { showFB(fb, 'wrong', val ? '✗ Not quite.' : 'No answer.', `Expected: <strong>${q.ans}</strong>. ${q.exp}`); }
                    }
                    else if (q.type === 'match') {
                        let mPts = 0;
                        q.pairs.forEach((p, pi) => { if (matchState[sid][pi] === p.def) mPts++; });
                        maxPts += q.pairs.length; pts += mPts;
                        const pairList = q.pairs.map(p => `<em>${p.term}</em> → ${p.def}`).join('<br>');
                        if (mPts === q.pairs.length) showFB(fb, 'correct', `✓ All ${mPts} correct!`, '');
                        else if (mPts > 0) showFB(fb, 'partial', `${mPts} of ${q.pairs.length} correct.`, `<br>Correct pairs:<br>${pairList}`);
                        else showFB(fb, 'wrong', 'No correct matches.', `<br>Correct pairs:<br>${pairList}`);
                        q.pairs.forEach((_, pi) => { const sel = document.getElementById(`ms-${sid}-${pi}`); if (sel) sel.disabled = true; });
                    }
                    else if (q.type === 'short') {
                        const ta = document.getElementById(`short-${sid}`);
                        const val = (ta ? ta.value : '').toLowerCase();
                        const found = q.kw.filter(k => val.includes(k));
                        const score = found.length / q.kw.length;
                        maxPts += 3;
                        const earned = score >= 0.6 ? 3 : score >= 0.35 ? 2 : score > 0 ? 1 : 0;
                        pts += earned;
                        if (ta) ta.disabled = true;
                        const chips = found.map(k => `<span class="kw-chip">${k}</span>`).join('');
                        const kwHtml = `<div class="kw-chips">${chips || '<span class="kw-chip">none found</span>'}</div>`;
                        const modelHtml = `<div class="model-ans">${q.modelAns}</div>`;
                        if (score >= 0.6) showFB(fb, 'correct', `✓ Good answer! (${found.length}/${q.kw.length} key ideas)`, kwHtml + modelHtml);
                        else if (score >= 0.2) showFB(fb, 'partial', `Partially correct. (${found.length}/${q.kw.length} key ideas)`, kwHtml + modelHtml);
                        else showFB(fb, 'wrong', val.trim().length > 5 ? 'Missing key ideas.' : 'No answer.', kwHtml + modelHtml);
                    }
                });
            });

            const pct = Math.round(pts / maxPts * 100);
            const sc = document.getElementById('score-card');
            sc.style.display = 'block';
            document.getElementById('sc-pct').textContent = pct + '%';
            document.getElementById('sc-pts').textContent = `${pts} / ${maxPts} points`;
            document.getElementById('sc-msg').textContent = pct >= 80 ? '🎉 Excellent — you are well prepared for the exam!' : pct >= 60 ? '📖 Good effort. Review the questions you missed and try again.' : '💪 Keep studying. Focus on the sections highlighted in red above.';
            setTimeout(() => { document.getElementById('sc-bar').style.width = pct + '%'; }, 100);
            sc.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.querySelectorAll('input[type=radio]').forEach(el => el.disabled = true);
            document.querySelectorAll('.tf-btn, .opt-label').forEach(el => el.style.pointerEvents = 'none');
        }

        function showFB(el, cls, heading, body) {
            el.className = `feedback show ${cls}`;
            el.innerHTML = `<strong>${heading}</strong>${body ? ' ' + body : ''}`;
        }

        function retry() {
            document.getElementById('score-card').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
            buildQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
        }

        buildQuiz();
    </script>
</body>
