<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <link rel="icon" type="image/png" href="/assets/favicon.png?v=2">
    <link rel="shortcut icon" href="/assets/favicon.png?v=2">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Ethics — Exam Prep Quiz</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #faf9f7;
            --surface: #ffffff;
            --surface2: #f3f1ee;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.15);
            --txt: #1a1814;
            --txt2: #6b6560;
            --txt3: #9b948e;
            --accent: #2d4a3e;
            --accent-light: #e8f0ed;
            --accent2: #c17f3e;
            --accent2-light: #fdf3e7;
            --correct: #2d5a3d;
            --correct-bg: #edf7f1;
            --correct-border: #a8d5b8;
            --wrong: #7a2020;
            --wrong-bg: #fdf0f0;
            --wrong-border: #f0b8b8;
            --partial: #7a4f10;
            --partial-bg: #fdf8ee;
            --partial-border: #f0d898;
            --radius: 10px;
            --radius-lg: 16px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.05), 0 4px 16px rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --bg: #141210;
            --surface: #1e1c19;
            --surface2: #272420;
            --border: rgba(255, 255, 255, 0.07);
            --border-strong: rgba(255, 255, 255, 0.14);
            --txt: #f0ede8;
            --txt2: #9b948e;
            --txt3: #6b6560;
            --accent: #7ab89a;
            --accent-light: #1a2e24;
            --accent2: #e0a060;
            --accent2-light: #2a1e0e;
            --correct: #7ab89a;
            --correct-bg: #0e2018;
            --correct-border: #2a5040;
            --wrong: #e08080;
            --wrong-bg: #200e0e;
            --wrong-border: #502020;
            --partial: #e0b870;
            --partial-bg: #201808;
            --partial-border: #503808;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            background: var(--bg);
            color: var(--txt);
            line-height: 1.65;
            min-height: 100vh;
            transition: background .3s, color .3s;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            backdrop-filter: blur(8px);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--txt);
            letter-spacing: -0.02em;
        }

        .logo span {
            color: var(--accent2);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-pill {
            font-size: 12px;
            font-weight: 500;
            color: var(--txt2);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            min-width: 80px;
            text-align: center;
        }

        #theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-strong);
            background: var(--surface2);
            color: var(--txt);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background .2s, transform .2s;
        }

        #theme-btn:hover {
            background: var(--accent-light);
            transform: rotate(20deg);
        }

        /* PROGRESS BAR */
        .progress-track {
            height: 3px;
            background: var(--surface2);
            position: sticky;
            top: 60px;
            z-index: 99;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .4s cubic-bezier(.4, 0, .2, 1);
        }

        /* MAIN LAYOUT */
        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        /* HERO */
        .hero {
            margin-bottom: 2.5rem;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 600;
            color: var(--txt);
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: .5rem;
        }

        .hero p {
            font-size: 14px;
            color: var(--txt2);
            font-weight: 300;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            margin-top: 1.25rem;
            flex-wrap: wrap;
        }

        .stat-chip {
            font-size: 12px;
            font-weight: 500;
            color: var(--txt2);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-chip .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }

        .stat-chip .dot.amber {
            background: var(--accent2);
        }

        /* SECTION DIVIDER */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 2.5rem 0 1rem;
        }

        .section-letter {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--accent);
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        [data-theme="dark"] .section-letter {
            color: var(--bg);
        }

        .section-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--txt2);
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* QUESTION CARD */
        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
            transition: border-color .2s;
        }

        .q-card:hover {
            border-color: var(--border-strong);
        }

        .q-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: .6rem;
        }

        .q-num {
            font-size: 11px;
            color: var(--txt3);
            font-weight: 500;
        }

        .q-tag {
            font-size: 11px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 5px;
            padding: 2px 8px;
            font-weight: 500;
        }

        .q-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--txt);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        /* MCQ OPTIONS */
        .options {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .opt-label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: background .15s, border-color .15s;
            font-size: 14px;
            color: var(--txt);
            background: var(--bg);
        }

        .opt-label:hover {
            background: var(--surface2);
            border-color: var(--border-strong);
        }

        .opt-label input[type="radio"] {
            margin-top: 3px;
            accent-color: var(--accent);
            flex-shrink: 0;
        }

        .opt-label.c-correct {
            background: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: var(--correct);
        }

        .opt-label.c-wrong {
            background: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: var(--wrong);
        }

        /* TF BUTTONS */
        .tf-group {
            display: flex;
            gap: 8px;
        }

        .tf-btn {
            flex: 1;
            padding: 10px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .15s;
        }

        .tf-btn:hover {
            background: var(--surface2);
            border-color: var(--border-strong);
        }

        .tf-btn.active {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tf-btn.c-correct {
            background: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: var(--correct) !important;
        }

        .tf-btn.c-wrong {
            background: var(--wrong-bg) !important;
            border-color: var(--wrong-border) !important;
            color: var(--wrong) !important;
        }

        /* FILL IN BLANK */
        .fill-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color .15s;
            outline: none;
        }

        .fill-input:focus {
            border-color: var(--accent);
        }

        textarea.fill-input {
            resize: vertical;
            min-height: 90px;
            line-height: 1.55;
        }

        /* MATCH */
        .match-pair {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .match-term {
            font-size: 13px;
            font-weight: 500;
            color: var(--txt);
            background: var(--accent-light);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 12px;
            flex: 0 0 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .match-arrow {
            color: var(--txt3);
            font-size: 14px;
            flex-shrink: 0;
        }

        .match-select {
            flex: 1;
            padding: 7px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }

        .match-select:focus {
            border-color: var(--accent);
        }

        /* FEEDBACK */
        .feedback {
            margin-top: 1rem;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13.5px;
            line-height: 1.6;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
            color: var(--correct);
        }

        .feedback.wrong {
            background: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
            color: var(--wrong);
        }

        .feedback.partial {
            background: var(--partial-bg);
            border: 1px solid var(--partial-border);
            color: var(--partial);
        }

        .feedback strong {
            font-weight: 500;
        }

        .model-ans {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid currentColor;
            opacity: .7;
            font-style: italic;
        }

        .kw-chips {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .kw-chip {
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 4px;
            border: 1px solid currentColor;
            opacity: .7;
        }

        /* SUBMIT */
        .submit-zone {
            margin: 2.5rem 0 1rem;
            text-align: center;
        }

        #submit-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 48px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: .01em;
            transition: opacity .2s, transform .15s;
            box-shadow: 0 4px 16px rgba(45, 74, 62, 0.25);
        }

        [data-theme="dark"] #submit-btn {
            box-shadow: none;
        }

        #submit-btn:hover {
            opacity: .88;
            transform: translateY(-1px);
        }

        #submit-btn:active {
            transform: translateY(0);
        }

        #submit-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        /* SCORE CARD */
        #score-card {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }

        .score-pct {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 600;
            color: var(--accent);
            line-height: 1;
            margin-bottom: .25rem;
        }

        .score-sub {
            font-size: 14px;
            color: var(--txt2);
            margin-bottom: 1rem;
        }

        .score-msg {
            font-size: 15px;
            color: var(--txt);
            margin-bottom: 1.25rem;
        }

        .score-bar-wrap {
            background: var(--surface2);
            border-radius: 4px;
            height: 6px;
            margin-bottom: 1.25rem;
            overflow: hidden;
        }

        .score-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 4px;
            transition: width 1s cubic-bezier(.4, 0, .2, 1);
        }

        #retry-btn {
            background: var(--surface2);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: 10px 28px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--txt);
            cursor: pointer;
            transition: background .15s;
        }

        #retry-btn:hover {
            background: var(--accent-light);
        }

        /* FOOTER */
        footer {
            border-top: 1px solid var(--border);
            padding: 1.5rem;
            text-align: center;
            font-size: 13px;
            color: var(--txt3);
        }

        footer strong {
            color: var(--txt2);
            font-weight: 500;
        }

        footer .accent {
            color: var(--accent2);
        }

        @media (max-width: 500px) {
            header {
                padding: 0 1rem;
            }

            main {
                padding: 1.5rem 1rem 3rem;
            }

            .match-term {
                flex: 0 0 110px;
                font-size: 12px;
            }

            .hero h1 {
                font-size: 22px;
            }
        }
    </style>

    <header>
        <div class="logo">Business <span>Ethics</span></div>
        <div class="header-right">
            <div class="progress-pill" id="prog-pill">0 / 30</div>

        </div>

    <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>

    <main>

                <div class="stat-chip"><span class="dot"></span> 30 questions</div>

    <script>
        const SECTIONS = [
            {
                id: 'A', label: 'Multiple choice', qs: [
                    { type: 'mcq', text: 'Which of the following best defines business ethics?', opts: ['Maximizing shareholder profit by any means', 'Applying moral principles to guide behavior in organizational settings', 'Following only the minimum standards required by law', 'Avoiding all decisions that carry any risk'], ans: 1, exp: 'Business ethics involves applying moral principles to business situations, defining right and wrong conduct in organizational settings beyond mere legal compliance.', tag: 'Core concepts' },
                    { type: 'mcq', text: 'According to the chapter, ethics differs from law because:', opts: ['Ethics is always stricter than law', 'Law represents minimum standards, while ethics goes further', 'Ethics only applies to individuals, not organizations', 'Law and ethics are essentially the same thing'], ans: 1, exp: 'Law sets minimum behavioral standards. Ethical responsibility often requires going beyond what the law demands.', tag: 'Ethics vs law' },
                    { type: 'mcq', text: 'Which of the following is NOT listed as a core ethical principle in business?', opts: ['Integrity', 'Profitability', 'Transparency', 'Fairness'], ans: 1, exp: 'The five core principles are integrity, fairness, respect, responsibility, and transparency. Profitability is a business goal, not an ethical principle.', tag: 'Core principles' },
                    { type: 'mcq', text: 'A company legally lays off employees to boost short-term profits. This scenario illustrates:', opts: ['An example of excellent CSR', 'That legal actions are not always ethically justified', 'That ethics and law are always aligned', 'Corporate transparency in action'], ans: 1, exp: 'Legal actions can still be ethically questionable. Ethics goes beyond legal compliance — the chapter uses this exact example.', tag: 'Ethics vs law' },
                    { type: 'mcq', text: 'Corporate Social Responsibility (CSR) primarily refers to a company\'s commitment to:', opts: ['Maximizing profit for shareholders only', 'Reducing taxes paid to government', 'Contributing positively to society including environmental and social concerns', 'Avoiding all forms of whistleblowing'], ans: 2, exp: 'CSR is a company\'s commitment to contribute positively to society through environmental protection, social equity, and ethical labor practices.', tag: 'CSR' },
                    { type: 'mcq', text: 'Which type of ethics refers to the values and principles that guide an entire company rather than an individual?', opts: ['Personal ethics', 'Professional ethics', 'Organizational ethics', 'Global ethics'], ans: 2, exp: 'Organizational ethics are the values and principles that guide the company as a whole, whereas personal ethics are individual moral beliefs.', tag: 'Types of ethics' },
                    { type: 'mcq', text: 'What is the primary purpose of a Code of Ethics in a business organization?', opts: ['To replace the need for laws', 'To outline expected ethical behavior and promote accountability', 'To guarantee no unethical behavior ever occurs', 'To limit employee freedom of expression'], ans: 1, exp: 'A code of ethics is a formal document outlining expected ethical behavior, providing guidelines for challenges, and promoting honesty and accountability.', tag: 'Code of ethics' },
                    { type: 'mcq', text: 'In the ethical decision-making model, what is the FIRST step?', opts: ['Evaluate alternatives and make a decision', 'Gather relevant facts', 'Reflect on the outcome', 'Recognize the ethical issue'], ans: 3, exp: 'The first step is recognizing that an ethical issue exists. You cannot address what you do not identify first.', tag: 'Decision-making' },
                    { type: 'mcq', text: 'Which leadership behavior is most critical for building an ethical culture?', opts: ['Setting ambitious profit targets', 'Modeling ethical values through words and actions', 'Delegating all ethics to the HR department', 'Prioritizing legal compliance over moral reasoning'], ans: 1, exp: 'Ethical culture starts at the top. Leaders must model values, mentor others, and enforce ethical conduct — employees look to leaders for moral guidance.', tag: 'Leadership' },
                    { type: 'mcq', text: 'Whistleblowing is best described as:', opts: ['Leaking trade secrets for personal gain', 'Exposing unethical or illegal activities within an organization', 'Reporting a competitor\'s wrongdoing anonymously', 'Disagreeing publicly with a manager\'s business decision'], ans: 1, exp: 'Whistleblowing is exposing unethical or illegal activities within an organization. Whistleblower protection laws exist in many countries to encourage this.', tag: 'Whistleblowing' },
                    { type: 'mcq', text: 'Which of the following is described as a common ethical dilemma in business?', opts: ['Setting quarterly performance targets', 'Using insider information for trading decisions', 'Hiring additional staff members', 'Launching a new product line'], ans: 1, exp: 'Using insider information is listed as a common ethical dilemma because it involves using privileged information unfairly against other market participants.', tag: 'Ethical dilemmas' },
                    { type: 'mcq', text: 'The long-term consequence of unethical business behavior typically includes:', opts: ['Increased consumer trust', 'Short-term financial gain with no lasting effects', 'Loss of reputation, legal penalties, and financial losses', 'Stronger employee morale and retention'], ans: 2, exp: 'While unethical behavior may offer short-term gains, the long-term consequences include loss of reputation, customer trust, legal penalties, morale decline, and financial losses.', tag: 'Consequences' }
                ]
            },
            {
                id: 'B', label: 'True or false', qs: [
                    { type: 'tf', text: 'A company that acts legally is always acting ethically.', ans: false, exp: 'Not all legal actions are ethically justified. Ethics goes beyond minimum legal standards.', tag: 'Ethics vs law' },
                    { type: 'tf', text: 'Whistleblower protection laws exist in many countries to encourage employees to report wrongdoing.', ans: true, exp: 'Correct. Many countries have enacted whistleblower protection laws so employees can safely report unethical behavior.', tag: 'Whistleblowing' },
                    { type: 'tf', text: 'Unethical business practices always lead to immediate legal consequences.', ans: false, exp: 'Unethical behavior does not always result in legal consequences. A practice can be morally wrong yet still legal.', tag: 'Ethics vs law' },
                    { type: 'tf', text: 'Professional ethics refers to standards specific to a particular profession, such as accounting or medicine.', ans: true, exp: 'Correct. Professional ethics are the moral standards and norms that apply to members of a specific profession.', tag: 'Types of ethics' },
                    { type: 'tf', text: 'Global ethics requires companies to abandon all local cultural customs in favor of universal principles.', ans: false, exp: 'Global ethics requires sensitivity — companies must respect local customs while still upholding universal ethical principles.', tag: 'Global ethics' },
                    { type: 'tf', text: 'Ethical leadership only matters at the executive level and has little impact on frontline employees.', ans: false, exp: 'Ethical culture starts at the top but permeates the whole organization. Employees at all levels look to their leaders for moral guidance.', tag: 'Leadership' },
                    { type: 'tf', text: 'A firm reducing its carbon emissions is given as an example of CSR in the chapter.', ans: true, exp: 'Correct. The chapter explicitly uses a firm reducing carbon emissions to fight climate change as a CSR example.', tag: 'CSR' },
                    { type: 'tf', text: 'The final step of the ethical decision-making model is to reflect on the outcome.', ans: true, exp: 'Correct. After recognizing the issue, gathering facts, considering principles, and evaluating alternatives, the final step is reflecting on the outcome.', tag: 'Decision-making' }
                ]
            },
            {
                id: 'C', label: 'Fill in the blank', qs: [
                    { type: 'fill', text: '_______ is the ethical principle of being honest and having strong moral principles in business.', ans: 'Integrity', kw: ['integrity'], exp: 'Integrity — being honest and having strong moral principles — is the first core ethical principle listed.' },
                    { type: 'fill', text: 'A company\'s formal commitment to contributing positively to society, including environmental and labor practices, is called _______ _______ _______.', ans: 'Corporate Social Responsibility (CSR)', kw: ['corporate social responsibility', 'csr'], exp: 'Corporate Social Responsibility (CSR) is the company\'s commitment to contribute positively to society.' },
                    { type: 'fill', text: 'The formal document that outlines expected ethical behavior within an organization is called a _______ of _______.', ans: 'Code of Ethics', kw: ['code of ethics', 'code', 'ethics'], exp: 'A Code of Ethics is the formal document outlining expected ethical behavior and guidelines.' },
                    { type: 'fill', text: '_______ is exposing unethical or illegal activities within an organization.', ans: 'Whistleblowing', kw: ['whistleblowing', 'whistleblow'], exp: 'Whistleblowing is the act of reporting wrongdoing or illegal activity within an organization.' },
                    { type: 'fill', text: 'The ethical principle of open communication with all stakeholders is called _______.', ans: 'Transparency', kw: ['transparency'], exp: 'Transparency refers to open communication with stakeholders and is one of the five core ethical principles.' }
                ]
            },
            {
                id: 'D', label: 'Matching', qs: [
                    {
                        type: 'match', text: 'Match each concept to its correct description.', pairs: [
                            { term: 'Integrity', def: 'Being honest and having strong moral principles' },
                            { term: 'CSR', def: 'Company commitment to contribute positively to society' },
                            { term: 'Whistleblowing', def: 'Exposing illegal or unethical activity within an organization' },
                            { term: 'Code of ethics', def: 'Formal document outlining expected ethical behavior' },
                            { term: 'Organizational ethics', def: 'Values and principles that guide an entire company' }
                        ], tag: 'Core concepts'
                    }
                ]
            },
            {
                id: 'E', label: 'Short answer', qs: [
                    { type: 'short', text: 'Explain the difference between business ethics and business law, and give one example where they diverge.', kw: ['minimum', 'beyond', 'legal', 'ethical', 'comply', 'law', 'ethics'], modelAns: 'Law sets the minimum standards of behavior that are legally enforceable. Business ethics goes beyond legal requirements to ask what is right, fair, and responsible. An example: a company may legally lay off employees to boost profits — this is permitted by law but may be considered ethically questionable if done without adequate justification or care for affected workers.', tag: 'Ethics vs law' },
                    { type: 'short', text: 'Describe three consequences of unethical behavior for a business.', kw: ['reputation', 'trust', 'legal', 'morale', 'financial', 'penalty', 'lawsuit', 'customer', 'employee'], modelAns: '(1) Loss of reputation and customer trust — consumers take their business elsewhere. (2) Legal penalties and lawsuits — regulators and affected parties may pursue the company. (3) Decline in employee morale — staff who witness unethical behavior become disengaged or resign, harming productivity.', tag: 'Consequences' },
                    { type: 'short', text: 'What is the role of leadership in building an ethical organizational culture?', kw: ['model', 'tone', 'mentor', 'enforce', 'guide', 'example', 'top', 'leader', 'culture', 'values'], modelAns: 'Leaders set the ethical tone for the entire organization through their words and actions. Ethical leadership involves consistently modeling values, mentoring employees, and enforcing standards. Because employees look to leaders for moral guidance, culture starts at the top — when leaders behave ethically, it signals that ethics is a real organizational priority.', tag: 'Leadership' },
                    { type: 'short', text: 'List the five steps of the ethical decision-making model from the chapter.', kw: ['recognize', 'gather', 'consider', 'evaluate', 'reflect', 'issue', 'facts', 'principle', 'alternative', 'outcome'], modelAns: '(1) Recognize the ethical issue. (2) Gather relevant facts and consider stakeholders\' views. (3) Consider ethical principles such as fairness, harm, and honesty. (4) Evaluate alternatives and make a decision. (5) Reflect on the outcome to improve future decisions.', tag: 'Decision-making' },
                    { type: 'short', text: 'Why might navigating ethics in a global business environment be particularly challenging?', kw: ['culture', 'vary', 'local', 'universal', 'corruption', 'exploitation', 'sensitivity', 'awareness', 'standards'], modelAns: 'Ethical standards vary significantly across cultures, so practices acceptable in one country may be unethical in another. Companies must balance respecting local customs with upholding universal ethical principles. Specific challenges include different attitudes toward bribery, labor standards, and environmental responsibility, while avoiding corruption and exploitation in international markets.', tag: 'Global ethics' }
                ]
            }
        ];

        let submitted = false;
        let tfState = {};
        let matchState = {};
        let totalQ = 0;

        function buildQuiz() {
            const body = document.getElementById('quiz-body');
            body.innerHTML = '';
            tfState = {}; matchState = {}; submitted = false;
            totalQ = 0;
            let qNum = 0;

            SECTIONS.forEach(sec => {
                const sh = document.createElement('div');
                sh.className = 'section-header';
                sh.innerHTML = `<div class="section-letter">${sec.id}</div><div class="section-label">${sec.label}</div><div class="section-line"></div>`;
                body.appendChild(sh);

                sec.qs.forEach((q, qi) => {
                    qNum++; totalQ++;
                    const sid = `${sec.id}-${qi}`;
                    const card = document.createElement('div');
                    card.className = 'q-card';
                    card.id = `card-${sid}`;

                    let inner = `<div class="q-meta"><span class="q-num">Q${qNum}</span><span class="q-tag">${q.tag}</span></div><div class="q-text">${q.text}</div><div class="q-input" id="inp-${sid}"></div><div class="feedback" id="fb-${sid}"></div>`;
                    card.innerHTML = inner;
                    body.appendChild(card);

                    const inp = document.getElementById(`inp-${sid}`);
                    if (q.type === 'mcq') buildMCQ(inp, q, sid);
                    else if (q.type === 'tf') buildTF(inp, q, sid);
                    else if (q.type === 'fill') buildFill(inp, q, sid);
                    else if (q.type === 'match') buildMatch(inp, q, sid);
                    else if (q.type === 'short') buildShort(inp, sid);
                });
            });
            updateProgress();
        }

        function buildMCQ(el, q, sid) {
            const d = document.createElement('div'); d.className = 'options';
            q.opts.forEach((o, oi) => {
                const id = `opt-${sid}-${oi}`;
                const lbl = document.createElement('label');
                lbl.className = 'opt-label';
                lbl.id = `lbl-${sid}-${oi}`;
                lbl.innerHTML = `<input type="radio" name="mcq-${sid}" value="${oi}" id="${id}" onchange="updateProgress()"> ${o}`;
                d.appendChild(lbl);
            });
            el.appendChild(d);
        }

        function buildTF(el, q, sid) {
            tfState[sid] = null;
            el.innerHTML = `<div class="tf-group"><button class="tf-btn" id="tf-t-${sid}" onclick="setTF('${sid}',true)">True</button><button class="tf-btn" id="tf-f-${sid}" onclick="setTF('${sid}',false)">False</button></div>`;
        }
        function setTF(sid, val) {
            if (submitted) return;
            tfState[sid] = val;
            document.getElementById(`tf-t-${sid}`).classList.toggle('active', val === true);
            document.getElementById(`tf-f-${sid}`).classList.toggle('active', val === false);
            updateProgress();
        }

        function buildFill(el, q, sid) {
            el.innerHTML = `<input class="fill-input" type="text" id="fill-${sid}" placeholder="Type your answer…" oninput="updateProgress()">`;
        }

        function buildMatch(el, q, sid) {
            matchState[sid] = {};
            const defs = [...q.pairs.map(p => p.def)].sort(() => Math.random() - .5);
            let html = '';
            q.pairs.forEach((p, pi) => {
                const opts = defs.map(d => `<option value="${d}">${d}</option>`).join('');
                html += `<div class="match-pair"><div class="match-term">${p.term}</div><div class="match-arrow">→</div><select class="match-select" onchange="setMatch('${sid}',${pi},this.value)" id="ms-${sid}-${pi}"><option value="">— select definition —</option>${opts}</select></div>`;
            });
            el.innerHTML = html;
        }
        function setMatch(sid, pi, val) {
            if (submitted) return;
            matchState[sid][pi] = val;
            updateProgress();
        }

        function buildShort(el, sid) {
            el.innerHTML = `<textarea class="fill-input" id="short-${sid}" placeholder="Write your answer here…" rows="4" oninput="updateProgress()"></textarea>`;
        }

        function updateProgress() {
            let answered = 0;
            SECTIONS.forEach(sec => {
                sec.qs.forEach((q, qi) => {
                    const sid = `${sec.id}-${qi}`;
                    if (q.type === 'mcq') { if (document.querySelector(`input[name="mcq-${sid}"]:checked`)) answered++; }
                    else if (q.type === 'tf') { if (tfState[sid] !== null && tfState[sid] !== undefined) answered++; }
                    else if (q.type === 'fill') { const v = document.getElementById(`fill-${sid}`); if (v && v.value.trim()) answered++; }
                    else if (q.type === 'match') { const keys = Object.values(matchState[sid] || {}); if (keys.length >= q.pairs.length && keys.every(v => v)) answered++; }
                    else if (q.type === 'short') { const v = document.getElementById(`short-${sid}`); if (v && v.value.trim().length > 8) answered++; }
                });
            });
            const pct = Math.round(answered / totalQ * 100);
            document.getElementById('prog-fill').style.width = pct + '%';
            document.getElementById('prog-pill').textContent = `${answered} / ${totalQ}`;
        }

        function submitAll() {
            if (submitted) return;
            submitted = true;
            document.getElementById('submit-btn').disabled = true;

            let pts = 0, maxPts = 0;

            SECTIONS.forEach(sec => {
                sec.qs.forEach((q, qi) => {
                    const sid = `${sec.id}-${qi}`;
                    const fb = document.getElementById(`fb-${sid}`);

                    if (q.type === 'mcq') {
                        maxPts++;
                        const r = document.querySelector(`input[name="mcq-${sid}"]:checked`);
                        const chosen = r ? parseInt(r.value) : -1;
                        q.opts.forEach((_, oi) => {
                            const lbl = document.getElementById(`lbl-${sid}-${oi}`);
                            if (!lbl) return;
                            if (oi === q.ans) lbl.classList.add('c-correct');
                            else if (oi === chosen && chosen !== q.ans) lbl.classList.add('c-wrong');
                        });
                        if (chosen === q.ans) { pts++; showFB(fb, 'correct', '✓ Correct.', q.exp); }
                        else { showFB(fb, 'wrong', chosen === -1 ? 'No answer selected.' : `✗ Incorrect. Correct answer: "${q.opts[q.ans]}"`, q.exp); }
                    }
                    else if (q.type === 'tf') {
                        maxPts++;
                        const chosen = tfState[sid];
                        const tBtn = document.getElementById(`tf-t-${sid}`);
                        const fBtn = document.getElementById(`tf-f-${sid}`);
                        if (q.ans) { if (tBtn) tBtn.classList.add('c-correct'); } else { if (fBtn) fBtn.classList.add('c-correct'); }
                        if (chosen === true && !q.ans && tBtn) tBtn.classList.add('c-wrong');
                        if (chosen === false && q.ans && fBtn) fBtn.classList.add('c-wrong');
                        if (chosen === q.ans) { pts++; showFB(fb, 'correct', '✓ Correct.', q.exp); }
                        else { showFB(fb, 'wrong', chosen === null ? 'No answer selected.' : `✗ Incorrect. This is <strong>${q.ans ? 'True' : 'False'}</strong>.`, q.exp); }
                    }
                    else if (q.type === 'fill') {
                        maxPts++;
                        const inp = document.getElementById(`fill-${sid}`);
                        const val = (inp ? inp.value : '').trim().toLowerCase();
                        const ok = q.kw.some(k => val.includes(k));
                        if (inp) inp.disabled = true;
                        if (ok) { pts++; showFB(fb, 'correct', '✓ Correct.', `Model answer: <strong>${q.ans}</strong>. ${q.exp}`); }
                        else { showFB(fb, 'wrong', val ? '✗ Not quite.' : 'No answer.', `Expected: <strong>${q.ans}</strong>. ${q.exp}`); }
                    }
                    else if (q.type === 'match') {
                        let matchPts = 0;
                        q.pairs.forEach((p, pi) => { if (matchState[sid][pi] === p.def) matchPts++; });
                        maxPts += q.pairs.length; pts += matchPts;
                        const pairList = q.pairs.map(p => `<em>${p.term}</em> → ${p.def}`).join('<br>');
                        if (matchPts === q.pairs.length) showFB(fb, 'correct', `✓ All ${matchPts} correct!`, '');
                        else if (matchPts > 0) showFB(fb, 'partial', `${matchPts} of ${q.pairs.length} correct.`, `<br>Correct pairs:<br>${pairList}`);
                        else showFB(fb, 'wrong', 'No correct matches.', `<br>Correct pairs:<br>${pairList}`);
                        q.pairs.forEach((_, pi) => { const sel = document.getElementById(`ms-${sid}-${pi}`); if (sel) sel.disabled = true; });
                    }
                    else if (q.type === 'short') {
                        const ta = document.getElementById(`short-${sid}`);
                        const val = (ta ? ta.value : '').toLowerCase();
                        const found = q.kw.filter(k => val.includes(k));
                        const score = found.length / q.kw.length;
                        maxPts += 3;
                        const earned = score >= 0.6 ? 3 : score >= 0.35 ? 2 : score > 0 ? 1 : 0;
                        pts += earned;
                        if (ta) ta.disabled = true;
                        const chips = found.map(k => `<span class="kw-chip">${k}</span>`).join('');
                        const kwHtml = `<div class="kw-chips">${chips || '<span class="kw-chip">none found</span>'}</div>`;
                        const modelHtml = `<div class="model-ans">${q.modelAns}</div>`;
                        if (score >= 0.6) showFB(fb, 'correct', `✓ Good answer! (${found.length}/${q.kw.length} key ideas)`, kwHtml + modelHtml);
                        else if (score >= 0.2) showFB(fb, 'partial', `Partially correct. (${found.length}/${q.kw.length} key ideas)`, kwHtml + modelHtml);
                        else showFB(fb, 'wrong', val.trim().length > 5 ? 'Missing key ideas.' : 'No answer.', kwHtml + modelHtml);
                    }
                });
            });

            const pct = Math.round(pts / maxPts * 100);
            const sc = document.getElementById('score-card');
            sc.style.display = 'block';
            document.getElementById('sc-pct').textContent = pct + '%';
            document.getElementById('sc-pts').textContent = `${pts} / ${maxPts} points`;
            document.getElementById('sc-msg').textContent = pct >= 80 ? '🎉 Excellent — you are well prepared for the exam!' : pct >= 60 ? '📖 Good effort. Review the questions you missed and try again.' : '💪 Keep studying. Focus on the sections highlighted in red above.';
            setTimeout(() => { document.getElementById('sc-bar').style.width = pct + '%'; }, 100);
            sc.scrollIntoView({ behavior: 'smooth', block: 'start' });

            document.querySelectorAll('input[type=radio]').forEach(el => el.disabled = true);
            document.querySelectorAll('.tf-btn, .opt-label').forEach(el => el.style.pointerEvents = 'none');
        }

        function showFB(el, cls, heading, body) {
            el.className = `feedback show ${cls}`;
            el.innerHTML = `<strong>${heading}</strong>${body ? ' ' + body : ''}`;
        }

        function retry() {
            document.getElementById('score-card').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
            buildQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
        }

        buildQuiz();
    </script>
</body>
