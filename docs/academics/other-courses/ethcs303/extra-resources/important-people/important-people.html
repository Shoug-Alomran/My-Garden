            font-size: 1.05rem;

        }

        .sw {
            flex: 1;
            max-width: 440px;
            position: relative;
        }

        .sw-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #4a4570;
            pointer-events: none;
        }

        body.light .sw-icon {

        }

        #search {
            width: 100%;
            padding: 0.48rem 0.8rem 0.48rem 2.3rem;

            border: 1px solid #2e2c50;

        }

            border-color: #c8c4e8;
            color: #1a1730;
        }

        #search::placeholder {

        }

        body.light #search::placeholder {

        #cnt {

        }

        body.light #cnt {

        }

        #tbtn {
            margin-left: auto;
            background: #1c1c2c;
            border: 1px solid #2e2c50;
            border-radius: 50px;
            padding: 0.28rem 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.35rem;

            color: #7870a8;

            white-space: nowrap;
            font-family: inherit;
        }

        body.light #tbtn {

    <script>
        var T = [
            { id: "jeremy-bentham", name: "Jeremy Bentham", dates: "1748-1832", role: "Philosopher and Social Reformer", tags: ["Utilitarianism", "Ethics"], ch: ["Ethical Theories Part 2"], desc: "Co-founder of the <b>Principle of Utility</b> (Greatest Happiness Principle). Argued an action is good if it benefits someone and bad if it harms someone. Defined utility as the tendency of an object to produce happiness or prevent unhappiness for an individual or community. Equated happiness with advantage, benefit, good, and pleasure." },
            { id: "john-stuart-mill", name: "John Stuart Mill", dates: "1806-1873", role: "Philosopher and Economist", tags: ["Utilitarianism", "Ethics"], ch: ["Ethical Theories Part 2"], desc: "Co-developer of the <b>Principle of Utility</b> alongside Bentham. An action is right or wrong to the extent it increases or decreases the <b>total happiness of affected parties</b>. Stressed the social usefulness of particular actions and policies by focusing on their consequences." },
            { id: "immanuel-kant", name: "Immanuel Kant", dates: "1724-1804", role: "Philosopher - Deontology / Kantianism", tags: ["Kantianism", "Deontology", "Ethics"], ch: ["Ethical Theories Part 1"], desc: "Born in Germany, never travelled more than 10 miles from home, yet one of the most influential philosophers of the past 300 years. Argued morality must be grounded in <b>duty and obligation</b>, never consequences. Formulated the <b>Categorical Imperative</b>: act only on principles you could universalize for all. Treat people as ends in themselves, never merely as means. Distinguished <b>perfect duties</b> (strict, no exceptions) from <b>imperfect duties</b> (flexible, context-dependent)." },
            { id: "thomas-hobbes", name: "Thomas Hobbes", dates: "1588-1679", role: "Political Philosopher", tags: ["Social Contract Theory", "Ethics"], ch: ["Ethical Theories Part 3"], desc: "Argued that without rules and enforcement, people would not create anything of value. Proposed the <b>Social Contract</b>: everyone in civilised society has implicitly agreed to moral rules governing relations among citizens, enforced by a government. Held that <b>no one is above the rules</b>." },
            { id: "john-rawls", name: "John Rawls", dates: "1921-2002", role: "Political Philosopher and Ethicist", tags: ["Justice", "Social Contract Theory", "Rights"], ch: ["Ethical Theories Part 3"], desc: "Developed two <b>Principles of Justice</b>. <b>1st Principle:</b> each person may claim a fully adequate set of basic rights and liberties consistent with everyone else having the same. <b>2nd Principle (Difference Principle):</b> inequalities must be open to all under fair equal opportunity and must benefit the least-advantaged members of society." },
            { id: "bernard-gert", name: "Bernard Gert", dates: "1934-2011", role: "Moral Philosopher", tags: ["Moral Systems", "Ethics"], ch: ["Moral Systems, Ethical Concepts and Theories"], desc: "Defined the <b>four features of a moral system</b>: (1) <b>Public</b> - everyone must know the rules; (2) <b>Informal</b> - no formal authoritative judges; (3) <b>Rational</b> - based on logical reason accessible to ordinary persons; (4) <b>Impartial</b> - rules apply equitably to all participants without favour." },
            { id: "potter-stewart", name: "Potter Stewart", dates: "1915-1985", role: "US Supreme Court Justice", tags: ["Business Ethics", "Law"], ch: ["Business Ethics"], desc: "Quoted in business ethics: <b>Ethics is knowing the difference between what you have a right to do and what is right to do.</b> This distinction is central to the field -- legal actions are not always ethically justified, and ethical obligations often exceed legal requirements." },
            { id: "warren-buffett", name: "Warren Buffett", dates: "b. 1930", role: "Investor and Business Leader", tags: ["Business Ethics", "Leadership"], ch: ["Business Ethics"], desc: "Cited for his view on hiring: <b>In looking for people to hire, you look for three qualities: integrity, intelligence, and energy. And if they don't have the first, the other two will kill you.</b> Emphasises that ethical character is the foundation of any professional effectiveness." },
            { id: "nijad-al-najdawi", name: "Prof. Nijad Al-Najdawi", dates: "--", role: "Course Instructor - ETHC303", tags: ["Ethics", "Computing", "Instructor"], ch: ["Moral Systems, Ethical Concepts and Theories"], desc: "Author and instructor of <b>ETHC303: Ethical and Social Aspects of Computing</b> at Prince Sultan University (nnajdawi@psu.edu.sa). Delivered course materials covering moral systems, ethical theories, privacy, cybersecurity, intellectual property, social engineering, and Saudi cyber law." },
            { id: "farnell", name: "Farnell (2005)", dates: "2005", role: "Referenced Scholar", tags: ["Divine Command Theory", "Ethics"], ch: ["Moral Systems, Ethical Concepts and Theories"], desc: "Cited for the definition of <b>Divine Command Theory</b>: what is in accordance with God's command is moral and what is contrary to that command is immoral. Supports the view that all moral judgment derives from an understanding of God's direct commandments recorded in holy texts." },
            { id: "carla", name: "Carla (Case Study)", dates: "--", role: "Fictional Ethics Scenario Subject", tags: ["Kantianism", "Plagiarism", "Case Study"], ch: ["Ethical Theories Part 1"], desc: "Fictional character illustrating Kantian ethics. A single mother working full-time who purchases and submits a report as her own work. Under <b>Kant's 1st Formulation</b> the rule is self-defeating: if everyone claimed others' work, reports would lose credibility. Under the <b>2nd Formulation</b> she treats her professor as a mere means to passing the course -- morally impermissible." },
            { id: "bill-dvd", name: "Bill (Case Study)", dates: "--", role: "Fictional Ethics Scenario Subject", tags: ["Social Contract Theory", "Privacy", "Case Study"], ch: ["Ethical Theories Part 3"], desc: "Fictional DVD rental store owner used to explore <b>Social Contract Theory and privacy rights</b>. Bill collects customer rental information, builds profiles, and sells them to direct marketing firms. The ethical question: do customers have a right to expect their transaction data kept confidential? If so, Bill acted wrongly by selling it without permission." },
            { id: "joe-cybersquatting", name: "Joe (Case Study)", dates: "--", role: "Fictional Cybersquatting Example", tags: ["Cybersquatting", "IP Law", "Case Study"], ch: ["Intellectual Property Laws"], desc: "Fictional character illustrating <b>cybersquatting</b>. If Joe registered michaeljordan.com pretending to be the athlete, he would gain unwarranted profits. This underpins why the <b>Anti-Cybersquatting Consumer Protection Act (ACPA)</b> exists -- registering a domain identical to a trademark for profit is both unethical and illegal." },
            { id: "michael-jordan", name: "Michael Jordan", dates: "b. 1963", role: "Referenced Public Figure - Trademark Context", tags: ["Trademark", "Cybersquatting", "IP Law"], ch: ["Intellectual Property Laws"], desc: "Referenced as a <b>trademark holder</b> to illustrate cybersquatting. His name shows how domain squatters register celebrity names to extract unwarranted profits, and why the <b>Anti-Cybersquatting Consumer Protection Act (ACPA)</b> protections are necessary for trademark owners." },
            { id: "oracle-google", name: "Oracle v. Google", dates: "2010-2021", role: "Landmark IP Lawsuit", tags: ["Patent Law", "Software", "IP Law"], ch: ["Intellectual Property Laws"], desc: "Oracle sued Google over patent infringement claims associated with Oracle's <b>Java programming language</b>, seeking <b>$6 billion in damages</b>. A landmark example of software patent litigation and the enormous financial stakes in intellectual property disputes." },
            { id: "apple-samsung", name: "Apple v. Samsung", dates: "2011-2018", role: "Landmark Patent Lawsuit", tags: ["Patent Law", "Smartphone", "IP Law"], ch: ["Intellectual Property Laws"], desc: "Apple sued Samsung for patent infringement related to smartphone and tablet patents. Apple was awarded <b>$1.1 billion in damages</b>. A landmark illustration of real-world IP consequences in consumer electronics." },
            { id: "apple-htc", name: "Apple v. HTC", dates: "2010-2012", role: "Patent Cross-Licensing Case", tags: ["Patent Law", "Cross-Licensing", "IP Law"], ch: ["Intellectual Property Laws"], desc: "Apple and HTC battled over mobile phone patents, leading to the <b>US ITC banning imports of two HTC phone models</b>. Resolved via a <b>10-year cross-licensing agreement</b> -- a common resolution strategy in the technology industry." },
            { id: "xio-tetris", name: "Xio Interactive (Case Study)", dates: "2009", role: "Copyright Infringement Case", tags: ["Copyright", "Software", "IP Law"], ch: ["Intellectual Property Laws"], desc: "Small company that created an unlicensed iPhone version of Tetris called <b>Mino</b>. The court found that <b>color, shape, number of game bricks, piece formation, and movement patterns</b> had all been copied. Xio was permanently banned from selling, displaying, or promoting the game." },
            { id: "amazon-cloud", name: "Amazon (Cloud Case Study)", dates: "2011", role: "Cloud Provider - Data Loss Incident", tags: ["Cloud Computing", "Data Loss"], ch: ["Privacy Issues in Cloud Computing"], desc: "Referenced as an example of <b>catastrophic cloud data loss</b>. In 2011, Amazon permanently destroyed many of its own customers' data, illustrating that cloud data can be lost through <b>accidental deletion by the provider itself</b> -- not only through attacks or natural disasters." },
            { id: "google-cloud", name: "Google (Cloud Case Study)", dates: "--", role: "Cloud Provider - Infrastructure Incident", tags: ["Cloud Computing", "Data Loss"], ch: ["Privacy Issues in Cloud Computing"], desc: "Referenced when <b>Google's power grid was struck by lightning four times</b>, resulting in permanent data loss. Illustrates that even the largest cloud providers are vulnerable to physical infrastructure failures, making backup strategies and disaster recovery planning essential." }
        ];

        function hl(text, q) {
            if (!q) return text;
            var re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "gi");
            return text.replace(re, "<mark>$1</mark>");
        }

        function buildCards(data, q) {
            var box = document.getElementById("cards");
            var nores = document.getElementById("nores");
            box.innerHTML = "";
            if (!data.length) {
                nores.style.display = "block";
                document.getElementById("cnt").textContent = "0 results";
                return;
            }
            nores.style.display = "none";
            document.getElementById("cnt").textContent = q ? (data.length + (data.length === 1 ? " result" : " results")) : "";
            for (var i = 0; i < data.length; i++) {
                var t = data[i];
                var ttags = t.tags.map(function (g) { return '<span class="tag">' + g + '</span>'; }).join("");
                var ctags = t.ch.map(function (c) { return '<span class="tag ch">ch: ' + c + '</span>'; }).join("");
                var d = document.createElement("div");
                d.className = "card";
                d.id = t.id;
                d.innerHTML =
                    '<div class="ctop">' +
                    '<div><div class="name">' + hl(t.name, q) + '</div>' +
                    (t.dates !== "--" ? '<div class="dates">' + t.dates + '</div>' : '') + '</div>' +
                    '<div class="tags">' + ttags + ctags + '</div>' +
                    '</div>' +
                    '<div class="role">' + hl(t.role, q) + '</div>' +
                    '<div class="desc">' + t.desc + '</div>';
                box.appendChild(d);
            }
        }

        function buildTOC(data) {
            var toc = document.getElementById("toc");
            toc.innerHTML = '<div class="toc-label">Thinkers (' + data.length + ')</div>';
            for (var i = 0; i < data.length; i++) {
                (function (t) {
                    var a = document.createElement("a");
                    a.className = "toc-a";
                    a.href = "#" + t.id;
                    a.textContent = t.name;
                    a.addEventListener("click", function () {
                        document.querySelectorAll(".toc-a").forEach(function (x) { x.classList.remove("on"); });
                        a.classList.add("on");
                    });
                    toc.appendChild(a);
                })(data[i]);
            }
        }

        var isLight = false;
        function toggleTheme() {
            isLight = !isLight;
            document.body.classList.toggle("light", isLight);
            var btn = document.getElementById("tbtn");
            btn.innerHTML = isLight
                ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg> Dark'
                : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg> Light';
        }

        document.getElementById("search").addEventListener("input", function () {
            var q = this.value.trim().toLowerCase();
            var f = q ? T.filter(function (t) {
                return [t.name, t.role, t.desc].concat(t.tags).concat(t.ch)
                    .some(function (s) { return s.toLowerCase().indexOf(q) > -1; });
            }) : T;
            buildCards(f, this.value.trim());
            buildTOC(f);
        });

        document.getElementById("total").textContent = T.length + " thinkers indexed.";
        buildCards(T, "");
        buildTOC(T);

        var obs = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
                if (e.isIntersecting) {
                    document.querySelectorAll(".toc-a").forEach(function (x) { x.classList.remove("on"); });
                    var a = document.querySelector('.toc-a[href="#' + e.target.id + '"]');
                    if (a) a.classList.add("on");
                }
            });
        }, { rootMargin: "-20% 0px -70% 0px" });

        setTimeout(function () {
            document.querySelectorAll(".card").forEach(function (c) { obs.observe(c); });
        }, 300);
    </script>
</body>

</html>
