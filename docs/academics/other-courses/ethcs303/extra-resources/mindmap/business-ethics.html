    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1f2937;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #d2a8ff;
            --accent4: #ffa657;
            --accent5: #ff7b72;
            --accent6: #79c0ff;
            --node-root: #1a2744;
            --node-root-border: #58a6ff;
            --node-l1: #1a2a1e;
            --node-l1-border: #3fb950;
            --node-l2: #2a1f3d;
            --node-l2-border: #d2a8ff;
            --node-l3: #2a1f18;
            --node-l3-border: #ffa657;
            --node-selected: #0d2442;
            --node-selected-border: #58a6ff;
            --shadow: rgba(0, 0, 0, 0.5);
            --connector: #30363d;
            --panel-bg: #161b22;
            --panel-border: #30363d;
            --toolbar-bg: rgba(13, 17, 23, 0.92);
            --search-bg: #21262d;
            --search-border: #30363d;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
            --accent2: #1a7f37;
            --accent3: #8250df;
            --accent4: #bc4c00;
            --accent5: #cf222e;
            --accent6: #0550ae;
            --node-root: #dbeafe;
            --node-root-border: #0969da;
            --node-l1: #dcfce7;
            --node-l1-border: #1a7f37;
            --node-l2: #ede9fe;
            --node-l2-border: #8250df;
            --node-l3: #fff7ed;
            --node-l3-border: #bc4c00;
            --node-selected: #bfdbfe;
            --node-selected-border: #0969da;
            --shadow: rgba(0, 0, 0, 0.12);
            --connector: #c8d1da;
            --panel-bg: #ffffff;
            --panel-border: #d0d7de;
            --toolbar-bg: rgba(246, 248, 250, 0.92);
            --search-bg: #f6f8fa;
            --search-border: #d0d7de;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            user-select: none;
        }

        /* TOOLBAR */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--toolbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            height: 56px;
            transition: background var(--transition), border-color var(--transition);
        }

        .toolbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            color: var(--text);
            white-space: nowrap;
            margin-right: 8px;
            letter-spacing: -0.3px;
        }

        .toolbar-brand span {
            color: var(--accent);
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        #search-wrap {
            position: relative;
            flex: 1;
            max-width: 280px;
        }

        #search-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
        }

        #search {
            width: 100%;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-radius: 8px;
            padding: 6px 12px 6px 34px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, background var(--transition);
        }

        #search:focus {
            border-color: var(--accent);
        }

        #search::placeholder {
            color: var(--text-muted);
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 11px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .tb-btn:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .tb-btn:active {
            transform: translateY(0);
        }

        .tb-btn svg {
            flex-shrink: 0;
        }

        #theme-toggle {
            font-size: 16px;
            padding: 6px 10px;
        }

        #search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px var(--shadow);
            z-index: 200;
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }

        .sr-item {
            padding: 9px 14px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sr-item:last-child {
            border-bottom: none;
        }

        .sr-item:hover {
            background: var(--surface2);
        }

        .sr-item .sr-path {
            font-size: 11px;
            color: var(--text-muted);
        }

        .sr-item mark {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
        }

        /* CANVAS */
        #canvas-wrap {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-wrap.grabbing {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 4000px;
            height: 4000px;
            transform-origin: 0 0;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* NODES */
        .node {
            position: absolute;
            border-radius: 14px;
            border: 2px solid;
            cursor: pointer;
            transition:
                box-shadow 0.25s,
                transform 0.25s,
                background 0.25s,
                border-color 0.25s,
                opacity 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            max-width: 220px;
            min-width: 120px;
        }

        .node:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px var(--shadow);
            z-index: 10;
        }

        .node.root {
            background: var(--node-root);
            border-color: var(--node-root-border);
            font-family: 'DM Serif Display', serif;
            font-size: 15px;
            min-width: 160px;
            max-width: 240px;
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.15), 0 4px 20px var(--shadow);
        }

        .node.level-1 {
            background: var(--node-l1);
            border-color: var(--node-l1-border);
            font-size: 13px;
            font-weight: 500;
        }

        .node.level-2 {
            background: var(--node-l2);
            border-color: var(--node-l2-border);
            font-size: 12.5px;
        }

        .node.level-3 {
            background: var(--node-l3);
            border-color: var(--node-l3-border);
            font-size: 12px;
        }

        .node.selected {
            background: var(--node-selected) !important;
            border-color: var(--node-selected-border) !important;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3), 0 6px 24px var(--shadow) !important;
            z-index: 20;
        }

        .node.highlighted {
            box-shadow: 0 0 0 3px var(--accent4), 0 4px 16px var(--shadow) !important;
        }

        .node-text {
            flex: 1;
            line-height: 1.35;
            word-break: break-word;
        }

        .chevron {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            opacity: 0.6;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        }

        .node.expanded .chevron {
            transform: rotate(90deg);
            opacity: 1;
        }

        .leaf-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .node.selected .leaf-dot,
        .node:hover .leaf-dot {
            background: var(--accent);
        }

        /* CONNECTOR LINES */
        .connector {
            fill: none;
            stroke: var(--connector);
            stroke-width: 1.5;
            transition: stroke var(--transition);
        }

        /* PANEL */
        #panel {
            position: fixed;
            top: 56px;
            right: -440px;
            width: 420px;
            bottom: 0;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            z-index: 90;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition), border-color var(--transition);
            box-shadow: -8px 0 40px var(--shadow);
        }

        #panel.open {
            right: 0;
        }

        #panel-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #panel-title {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            line-height: 1.3;
            flex: 1;
            color: var(--text);
        }

        #panel-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #panel-close:hover {
            color: var(--text);
            background: var(--surface2);
        }

        #panel-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.75;
            font-size: 14px;
            color: var(--text);
        }

        #panel-body p {
            margin-bottom: 14px;
        }

        #panel-body strong {
            color: var(--accent);
            font-weight: 600;
        }

        #panel-body em {
            color: var(--accent3);
            font-style: italic;
        }

        .panel-tag {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ZOOM BADGE */
        #zoom-badge {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* FOOTER */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--toolbar-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            z-index: 100;
            font-size: 12px;
            color: var(--text-muted);
            gap: 6px;
            transition: background var(--transition), border-color var(--transition);
        }

        #footer span {
            font-weight: 600;
            color: var(--text);
            font-family: 'DM Serif Display', serif;
            letter-spacing: 0.2px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* NODE ANIMATION */
        @keyframes nodeIn {
            from {
                opacity: 0;
                transform: translateX(-12px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .node {
            animation: nodeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
        }
    </style>

    <script>
        // ─────────────────────────────────────────────
        // DATA
        // ─────────────────────────────────────────────
        const DATA = {
            id: 'root',
            label: 'Business Ethics',
            children: [
                {
                    id: 'def',
                    label: 'What is Business Ethics?',
                    children: [
                        { id: 'def1', label: 'Moral Principles', desc: '<span class="panel-tag">Definition</span><p><strong>Moral principles in business</strong> involve applying ethical reasoning to everyday organizational decisions.</p><p>Business ethics defines what constitutes <em>right and wrong conduct</em> in professional settings, from how employees treat one another to how organizations engage with customers and the public.</p><p><strong>Key quote:</strong> "Ethics is knowing the difference between what you have a right to do and what is right to do." — Potter Stewart</p>' },
                        { id: 'def2', label: 'Daily Operations', desc: '<span class="panel-tag">Application</span><p>Ethics is not abstract — it shapes <strong>everyday decisions</strong>: hiring, pricing, communication, and partnerships.</p><p>Employees face ethical choices constantly, often without explicit guidance, which is why a strong ethical culture matters so much.</p>' },
                        { id: 'def3', label: 'Right vs Wrong Conduct', desc: '<span class="panel-tag">Foundation</span><p>Distinguishing <strong>right from wrong</strong> in business isn\'t always obvious. Cultural, legal, and personal values all intersect.</p><p>Business ethics provides frameworks that help organizations navigate ambiguity with consistency and integrity.</p>' }
                    ]
                },
                {
                    id: 'imp',
                    label: 'Importance',
                    children: [
                        { id: 'imp1', label: 'Consumer Trust', desc: '<span class="panel-tag">Importance</span><p><strong>Trust is the currency of business.</strong> Ethical companies attract loyal customers who believe in their values and mission.</p><p>Research consistently shows that consumers are willing to pay a premium for brands they trust and avoid those associated with scandal.</p>' },
                        { id: 'imp2', label: 'Reputation & Brand', desc: '<span class="panel-tag">Importance</span><p>A company\'s <strong>reputation</strong> is one of its most valuable assets — and one of the hardest to rebuild once damaged.</p><p>Ethical behavior enhances brand image organically, while unethical behavior can collapse years of goodwill overnight.</p>' },
                        { id: 'imp3', label: 'Transparency', desc: '<span class="panel-tag">Importance</span><p><strong>Transparency</strong> means openly communicating with all stakeholders — shareholders, employees, customers, and regulators.</p><p>Organizations that practice transparency build deeper trust and are better positioned to handle crises.</p>' },
                        { id: 'imp4', label: 'Legal Compliance', desc: '<span class="panel-tag">Importance</span><p>Ethics helps avoid <strong>legal issues and scandals</strong> by establishing internal standards that often exceed minimum legal requirements.</p><p>Proactive ethical governance reduces the risk of regulatory penalties and litigation.</p>' }
                    ]
                },
                {
                    id: 'ethlaw',
                    label: 'Ethics vs. Law',
                    children: [
                        { id: 'ethlaw1', label: 'Law as Minimum Standard', desc: '<span class="panel-tag">Ethics vs Law</span><p><strong>Law represents the floor</strong>, not the ceiling of acceptable behavior. It sets baseline standards that society demands.</p><p>Ethics asks a higher question: not just "Is this legal?" but "Is this right?" True ethical conduct goes beyond compliance.</p>' },
                        { id: 'ethlaw2', label: 'Legal ≠ Ethical', desc: '<span class="panel-tag">Ethics vs Law</span><p>Many actions are <strong>legal but not ethical</strong>. A company may legally lay off workers to boost profits — but is it the right thing to do?</p><p>This tension is at the heart of business ethics: navigating spaces where law is silent but conscience is not.</p>' }
                    ]
                },
                {
                    id: 'principles',
                    label: 'Core Principles',
                    children: [
                        { id: 'p1', label: 'Integrity', desc: '<span class="panel-tag">Core Principle</span><p><strong>Integrity</strong> means being honest and having strong moral principles even when no one is watching.</p><p>In business, integrity shows up in accurate reporting, fair dealing, and keeping commitments — even when it\'s costly.</p>' },
                        { id: 'p2', label: 'Fairness', desc: '<span class="panel-tag">Core Principle</span><p><strong>Fairness</strong> involves treating all stakeholders equally and without bias.</p><p>Fair businesses apply consistent standards to hiring, promotion, pricing, and conflict resolution — regardless of who is involved.</p>' },
                        { id: 'p3', label: 'Respect', desc: '<span class="panel-tag">Core Principle</span><p><strong>Respect</strong> means valuing the rights and dignity of every individual — employees, customers, partners, and communities.</p><p>Respectful workplaces foster psychological safety and creativity.</p>' },
                        { id: 'p4', label: 'Responsibility', desc: '<span class="panel-tag">Core Principle</span><p><strong>Accountability</strong> is the willingness to own your actions and their consequences.</p><p>Responsible organizations don\'t deflect blame — they acknowledge mistakes, correct them, and improve systems to prevent recurrence.</p>' },
                        { id: 'p5', label: 'Transparency', desc: '<span class="panel-tag">Core Principle</span><p><strong>Open communication</strong> with all stakeholders builds confidence and reduces uncertainty.</p><p>Transparency includes honest financial reporting, clear communication about risks, and openness about business practices.</p>' }
                    ]
                },
                {
                    id: 'types',
                    label: 'Types of Ethics',
                    children: [
                        { id: 't1', label: 'Personal Ethics', desc: '<span class="panel-tag">Ethics Type</span><p><strong>Personal ethics</strong> are the individual moral beliefs each person brings to the workplace.</p><p>These are shaped by upbringing, culture, religion, and personal experience — and they directly influence workplace behavior and decision-making.</p>' },
                        { id: 't2', label: 'Professional Ethics', desc: '<span class="panel-tag">Ethics Type</span><p><strong>Professional ethics</strong> are standards specific to a profession, such as accounting, law, or medicine.</p><p>Professional codes of ethics exist to protect the public and maintain the integrity of the profession.</p>' },
                        { id: 't3', label: 'Organizational Ethics', desc: '<span class="panel-tag">Ethics Type</span><p><strong>Organizational ethics</strong> are the values, policies, and culture that guide an entire company\'s behavior.</p><p>These are encoded in mission statements, codes of conduct, and the daily decisions of leadership.</p>' },
                        { id: 't4', label: 'Global Ethics', desc: '<span class="panel-tag">Ethics Type</span><p><strong>Global ethics</strong> addresses the unique challenges of international business — navigating different cultural norms while upholding universal moral principles.</p><p>It includes avoiding exploitation, respecting human rights, and refusing corruption in all markets.</p>' }
                    ]
                },
                {
                    id: 'dilemmas',
                    label: 'Ethical Dilemmas',
                    children: [
                        { id: 'd1', label: 'Bribery & Corruption', desc: '<span class="panel-tag">Ethical Dilemma</span><p><strong>Bribery</strong> — offering or accepting unfair benefits — distorts competition and erodes public trust.</p><p>It is both illegal in most jurisdictions and deeply unethical, yet remains a significant global business challenge.</p>' },
                        { id: 'd2', label: 'Misleading Advertising', desc: '<span class="panel-tag">Ethical Dilemma</span><p><strong>Deceptive advertising</strong> manipulates consumers and undermines informed decision-making.</p><p>Ethical marketing requires honesty about product capabilities, pricing, and limitations — even when competitors exaggerate.</p>' },
                        { id: 'd3', label: 'Insider Trading', desc: '<span class="panel-tag">Ethical Dilemma</span><p><strong>Insider trading</strong> — using non-public information for financial gain — is both illegal and deeply unfair to other market participants.</p><p>It represents a breach of fiduciary duty and undermines market integrity.</p>' },
                        { id: 'd4', label: 'Discrimination', desc: '<span class="panel-tag">Ethical Dilemma</span><p><strong>Discriminatory practices</strong> in hiring or promotion violate principles of fairness and respect.</p><p>Ethical organizations actively work to eliminate bias through policy, training, and inclusive culture-building.</p>' },
                        { id: 'd5', label: 'Environmental Harm', desc: '<span class="panel-tag">Ethical Dilemma</span><p><strong>Environmental pollution</strong> represents a conflict between short-term profits and long-term responsibility to society and the planet.</p><p>Ethical businesses factor environmental impact into every decision — not just when required by law.</p>' }
                    ]
                },
                {
                    id: 'csr',
                    label: 'CSR',
                    children: [
                        { id: 'csr1', label: 'Environmental Protection', desc: '<span class="panel-tag">CSR</span><p>Companies committed to <strong>environmental responsibility</strong> reduce emissions, minimize waste, and invest in sustainable practices.</p><p>Example: A firm reducing its carbon footprint to combat climate change — before being legally required to do so.</p>' },
                        { id: 'csr2', label: 'Social Equity', desc: '<span class="panel-tag">CSR</span><p><strong>Social equity</strong> means investing in the communities where businesses operate — through fair wages, local hiring, and community programs.</p>' },
                        { id: 'csr3', label: 'Ethical Labor', desc: '<span class="panel-tag">CSR</span><p><strong>Ethical labor practices</strong> include fair pay, safe working conditions, reasonable hours, and respect for workers\' rights throughout the supply chain.</p>' }
                    ]
                },
                {
                    id: 'decision',
                    label: 'Decision-Making Model',
                    children: [
                        { id: 'dm1', label: 'Recognize the Issue', desc: '<span class="panel-tag">Step 1</span><p>The first step in ethical decision-making is <strong>recognizing that an ethical issue exists</strong>.</p><p>Many unethical decisions happen because people fail to see the moral dimension of a situation.</p>' },
                        { id: 'dm2', label: 'Gather Facts', desc: '<span class="panel-tag">Step 2</span><p><strong>Collect all relevant facts</strong> and consider the perspectives of all stakeholders affected by the decision.</p><p>Incomplete information leads to poor ethical judgments.</p>' },
                        { id: 'dm3', label: 'Consider Principles', desc: '<span class="panel-tag">Step 3</span><p>Apply relevant <strong>ethical principles</strong> — fairness, harm prevention, honesty — to evaluate the situation from multiple moral frameworks.</p>' },
                        { id: 'dm4', label: 'Evaluate & Decide', desc: '<span class="panel-tag">Step 4</span><p>Weigh the alternatives and <strong>make a decision</strong> that best aligns with ethical principles and stakeholder interests.</p>' },
                        { id: 'dm5', label: 'Reflect on Outcome', desc: '<span class="panel-tag">Step 5</span><p><strong>Reflection</strong> closes the loop: Was the decision right? What would you do differently? Learning from ethical decisions builds better judgment over time.</p>' }
                    ]
                },
                {
                    id: 'leadership',
                    label: 'Leadership & Ethics',
                    children: [
                        { id: 'l1', label: 'Setting the Tone', desc: '<span class="panel-tag">Leadership</span><p>Leaders <strong>set the ethical tone</strong> for the entire organization. When leaders act with integrity, employees follow.</p><p>Ethical culture flows downward — from board to CEO to managers to employees.</p>' },
                        { id: 'l2', label: 'Modeling Values', desc: '<span class="panel-tag">Leadership</span><p><strong>Ethical leadership</strong> means walking the talk: demonstrating the values the organization espouses, even under pressure.</p><p>Warren Buffett said it best: "In looking for people to hire, look for integrity, intelligence, and energy. Without the first, the other two will kill you."</p>' },
                        { id: 'l3', label: 'Whistleblowing', desc: '<span class="panel-tag">Leadership</span><p><strong>Whistleblowing</strong> — exposing unethical or illegal activity — is an act of moral courage.</p><p>Ethical leaders create environments where employees feel safe to report wrongdoing without fear of retaliation. Many countries provide legal protections for whistleblowers.</p>' }
                    ]
                },
                {
                    id: 'global',
                    label: 'Global Ethics',
                    children: [
                        { id: 'g1', label: 'Cultural Variation', desc: '<span class="panel-tag">Global Ethics</span><p>Ethical standards vary across cultures. What is acceptable in one country may be taboo in another.</p><p><strong>Cultural sensitivity</strong> is essential for global business — but it cannot be used as a justification for unethical behavior.</p>' },
                        { id: 'g2', label: 'Universal Principles', desc: '<span class="panel-tag">Global Ethics</span><p>Despite cultural differences, certain <strong>universal ethical principles</strong> apply across borders: human dignity, fairness, honesty, and avoidance of harm.</p>' },
                        { id: 'g3', label: 'Anti-Corruption', desc: '<span class="panel-tag">Global Ethics</span><p><strong>Avoiding corruption</strong> in international markets requires strong internal policies, employee training, and zero-tolerance enforcement.</p><p>Laws like the U.S. Foreign Corrupt Practices Act make overseas bribery illegal for American companies.</p>' }
                    ]
                },
                {
                    id: 'consequences',
                    label: 'Consequences',
                    children: [
                        { id: 'c1', label: 'Reputation Loss', desc: '<span class="panel-tag">Consequence</span><p>Unethical behavior can destroy a company\'s <strong>reputation</strong> built over decades — in a matter of days.</p><p>In the social media age, scandals spread instantly and are permanent.</p>' },
                        { id: 'c2', label: 'Legal Penalties', desc: '<span class="panel-tag">Consequence</span><p><strong>Legal consequences</strong> of unethical behavior include fines, lawsuits, regulatory action, and even criminal prosecution for executives.</p>' },
                        { id: 'c3', label: 'Employee Morale', desc: '<span class="panel-tag">Consequence</span><p>Unethical workplaces suffer from low <strong>employee morale</strong>, high turnover, and difficulty attracting top talent.</p><p>People want to work for organizations they can be proud of.</p>' },
                        { id: 'c4', label: 'Financial Loss', desc: '<span class="panel-tag">Consequence</span><p>The <strong>financial cost</strong> of unethical behavior — through fines, lost business, and remediation — often far exceeds any short-term gain.</p>' }
                    ]
                }
            ]
        };

        // ─────────────────────────────────────────────
        // STATE
        // ─────────────────────────────────────────────
        const state = {
            expanded: new Set(['root']),
            selected: null,
            panX: 0,
            panY: 0,
            scale: 1,
            dragging: false,
            dragStartX: 0,
            dragStartY: 0,
            dragStartPanX: 0,
            dragStartPanY: 0
        };

        const NODE_W = 200;
        const NODE_H = 44;
        const H_GAP = 80;
        const V_GAP = 28;

        function estimateNodeHeight(node) {
            const text = String(node.label || "");
            const charsPerLine = node._level === 0 ? 22 : 18;
            const lines = Math.max(1, Math.ceil(text.length / charsPerLine));
            return Math.max(NODE_H, 24 + lines * 22);
        }

        // ─────────────────────────────────────────────
        // LAYOUT ENGINE
        // ─────────────────────────────────────────────
        function shiftSubtree(node, deltaY) {
            node._y += deltaY;
            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(child => shiftSubtree(child, deltaY));
            }
        }

        function computeLayout(node, level = 0, x = 100, y = 0) {
            node._level = level;
            node._x = x;
            node._y = y;
            node._w = NODE_W;
            node._h = estimateNodeHeight(node);

            if (!node.children || !state.expanded.has(node.id)) {
                node._subtreeH = node._h;
                return node._subtreeH;
            }

            const childX = x + NODE_W + H_GAP;
            let totalH = 0;
            node.children.forEach(child => {
                totalH += computeLayout(child, level + 1, childX, 0);
                totalH += V_GAP;
            });
            totalH -= V_GAP;

            let cy = y + (node._h / 2) - (totalH / 2);
            node.children.forEach(child => {
                const nextY = cy + (child._subtreeH / 2) - (child._h / 2);
                shiftSubtree(child, nextY - child._y);
                cy += child._subtreeH + V_GAP;
            });

            node._subtreeH = Math.max(node._h, totalH);
            return node._subtreeH;
        }

        // ─────────────────────────────────────────────
        // RENDER
        // ─────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        let nodeEls = {};

        function render() {
            computeLayout(DATA, 0, 100, 2000);
            renderNodes(DATA);
            renderConnectors(DATA);
        }

        function renderNodes(node) {
            let el = nodeEls[node.id];
            if (!el) {
                el = document.createElement('div');
                el.className = 'node';
                el.dataset.id = node.id;
                el.innerHTML = buildNodeHTML(node);
                el.addEventListener('click', () => onNodeClick(node));
                canvas.appendChild(el);
                nodeEls[node.id] = el;
            }

            const levelClass = node._level === 0 ? 'root' : `level-${Math.min(node._level, 3)}`;
            el.className = `node ${levelClass}${state.selected === node.id ? ' selected' : ''}${state.expanded.has(node.id) ? ' expanded' : ''}`;
            el.style.left = node._x + 'px';
            el.style.top = node._y + 'px';
            el.style.width = node._w + 'px';
            el.style.minHeight = node._h + 'px';
            el.style.display = 'flex';

            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(renderNodes);
            }

            // Remove orphaned children
            if (!node.children || !state.expanded.has(node.id)) {
                collapseChildren(node);
            }
        }

        function buildNodeHTML(node) {
            const isParent = node.children && node.children.length > 0;
            const icon = isParent
                ? `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`
                : `<div class="leaf-dot"></div>`;
            return `<div class="node-text">${node.label}</div>${icon}`;
        }

        function collapseChildren(node) {
            if (!node.children) return;
            node.children.forEach(child => {
                if (nodeEls[child.id]) {
                    nodeEls[child.id].style.display = 'none';
                }
                collapseChildren(child);
            });
        }

        function renderConnectors(node) {
            svgLayer.innerHTML = '';
            drawConnectors(node);
        }

        function drawConnectors(node) {
            if (!node.children || !state.expanded.has(node.id)) return;
            node.children.forEach(child => {
                const x1 = node._x + node._w;
                const y1 = node._y + node._h / 2;
                const x2 = child._x;
                const y2 = child._y + child._h / 2;
                const cx1 = x1 + (x2 - x1) * 0.55;
                const cx2 = x2 - (x2 - x1) * 0.55;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('class', 'connector');
                path.setAttribute('d', `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`);
                svgLayer.appendChild(path);
                drawConnectors(child);
            });
        }

        // ─────────────────────────────────────────────
        // INTERACTION
        // ─────────────────────────────────────────────
        function onNodeClick(node) {
            if (node.children && node.children.length > 0) {
                if (state.expanded.has(node.id)) {
                    state.expanded.delete(node.id);
                } else {
                    state.expanded.add(node.id);
                }
                state.selected = node.id;
                render();
            } else {
                state.selected = node.id;
                render();
                openPanel(node);
            }
        }

        function openPanel(node) {
            document.getElementById('panel-title').textContent = node.label;
            document.getElementById('panel-body').innerHTML = node.desc || `<p>No description available.</p>`;
            document.getElementById('panel').classList.add('open');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
            state.selected = null;
            render();
        }

        // ─────────────────────────────────────────────
        // PAN & ZOOM
        // ─────────────────────────────────────────────
        const wrap = document.getElementById('canvas-wrap');

        function applyTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            document.getElementById('zoom-badge').textContent = Math.round(state.scale * 100) + '%';
        }

        wrap.addEventListener('mousedown', e => {
            if (e.target.closest('.node')) return;
            state.dragging = true;
            state.dragStartX = e.clientX;
            state.dragStartY = e.clientY;
            state.dragStartPanX = state.panX;
            state.dragStartPanY = state.panY;
            wrap.classList.add('grabbing');
        });

        window.addEventListener('mousemove', e => {
            if (!state.dragging) return;
            state.panX = state.dragStartPanX + (e.clientX - state.dragStartX);
            state.panY = state.dragStartPanY + (e.clientY - state.dragStartY);
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            state.dragging = false;
            wrap.classList.remove('grabbing');
        });

        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 0.1 : -0.1;
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }, { passive: false });

        function zoom(delta) {
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }

        function resetView() {
            state.panX = 0;
            state.panY = 0;
            state.scale = 1;
            applyTransform();
        }

        // ─────────────────────────────────────────────
        // EXPAND / COLLAPSE ALL
        // ─────────────────────────────────────────────
        function collectIds(node, ids = []) {
            ids.push(node.id);
            if (node.children) node.children.forEach(c => collectIds(c, ids));
            return ids;
        }

        function expandAll() {
            collectIds(DATA).forEach(id => state.expanded.add(id));
            render();
        }

        function collapseAll() {
            state.expanded.clear();
            state.expanded.add('root');
            render();
        }

        // ─────────────────────────────────────────────
        // SEARCH
        // ─────────────────────────────────────────────
        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('search-results');

        function flatNodes(node, path = [], results = []) {
            results.push({ node, path: [...path, node.label] });
            if (node.children) node.children.forEach(c => flatNodes(c, [...path, node.label], results));
            return results;
        }

        const allNodes = flatNodes(DATA);

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            // Clear highlights
            Object.values(nodeEls).forEach(el => el.classList.remove('highlighted'));

            if (!q) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = allNodes.filter(({ node }) => node.label.toLowerCase().includes(q));
            if (matches.length === 0) {
                searchResults.innerHTML = '<div class="sr-item" style="cursor:default;color:var(--text-muted)">No results found</div>';
                searchResults.style.display = 'block';
                return;
            }

            searchResults.innerHTML = matches.slice(0, 10).map(({ node, path }) => {
                const hl = node.label.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
                const trail = path.slice(0, -1).join(' › ');
                return `<div class="sr-item" data-id="${node.id}"><div>${hl}</div>${trail ? `<div class="sr-path">${trail}</div>` : ''}</div>`;
            }).join('');

            searchResults.querySelectorAll('.sr-item[data-id]').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    navigateTo(id);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });

            matches.forEach(({ node }) => {
                if (nodeEls[node.id]) nodeEls[node.id].classList.add('highlighted');
            });

            searchResults.style.display = 'block';
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-wrap')) searchResults.style.display = 'none';
        });

        function navigateTo(id) {
            // Expand path to node
            function findPath(node, targetId, path = []) {
                if (node.id === targetId) return [...path, node.id];
                if (node.children) {
                    for (const c of node.children) {
                        const r = findPath(c, targetId, [...path, node.id]);
                        if (r) return r;
                    }
                }
                return null;
            }
            const path = findPath(DATA, id);
            if (path) path.forEach(pid => state.expanded.add(pid));
            state.selected = id;
            render();
            // Center on node
            setTimeout(() => {
                function findNode(node, id) {
                    if (node.id === id) return node;
                    if (node.children) for (const c of node.children) { const r = findNode(c, id); if (r) return r; }
                    return null;
                }
                const n = findNode(DATA, id);
                if (n) {
                    const vpW = wrap.clientWidth;
                    const vpH = wrap.clientHeight;
                    state.panX = vpW / 2 - (n._x + n._w / 2) * state.scale;
                    state.panY = vpH / 2 - (n._y + n._h / 2) * state.scale;
                    applyTransform();
                }
            }, 100);
        }

        // ─────────────────────────────────────────────
        // THEME
        // ─────────────────────────────────────────────
        const themeBtn = document.getElementById('theme-toggle');
        let isDark = true;

        function applyTheme(dark) {
            document.body.dataset.theme = dark ? 'dark' : 'light';
            themeBtn.textContent = dark ? '🌙' : '☀️';
            localStorage.setItem('mm-theme', dark ? 'dark' : 'light');
            try { localStorage.setItem('shoug-theme', dark ? 'dark' : 'light'); } catch(_e) {}
        }

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            applyTheme(isDark);
        });

        // Restore
        const saved = localStorage.getItem('shoug-theme') || localStorage.getItem('mm-theme');
        if (saved === 'light') { isDark = false; applyTheme(false); }

        // ─────────────────────────────────────────────
        // EXPORT PNG
        // ─────────────────────────────────────────────
        async function exportPNG() {
            const msg = document.createElement('div');
            msg.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;';
            msg.textContent = 'Preparing export… (open browser print for full export)';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
            window.print();
        }

        // ─────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────
        function init() {
            state.panX = 40;
            state.panY = -1820;
            applyTransform();
            render();
        }

        init();
    </script>
</body>

</html>
