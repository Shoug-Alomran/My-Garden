    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1f2937;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #d2a8ff;
            --accent4: #ffa657;
            --accent5: #ff7b72;
            --accent6: #79c0ff;
            --node-root: #1a2744;
            --node-root-border: #58a6ff;
            --node-l1: #1a2a1e;
            --node-l1-border: #3fb950;
            --node-l2: #2a1f3d;
            --node-l2-border: #d2a8ff;
            --node-l3: #2a1f18;
            --node-l3-border: #ffa657;
            --node-selected: #0d2442;
            --node-selected-border: #58a6ff;
            --shadow: rgba(0, 0, 0, 0.5);
            --connector: #30363d;
            --panel-bg: #161b22;
            --panel-border: #30363d;
            --toolbar-bg: rgba(13, 17, 23, 0.92);
            --search-bg: #21262d;
            --search-border: #30363d;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
            --accent2: #1a7f37;
            --accent3: #8250df;
            --accent4: #bc4c00;
            --accent5: #cf222e;
            --accent6: #0550ae;
            --node-root: #dbeafe;
            --node-root-border: #0969da;
            --node-l1: #dcfce7;
            --node-l1-border: #1a7f37;
            --node-l2: #ede9fe;
            --node-l2-border: #8250df;
            --node-l3: #fff7ed;
            --node-l3-border: #bc4c00;
            --node-selected: #bfdbfe;
            --node-selected-border: #0969da;
            --shadow: rgba(0, 0, 0, 0.12);
            --connector: #c8d1da;
            --panel-bg: #ffffff;
            --panel-border: #d0d7de;
            --toolbar-bg: rgba(246, 248, 250, 0.92);
            --search-bg: #f6f8fa;
            --search-border: #d0d7de;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            user-select: none;
        }

        /* TOOLBAR */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--toolbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            height: 56px;
            transition: background var(--transition), border-color var(--transition);
        }

        .toolbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            color: var(--text);
            white-space: nowrap;
            margin-right: 8px;
            letter-spacing: -0.3px;
        }

        .toolbar-brand span {
            color: var(--accent);
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        #search-wrap {
            position: relative;
            flex: 1;
            max-width: 280px;
        }

        #search-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
        }

        #search {
            width: 100%;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-radius: 8px;
            padding: 6px 12px 6px 34px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, background var(--transition);
        }

        #search:focus {
            border-color: var(--accent);
        }

        #search::placeholder {
            color: var(--text-muted);
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 11px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .tb-btn:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .tb-btn:active {
            transform: translateY(0);
        }

        .tb-btn svg {
            flex-shrink: 0;
        }

        #theme-toggle {
            font-size: 16px;
            padding: 6px 10px;
        }

        #search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px var(--shadow);
            z-index: 200;
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }

        .sr-item {
            padding: 9px 14px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sr-item:last-child {
            border-bottom: none;
        }

        .sr-item:hover {
            background: var(--surface2);
        }

        .sr-item .sr-path {
            font-size: 11px;
            color: var(--text-muted);
        }

        .sr-item mark {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
        }

        /* CANVAS */
        #canvas-wrap {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-wrap.grabbing {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 4000px;
            height: 4000px;
            transform-origin: 0 0;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* NODES */
        .node {
            position: absolute;
            border-radius: 14px;
            border: 2px solid;
            cursor: pointer;
            transition:
                box-shadow 0.25s,
                transform 0.25s,
                background 0.25s,
                border-color 0.25s,
                opacity 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            max-width: 220px;
            min-width: 120px;
        }

        .node:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px var(--shadow);
            z-index: 10;
        }

        .node.root {
            background: var(--node-root);
            border-color: var(--node-root-border);
            font-family: 'DM Serif Display', serif;
            font-size: 15px;
            min-width: 160px;
            max-width: 240px;
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.15), 0 4px 20px var(--shadow);
        }

        .node.level-1 {
            background: var(--node-l1);
            border-color: var(--node-l1-border);
            font-size: 13px;
            font-weight: 500;
        }

        .node.level-2 {
            background: var(--node-l2);
            border-color: var(--node-l2-border);
            font-size: 12.5px;
        }

        .node.level-3 {
            background: var(--node-l3);
            border-color: var(--node-l3-border);
            font-size: 12px;
        }

        .node.selected {
            background: var(--node-selected) !important;
            border-color: var(--node-selected-border) !important;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3), 0 6px 24px var(--shadow) !important;
            z-index: 20;
        }

        .node.highlighted {
            box-shadow: 0 0 0 3px var(--accent4), 0 4px 16px var(--shadow) !important;
        }

        .node-text {
            flex: 1;
            line-height: 1.35;
            word-break: break-word;
        }

        .chevron {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            opacity: 0.6;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        }

        .node.expanded .chevron {
            transform: rotate(90deg);
            opacity: 1;
        }

        .leaf-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .node.selected .leaf-dot,
        .node:hover .leaf-dot {
            background: var(--accent);
        }

        /* CONNECTOR LINES */
        .connector {
            fill: none;
            stroke: var(--connector);
            stroke-width: 1.5;
            transition: stroke var(--transition);
        }

        /* PANEL */
        #panel {
            position: fixed;
            top: 56px;
            right: -440px;
            width: 420px;
            bottom: 0;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            z-index: 90;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition), border-color var(--transition);
            box-shadow: -8px 0 40px var(--shadow);
        }

        #panel.open {
            right: 0;
        }

        #panel-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #panel-title {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            line-height: 1.3;
            flex: 1;
            color: var(--text);
        }

        #panel-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #panel-close:hover {
            color: var(--text);
            background: var(--surface2);
        }

        #panel-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.75;
            font-size: 14px;
            color: var(--text);
        }

        #panel-body p {
            margin-bottom: 14px;
        }

        #panel-body strong {
            color: var(--accent);
            font-weight: 600;
        }

        #panel-body em {
            color: var(--accent3);
            font-style: italic;
        }

        .panel-tag {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ZOOM BADGE */
        #zoom-badge {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* FOOTER */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--toolbar-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            z-index: 100;
            font-size: 12px;
            color: var(--text-muted);
            gap: 6px;
            transition: background var(--transition), border-color var(--transition);
        }

        #footer span {
            font-weight: 600;
            color: var(--text);
            font-family: 'DM Serif Display', serif;
            letter-spacing: 0.2px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* NODE ANIMATION */
        @keyframes nodeIn {
            from {
                opacity: 0;
                transform: translateX(-12px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .node {
            animation: nodeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
        }
    </style>

    <script>
        const DATA = {
            id: 'root',
            label: 'Utilitarianism',
            children: [
                {
                    id: 'principle',
                    label: 'Principle of Utility',
                    children: [
                        { id: 'pu1', label: 'Founders', desc: '<span class="panel-tag">Origin</span><p>Utilitarianism was developed primarily by <strong>Jeremy Bentham</strong> and <strong>John Stuart Mill</strong>.</p><p>Bentham introduced the idea of measuring pleasure and pain mathematically. Mill refined the theory by distinguishing between higher and lower pleasures.</p>' },
                        { id: 'pu2', label: 'Good & Bad Actions', desc: '<span class="panel-tag">Core Rule</span><p>Under the principle of utility:<br><strong>• An action is good</strong> if it benefits someone.<br><strong>• An action is bad</strong> if it harms someone.</p><p><em>Utility</em> is defined as the tendency of an object to produce happiness or prevent unhappiness for an individual or a community.</p>' },
                        { id: 'pu3', label: 'Happiness Equation', desc: '<span class="panel-tag">Key Equivalencies</span><p>Utilitarianism treats the following as equivalent:<br><strong>Happiness</strong> = Advantage = Benefit = Good = Pleasure = Profit<br><strong>Unhappiness</strong> = Disadvantage = Cost = Evil = Pain</p><p>Moral decisions reduce to a calculation of net happiness produced.</p>' },
                        { id: 'pu4', label: 'Greatest Happiness Principle', desc: '<span class="panel-tag">Foundation</span><p>Also called the <strong>Greatest Happiness Principle</strong>: an action is right (or wrong) to the extent that it <em>increases</em> (or <em>decreases</em>) the total happiness of the affected parties.</p><p>What makes behavior right or wrong depends wholly on the <strong>consequences</strong> — not on intention, behavior, or attitude.</p>' },
                        { id: 'pu5', label: 'Consequences Over Intent', desc: '<span class="panel-tag">Key Insight</span><p>Utilitarianism is entirely <strong>consequentialist</strong> — only the outcome matters.</p><p>Focus is on the result of an act or the application of a rule. A good intention with a bad outcome is still morally problematic under this framework.</p>' },
                        { id: 'pu6', label: 'Social Usefulness', desc: '<span class="panel-tag">Application</span><p>Utilitarians stress the <strong>social usefulness</strong> of particular actions and policies by focusing on the consequences that result from those actions.</p><p>This makes the theory especially useful in public policy, economics, and organizational decision-making.</p>' }
                    ]
                },
                {
                    id: 'types',
                    label: 'Types of Utilitarianism',
                    children: [
                        {
                            id: 'act',
                            label: 'Act Utilitarianism',
                            children: [
                                { id: 'au1', label: 'Definition', desc: '<span class="panel-tag">Act Utilitarianism</span><p>An individual act <strong>(X)</strong> is morally acceptable if the consequences that result from <strong>(X)</strong> produce the <em>greatest amount of good</em> for the <em>greatest number of persons</em> affected by the act.</p><p>Each action is evaluated individually, in isolation, by its own consequences.</p>' },
                                { id: 'au2', label: 'How It Works', desc: '<span class="panel-tag">Act Utilitarianism</span><p>We analyze <strong>each of our actions</strong> from the perspective of how much happiness we believe they will produce.</p><p>There are no fixed rules — every situation is assessed fresh, calculating the net benefit vs. harm for all parties involved.</p>' },
                                { id: 'au3', label: 'Highway Scenario', desc: '<span class="panel-tag">Act Utilitarianism — Example</span><p>A state considers replacing a curvy highway. Costs: <strong>$31M</strong> (homeowner compensation $20M + construction $10M + environmental damage $1M).</p><p>Benefits: 15,000 cars/day save $6,000/weekday in operating costs → <strong>$39M over 25 years</strong>.</p><p>Since $39M benefit &gt; $31M cost → building the highway is the <strong>right action</strong> under Act Utilitarianism.</p>' },
                                { id: 'au4', label: 'Case For', desc: '<span class="panel-tag">Act Utilitarianism — Strengths</span><p><strong>✓ Focus on happiness</strong> is reasonable and intuitive.<br><strong>✓ Practical</strong> — attractive to most people as it mirrors everyday cost-benefit thinking.<br><strong>✓ Flexible</strong> — adapts to unique circumstances rather than blindly following rules.</p>' },
                                { id: 'au5', label: 'Case Against', desc: '<span class="panel-tag">Act Utilitarianism — Weaknesses</span><p><strong>✗ Unclear whom to include</strong> in happiness calculations.<br><strong>✗ Ignores duty:</strong> If keeping a promise produces 1,000 units of good but breaking it produces 1,001 units for someone else — Act Utilitarianism says <em>break the promise</em>.<br><strong>✗ Can justify injustice</strong> if the math favors it.</p>' }
                            ]
                        },
                        {
                            id: 'rule',
                            label: 'Rule Utilitarianism',
                            children: [
                                { id: 'ru1', label: 'Definition', desc: '<span class="panel-tag">Rule Utilitarianism</span><p>An action is right if it follows a <strong>rule</strong> that leads to the greatest good.</p><p>The correctness of a rule is determined by the amount of good it brings about when followed — not by the consequences of the individual act.</p>' },
                                { id: 'ru2', label: 'Rules Over Acts', desc: '<span class="panel-tag">Rule Utilitarianism</span><p>Instead of evaluating each act individually, Rule Utilitarianism says: <em>"What rule, if generally followed, would produce the most happiness?"</em></p><p>We should base our behavior on <strong>rules understood to maximize collective happiness</strong>.</p>' },
                                { id: 'ru3', label: 'vs. Act Utilitarianism', desc: '<span class="panel-tag">Comparison</span><p><strong>Act Utilitarians</strong> judge each act by the consequences of that act alone.</p><p><strong>Rule Utilitarians</strong> follow rules that, when universally adopted, produce the greatest good — even if a particular act under the rule might not maximize happiness in that one case.</p>' },
                                { id: 'ru4', label: 'vs. Kantianism', desc: '<span class="panel-tag">Comparison</span><p>Both Rule Utilitarianism and <strong>Kantianism</strong> are rule-focused, and their rules may significantly overlap. But they derive rules differently:</p><p>• <em>Rule Utilitarian:</em> follows a rule because its universal adoption maximizes happiness.<br>• <em>Kantian:</em> follows a rule because it aligns with the Categorical Imperative — treating humans as ends, not means.</p><p>One looks at <strong>consequences</strong>; the other at the <strong>will motivating the action</strong>.</p>' },
                                { id: 'ru5', label: 'Case For', desc: '<span class="panel-tag">Rule Utilitarianism — Strengths</span><p><strong>✓ Easier to use</strong> — not every decision requires performing utilitarian calculus.<br><strong>✓ Moral rules survive exceptional situations</strong> — avoids the promise-breaking trap, since long-term rule-following is better.<br><strong>✓ Avoids bias</strong> — asks "Is it ok for everyone?" not just "Is it ok for me?"<br><strong>✓ Appeals to a wide cross-section of society</strong>.<br><strong>✓ Workable ethical theory</strong> for organizations and policy.</p>' },
                                { id: 'ru6', label: 'Justification Test', desc: '<span class="panel-tag">Rule Utilitarianism</span><p>An action is <strong>justifiable</strong> if allowing that action as a rule would bring about greater net happiness than forbidding it.</p><p>This shifts the moral question from "Does this act maximize happiness?" to "Does the rule permitting this act maximize happiness when universally applied?"</p>' }
                            ]
                        }
                    ]
                },
                {
                    id: 'comparison',
                    label: 'Act vs. Rule — Key Differences',
                    children: [
                        { id: 'cmp1', label: 'Unit of Evaluation', desc: '<span class="panel-tag">Comparison</span><p><strong>Act Utilitarianism:</strong> evaluates each <em>individual action</em> by its own consequences.<br><strong>Rule Utilitarianism:</strong> evaluates the <em>rule</em> governing an action by its consequences when universally applied.</p>' },
                        { id: 'cmp2', label: 'Flexibility vs. Consistency', desc: '<span class="panel-tag">Comparison</span><p><strong>Act:</strong> highly flexible — adapts to each unique situation, but can produce inconsistent moral judgments.<br><strong>Rule:</strong> more consistent — sets stable behavioral standards, but may not maximize happiness in every single case.</p>' },
                        { id: 'cmp3', label: 'The Promise Problem', desc: '<span class="panel-tag">Classic Dilemma</span><p>Act Utilitarianism may endorse <strong>breaking a promise</strong> if doing so produces slightly more happiness (1,001 vs 1,000 units).</p><p>Rule Utilitarianism avoids this — recognizing that the rule <em>"keep your promises"</em> produces far greater collective happiness in the long run when universally followed.</p>' },
                        { id: 'cmp4', label: 'Bias & Fairness', desc: '<span class="panel-tag">Comparison</span><p>Act Utilitarianism can be biased toward the actor\'s own interests or those close to them.</p><p>Rule Utilitarianism counters this by asking: <strong>"Would this rule be acceptable to everyone?"</strong> — a more universally fair standard.</p>' }
                    ]
                },
                {
                    id: 'strengths',
                    label: 'Overall Strengths',
                    children: [
                        { id: 'str1', label: 'Consequentialist Logic', desc: '<span class="panel-tag">Strength</span><p>Utilitarianism\'s focus on <strong>outcomes over intentions</strong> aligns well with how we naturally evaluate decisions — by their real-world results.</p><p>It is grounded in observable consequences rather than abstract duties.</p>' },
                        { id: 'str2', label: 'Democratic Appeal', desc: '<span class="panel-tag">Strength</span><p>The greatest happiness for the greatest number resonates with <strong>democratic values</strong> — prioritizing the collective over the individual.</p><p>It is widely used in public policy, economics, and social welfare analysis.</p>' },
                        { id: 'str3', label: 'Practical Framework', desc: '<span class="panel-tag">Strength</span><p>Utilitarianism provides a <strong>practical, actionable framework</strong> — especially for organizational and governmental decisions involving resource allocation, regulation, and policy trade-offs.</p>' }
                    ]
                },
                {
                    id: 'weaknesses',
                    label: 'Overall Weaknesses',
                    children: [
                        { id: 'wk1', label: 'Ignores Rights & Duties', desc: '<span class="panel-tag">Weakness</span><p>Utilitarianism can justify violating individual rights if it maximizes overall happiness.</p><p>It ignores our <strong>innate sense of duty</strong> — the feeling that some things are simply wrong regardless of consequences (e.g., torturing one innocent person to save many).</p>' },
                        { id: 'wk2', label: 'Measurement Problems', desc: '<span class="panel-tag">Weakness</span><p>How do you measure happiness? Who counts? How far into the future do you project consequences?</p><p>The theory is difficult to apply rigorously because <strong>happiness is subjective</strong> and comparisons across people are problematic.</p>' },
                        { id: 'wk3', label: 'Minority Harm Risk', desc: '<span class="panel-tag">Weakness</span><p>By focusing on aggregate happiness, utilitarianism can endorse policies that <strong>harm minorities</strong> if they benefit the majority.</p><p>This tension with justice and rights is one of the most persistent criticisms of the theory.</p>' }
                    ]
                }
            ]
        };

        // ─────────────────────────────────────────────
        // STATE
        // ─────────────────────────────────────────────
        const state = {
            expanded: new Set(['root']),
            selected: null,
            panX: 0,
            panY: 0,
            scale: 1,
            dragging: false,
            dragStartX: 0,
            dragStartY: 0,
            dragStartPanX: 0,
            dragStartPanY: 0
        };

        const NODE_W = 200;
        const NODE_H = 44;
        const H_GAP = 80;
        const V_GAP = 28;

        function estimateNodeHeight(node) {
            const text = String(node.label || "");
            const charsPerLine = node._level === 0 ? 22 : 18;
            const lines = Math.max(1, Math.ceil(text.length / charsPerLine));
            return Math.max(NODE_H, 24 + lines * 22);
        }

        // ─────────────────────────────────────────────
        // LAYOUT ENGINE
        // ─────────────────────────────────────────────
        function shiftSubtree(node, deltaY) {
            node._y += deltaY;
            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(child => shiftSubtree(child, deltaY));
            }
        }

        function computeLayout(node, level = 0, x = 100, y = 0) {
            node._level = level;
            node._x = x;
            node._y = y;
            node._w = NODE_W;
            node._h = estimateNodeHeight(node);

            if (!node.children || !state.expanded.has(node.id)) {
                node._subtreeH = node._h;
                return node._subtreeH;
            }

            const childX = x + NODE_W + H_GAP;
            let totalH = 0;
            node.children.forEach(child => {
                totalH += computeLayout(child, level + 1, childX, 0);
                totalH += V_GAP;
            });
            totalH -= V_GAP;

            let cy = y + (node._h / 2) - (totalH / 2);
            node.children.forEach(child => {
                const nextY = cy + (child._subtreeH / 2) - (child._h / 2);
                shiftSubtree(child, nextY - child._y);
                cy += child._subtreeH + V_GAP;
            });

            node._subtreeH = Math.max(node._h, totalH);
            return node._subtreeH;
        }

        // ─────────────────────────────────────────────
        // RENDER
        // ─────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        let nodeEls = {};

        function render() {
            computeLayout(DATA, 0, 100, 2000);
            renderNodes(DATA);
            renderConnectors(DATA);
        }

        function renderNodes(node) {
            let el = nodeEls[node.id];
            if (!el) {
                el = document.createElement('div');
                el.className = 'node';
                el.dataset.id = node.id;
                el.innerHTML = buildNodeHTML(node);
                el.addEventListener('click', () => onNodeClick(node));
                canvas.appendChild(el);
                nodeEls[node.id] = el;
            }

            const levelClass = node._level === 0 ? 'root' : `level-${Math.min(node._level, 3)}`;
            el.className = `node ${levelClass}${state.selected === node.id ? ' selected' : ''}${state.expanded.has(node.id) ? ' expanded' : ''}`;
            el.style.left = node._x + 'px';
            el.style.top = node._y + 'px';
            el.style.width = node._w + 'px';
            el.style.minHeight = node._h + 'px';
            el.style.display = 'flex';

            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(renderNodes);
            }

            // Remove orphaned children
            if (!node.children || !state.expanded.has(node.id)) {
                collapseChildren(node);
            }
        }

        function buildNodeHTML(node) {
            const isParent = node.children && node.children.length > 0;
            const icon = isParent
                ? `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`
                : `<div class="leaf-dot"></div>`;
            return `<div class="node-text">${node.label}</div>${icon}`;
        }

        function collapseChildren(node) {
            if (!node.children) return;
            node.children.forEach(child => {
                if (nodeEls[child.id]) {
                    nodeEls[child.id].style.display = 'none';
                }
                collapseChildren(child);
            });
        }

        function renderConnectors(node) {
            svgLayer.innerHTML = '';
            drawConnectors(node);
        }

        function drawConnectors(node) {
            if (!node.children || !state.expanded.has(node.id)) return;
            node.children.forEach(child => {
                const x1 = node._x + node._w;
                const y1 = node._y + node._h / 2;
                const x2 = child._x;
                const y2 = child._y + child._h / 2;
                const cx1 = x1 + (x2 - x1) * 0.55;
                const cx2 = x2 - (x2 - x1) * 0.55;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('class', 'connector');
                path.setAttribute('d', `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`);
                svgLayer.appendChild(path);
                drawConnectors(child);
            });
        }

        // ─────────────────────────────────────────────
        // INTERACTION
        // ─────────────────────────────────────────────
        function onNodeClick(node) {
            if (node.children && node.children.length > 0) {
                if (state.expanded.has(node.id)) {
                    state.expanded.delete(node.id);
                } else {
                    state.expanded.add(node.id);
                }
                state.selected = node.id;
                render();
            } else {
                state.selected = node.id;
                render();
                openPanel(node);
            }
        }

        function openPanel(node) {
            document.getElementById('panel-title').textContent = node.label;
            document.getElementById('panel-body').innerHTML = node.desc || `<p>No description available.</p>`;
            document.getElementById('panel').classList.add('open');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
            state.selected = null;
            render();
        }

        // ─────────────────────────────────────────────
        // PAN & ZOOM
        // ─────────────────────────────────────────────
        const wrap = document.getElementById('canvas-wrap');

        function applyTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            document.getElementById('zoom-badge').textContent = Math.round(state.scale * 100) + '%';
        }

        wrap.addEventListener('mousedown', e => {
            if (e.target.closest('.node')) return;
            state.dragging = true;
            state.dragStartX = e.clientX;
            state.dragStartY = e.clientY;
            state.dragStartPanX = state.panX;
            state.dragStartPanY = state.panY;
            wrap.classList.add('grabbing');
        });

        window.addEventListener('mousemove', e => {
            if (!state.dragging) return;
            state.panX = state.dragStartPanX + (e.clientX - state.dragStartX);
            state.panY = state.dragStartPanY + (e.clientY - state.dragStartY);
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            state.dragging = false;
            wrap.classList.remove('grabbing');
        });

        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 0.1 : -0.1;
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }, { passive: false });

        function zoom(delta) {
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }

        function resetView() {
            state.panX = 0;
            state.panY = 0;
            state.scale = 1;
            applyTransform();
        }

        // ─────────────────────────────────────────────
        // EXPAND / COLLAPSE ALL
        // ─────────────────────────────────────────────
        function collectIds(node, ids = []) {
            ids.push(node.id);
            if (node.children) node.children.forEach(c => collectIds(c, ids));
            return ids;
        }

        function expandAll() {
            collectIds(DATA).forEach(id => state.expanded.add(id));
            render();
        }

        function collapseAll() {
            state.expanded.clear();
            state.expanded.add('root');
            render();
        }

        // ─────────────────────────────────────────────
        // SEARCH
        // ─────────────────────────────────────────────
        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('search-results');

        function flatNodes(node, path = [], results = []) {
            results.push({ node, path: [...path, node.label] });
            if (node.children) node.children.forEach(c => flatNodes(c, [...path, node.label], results));
            return results;
        }

        const allNodes = flatNodes(DATA);

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            // Clear highlights
            Object.values(nodeEls).forEach(el => el.classList.remove('highlighted'));

            if (!q) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = allNodes.filter(({ node }) => node.label.toLowerCase().includes(q));
            if (matches.length === 0) {
                searchResults.innerHTML = '<div class="sr-item" style="cursor:default;color:var(--text-muted)">No results found</div>';
                searchResults.style.display = 'block';
                return;
            }

            searchResults.innerHTML = matches.slice(0, 10).map(({ node, path }) => {
                const hl = node.label.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
                const trail = path.slice(0, -1).join(' › ');
                return `<div class="sr-item" data-id="${node.id}"><div>${hl}</div>${trail ? `<div class="sr-path">${trail}</div>` : ''}</div>`;
            }).join('');

            searchResults.querySelectorAll('.sr-item[data-id]').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    navigateTo(id);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });

            matches.forEach(({ node }) => {
                if (nodeEls[node.id]) nodeEls[node.id].classList.add('highlighted');
            });

            searchResults.style.display = 'block';
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-wrap')) searchResults.style.display = 'none';
        });

        function navigateTo(id) {
            // Expand path to node
            function findPath(node, targetId, path = []) {
                if (node.id === targetId) return [...path, node.id];
                if (node.children) {
                    for (const c of node.children) {
                        const r = findPath(c, targetId, [...path, node.id]);
                        if (r) return r;
                    }
                }
                return null;
            }
            const path = findPath(DATA, id);
            if (path) path.forEach(pid => state.expanded.add(pid));
            state.selected = id;
            render();
            // Center on node
            setTimeout(() => {
                function findNode(node, id) {
                    if (node.id === id) return node;
                    if (node.children) for (const c of node.children) { const r = findNode(c, id); if (r) return r; }
                    return null;
                }
                const n = findNode(DATA, id);
                if (n) {
                    const vpW = wrap.clientWidth;
                    const vpH = wrap.clientHeight;
                    state.panX = vpW / 2 - (n._x + n._w / 2) * state.scale;
                    state.panY = vpH / 2 - (n._y + n._h / 2) * state.scale;
                    applyTransform();
                }
            }, 100);
        }

        // ─────────────────────────────────────────────
        // THEME
        // ─────────────────────────────────────────────
        const themeBtn = document.getElementById('theme-toggle');
        let isDark = true;

        function applyTheme(dark) {
            document.body.dataset.theme = dark ? 'dark' : 'light';
            themeBtn.textContent = dark ? '🌙' : '☀️';
            localStorage.setItem('mm-theme', dark ? 'dark' : 'light');
            try { localStorage.setItem('shoug-theme', dark ? 'dark' : 'light'); } catch(_e) {}
        }

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            applyTheme(isDark);
        });

        // Restore
        const saved = localStorage.getItem('shoug-theme') || localStorage.getItem('mm-theme');
        if (saved === 'light') { isDark = false; applyTheme(false); }

        // ─────────────────────────────────────────────
        // EXPORT PNG
        // ─────────────────────────────────────────────
        async function exportPNG() {
            const msg = document.createElement('div');
            msg.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;';
            msg.textContent = 'Preparing export… (open browser print for full export)';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
            window.print();
        }

        // ─────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────
        function init() {
            state.panX = 40;
            state.panY = -1820;
            applyTransform();
            render();
        }

        init();
    </script>
</body>

</html>
