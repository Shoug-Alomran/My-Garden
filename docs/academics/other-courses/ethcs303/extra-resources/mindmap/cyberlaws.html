    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1f2937;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #d2a8ff;
            --accent4: #ffa657;
            --accent5: #ff7b72;
            --accent6: #79c0ff;
            --node-root: #1a2744;
            --node-root-border: #58a6ff;
            --node-l1: #1a2a1e;
            --node-l1-border: #3fb950;
            --node-l2: #2a1f3d;
            --node-l2-border: #d2a8ff;
            --node-l3: #2a1f18;
            --node-l3-border: #ffa657;
            --node-selected: #0d2442;
            --node-selected-border: #58a6ff;
            --shadow: rgba(0, 0, 0, 0.5);
            --connector: #30363d;
            --panel-bg: #161b22;
            --panel-border: #30363d;
            --toolbar-bg: rgba(13, 17, 23, 0.92);
            --search-bg: #21262d;
            --search-border: #30363d;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
            --accent2: #1a7f37;
            --accent3: #8250df;
            --accent4: #bc4c00;
            --accent5: #cf222e;
            --accent6: #0550ae;
            --node-root: #dbeafe;
            --node-root-border: #0969da;
            --node-l1: #dcfce7;
            --node-l1-border: #1a7f37;
            --node-l2: #ede9fe;
            --node-l2-border: #8250df;
            --node-l3: #fff7ed;
            --node-l3-border: #bc4c00;
            --node-selected: #bfdbfe;
            --node-selected-border: #0969da;
            --shadow: rgba(0, 0, 0, 0.12);
            --connector: #c8d1da;
            --panel-bg: #ffffff;
            --panel-border: #d0d7de;
            --toolbar-bg: rgba(246, 248, 250, 0.92);
            --search-bg: #f6f8fa;
            --search-border: #d0d7de;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            user-select: none;
        }

        /* TOOLBAR */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--toolbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            height: 56px;
            transition: background var(--transition), border-color var(--transition);
        }

        .toolbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            color: var(--text);
            white-space: nowrap;
            margin-right: 8px;
            letter-spacing: -0.3px;
        }

        .toolbar-brand span {
            color: var(--accent);
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        #search-wrap {
            position: relative;
            flex: 1;
            max-width: 280px;
        }

        #search-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
        }

        #search {
            width: 100%;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-radius: 8px;
            padding: 6px 12px 6px 34px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, background var(--transition);
        }

        #search:focus {
            border-color: var(--accent);
        }

        #search::placeholder {
            color: var(--text-muted);
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 11px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .tb-btn:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .tb-btn:active {
            transform: translateY(0);
        }

        .tb-btn svg {
            flex-shrink: 0;
        }

        #theme-toggle {
            font-size: 16px;
            padding: 6px 10px;
        }

        #search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px var(--shadow);
            z-index: 200;
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }

        .sr-item {
            padding: 9px 14px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sr-item:last-child {
            border-bottom: none;
        }

        .sr-item:hover {
            background: var(--surface2);
        }

        .sr-item .sr-path {
            font-size: 11px;
            color: var(--text-muted);
        }

        .sr-item mark {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
        }

        /* CANVAS */
        #canvas-wrap {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-wrap.grabbing {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 4000px;
            height: 4000px;
            transform-origin: 0 0;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* NODES */
        .node {
            position: absolute;
            border-radius: 14px;
            border: 2px solid;
            cursor: pointer;
            transition:
                box-shadow 0.25s,
                transform 0.25s,
                background 0.25s,
                border-color 0.25s,
                opacity 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            max-width: 220px;
            min-width: 120px;
        }

        .node:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px var(--shadow);
            z-index: 10;
        }

        .node.root {
            background: var(--node-root);
            border-color: var(--node-root-border);
            font-family: 'DM Serif Display', serif;
            font-size: 15px;
            min-width: 160px;
            max-width: 240px;
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.15), 0 4px 20px var(--shadow);
        }

        .node.level-1 {
            background: var(--node-l1);
            border-color: var(--node-l1-border);
            font-size: 13px;
            font-weight: 500;
        }

        .node.level-2 {
            background: var(--node-l2);
            border-color: var(--node-l2-border);
            font-size: 12.5px;
        }

        .node.level-3 {
            background: var(--node-l3);
            border-color: var(--node-l3-border);
            font-size: 12px;
        }

        .node.selected {
            background: var(--node-selected) !important;
            border-color: var(--node-selected-border) !important;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3), 0 6px 24px var(--shadow) !important;
            z-index: 20;
        }

        .node.highlighted {
            box-shadow: 0 0 0 3px var(--accent4), 0 4px 16px var(--shadow) !important;
        }

        .node-text {
            flex: 1;
            line-height: 1.35;
            word-break: break-word;
        }

        .chevron {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            opacity: 0.6;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        }

        .node.expanded .chevron {
            transform: rotate(90deg);
            opacity: 1;
        }

        .leaf-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .node.selected .leaf-dot,
        .node:hover .leaf-dot {
            background: var(--accent);
        }

        /* CONNECTOR LINES */
        .connector {
            fill: none;
            stroke: var(--connector);
            stroke-width: 1.5;
            transition: stroke var(--transition);
        }

        /* PANEL */
        #panel {
            position: fixed;
            top: 56px;
            right: -440px;
            width: 420px;
            bottom: 0;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            z-index: 90;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition), border-color var(--transition);
            box-shadow: -8px 0 40px var(--shadow);
        }

        #panel.open {
            right: 0;
        }

        #panel-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #panel-title {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            line-height: 1.3;
            flex: 1;
            color: var(--text);
        }

        #panel-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #panel-close:hover {
            color: var(--text);
            background: var(--surface2);
        }

        #panel-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.75;
            font-size: 14px;
            color: var(--text);
        }

        #panel-body p {
            margin-bottom: 14px;
        }

        #panel-body strong {
            color: var(--accent);
            font-weight: 600;
        }

        #panel-body em {
            color: var(--accent3);
            font-style: italic;
        }

        .panel-tag {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ZOOM BADGE */
        #zoom-badge {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* FOOTER */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--toolbar-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            z-index: 100;
            font-size: 12px;
            color: var(--text-muted);
            gap: 6px;
            transition: background var(--transition), border-color var(--transition);
        }

        #footer span {
            font-weight: 600;
            color: var(--text);
            font-family: 'DM Serif Display', serif;
            letter-spacing: 0.2px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* NODE ANIMATION */
        @keyframes nodeIn {
            from {
                opacity: 0;
                transform: translateX(-12px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .node {
            animation: nodeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
        }
    </style>

    <script>
        const DATA = {
            id: 'root',
            label: 'Cyber Laws in KSA',
            children: [
                {
                    id: 'overview',
                    label: 'What is Cybercrime?',
                    children: [
                        { id: 'ov1', label: 'Definition', desc: '<span class="panel-tag">Definition</span><p>A <strong>cybercrime</strong> is any crime that involves a computer and a network.</p><p>With the rise of technology, malicious actors exploit digital channels to trespass on the privacy of individuals and organizations in countless ways.</p>' },
                        { id: 'ov2', label: 'WWW Downside', desc: '<span class="panel-tag">Context</span><p>The World Wide Web, while transformative, has empowered <strong>evil minds</strong> to find indefinite and unethical routes to harm others.</p><p>Legislatures around the world have responded by codifying laws to tackle the growing menace of cyber-crimes.</p>' }
                    ]
                },
                {
                    id: 'classification',
                    label: 'Classification',
                    children: [
                        {
                            id: 'against_individual',
                            label: 'Against Individuals',
                            children: [
                                { id: 'ai1', label: 'Email Spoofing', desc: '<span class="panel-tag">Against Individual</span><p><strong>Email spoofing</strong> is the forgery of an email header so that the message appears to have originated from someone or somewhere other than the actual source.</p><p>It is used to deceive recipients into trusting a malicious message.</p>' },
                                { id: 'ai2', label: 'Spamming', desc: '<span class="panel-tag">Against Individual</span><p><strong>Spamming</strong> is the sending of unsolicited email — generally advertisements — to someone who has not requested that information.</p><p>At scale, spam can overwhelm inboxes and carry malicious payloads.</p>' },
                                { id: 'ai3', label: 'Phishing', desc: '<span class="panel-tag">Against Individual</span><p><strong>Phishing</strong> is the attempt to obtain sensitive information such as usernames, passwords, and credit card details by disguising as a trustworthy entity in electronic communication.</p><p>It often exploits urgency and fear to trick victims.</p>' },
                                { id: 'ai4', label: 'Cyberstalking', desc: '<span class="panel-tag">Against Individual</span><p><strong>Cyberstalking</strong> is the use of the Internet or electronic means to stalk or harass an individual, group, or organization.</p><p>Motivations include anger, revenge, or control. It may include false accusations, defamation, and threats sent via email or social media.</p>' },
                                { id: 'ai5', label: 'Cyber Defamation', desc: '<span class="panel-tag">Against Individual</span><p><strong>Cyber defamation</strong> is the publication or broadcast through any internet-based media of slanderous statements about an individual or business that can be proven to be false, with the intention of harming reputation.</p>' },
                                { id: 'ai6', label: 'Cyber Pornography', desc: '<span class="panel-tag">Against Individual</span><p><strong>Cyber pornography</strong> refers to the distribution of pornographic material through digital networks.</p><p>Under Saudi law, production, preparation, and promotion of such material is a serious criminal offence punishable by imprisonment and fines.</p>' }
                            ]
                        },
                        {
                            id: 'against_property',
                            label: 'Against Property',
                            children: [
                                { id: 'ap1', label: 'Credit Card Skimming', desc: '<span class="panel-tag">Against Property</span><p><strong>Credit card skimming</strong> is a type of theft where criminals use a small device to steal credit card information during an otherwise legitimate transaction.</p><p>The stolen data is then cloned onto fake cards or used for unauthorized online purchases.</p>' },
                                { id: 'ap2', label: 'Software Piracy', desc: '<span class="panel-tag">Against Property</span><p><strong>Software piracy</strong> is the stealing of legally protected software. Under copyright law, piracy occurs when software is copied, distributed, modified, or sold without authorization.</p>' },
                                { id: 'ap3', label: 'Identity Theft', desc: '<span class="panel-tag">Against Property</span><p><strong>Identity theft</strong> is a crime in which an imposter obtains key personally identifiable information — such as ID numbers or financial credentials — to impersonate someone else.</p><p>This can devastate victims financially and legally.</p>' },
                                { id: 'ap4', label: 'DDoS / Hacking', desc: '<span class="panel-tag">Against Property</span><p>A <strong>DDoS (Distributed Denial of Service) attack</strong> overwhelms a server with traffic until it crashes, denying service to legitimate users.</p><p><strong>Hacking</strong> involves unauthorized access to computer systems to steal, alter, or destroy data.</p>' },
                                { id: 'ap5', label: 'Cybersquatting & IPR', desc: '<span class="panel-tag">Against Property</span><p><strong>Cybersquatting</strong> involves registering domain names of well-known brands with the intent to sell them at a premium.</p><p><strong>IPR violations</strong> include copyright infringement and trademark theft across digital platforms.</p>' },
                                { id: 'ap6', label: 'Salami Attack', desc: '<span class="panel-tag">Against Property</span><p>A <strong>salami attack</strong> involves making tiny, almost imperceptible financial alterations — for example, deducting SAR 2/month from every bank customer — that go unnoticed individually but accumulate into substantial theft.</p><p>Named after the technique of slicing data thinly, like salami.</p>' }
                            ]
                        },
                        {
                            id: 'against_government',
                            label: 'Against Government',
                            children: [
                                { id: 'ag1', label: 'DoS Attack', desc: '<span class="panel-tag">Against Government</span><p>A <strong>Denial of Service (DoS)</strong> attack is a security event where an attacker prevents legitimate users from accessing targeted computer systems, devices, or network resources.</p><p>When directed at government systems, it can disrupt critical public services.</p>' },
                                { id: 'ag2', label: 'Email Bombing', desc: '<span class="panel-tag">Against Government</span><p>An <strong>email bomb</strong> consists of sending huge volumes of email to an address in an attempt to overflow the mailbox or overwhelm the mail server — effectively a DoS attack via email.</p>' },
                                { id: 'ag3', label: 'Logic Bombing', desc: '<span class="panel-tag">Against Government</span><p>A <strong>logic bomb</strong> is a piece of code intentionally inserted into a software system that triggers a malicious function when specified conditions are met.</p><p>It is a time-delayed or event-triggered attack that can be devastating when it fires.</p>' },
                                { id: 'ag4', label: 'Data Diddling', desc: '<span class="panel-tag">Against Government</span><p><strong>Data diddling</strong> is the unauthorized alteration of data before or during entry into a computer system, then changing it back after processing.</p><p><em>Example:</em> A ticket clerk issued full-price tickets but recorded them as half-price sales — pocketing the difference.</p>' },
                                { id: 'ag5', label: 'Cyber Terrorism', desc: '<span class="panel-tag">Against Government</span><p><strong>Cyber terrorism</strong> involves using the internet to facilitate, coordinate, or execute terrorist activities — including spreading propaganda, financing operations, or attacking critical infrastructure.</p><p>Saudi law imposes its harshest penalties for this category.</p>' },
                                { id: 'ag6', label: 'Sale of Illegal Articles', desc: '<span class="panel-tag">Against Government</span><p>The Internet facilitates the <strong>sale of illegal items</strong> — drugs, narcotics, weapons, wildlife — through bulletin boards, social networks, and dedicated dark-web sites.</p>' }
                            ]
                        }
                    ]
                },
                {
                    id: 'techniques',
                    label: 'Attack Techniques',
                    children: [
                        { id: 'tech1', label: 'Data Diddling', desc: '<span class="panel-tag">Technique</span><p><strong>Data diddling</strong> involves unauthorized altering of data before or during entry, then reverting it after processing — making it difficult to detect.</p><p><em>Illustration:</em> A keyboard operator diverted thousands of dollars of store goods by changing delivery addresses during order processing.</p>' },
                        { id: 'tech2', label: 'Salami Attack', desc: '<span class="panel-tag">Technique</span><p><strong>Salami attacks</strong> commit financial crimes by making alterations so small they go completely unnoticed in any single case.</p><p>A bank employee who programs the server to deduct SAR 2/month per customer makes a sizeable profit while no individual customer notices.</p>' },
                        { id: 'tech3', label: 'Trojans / Keyloggers', desc: '<span class="panel-tag">Technique</span><p>A <strong>keylogger</strong> records every keystroke a victim makes — making it extremely dangerous on computers used for online banking or financial transactions.</p><p>Keyloggers are often delivered via trojans — malicious programs disguised as legitimate software.</p>' },
                        { id: 'tech4', label: 'Web Jacking', desc: '<span class="panel-tag">Technique</span><p><strong>Web jacking</strong> means forcefully taking over control of a website by cracking and changing its password.</p><p>The motive is typically ransom — monetary or political — similar to airplane hijacking. The original owner loses all control over the website\'s content.</p>' },
                        { id: 'tech5', label: 'Domain Name Disputes', desc: '<span class="panel-tag">Technique</span><p><strong>Domain disputes</strong> arise when two parties claim the same second-level domain name (e.g., "microsoft" in www.microsoft.com).</p><p>Cybersquatters register brand names as domains to profit from resale or misdirection of traffic.</p>' }
                    ]
                },
                {
                    id: 'ksa_law',
                    label: 'Saudi Anti-Cybercrime Law',
                    children: [
                        {
                            id: 'ksa_intro',
                            label: 'Introduction',
                            children: [
                                { id: 'ki1', label: 'Royal Decree M/17', desc: '<span class="panel-tag">Legal Basis</span><p>The <strong>Saudi Anti-Cybercrime Law</strong> was issued by Royal Decree Number M/17, dated <em>26th March 2007</em>.</p><p>It was the Kingdom\'s first set of laws designed specifically to combat the growing threat of IT crimes.</p>' },
                                { id: 'ki2', label: '16 Provisions', desc: '<span class="panel-tag">Structure</span><p>The law consists of <strong>16 provisions/articles</strong> that set out key definitions, scope and objectives, criminal sentences, and financial fines.</p>' },
                                { id: 'ki3', label: 'Objectives', desc: '<span class="panel-tag">Objectives</span><p>The law has four core objectives:<br><strong>1.</strong> Enhancement of information security.<br><strong>2.</strong> Protection of rights pertaining to legitimate computer use.<br><strong>3.</strong> Protection of public interest, morals, and common values.<br><strong>4.</strong> Protection of the national economy.</p>' }
                            ]
                        },
                        {
                            id: 'articles',
                            label: 'Key Articles',
                            children: [
                                { id: 'art3', label: 'Article 3 — Privacy', desc: '<span class="panel-tag">Article 3</span><p><strong>Crimes covered:</strong></p><p>• Spying on, intercepting, or receiving data without authorization<br>• Unlawful computer access to threaten or blackmail<br>• Hacking websites to change design, destroy, or modify<br>• Invasion of privacy via camera-equipped mobile phones<br>• Defamation using information technology tools</p><p><strong>Penalty:</strong> Prison not exceeding <em>1 year</em> and fine up to <em>SAR 500,000</em>.</p>' },
                                { id: 'art4', label: 'Article 4 — Fraud', desc: '<span class="panel-tag">Article 4</span><p><strong>Crimes covered:</strong></p><p>• Acquiring property or bonds through fraud or false identity<br>• Illegally accessing bank or credit data to obtain financial information</p><p><strong>Penalty:</strong> Imprisonment not exceeding <em>3 years</em> and fine not exceeding <em>SAR 2,000,000</em>, or both.</p>' },
                                { id: 'art5', label: 'Article 5 — Data Damage', desc: '<span class="panel-tag">Article 5</span><p><strong>Crimes covered:</strong></p><p>• Unlawful access to delete, destroy, leak, or alter private data<br>• Causing information networks to halt or breakdown<br>• Obstruction of access or distortion of services</p><p><strong>Penalty:</strong> Imprisonment not exceeding <em>4 years</em> and fine not exceeding <em>SAR 3,000,000</em>, or both.</p>' },
                                { id: 'art6', label: 'Article 6 — Morality', desc: '<span class="panel-tag">Article 6</span><p><strong>Crimes covered:</strong></p><p>• Content impinging on public order, religious values, or privacy<br>• Pornographic or gambling sites violating public morals<br>• Websites facilitating human trafficking<br>• Sites promoting trade in narcotics or psychotropic drugs</p><p><strong>Penalty:</strong> Imprisonment not exceeding <em>5 years</em> and fine not exceeding <em>SAR 3,000,000</em>, or both.</p>' },
                                { id: 'art7', label: 'Article 7 — Terrorism', desc: '<span class="panel-tag">Article 7 — Harshest Penalty</span><p><strong>Crimes covered:</strong></p><p>• Websites for terrorist organizations — financing, promoting ideologies, sharing bomb-making methods<br>• Unlawful access to systems jeopardizing internal/external state security or national economy</p><p><strong>Penalty:</strong> Imprisonment not exceeding <em>10 years</em> and fine not exceeding <em>SAR 5,000,000</em>, or both.</p>' },
                                { id: 'art9', label: 'Article 9 — Complicity', desc: '<span class="panel-tag">Article 9</span><p><strong>Incitement, assistance, or collaboration</strong> with cybercriminals is itself a crime.</p><p>If the crime is committed: penalty up to the <em>maximum</em> designated for the crime.<br>If the intended crime is not committed: penalty up to <em>half</em> the maximum.</p>' }
                            ]
                        }
                    ]
                },
                {
                    id: 'penalties',
                    label: 'Penalty Summary',
                    children: [
                        { id: 'pen1', label: 'Art. 3 — 1yr / SAR 500K', desc: '<span class="panel-tag">Penalty</span><p>Privacy violations, spying, defamation, camera misuse, and blackmail via computer are punishable by <strong>up to 1 year imprisonment</strong> and/or a fine of <strong>up to SAR 500,000</strong>.</p>' },
                        { id: 'pen2', label: 'Art. 4 — 3yrs / SAR 2M', desc: '<span class="panel-tag">Penalty</span><p>Fraud, identity impersonation, and illegal access to financial data carry <strong>up to 3 years imprisonment</strong> and/or a fine of <strong>up to SAR 2,000,000</strong>.</p>' },
                        { id: 'pen3', label: 'Art. 5 — 4yrs / SAR 3M', desc: '<span class="panel-tag">Penalty</span><p>Data destruction, network disruption, and service obstruction carry <strong>up to 4 years imprisonment</strong> and/or a fine of <strong>up to SAR 3,000,000</strong>.</p>' },
                        { id: 'pen4', label: 'Art. 6 — 5yrs / SAR 3M', desc: '<span class="panel-tag">Penalty</span><p>Immoral content, pornography, human trafficking sites, and drug-trade facilitation carry <strong>up to 5 years imprisonment</strong> and/or a fine of <strong>up to SAR 3,000,000</strong>.</p>' },
                        { id: 'pen5', label: 'Art. 7 — 10yrs / SAR 5M', desc: '<span class="panel-tag">Penalty — Most Severe</span><p>Terrorism facilitation and attacks on national security carry the harshest penalties: <strong>up to 10 years imprisonment</strong> and/or a fine of <strong>up to SAR 5,000,000</strong>.</p>' }
                    ]
                }
            ]
        };

        // ─────────────────────────────────────────────
        // STATE
        // ─────────────────────────────────────────────
        const state = {
            expanded: new Set(['root']),
            selected: null,
            panX: 0,
            panY: 0,
            scale: 1,
            dragging: false,
            dragStartX: 0,
            dragStartY: 0,
            dragStartPanX: 0,
            dragStartPanY: 0
        };

        const NODE_W = 200;
        const NODE_H = 44;
        const H_GAP = 80;
        const V_GAP = 28;

        function estimateNodeHeight(node) {
            const text = String(node.label || "");
            const charsPerLine = node._level === 0 ? 22 : 18;
            const lines = Math.max(1, Math.ceil(text.length / charsPerLine));
            return Math.max(NODE_H, 24 + lines * 22);
        }

        // ─────────────────────────────────────────────
        // LAYOUT ENGINE
        // ─────────────────────────────────────────────
        function shiftSubtree(node, deltaY) {
            node._y += deltaY;
            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(child => shiftSubtree(child, deltaY));
            }
        }

        function computeLayout(node, level = 0, x = 100, y = 0) {
            node._level = level;
            node._x = x;
            node._y = y;
            node._w = NODE_W;
            node._h = estimateNodeHeight(node);

            if (!node.children || !state.expanded.has(node.id)) {
                node._subtreeH = node._h;
                return node._subtreeH;
            }

            const childX = x + NODE_W + H_GAP;
            let totalH = 0;
            node.children.forEach(child => {
                totalH += computeLayout(child, level + 1, childX, 0);
                totalH += V_GAP;
            });
            totalH -= V_GAP;

            let cy = y + (node._h / 2) - (totalH / 2);
            node.children.forEach(child => {
                const nextY = cy + (child._subtreeH / 2) - (child._h / 2);
                shiftSubtree(child, nextY - child._y);
                cy += child._subtreeH + V_GAP;
            });

            node._subtreeH = Math.max(node._h, totalH);
            return node._subtreeH;
        }

        // ─────────────────────────────────────────────
        // RENDER
        // ─────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        let nodeEls = {};

        function render() {
            computeLayout(DATA, 0, 100, 2000);
            renderNodes(DATA);
            renderConnectors(DATA);
        }

        function renderNodes(node) {
            let el = nodeEls[node.id];
            if (!el) {
                el = document.createElement('div');
                el.className = 'node';
                el.dataset.id = node.id;
                el.innerHTML = buildNodeHTML(node);
                el.addEventListener('click', () => onNodeClick(node));
                canvas.appendChild(el);
                nodeEls[node.id] = el;
            }

            const levelClass = node._level === 0 ? 'root' : `level-${Math.min(node._level, 3)}`;
            el.className = `node ${levelClass}${state.selected === node.id ? ' selected' : ''}${state.expanded.has(node.id) ? ' expanded' : ''}`;
            el.style.left = node._x + 'px';
            el.style.top = node._y + 'px';
            el.style.width = node._w + 'px';
            el.style.minHeight = node._h + 'px';
            el.style.display = 'flex';

            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(renderNodes);
            }

            // Remove orphaned children
            if (!node.children || !state.expanded.has(node.id)) {
                collapseChildren(node);
            }
        }

        function buildNodeHTML(node) {
            const isParent = node.children && node.children.length > 0;
            const icon = isParent
                ? `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`
                : `<div class="leaf-dot"></div>`;
            return `<div class="node-text">${node.label}</div>${icon}`;
        }

        function collapseChildren(node) {
            if (!node.children) return;
            node.children.forEach(child => {
                if (nodeEls[child.id]) {
                    nodeEls[child.id].style.display = 'none';
                }
                collapseChildren(child);
            });
        }

        function renderConnectors(node) {
            svgLayer.innerHTML = '';
            drawConnectors(node);
        }

        function drawConnectors(node) {
            if (!node.children || !state.expanded.has(node.id)) return;
            node.children.forEach(child => {
                const x1 = node._x + node._w;
                const y1 = node._y + node._h / 2;
                const x2 = child._x;
                const y2 = child._y + child._h / 2;
                const cx1 = x1 + (x2 - x1) * 0.55;
                const cx2 = x2 - (x2 - x1) * 0.55;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('class', 'connector');
                path.setAttribute('d', `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`);
                svgLayer.appendChild(path);
                drawConnectors(child);
            });
        }

        // ─────────────────────────────────────────────
        // INTERACTION
        // ─────────────────────────────────────────────
        function onNodeClick(node) {
            if (node.children && node.children.length > 0) {
                if (state.expanded.has(node.id)) {
                    state.expanded.delete(node.id);
                } else {
                    state.expanded.add(node.id);
                }
                state.selected = node.id;
                render();
            } else {
                state.selected = node.id;
                render();
                openPanel(node);
            }
        }

        function openPanel(node) {
            document.getElementById('panel-title').textContent = node.label;
            document.getElementById('panel-body').innerHTML = node.desc || `<p>No description available.</p>`;
            document.getElementById('panel').classList.add('open');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
            state.selected = null;
            render();
        }

        // ─────────────────────────────────────────────
        // PAN & ZOOM
        // ─────────────────────────────────────────────
        const wrap = document.getElementById('canvas-wrap');

        function applyTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            document.getElementById('zoom-badge').textContent = Math.round(state.scale * 100) + '%';
        }

        wrap.addEventListener('mousedown', e => {
            if (e.target.closest('.node')) return;
            state.dragging = true;
            state.dragStartX = e.clientX;
            state.dragStartY = e.clientY;
            state.dragStartPanX = state.panX;
            state.dragStartPanY = state.panY;
            wrap.classList.add('grabbing');
        });

        window.addEventListener('mousemove', e => {
            if (!state.dragging) return;
            state.panX = state.dragStartPanX + (e.clientX - state.dragStartX);
            state.panY = state.dragStartPanY + (e.clientY - state.dragStartY);
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            state.dragging = false;
            wrap.classList.remove('grabbing');
        });

        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 0.1 : -0.1;
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }, { passive: false });

        function zoom(delta) {
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }

        function resetView() {
            state.panX = 0;
            state.panY = 0;
            state.scale = 1;
            applyTransform();
        }

        // ─────────────────────────────────────────────
        // EXPAND / COLLAPSE ALL
        // ─────────────────────────────────────────────
        function collectIds(node, ids = []) {
            ids.push(node.id);
            if (node.children) node.children.forEach(c => collectIds(c, ids));
            return ids;
        }

        function expandAll() {
            collectIds(DATA).forEach(id => state.expanded.add(id));
            render();
        }

        function collapseAll() {
            state.expanded.clear();
            state.expanded.add('root');
            render();
        }

        // ─────────────────────────────────────────────
        // SEARCH
        // ─────────────────────────────────────────────
        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('search-results');

        function flatNodes(node, path = [], results = []) {
            results.push({ node, path: [...path, node.label] });
            if (node.children) node.children.forEach(c => flatNodes(c, [...path, node.label], results));
            return results;
        }

        const allNodes = flatNodes(DATA);

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            // Clear highlights
            Object.values(nodeEls).forEach(el => el.classList.remove('highlighted'));

            if (!q) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = allNodes.filter(({ node }) => node.label.toLowerCase().includes(q));
            if (matches.length === 0) {
                searchResults.innerHTML = '<div class="sr-item" style="cursor:default;color:var(--text-muted)">No results found</div>';
                searchResults.style.display = 'block';
                return;
            }

            searchResults.innerHTML = matches.slice(0, 10).map(({ node, path }) => {
                const hl = node.label.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
                const trail = path.slice(0, -1).join(' › ');
                return `<div class="sr-item" data-id="${node.id}"><div>${hl}</div>${trail ? `<div class="sr-path">${trail}</div>` : ''}</div>`;
            }).join('');

            searchResults.querySelectorAll('.sr-item[data-id]').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    navigateTo(id);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });

            matches.forEach(({ node }) => {
                if (nodeEls[node.id]) nodeEls[node.id].classList.add('highlighted');
            });

            searchResults.style.display = 'block';
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-wrap')) searchResults.style.display = 'none';
        });

        function navigateTo(id) {
            // Expand path to node
            function findPath(node, targetId, path = []) {
                if (node.id === targetId) return [...path, node.id];
                if (node.children) {
                    for (const c of node.children) {
                        const r = findPath(c, targetId, [...path, node.id]);
                        if (r) return r;
                    }
                }
                return null;
            }
            const path = findPath(DATA, id);
            if (path) path.forEach(pid => state.expanded.add(pid));
            state.selected = id;
            render();
            // Center on node
            setTimeout(() => {
                function findNode(node, id) {
                    if (node.id === id) return node;
                    if (node.children) for (const c of node.children) { const r = findNode(c, id); if (r) return r; }
                    return null;
                }
                const n = findNode(DATA, id);
                if (n) {
                    const vpW = wrap.clientWidth;
                    const vpH = wrap.clientHeight;
                    state.panX = vpW / 2 - (n._x + n._w / 2) * state.scale;
                    state.panY = vpH / 2 - (n._y + n._h / 2) * state.scale;
                    applyTransform();
                }
            }, 100);
        }

        // ─────────────────────────────────────────────
        // THEME
        // ─────────────────────────────────────────────
        const themeBtn = document.getElementById('theme-toggle');
        let isDark = true;

        function applyTheme(dark) {
            document.body.dataset.theme = dark ? 'dark' : 'light';
            themeBtn.textContent = dark ? '🌙' : '☀️';
            localStorage.setItem('mm-theme', dark ? 'dark' : 'light');
            try { localStorage.setItem('shoug-theme', dark ? 'dark' : 'light'); } catch(_e) {}
        }

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            applyTheme(isDark);
        });

        // Restore
        const saved = localStorage.getItem('shoug-theme') || localStorage.getItem('mm-theme');
        if (saved === 'light') { isDark = false; applyTheme(false); }

        // ─────────────────────────────────────────────
        // EXPORT PNG
        // ─────────────────────────────────────────────
        async function exportPNG() {
            const msg = document.createElement('div');
            msg.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;';
            msg.textContent = 'Preparing export… (open browser print for full export)';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
            window.print();
        }

        // ─────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────
        function init() {
            state.panX = 40;
            state.panY = -1820;
            applyTransform();
            render();
        }

        init();
    </script>
</body>
