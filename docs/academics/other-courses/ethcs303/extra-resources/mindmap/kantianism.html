    <script>
        // DATA based on Kantianism / Deontology chapter (PDF content)
        const DATA = {
            id: 'kant_root', label: 'Kantianism & Deontology', level: 0,
            children: [
                {
                    id: 'core', label: 'Core Concepts', level: 1, tag: 'kant',
                    children: [
                        { id: 'goodwill', label: 'Good Will', level: 2, tag: 'kant', leaf: true, content: '<h4>Good Will</h4><p>The only thing that is good without qualification. Intelligence, wealth, or power can be used for evil, but a good will is intrinsically moral: the motivation to do the right thing for its own sake, not for consequences.</p><p><strong>Key idea:</strong> An action has moral worth only if done from duty, not merely in accordance with duty.</p>' },
                        { id: 'duty', label: 'Duty & Obligation', level: 2, tag: 'kant', leaf: true, content: '<h4>Moral Grounding</h4><p>Morality is grounded in duty — obligations humans have to one another. Actions are right when performed out of respect for the moral law, not based on outcomes or desires.</p><p>Kant rejected consequentialism entirely.</p>' },
                        { id: 'categorical', label: 'Categorical Imperative', level: 2, tag: 'kant', leaf: true, content: '<h4>The Supreme Principle</h4><p>Moral laws are universal, unconditional commands (categorical, not hypothetical). They apply to all rational beings regardless of their personal goals or circumstances.</p><p><strong>First formulation:</strong> Act only according to that maxim whereby you can at the same time will that it should become a universal law.</p><p><strong>Second formulation:</strong> Act so that you treat humanity, whether in your own person or that of another, always as an end and never merely as a means.</p>' }
                    ]
                },
                {
                    id: 'universal', label: 'Universalizability', level: 1, tag: 'duty',
                    children: [
                        { id: 'univ_def', label: 'Universal Law', level: 2, tag: 'duty', leaf: true, content: '<h4>Universal Moral Laws</h4><p>Moral rules must be universalizable — everyone could discover and follow them without logical contradiction. If a maxim cannot be willed as a universal law, it is immoral.</p><h4>Examples:</h4><ul><li><strong>Telling truth:</strong> can be universalized → moral.</li><li><strong>Lying:</strong> if everyone lied, trust collapses & lying becomes pointless → immoral.</li><li><strong>Murder:</strong> cannot be universalized (would destroy humanity) → immoral.</li></ul>' },
                        { id: 'first_form', label: '1st Formulation Illustration', level: 2, tag: 'duty', leaf: true, content: '<h4>Promising with Intent to Break</h4><p>Scenario: A person in dire need makes a false promise to get help. Proposed rule: "I may make promises intending to break them."</p><p>If universalized, no promise would be believed, contradicting the very purpose of making a promise. Therefore the rule is self-defeating → morally forbidden. Kant concludes: false promises are never permissible.</p>' }
                    ]
                },
                {
                    id: 'ends', label: 'Ends-in-Themselves', level: 1, tag: 'duty',
                    children: [
                        { id: 'means_end', label: 'Respect for Persons', level: 2, tag: 'duty', leaf: true, content: '<h4>Second Formulation: Ends not Means</h4><p>Treat every person (including yourself) as an end in themselves, never merely as a means to an end. Rational beings have intrinsic worth; using someone purely as a tool violates their dignity.</p><p>This grounds respect, informed consent, and prohibits exploitation.</p>' },
                        { id: 'scenario_fab', label: 'Semiconductor Plant', level: 2, tag: 'scenario', leaf: true, content: '<h4>Ethical Dilemma: Plant Closure</h4><p>A plant closing in one year needs new employees, but applicants from other states would not relocate if they knew. Withholding information treats applicants as mere means to fill positions. Kantian evaluation (2nd Formulation): You must disclose the closure because rational beings have a right to make informed decisions about their own lives. Withholding is always wrong.</p>' },
                        { id: 'scenario_plag', label: 'Plagiarism Case', level: 2, tag: 'scenario', leaf: true, content: '<h4>Carla & Plagiarism</h4><p>Carla, a busy student, buys a report and submits it as her own. 1st Formulation: "You may claim credit for work by others" — if universalized, reports lose credibility, defeating the purpose of grading. 2nd Formulation: She deceives the professor, using them as a means to a grade. Both formulations condemn plagiarism as immoral.</p>' }
                    ]
                },
                {
                    id: 'duties', label: 'Perfect & Imperfect Duties', level: 1, tag: 'duty',
                    children: [
                        { id: 'perfect', label: 'Perfect Duties', level: 2, tag: 'duty', leaf: true, content: '<h4>Absolute Obligations</h4><p>Perfect duties are strict, without exceptions. Usually negative (e.g., "Do not lie", "Do not steal", "Do not kill"). Violations are always impermissible regardless of consequences.</p><p><strong>Example:</strong> Duty not to lie — Kant insists that even lying to a murderer at the door is forbidden.</p>' },
                        { id: 'imperfect', label: 'Imperfect Duties', level: 2, tag: 'duty', leaf: true, content: '<h4>Flexible Obligations</h4><p>Imperfect duties are positive duties (help others, develop talents) that allow discretion in <em>when</em> and <em>how</em> to fulfill them. You are not required to help every single person, but you must adopt helping as a general maxim.</p><p>They can be prioritized contextually, unlike perfect duties.</p>' },
                        { id: 'duty_conflict', label: 'Conflicts & Prioritization', level: 2, tag: 'problem', leaf: true, content: '<h4>Kantian Conflicts</h4><p>Kantianism struggles with rule conflicts: between two perfect duties (e.g., tell truth vs protect life), there’s no clear solution. Kant famously argued we must never lie even to save a life — a controversial stance.</p><p>When perfect duty vs imperfect duty, the perfect duty overrides.</p><h4>Criticism:</h4><p>No exceptions allowed for perfect duties (e.g., no lie even to prevent murder). This rigidity is a major weakness.</p>' }
                    ]
                },
                {
                    id: 'cases_against', label: 'Case Against Kantianism', level: 1, tag: 'problem',
                    children: [
                        { id: 'conflict_rules', label: 'Rule Conflicts', level: 2, tag: 'problem', leaf: true, content: '<h4>No Single Rule Adequately Characterizes Action</h4><p>Example: You promise to meet a friend, but see an injured person needing help. Rules "keep promises" and "help those in need" conflict — Kantianism offers no clear priority.</p><p>Example (outfit): Friend asks if you like their bad outfit. "Always tell truth" vs "Be kind" — both are duties, no hierarchical resolution apart from truth winning but causing harm.</p>' },
                        { id: 'no_exceptions', label: 'No Exceptions to Perfect Duties', level: 2, tag: 'problem', leaf: true, content: '<h4>The Murderer at the Door</h4><p>Kant insists you cannot lie even when a murderer asks where your friend is hiding. Lying violates a perfect duty, so you must tell the truth, even at the cost of an innocent life. This absolutism feels counterintuitive and inhumane — a significant objection.</p><p>Critics argue that some lies (e.g., to save life) are morally justifiable, but Kantian ethics forbids all.</p>' },
                        { id: 'workable', label: 'Still a Workable Theory', level: 2, tag: 'problem', leaf: true, content: '<h4>Despite Weaknesses</h4><p>Kantianism remains a workable ethical theory because:</p><ul><li>It is rational and based on logic, not feelings.</li><li>Provides universal moral guidelines.</li><li>Treats all persons as moral equals.</li><li>Respects human dignity and autonomy.</li><li>Foundational for human rights and modern professional ethics (informed consent, non-manipulation).</li></ul>' }
                    ]
                },
                {
                    id: 'applications', label: 'Professional Ethics', level: 1, tag: 'scenario',
                    children: [
                        { id: 'consent', label: 'Informed Consent', level: 2, tag: 'scenario', leaf: true, content: '<h4>IT & Deontology</h4><p>Kant’s second formulation underpins the duty to obtain informed consent. Users, employees, and clients must never be treated as mere means. Transparency in data collection, system monitoring, and software limitations reflects respect for rational agency.</p><p>Example: System admins must inform users about monitoring policies to respect autonomy.</p>' },
                        { id: 'whistle', label: 'Whistleblowing', level: 2, tag: 'scenario', leaf: true, content: '<h4>Duty to Report Harms</h4><p>When an organization engages in illegal or life-threatening practices, a Kantian may argue there is a perfect duty not to be complicit in deception. Whistleblowing aligns with universalizability (if every professional concealed fatal defects, systems would become unsafe). However conflicts with loyalty can be intense — Kantianism prioritizes the moral law over corporate duty.</p>' }
                    ]
                }
            ]
        };

        let nodes = {}, expanded = new Set(['kant_root']);
        let selectedId = null;
        let tf = { x: 70, y: 80, scale: 0.85 }, isPanning = false, panStart = {};
        const cw = document.getElementById('cw'), canvas = document.getElementById('canvas'), linesEl = document.getElementById('lines');
        const NW = 185, NH = 58, HG = 270, VG = 76;

        function flatten(n, d = 0) { nodes[n.id] = { ...n, depth: d }; if (n.children) n.children.forEach(c => flatten(c, d + 1)); }
        flatten(DATA);

        function countH(n) {
            if (!n.children || !expanded.has(n.id)) return 1;
            let total = 0;
            n.children.forEach(c => total += countH(nodes[c.id] || c));
            return Math.max(total, 1);
        }

        function layout() {
            let pos = {};
            function assign(n, x, yOff) {
                pos[n.id] = { x, yOff, y: 0 };
                if (n.children && expanded.has(n.id)) {
                    let sy = yOff;
                    n.children.forEach(c => {
                        let cn = nodes[c.id] || c;
                        let ch = countH(cn);
                        assign(cn, x + HG, sy);
                        sy += ch;
                    });
                }
            }
            assign(DATA, 0, 0);
            function computeY(n) {
                if (!n.children || !expanded.has(n.id)) { pos[n.id].y = pos[n.id].yOff * VG; return; }
                n.children.forEach(c => computeY(nodes[c.id] || c));
                let childs = n.children.map(c => nodes[c.id] || c);
                let topY = pos[childs[0].id].y, botY = pos[childs[childs.length - 1].id].y;
                pos[n.id].y = (topY + botY) / 2;
            }
            computeY(DATA);
            return pos;
        }

        function render() {
            let pos = layout();
            let existing = {};
            canvas.querySelectorAll('.node').forEach(el => { existing[el.dataset.id] = el; });
            let vis = new Set();
            function collect(n) { vis.add(n.id); if (n.children && expanded.has(n.id)) n.children.forEach(c => collect(nodes[c.id] || c)); }
            collect(DATA);
            Object.keys(existing).forEach(id => { if (!vis.has(id)) existing[id].remove(); });
            vis.forEach(id => {
                let nd = nodes[id], p = pos[id];
                if (!p) return;
                let el = existing[id];
                let isNew = !el;
                if (isNew) { el = document.createElement('div'); el.className = 'node'; el.dataset.id = id; canvas.appendChild(el); }
                let lvlClass = id === 'kant_root' ? 'root' : (nd.level === 1 ? 'l1' : (nd.level === 2 ? 'l2' : 'l3'));
                el.className = `node ${lvlClass} ${selectedId === id ? 'selected' : ''}`;
                el.style.left = p.x + 'px';
                el.style.top = (p.y - NH / 2) + 'px';
                el.style.width = NW + 'px';
                el.style.minHeight = NH + 'px';
                let hasChildren = nd.children && nd.children.length > 0 && !nd.leaf;
                let icon = hasChildren ? `<svg class="chev ${expanded.has(id) ? 'open' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M6 4l4 4-4 4" stroke-width="2"/></svg>` : (nd.leaf ? `<svg class="li" viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="4"/></svg>` : '');
                el.innerHTML = `<span class="nl">${nd.label.replace(/\n/g, '<br>')}</span>${icon}`;
                if (isNew) el.classList.add('entering');
                el.onclick = (e) => { e.stopPropagation(); onClick(id); };
            });
            drawLines(pos, vis);
        }

        function drawLines(pos, vis) {
            let paths = [];
            vis.forEach(id => {
                let nd = nodes[id];
                if (!nd.children || !expanded.has(id)) return;
                nd.children.forEach(c => {
                    let cid = (nodes[c.id] || c).id;
                    if (!vis.has(cid)) return;
                    let p1 = pos[id], p2 = pos[cid];
                    if (!p1 || !p2) return;
                    let x1 = p1.x + NW, y1 = p1.y;
                    let x2 = p2.x, y2 = p2.y;
                    let mx = x1 + (x2 - x1) * 0.5;
                    paths.push(`<path class="pl" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`);
                });
            });
            linesEl.innerHTML = paths.join('');
        }

        function onClick(id) {
            let nd = nodes[id];
            if (nd.leaf || (nd.children && nd.children.length === 0)) { selectedId = id; openPanel(id); render(); return; }
            if (nd.children && nd.children.length) {
                expanded.has(id) ? expanded.delete(id) : expanded.add(id);
                render();
            }
        }

        function openPanel(id) {
            let nd = nodes[id];
            document.getElementById('ptitle').innerHTML = nd.label.replace(/\n/g, ' ');
            let tagDiv = document.getElementById('ptag');
            let tagMap = { kant: 'KANTIAN', duty: 'DUTY', problem: 'CRITIQUE', scenario: 'SCENARIO' };
            let cls = tagMap[nd.tag] || 'KANTIAN';
            tagDiv.textContent = cls;
            tagDiv.className = `tag-${(nd.tag === 'kant' ? 'kant' : (nd.tag === 'duty' ? 'duty' : (nd.tag === 'problem' ? 'problem' : 'scenario')))}`;
            tagDiv.style.display = 'inline-flex';
            document.getElementById('pb').innerHTML = nd.content || '<p>Core concept from Kantian ethics.</p>';
            document.getElementById('panel').classList.add('open');
        }

        document.getElementById('pc').onclick = () => { document.getElementById('panel').classList.remove('open'); selectedId = null; render(); };
        cw.addEventListener('mousedown', e => { if (e.target.closest('.node') || e.target.closest('#panel')) return; isPanning = true; cw.classList.add('panning'); panStart = { x: e.clientX - tf.x, y: e.clientY - tf.y }; });
        window.addEventListener('mousemove', e => { if (!isPanning) return; tf.x = e.clientX - panStart.x; tf.y = e.clientY - panStart.y; applyTf(); });
        window.addEventListener('mouseup', () => { isPanning = false; cw.classList.remove('panning'); });
        cw.addEventListener('wheel', e => { e.preventDefault(); let delta = -e.deltaY * 0.001; let ns = Math.min(2.2, Math.max(0.3, tf.scale + delta)); let rect = cw.getBoundingClientRect(); let mx = e.clientX - rect.left, my = e.clientY - rect.top; tf.x = mx - (mx - tf.x) * (ns / tf.scale); tf.y = my - (my - tf.y) * (ns / tf.scale); tf.scale = ns; applyTf(); }, { passive: false });
        function applyTf() {
            canvas.style.transform = `translate(${tf.x}px, ${tf.y}px) scale(${tf.scale})`;
            document.getElementById('zl').innerText = Math.round(tf.scale * 100) + '%';
        }

        function zoom(delta) {
            tf.scale = Math.min(2.2, Math.max(0.3, tf.scale + delta));
            applyTf();
        }

        function resetView() {
            tf = { x: 70, y: 80, scale: 0.85 };
            applyTf();
        }

        function collectIds(node, ids = []) {
            ids.push(node.id);
            if (node.children) node.children.forEach(child => collectIds(child, ids));
            return ids;
        }

        function expandAll() {
            collectIds(DATA).forEach(id => expanded.add(id));
            render();
        }

        function collapseAll() {
            expanded.clear();
            expanded.add('kant_root');
            render();
        }

        document.getElementById('zi').onclick = () => zoom(0.12);
        document.getElementById('zo').onclick = () => zoom(-0.12);
        document.getElementById('rb').onclick = resetView;
        document.getElementById('eab').onclick = expandAll;
        document.getElementById('cab').onclick = collapseAll;
        document.getElementById('tb').onclick = () => {
            const body = document.body;
            const next = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', next);
            document.getElementById('tb').textContent = next === 'light' ? '☀️' : '🌙';
        };

        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('sr');

        function flatNodes(node, path = [], out = []) {
            out.push({ node, path: [...path, node.label] });
            if (node.children) node.children.forEach(child => flatNodes(child, [...path, node.label], out));
            return out;
        }

        function selectNode(id) {
            function findPath(node, target, path = []) {
                if (node.id === target) return [...path, node.id];
                if (!node.children) return null;
                for (const child of node.children) {
                    const found = findPath(child, target, [...path, node.id]);
                    if (found) return found;
                }
                return null;
            }

            const path = findPath(DATA, id);
            if (path) path.forEach(pid => expanded.add(pid));
            selectedId = id;
            render();
            setTimeout(() => {
                const el = canvas.querySelector(`[data-id="${id}"]`);
                if (!el) return;
                const r = el.getBoundingClientRect();
                const wr = cw.getBoundingClientRect();
                tf.x += (wr.width / 2) - (r.left + r.width / 2 - wr.left);
                tf.y += (wr.height / 2) - (r.top + r.height / 2 - wr.top);
                applyTf();
                if (nodes[id] && nodes[id].leaf) openPanel(id);
            }, 100);
        }

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            if (!q) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = flatNodes(DATA).filter(({ node }) => node.label.toLowerCase().includes(q)).slice(0, 10);
            searchResults.innerHTML = matches.map(({ node, path }) => {
                const trail = path.slice(0, -1).join(' › ');
                return `<div class="sr-item" data-id="${node.id}"><div>${node.label}</div>${trail ? `<div class="sr-path">${trail}</div>` : ''}</div>`;
            }).join('');
            searchResults.style.display = matches.length ? 'block' : 'none';
            searchResults.querySelectorAll('.sr-item').forEach(item => {
                item.onclick = () => {
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                    selectNode(item.dataset.id);
                };
            });
        });

        document.addEventListener('click', event => {
            if (!event.target.closest('#search-wrap')) searchResults.style.display = 'none';
        });

        render();
        applyTf();
    </script>

    <script src="/javascripts/mindmap-controls.js"></script>
</body>

</html>
