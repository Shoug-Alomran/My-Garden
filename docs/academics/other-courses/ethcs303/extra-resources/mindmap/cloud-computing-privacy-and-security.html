    <style>
        :root {
            --bg: #0d1117;
            --bg2: #161b22;
            --bg3: #1f2937;
            --panel: #1a2030;
            --border: #2d3748;
            --border2: #374151;
            --text: #e2e8f0;
            --text2: #94a3b8;
            --text3: #64748b;
            --accent: #3b82f6;
            --accent2: #60a5fa;
            --accent-dim: rgba(59, 130, 246, 0.12);
            --line: rgba(96, 165, 250, 0.4);
            --node-root: #1e3a5f;
            --node-root-b: #3b82f6;
            --node-root-t: #93c5fd;
            --node-l1: #1a2f1a;
            --node-l1-b: #4ade80;
            --node-l1-t: #86efac;
            --node-l2: #2a1f3d;
            --node-l2-b: #a78bfa;
            --node-l2-t: #c4b5fd;
            --node-l3: #2d1f1a;
            --node-l3-b: #fb923c;
            --node-l3-t: #fdba74;
            --highlight: rgba(251, 191, 36, 0.25);
            --highlight-b: #fbbf24;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            --toolbar-h: 56px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --bg2: #ffffff;
            --bg3: #f1f5f9;
            --panel: #ffffff;
            --border: #e2e8f0;
            --border2: #cbd5e1;
            --text: #1e293b;
            --text2: #475569;
            --text3: #94a3b8;
            --accent: #2563eb;
            --accent2: #3b82f6;
            --accent-dim: rgba(37, 99, 235, 0.08);
            --line: rgba(59, 130, 246, 0.5);
            --node-root: #dbeafe;
            --node-root-b: #2563eb;
            --node-root-t: #1d4ed8;
            --node-l1: #dcfce7;
            --node-l1-b: #16a34a;
            --node-l1-t: #15803d;
            --node-l2: #ede9fe;
            --node-l2-b: #7c3aed;
            --node-l2-t: #6d28d9;
            --node-l3: #fff7ed;
            --node-l3-b: #ea580c;
            --node-l3-t: #c2410c;
            --highlight: rgba(234, 179, 8, 0.15);
            --highlight-b: #ca8a04;
            --shadow: 0 2px 16px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            transition: background var(--transition), color var(--transition);
        }

        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--toolbar-h);
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            z-index: 100;
            backdrop-filter: blur(12px);
            transition: background var(--transition), border-color var(--transition);
        }

        .tb-logo {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent2);
            white-space: nowrap;
            margin-right: 4px;
            letter-spacing: -0.3px;
        }

        .tb-sep {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 4px;
            flex-shrink: 0;
        }

        #search-wrap {
            position: relative;
            flex: 1;
            max-width: 280px;
        }

        #search {
            width: 100%;
            height: 34px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 0 12px 0 34px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        #search:focus {
            border-color: var(--accent);
            background: var(--bg2);
        }

        #search::placeholder {
            color: var(--text3);
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            font-size: 15px;
            pointer-events: none;
        }

        #search-results {
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: var(--shadow);
            z-index: 200;
            max-height: 240px;
            overflow-y: auto;
            display: none;
        }

        #search-results.visible {
            display: block;
        }

        .sr-item {
            padding: 9px 14px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .sr-item:last-child {
            border-bottom: none;
        }

        .sr-item:hover {
            background: var(--accent-dim);
            color: var(--text);
        }

        .sr-item mark {
            background: none;
            color: var(--accent2);
            font-weight: 500;
        }

        .tb-btn {
            height: 34px;
            padding: 0 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text2);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .tb-btn:hover {
            background: var(--accent-dim);
            color: var(--text);
            border-color: var(--accent);
        }

        .tb-btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        #theme-btn {
            font-size: 15px;
            padding: 0 10px;
        }

        .spacer {
            flex: 1;
        }

        #canvas-wrap {
            position: fixed;
            top: var(--toolbar-h);
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-wrap.panning {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        svg#lines {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible;
        }

        .node {
            position: absolute;
            border-radius: 12px;
            padding: 10px 16px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
            border: 1.5px solid;
            min-width: 140px;
            max-width: 220px;
            white-space: normal;
            word-break: break-word;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .node:hover {
            transform: translateY(-1px) scale(1.02);
        }

        .node.root {
            background: var(--node-root);
            border-color: var(--node-root-b);
            padding: 14px 20px;
            min-width: 180px;
            border-radius: 16px;
        }

        .node.root .node-label {
            color: var(--node-root-t);
            font-size: 15px;
            font-weight: 600;
        }

        .node.l1 {
            background: var(--node-l1);
            border-color: var(--node-l1-b);
        }

        .node.l1 .node-label {
            color: var(--node-l1-t);
            font-size: 13px;
            font-weight: 500;
        }

        .node.l2 {
            background: var(--node-l2);
            border-color: var(--node-l2-b);
        }

        .node.l2 .node-label {
            color: var(--node-l2-t);
            font-size: 12.5px;
            font-weight: 500;
        }

        .node.l3 {
            background: var(--node-l3);
            border-color: var(--node-l3-b);
        }

        .node.l3 .node-label {
            color: var(--node-l3-t);
            font-size: 12px;
        }

        .node.highlighted {
            outline: 2px solid var(--highlight-b);
            outline-offset: 2px;
        }

        .node.selected {
            box-shadow: 0 0 0 3px var(--accent), var(--shadow);
        }

        .node-label {
            flex: 1;
            line-height: 1.35;
        }

        .chevron {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            transition: transform 0.25s;
            color: inherit;
            opacity: 0.6;
        }

        .chevron.open {
            transform: rotate(90deg);
        }

        .leaf-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            opacity: 0.5;
        }

        .node.entering {
            animation: nodeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .node.leaving {
            animation: nodeOut 0.2s ease-in forwards;
        }

        @keyframes nodeIn {
            from {
                opacity: 0;
                transform: scale(0.7) translateX(-10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateX(0);
            }
        }

        @keyframes nodeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.7);
            }
        }

        #panel {
            position: fixed;
            top: var(--toolbar-h);
            right: 0;
            bottom: 0;
            width: 380px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform var(--transition);
            z-index: 90;
            display: flex;
            flex-direction: column;
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.3);
        }

        #panel.open {
            transform: translateX(0);
        }

        #panel-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #panel-title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }

        #panel-close {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }

        #panel-close:hover {
            background: var(--accent-dim);
            color: var(--text);
        }

        #panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            line-height: 1.7;
            font-size: 14px;
            color: var(--text2);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #panel-body h4 {
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            margin: 16px 0 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'DM Mono', monospace;
        }

        #panel-body p {
            margin-bottom: 10px;
        }

        #panel-body ul {
            padding-left: 16px;
        }

        #panel-body li {
            margin-bottom: 5px;
        }

        #panel-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            margin-bottom: 12px;
        }

        .tag-security {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
        }

        .tag-legal {
            background: rgba(234, 179, 8, 0.15);
            color: #fbbf24;
        }

        .tag-ethical {
            background: rgba(168, 85, 247, 0.15);
            color: #c084fc;
        }

        .tag-social {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
        }

        .tag-model {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .tag-advantage {
            background: rgba(20, 184, 166, 0.15);
            color: #2dd4bf;
        }

        .tag-overview {
            background: rgba(249, 115, 22, 0.15);
            color: #fb923c;
        }

        #zoom-controls {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 80;
        }

        .zc-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            box-shadow: var(--shadow);
        }

        .zc-btn:hover {
            background: var(--accent-dim);
            color: var(--accent2);
        }

        #zoom-label {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            color: var(--text3);
            text-align: center;
        }

        .path-line {
            fill: none;
            stroke: var(--line);
            stroke-width: 1.5;
            stroke-linecap: round;
            transition: d 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
        }
    </style>

    <script>
        const DATA = {
            id: 'root', label: 'Cloud Computing\nPrivacy & Security', level: 0,
            children: [
                {
                    id: 'what', label: 'What is\nCloud Computing?', level: 1, tag: 'overview',
                    children: [
                        {
                            id: 'def', label: 'Definition', level: 2, tag: 'overview',
                            children: [
                                {
                                    id: 'def-detail', label: 'Scalable IT capabilities', level: 3, tag: 'overview', leaf: true,
                                    content: '<p>Cloud computing is defined as <strong>"a style of computing where massively scalable IT enabled capabilities are delivered as a service to external customers using Internet technologies."</strong></p><p>It enables organizations to access computing resources on-demand without owning physical infrastructure, paying only for what they use.</p>'
                                }
                            ]
                        },
                        {
                            id: 'models', label: 'Service Models', level: 2, tag: 'model',
                            children: [
                                {
                                    id: 'saas', label: 'SaaS', level: 3, tag: 'model', leaf: true,
                                    content: '<h4>Software as a Service</h4><p>Specific online application programs provided by cloud providers.</p><h4>Examples</h4><ul><li>Google Apps, Gmail</li><li>Microsoft Office 365</li><li>Google Docs</li><li>Dropbox</li></ul><p>Users access software over the internet without managing the underlying infrastructure.</p>'
                                },
                                {
                                    id: 'iaas', label: 'IaaS', level: 3, tag: 'model', leaf: true,
                                    content: '<h4>Infrastructure as a Service</h4><p>Hardware resources such as CPU, storage, and communication bandwidth are provided and managed by an external provider.</p><h4>Examples</h4><ul><li>Microsoft Azure</li><li>Amazon Web Services (AWS)</li></ul><p>Customers get virtual servers and resources without purchasing physical hardware.</p>'
                                },
                                {
                                    id: 'paas', label: 'PaaS', level: 3, tag: 'model', leaf: true,
                                    content: '<h4>Platform as a Service</h4><p>In addition to infrastructure, a development platform is provided — making the development, testing, and deployment of applications quick, simple, and cost-effective.</p><p>Developers can build applications without worrying about the underlying hardware or OS management.</p>'
                                },
                                {
                                    id: 'eaas', label: 'EaaS', level: 3, tag: 'model', leaf: true,
                                    content: '<h4>Equipment as a Service</h4><p>With the rise of the Internet of Things (IoT), EaaS connects all sorts of equipment and devices to cloud services.</p><p>This model is becoming more feasible and affordable as IoT adoption grows across industries.</p>'
                                }
                            ]
                        }
                    ]
                },
                {
                    id: 'advantages', label: 'Advantages', level: 1, tag: 'advantage',
                    children: [
                        {
                            id: 'adv-cost', label: 'Cost & Storage', level: 2, tag: 'advantage', leaf: true,
                            content: '<h4>Economical</h4><p>Cloud technology is paid incrementally, saving organizations money. No need to maintain own hardware systems — costs are reduced significantly.</p><h4>Increased Storage</h4><p>Organizations can store more data than on private computer systems, with virtually unlimited scalable storage options.</p>'
                        },
                        {
                            id: 'adv-flex', label: 'Flexibility & Mobility', level: 2, tag: 'advantage', leaf: true,
                            content: '<h4>Flexibility</h4><p>Cloud computing offers much more flexibility than past computing methods. Resources can be scaled up or down instantly based on need.</p><h4>More Mobility</h4><p>Employees can access information wherever they are, rather than remaining at their desks. Scholars can simulate their experience without caring about infrastructure.</p>'
                        },
                        {
                            id: 'adv-collab', label: 'Collaboration & Insight', level: 2, tag: 'advantage', leaf: true,
                            content: '<h4>Collaboration</h4><p>Cloud computing makes collaboration simple. Team members can view and share information easily and securely across a cloud-based platform. Some services provide collaborative social spaces to connect employees across the organization.</p><h4>Insight</h4><p>Many cloud-based storage solutions offer integrated cloud analytics. You can implement tracking mechanisms and build customized reports to analyze organization-wide data.</p>'
                        },
                        {
                            id: 'adv-recovery', label: 'Disaster Recovery', level: 2, tag: 'advantage', leaf: true,
                            content: '<h4>Disaster Recovery</h4><p>Cloud-based services provide quick data recovery for all kinds of emergency scenarios — from natural disasters to power outages — avoiding costly downtime.</p><h4>Loss Prevention</h4><p>With a cloud-based server, uploaded information remains safe and accessible from any computer with an internet connection, even if local machines fail.</p><h4>Automatic Updates</h4><p>Cloud-based applications automatically refresh and update themselves, saving IT staff time and money on manual organization-wide updates.</p>'
                        }
                    ]
                },
                {
                    id: 'disadvantages', label: 'Disadvantages', level: 1, tag: 'overview',
                    children: [
                        {
                            id: 'disadv', label: 'Key Risks', level: 2, tag: 'overview', leaf: true,
                            content: '<h4>Operational Risks</h4><ul><li><strong>Possible Downtime</strong> — Cloud services can experience outages.</li><li><strong>Internet Dependency</strong> — Slow internet inhibits upload/download and work progress.</li><li><strong>Lack of Support</strong> — In some circumstances, provider support may be inadequate.</li><li><strong>Data Loss on Bankruptcy</strong> — If a cloud provider goes bankrupt, stored data may be lost.</li></ul><h4>Security</h4><p>Security and legal issues remain significant concerns for organizations moving to the cloud.</p>'
                        }
                    ]
                },
                {
                    id: 'security', label: 'Security Issues', level: 1, tag: 'security',
                    children: [
                        {
                            id: 'breach', label: 'Data Breaches', level: 2, tag: 'security', leaf: true,
                            content: '<h4>What Is It?</h4><p>A data breach might be the primary objective of a targeted attack, or simply the result of human error, application vulnerabilities, or poor security practices.</p><h4>What Data Is at Risk?</h4><ul><li>Personal health information</li><li>Financial information</li><li>Personally identifiable information (PII)</li><li>Trade secrets and intellectual property</li></ul><h4>Who Is Responsible?</h4><p>Data may be accessed by hackers, the cloud provider itself, or a third party. A user may never know who accessed their data or how it will be abused — leading to serious ethical challenges.</p>'
                        },
                        {
                            id: 'hijack', label: 'Account Hijacking', level: 2, tag: 'security', leaf: true,
                            content: '<h4>The Threat</h4><p>Attackers can use stolen login credentials to remotely access sensitive data stored in the cloud. They can falsify and manipulate information through hijacked accounts.</p><h4>What Attackers Can Do</h4><ul><li>Eavesdrop on activities and transactions</li><li>Manipulate data</li><li>Return falsified information</li><li>Redirect clients to illegitimate sites</li><li>Compromise confidentiality, integrity, and availability of services</li></ul>'
                        },
                        {
                            id: 'malware', label: 'Malware Injection', level: 2, tag: 'security', leaf: true,
                            content: '<h4>How It Works</h4><p>Malware injections are scripts or code embedded into cloud services that act as "valid instances" and run as SaaS to cloud servers. Malicious code is injected and appears to be a legitimate part of the running service.</p><h4>Impact</h4><ul><li>Attackers can eavesdrop on users</li><li>Compromise integrity of sensitive information</li><li>Steal data silently</li></ul><p>The cloud\'s unprecedented storage capacity has made it easier to host and spread malware and illegal software.</p>'
                        },
                        {
                            id: 'shared', label: 'Shared Vulnerabilities', level: 2, tag: 'security', leaf: true,
                            content: '<h4>Shared Responsibility Model</h4><p>Cloud security is a shared responsibility between the provider and the client. Data can be at risk due to weak protection at the client side.</p><h4>Provider vs. Client Duties</h4><ul><li><strong>Providers</strong> (Box, Dropbox, Microsoft, Google) maintain standardized security procedures on their end.</li><li><strong>Clients</strong> are responsible for: user password protection, file and device access restrictions, multi-factor authentication.</li></ul>'
                        },
                        {
                            id: 'dataloss', label: 'Data Loss', level: 2, tag: 'security', leaf: true,
                            content: '<h4>Causes of Data Loss</h4><ul><li>Malicious attacks</li><li>Natural disasters (fire, earthquake)</li><li>Accidental deletion by cloud service provider</li></ul><h4>Real-World Examples</h4><ul><li><strong>Amazon (2011)</strong>: Permanently destroyed many customers\' data.</li><li><strong>Google</strong>: Lost data when its power grid was struck by lightning four times.</li></ul><h4>Prevention</h4><p>Carefully review your provider\'s backup procedures regarding physical storage locations, physical access, and disaster recovery plans.</p>'
                        }
                    ]
                },
                {
                    id: 'ethical', label: 'Ethical Issues', level: 1, tag: 'ethical',
                    children: [
                        {
                            id: 'compliance', label: 'Compliance', level: 2, tag: 'ethical', leaf: true,
                            content: '<h4>What Is Compliance?</h4><p>A cloud service should comply with a subset of standards regarding the application of the service. Compliance covers a set of principles that should be considered during both development and maintenance of the system.</p><p>If the cloud provider conflicts with compliance requirements, it cannot be chosen as a provider by clients who must meet those requirements.</p>'
                        },
                        {
                            id: 'spiteful', label: 'Spiteful Activity', level: 2, tag: 'ethical', leaf: true,
                            content: '<h4>Internal Threats</h4><p>One of the most unfortunate disadvantages of cloud computing is the potential for spiteful actors to cause harm — which would be much more difficult with a physical server.</p><h4>Who Might Act Maliciously?</h4><ul><li>Former employees</li><li>Disgruntled current employees</li><li>Unhappy contractors</li><li>Displeased business partners</li><li>Industry insiders working for competitors</li></ul>'
                        },
                        {
                            id: 'policies', label: 'Customer Interest', level: 2, tag: 'ethical', leaf: true,
                            content: '<h4>The Problem</h4><p>IT professionals are making decisions about how to manage and store data that could have important long-term consequences. They must analyze ethical concepts when making such decisions.</p><h4>Utilitarianism in Cloud</h4><p>Applying ethical methods of utilitarianism means considering cloud computing as everyone\'s utility. IT professionals must develop new policies, standards, and designs considering everyone who will utilize cloud computing — protecting interests regardless of whether the customer is an ordinary citizen, large company, or government.</p>'
                        },
                        {
                            id: 'ip', label: 'Intellectual Property', level: 2, tag: 'ethical', leaf: true,
                            content: '<h4>The Issue</h4><p>The easy storage and transfer of media in digital form on cloud networks creates opportunities for unauthorized distribution of intellectual property.</p><h4>Example</h4><p>One person with rightful access to a movie or piece of content can upload it to a cloud network, allowing others to download it without paying — bypassing copyright protections and harming content creators.</p>'
                        },
                        {
                            id: 'discrimination', label: 'Discrimination', level: 2, tag: 'ethical', leaf: true,
                            content: '<h4>The Problem</h4><p>In crisis situations, vendors may focus only on the needs of big accounts — clients who pay more for support — while ignoring smaller accounts.</p><p>This constitutes a form of discrimination because providers have a responsibility to ALL their customers, regardless of account size or payment tier.</p>'
                        }
                    ]
                },
                {
                    id: 'legal', label: 'Legal Issues', level: 1, tag: 'legal',
                    children: [
                        {
                            id: 'jurisdiction', label: 'Data Jurisdiction', level: 2, tag: 'legal', leaf: true,
                            content: '<h4>The Core Problem</h4><p>All user data is stored in data centres spread around the world. The user often does not know where their information is stored or what kind of activity is being recorded.</p><h4>Cross-Border Complications</h4><ul><li>If data is stored in a different country, it may fall under different laws.</li><li>Local government regulations could apply without the user\'s knowledge.</li><li>Transferring data through multiple countries creates complex jurisdictional conflicts.</li></ul><p>Users can sign agreements specifying preferred countries for data storage, but as clouds are proprietary technologies, tracking compliance is difficult.</p>'
                        },
                        {
                            id: 'rights', label: 'Data Rights', level: 2, tag: 'legal', leaf: true,
                            content: '<h4>Responsibility Gaps</h4><ul><li>The responsibility for data must be clear — cloud providers must offer insurance for data in their infrastructure.</li><li>Customers need to know if third-party partners have access to their data.</li><li>When a company stops using cloud services, ownership of leftover files can become a dispute.</li></ul><h4>Terms & Agreements</h4><p>Most users agree to terms without actually reading or understanding them — creating legal exposure they may not be aware of.</p><h4>Sustainability & National Records</h4><p>Large data centres have a sustainability impact. National records may fall under entirely different legal frameworks.</p>'
                        }
                    ]
                },
                {
                    id: 'social', label: 'Social Issues', level: 1, tag: 'social',
                    children: [
                        {
                            id: 'cost-access', label: 'Cost & Access Gap', level: 2, tag: 'social', leaf: true,
                            content: '<h4>The Affordability Problem</h4><p>Cloud computing has many benefits, but it comes at a cost. If more computing resources (storage, network bandwidth, etc.) are needed, they must be purchased — sometimes at a price that is unaffordable for smaller users.</p><h4>Inequality in Access</h4><ul><li><strong>Small companies</strong> cannot access the same resources/tools as the largest players in their industry.</li><li>This may prevent small companies from competing with larger ones who have greater cloud capabilities.</li><li>Individual users or small companies may receive less attention from cloud providers when resolving service issues.</li></ul>'
                        }
                    ]
                }
            ]
        };

        const TAGS = {
            overview: { label: 'Overview', cls: 'tag-overview' },
            model: { label: 'Service Model', cls: 'tag-model' },
            advantage: { label: 'Advantage', cls: 'tag-advantage' },
            security: { label: 'Security', cls: 'tag-security' },
            ethical: { label: 'Ethics', cls: 'tag-ethical' },
            legal: { label: 'Legal', cls: 'tag-legal' },
            social: { label: 'Social', cls: 'tag-social' }
        };

        const HORIZ_GAP = 260;
        const VERT_GAP = 96;
        const NODE_W = 200;
        const NODE_H = 70;

        let nodes = {};
        let expanded = new Set(['root']);
        let selectedId = null;
        let transform = { x: 80, y: 60, scale: 1 };
        let isPanning = false;
        let panStart = {};

        const canvasWrap = document.getElementById('canvas-wrap');
        const canvas = document.getElementById('canvas');
        const linesEl = document.getElementById('lines');

        function flattenTree(node, depth = 0) {
            nodes[node.id] = { ...node, depth, domEl: null, x: 0, y: 0, visible: false };
            if (node.children) node.children.forEach(c => flattenTree(c, depth + 1));
        }
        flattenTree(DATA);

        function getVisibleTree() {
            let result = [];
            function walk(node, parentId) {
                result.push({ ...nodes[node.id], parentId });
                if (!node.leaf && node.children && expanded.has(node.id)) {
                    node.children.forEach(c => walk(nodes[c.id] || c, node.id));
                }
            }
            walk(DATA, null);
            return result;
        }

        function getTreeData(node, parentId) {
            let arr = [{ node, parentId }];
            if (!node.leaf && node.children && expanded.has(node.id)) {
                node.children.forEach(c => {
                    arr = arr.concat(getTreeData(nodes[c.id] || c, node.id));
                });
            }
            return arr;
        }

        function countSubtreeHeight(node) {
            if (!node.children || !expanded.has(node.id)) return 1;
            let total = 0;
            node.children.forEach(c => { total += countSubtreeHeight(nodes[c.id] || c); });
            return Math.max(total, 1);
        }

        function layoutTree() {
            let positions = {};
            function assignPos(node, x, yOffset) {
                positions[node.id] = { x, y: 0, yOffset };
                if (!node.leaf && node.children && expanded.has(node.id)) {
                    let totalH = countSubtreeHeight(node);
                    let startY = yOffset;
                    node.children.forEach(c => {
                        let cNode = nodes[c.id] || c;
                        let cH = countSubtreeHeight(cNode);
                        let cY = startY + (cH / 2);
                        assignPos(cNode, x + HORIZ_GAP, startY);
                        startY += cH;
                    });
                }
            }
            let totalH = countSubtreeHeight(DATA);
            assignPos(DATA, 0, 0);

            function computeY(node) {
                if (!node.children || !expanded.has(node.id)) {
                    positions[node.id].y = positions[node.id].yOffset * VERT_GAP;
                    return;
                }
                node.children.forEach(c => computeY(nodes[c.id] || c));
                let children = node.children.map(c => nodes[c.id] || c);
                let firstY = positions[children[0].id].y;
                let lastY = positions[children[children.length - 1].id].y;
                positions[node.id].y = (firstY + lastY) / 2;
            }
            computeY(DATA);
            return positions;
        }

        function renderMindMap() {
            let positions = layoutTree();
            let existingEls = {};
            canvas.querySelectorAll('.node').forEach(el => {
                existingEls[el.dataset.id] = el;
            });

            let visible = new Set();
            function walkVisible(node) {
                visible.add(node.id);
                if (!node.leaf && node.children && expanded.has(node.id)) {
                    node.children.forEach(c => walkVisible(nodes[c.id] || c));
                }
            }
            walkVisible(DATA);

            Object.keys(existingEls).forEach(id => {
                if (!visible.has(id)) {
                    let el = existingEls[id];
                    el.classList.add('leaving');
                    setTimeout(() => el.remove(), 200);
                }
            });

            visible.forEach(id => {
                let nData = nodes[id];
                let pos = positions[id];
                if (!pos) return;
                let el = existingEls[id];
                let isNew = !el;
                if (isNew) {
                    el = document.createElement('div');
                    el.className = 'node';
                    el.dataset.id = id;
                    canvas.appendChild(el);
                }
                let lvlClass = id === 'root' ? 'root' : ['', 'l1', 'l2', 'l3'][nData.level] || 'l3';
                el.className = 'node ' + lvlClass + (selectedId === id ? ' selected' : '');
                el.style.left = pos.x + 'px';
                el.style.top = (pos.y - NODE_H / 2) + 'px';
                el.style.width = NODE_W + 'px';
                el.style.minHeight = NODE_H + 'px';

                let labelText = nData.label.replace(/\n/g, '<br>');
                let hasChildren = nData.children && nData.children.length > 0 && !nData.leaf;
                let chevron = hasChildren
                    ? `<svg class="chevron ${expanded.has(id) ? 'open' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4l4 4-4 4"/></svg>`
                    : nData.leaf ? `<svg class="leaf-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><path d="M8 5v3l2 2"/></svg>` : '';

                el.innerHTML = `<span class="node-label">${labelText}</span>${chevron}`;

                if (isNew) {
                    el.classList.add('entering');
                    setTimeout(() => el.classList.remove('entering'), 400);
                }

                el.onclick = (e) => { e.stopPropagation(); handleNodeClick(id); };
            });

            drawLines(positions, visible);
        }

        function drawLines(positions, visible) {
            let paths = [];
            visible.forEach(id => {
                let nData = nodes[id];
                if (!nData.children || nData.children.length === 0) return;
                if (!expanded.has(id)) return;
                nData.children.forEach(c => {
                    let cId = (nodes[c.id] || c).id || c.id;
                    if (!visible.has(cId)) return;
                    let p1 = positions[id];
                    let p2 = positions[cId];
                    if (!p1 || !p2) return;
                    let x1 = p1.x + NODE_W;
                    let y1 = p1.y;
                    let x2 = p2.x;
                    let y2 = p2.y;
                    let cx1 = x1 + (x2 - x1) * 0.5;
                    let cx2 = x1 + (x2 - x1) * 0.5;
                    paths.push(`<path class="path-line" d="M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}"/>`);
                });
            });
            linesEl.innerHTML = paths.join('');
        }

        function handleNodeClick(id) {
            let nData = nodes[id];
            if (nData.leaf) {
                openPanel(id);
                selectedId = id;
                renderMindMap();
                return;
            }
            if (nData.children && nData.children.length > 0) {
                if (expanded.has(id)) expanded.delete(id);
                else expanded.add(id);
                renderMindMap();
            }
        }

        function openPanel(id) {
            let nData = nodes[id];
            document.getElementById('panel-title').textContent = nData.label.replace(/\n/g, ' ');
            let tagInfo = TAGS[nData.tag];
            let tagEl = document.getElementById('panel-tag');
            if (tagInfo) {
                tagEl.textContent = tagInfo.label;
                tagEl.className = 'panel-tag ' + tagInfo.cls;
                tagEl.style.display = 'inline-flex';
            } else {
                tagEl.style.display = 'none';
            }
            document.getElementById('panel-body').innerHTML = nData.content || '<p>No additional information.</p>';
            document.getElementById('panel').classList.add('open');
        }

        document.getElementById('panel-close').onclick = () => {
            document.getElementById('panel').classList.remove('open');
            selectedId = null;
            renderMindMap();
        };

        canvasWrap.addEventListener('mousedown', e => {
            if (e.target.closest('.node') || e.target.closest('#panel')) return;
            isPanning = true;
            canvasWrap.classList.add('panning');
            panStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
        });
        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            transform.x = e.clientX - panStart.x;
            transform.y = e.clientY - panStart.y;
            applyTransform();
        });
        window.addEventListener('mouseup', () => {
            isPanning = false;
            canvasWrap.classList.remove('panning');
        });

        canvasWrap.addEventListener('wheel', e => {
            e.preventDefault();
            let delta = -e.deltaY * 0.001;
            let newScale = Math.min(2.5, Math.max(0.2, transform.scale + delta));
            let rect = canvasWrap.getBoundingClientRect();
            let mx = e.clientX - rect.left;
            let my = e.clientY - rect.top;
            transform.x = mx - (mx - transform.x) * (newScale / transform.scale);
            transform.y = my - (my - transform.y) * (newScale / transform.scale);
            transform.scale = newScale;
            applyTransform();
        }, { passive: false });

        function applyTransform() {
            canvas.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`;
            document.getElementById('zoom-label').textContent = Math.round(transform.scale * 100) + '%';
        }

        document.getElementById('zoom-in-btn').onclick = () => {
            transform.scale = Math.min(2.5, transform.scale + 0.15);
            applyTransform();
        };
        document.getElementById('zoom-out-btn').onclick = () => {
            transform.scale = Math.max(0.2, transform.scale - 0.15);
            applyTransform();
        };
        document.getElementById('reset-btn').onclick = () => {
            transform = { x: 80, y: 80, scale: 1 };
            applyTransform();
        };

        document.getElementById('expand-all-btn').onclick = () => {
            function expandAll(node) {
                if (node.children) {
                    expanded.add(node.id);
                    node.children.forEach(c => expandAll(nodes[c.id] || c));
                }
            }
            expandAll(DATA);
            renderMindMap();
        };
        document.getElementById('collapse-all-btn').onclick = () => {
            expanded.clear();
            expanded.add('root');
            document.getElementById('panel').classList.remove('open');
            selectedId = null;
            renderMindMap();
        };

        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('search-results');

        function getAllLeafText() {
            let results = [];
            function walk(node) {
                results.push({ id: node.id, label: node.label.replace(/\n/g, ' '), tag: node.tag });
                if (node.children) node.children.forEach(c => walk(nodes[c.id] || c));
            }
            walk(DATA);
            return results;
        }

        searchInput.addEventListener('input', () => {
            let q = searchInput.value.trim().toLowerCase();
            if (!q) { searchResults.classList.remove('visible'); return; }
            let all = getAllLeafText();
            let matches = all.filter(n => n.label.toLowerCase().includes(q)).slice(0, 8);
            if (!matches.length) { searchResults.innerHTML = '<div class="sr-item" style="color:var(--text3)">No results</div>'; searchResults.classList.add('visible'); return; }
            searchResults.innerHTML = matches.map(m => {
                let hi = m.label.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
                return `<div class="sr-item" data-id="${m.id}">${hi}</div>`;
            }).join('');
            searchResults.classList.add('visible');
        });

        searchResults.addEventListener('click', e => {
            let item = e.target.closest('.sr-item');
            if (!item || !item.dataset.id) return;
            let id = item.dataset.id;
            searchResults.classList.remove('visible');
            searchInput.value = '';
            navigateTo(id);
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-wrap')) searchResults.classList.remove('visible');
        });

        function navigateTo(id) {
            function findPath(node, target, path = []) {
                if (node.id === target) return [...path, node.id];
                if (node.children) {
                    for (let c of node.children) {
                        let r = findPath(nodes[c.id] || c, target, [...path, node.id]);
                        if (r) return r;
                    }
                }
                return null;
            }
            let path = findPath(DATA, id);
            if (path) {
                path.forEach(pid => expanded.add(pid));
                selectedId = id;
                renderMindMap();
                setTimeout(() => {
                    let el = canvas.querySelector(`[data-id="${id}"]`);
                    if (el) {
                        let rect = el.getBoundingClientRect();
                        let wrapRect = canvasWrap.getBoundingClientRect();
                        let cx = rect.left + rect.width / 2 - wrapRect.left;
                        let cy = rect.top + rect.height / 2 - wrapRect.top;
                        let targetX = wrapRect.width / 2;
                        let targetY = wrapRect.height / 2;
                        transform.x += targetX - cx;
                        transform.y += targetY - cy;
                        applyTransform();
                    }
                    if (nodes[id] && nodes[id].leaf) openPanel(id);
                }, 100);
            }
        }

        let isDark = true;
        document.getElementById('theme-btn').onclick = () => {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');
            try { localStorage.setItem('shoug-theme', document.documentElement.getAttribute('data-theme')); } catch(_e) {}
            document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
            localStorage.setItem('mm-theme', isDark ? 'dark' : 'light');
        };
        (function () {
            let saved = localStorage.getItem('mm-theme');
            if (saved === 'light') {
                isDark = false;
                document.documentElement.setAttribute('data-theme', 'light');
            try { localStorage.setItem('shoug-theme', document.documentElement.getAttribute('data-theme')); } catch(_e) {}
                document.getElementById('theme-btn').textContent = '☀️';
            }
        })();

        document.getElementById('export-btn').onclick = () => {
            let notice = document.createElement('div');
            notice.style.cssText = 'position:fixed;bottom:80px;right:24px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--text2);z-index:999;';
            notice.textContent = 'Screenshot your browser window to save the mind map.';
            document.body.appendChild(notice);
            setTimeout(() => notice.remove(), 3000);
        };

        transform = { x: window.innerWidth * 0.1, y: window.innerHeight * 0.35, scale: 0.95 };
        renderMindMap();
        applyTransform();
    </script>

    <footer style="
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 36px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--text3);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.3px;
  z-index: 100;
  transition: background var(--transition), border-color var(--transition);
">
        Shoug Alomran
    </footer>
