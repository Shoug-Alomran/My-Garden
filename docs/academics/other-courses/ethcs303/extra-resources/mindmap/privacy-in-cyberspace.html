    <title>Privacy in Cyberspace — Mind Map</title>
    <link

        rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #4c9ef8;
            --accent2: #79c0ff;
            --accent3: #56d364;
            --accent4: #f78166;
            --accent5: #d2a8ff;
            --accent6: #ffa657;
            --node-root: #1c2a3a;
            --node-root-border: #4c9ef8;
            --node-l1: #1a2332;
            --node-l1-border: #388bfd;
            --node-l2: #1e2533;
            --node-l2-border: #58a6ff;
            --node-leaf: #1b2430;
            --node-leaf-border: #79c0ff;
            --connector: #30363d;
            --panel-bg: #161b22;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 12px;
            --toolbar-bg: rgba(22, 27, 34, 0.92);
            --search-bg: #21262d;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f0f4f8;
            --surface: #ffffff;
            --surface2: #f6f8fa;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
            --accent2: #0550ae;
            --node-root: #dbeafe;
            --node-root-border: #2563eb;
            --node-l1: #eff6ff;
            --node-l1-border: #3b82f6;
            --node-l2: #f0f9ff;
            --node-l2-border: #0ea5e9;
            --node-leaf: #f8fafc;
            --node-leaf-border: #64748b;
            --connector: #94a3b8;
            --panel-bg: #ffffff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            --toolbar-bg: rgba(255, 255, 255, 0.95);
            --search-bg: #f6f8fa;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            user-select: none;
            transition: background var(--transition), color var(--transition);
        }

        /* TOOLBAR */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 56px;
            background: var(--toolbar-bg);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
            transition: background var(--transition), border-color var(--transition);
        }

        .toolbar-brand {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: -0.02em;
            white-space: nowrap;
            margin-right: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-brand svg {
            width: 20px;
            height: 20px;
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
            flex-shrink: 0;
        }

        #search-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--search-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 10px;
            height: 34px;
            flex: 1;
            max-width: 260px;
            transition: border-color 0.2s, background var(--transition);
        }

        #search-box:focus-within {
            border-color: var(--accent);
        }

        #search-box svg {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        #search-input {
            border: none;
            outline: none;
            background: transparent;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            width: 100%;
            caret-color: var(--accent);
        }

        #search-input::placeholder {
            color: var(--text-muted);
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            height: 34px;
            padding: 0 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .tb-btn:hover {
            background: var(--surface);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tb-btn svg {
            width: 14px;
            height: 14px;
        }

        .tb-btn.icon-only {
            padding: 0;
            width: 34px;
            justify-content: center;
        }

        .spacer {
            flex: 1;
        }

        /* SEARCH RESULTS */
        #search-results {
            position: fixed;
            top: 64px;
            left: 16px;
            z-index: 200;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 280px;
            max-height: 320px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: none;
        }

        #search-results.show {
            display: block;
        }

        .sr-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            transition: background 0.15s;
        }

        .sr-item:last-child {
            border-bottom: none;
        }

        .sr-item:hover {
            background: var(--surface2);
        }

        .sr-item .sr-path {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        mark {
            background: rgba(76, 158, 248, 0.3);
            color: var(--accent2);
            border-radius: 2px;
            padding: 0 1px;
        }

        /* CANVAS */
        #canvas-wrap {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-wrap.dragging {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible;
        }

        /* NODES */
        .node {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: var(--radius);
            border: 1.5px solid var(--node-l1-border);
            background: var(--node-l1);
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s, opacity 0.25s;
            white-space: nowrap;
            max-width: 260px;
            transform-origin: left center;
            will-change: transform, opacity;
        }

        .node:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        }

        .node.root {
            background: var(--node-root);
            border-color: var(--node-root-border);
            font-size: 16px;
            font-weight: 700;
            padding: 14px 20px;
            box-shadow: 0 0 0 3px rgba(76, 158, 248, 0.15), 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        .node.level-2 {
            background: var(--node-l2);
            border-color: var(--node-l2-border);
            font-size: 12px;
        }

        .node.leaf {
            background: var(--node-leaf);
            border-color: var(--node-leaf-border);
        }

        .node.active {
            box-shadow: 0 0 0 2px var(--accent), 0 6px 24px rgba(76, 158, 248, 0.25);
        }

        .node.highlight {
            border-color: #f78166;
            box-shadow: 0 0 0 2px #f78166;
        }

        .node.entering {
            animation: nodeIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .node.exiting {
            animation: nodeOut 0.18s ease-in forwards;
        }

        @keyframes nodeIn {
            from {
                opacity: 0;
                transform: translateX(-12px) scale(0.92);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes nodeOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.88);
            }
        }

        .chevron {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--text-muted);
            transition: transform 0.2s ease;
        }

        .node.open .chevron {
            transform: rotate(90deg);
        }

        .node-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: var(--accent);
        }

        .node-label {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* SVG CONNECTORS */
        .connector {
            fill: none;
            stroke: var(--connector);
            stroke-width: 1.5;
        }

        .connector.animated {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: drawLine 0.3s ease forwards;
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* PANEL */
        #panel {
            position: fixed;
            top: 56px;
            right: 0;
            bottom: 0;
            width: 380px;
            background: var(--panel-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.3);
        }

        #panel.open {
            transform: translateX(0);
        }

        #panel-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #panel-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            flex: 1;
            line-height: 1.3;
        }

        #panel-close {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        #panel-close:hover {
            border-color: var(--accent4);
            color: var(--accent4);
        }

        #panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-size: 14px;
            line-height: 1.75;
            color: var(--text-muted);
        }

        #panel-body strong {
            color: var(--text);
            font-weight: 600;
        }

        #panel-body ul {
            margin: 8px 0 8px 18px;
        }

        #panel-body li {
            margin: 4px 0;
        }

        #panel-path {
            padding: 0 20px 16px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.02em;
        }

        /* ZOOM INDICATOR */
        #zoom-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: var(--toolbar-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            color: var(--text-muted);
            backdrop-filter: blur(8px);
            pointer-events: none;
        }

        /* SCROLLBARS */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* RESPONSIVE */
        @media (max-width: 640px) {
            #panel {
                width: 100%;
            }

            .toolbar-brand span {
                display: none;
            }

            .tb-btn span {
                display: none;
            }

            .tb-btn {
                padding: 0;
                width: 34px;
            }
        }
    </style>

        // ============================================================
        // STATE
        // ============================================================
        const state = {
            expanded: new Set(["root"]),
            selected: null,
            zoom: 1,
            panX: 60,
            panY: 80,
            isDragging: false,
            dragStartX: 0,
            dragStartY: 0,
            panStartX: 0,
            panStartY: 0,
            nodePositions: {},
            nodeEls: {},
            allNodes: [],
            searchQuery: ""
        };

        // ============================================================
        // LAYOUT
        // ============================================================
        const NODE_W = 200;
        const NODE_H = 46;
        const H_GAP = 80;
        const V_GAP = 28;
        const ROOT_W = 240;
        const ROOT_H = 54;

        function estimateNodeHeight(node) {
            const base = node.level === 0 ? ROOT_H : NODE_H;
            const charsPerLine = node.level === 0 ? 24 : 20;
            const lines = Math.max(1, Math.ceil(String(node.label || "").length / charsPerLine));
            return Math.max(base, 24 + lines * 22);
        }

        function getAllNodes(node, acc = []) {
            acc.push(node);
            if (node.children) node.children.forEach(c => getAllNodes(c, acc));
            return acc;
        }

        function getVisibleTree(node, expanded) {
            const result = { ...node, visibleChildren: [] };
            if (node.children && expanded.has(node.id)) {
                result.visibleChildren = node.children.map(c => getVisibleTree(c, expanded));
            }
            return result;
        }

        function measureSubtreeHeight(visNode) {
            if (!visNode.visibleChildren || visNode.visibleChildren.length === 0) {
                return estimateNodeHeight(visNode);
            }
            const childrenH = visNode.visibleChildren.reduce((sum, c) => sum + measureSubtreeHeight(c) + V_GAP, 0) - V_GAP;
            return Math.max(estimateNodeHeight(visNode), childrenH);
        }

        function layoutTree(visNode, x, y, positions) {
            const w = visNode.level === 0 ? ROOT_W : NODE_W;
            const h = estimateNodeHeight(visNode);
            positions[visNode.id] = { x, y, w, h };

            if (!visNode.visibleChildren || visNode.visibleChildren.length === 0) return;

            const totalH = visNode.visibleChildren.reduce((sum, c) => sum + measureSubtreeHeight(c) + V_GAP, 0) - V_GAP;
            const subtreeH = measureSubtreeHeight(visNode);
            const childX = x + w + H_GAP;
            let childY = y + h / 2 - totalH / 2;

            for (const child of visNode.visibleChildren) {
                const ch = measureSubtreeHeight(child);
                layoutTree(child, childX, childY, positions);
                childY += ch + V_GAP;
            }
        }

        // ============================================================
        // RENDER
        // ============================================================
        const canvas = document.getElementById("canvas");
        const svgLayer = document.getElementById("svg-layer");

        function getNodeClass(node, positions) {
            let cls = "node";
            if (node.level === 0) cls += " root";
            else if (node.level === 2) cls += " level-2";
            if (node.leaf) cls += " leaf";
            if (state.expanded.has(node.id)) cls += " open";
            if (state.selected === node.id) cls += " active";
            return cls;
        }

        function makeChevron() {
            return `<svg class="chevron" viewBox="0 0 16 16" fill="currentColor">
    <path d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
  </svg>`;
        }

        function makeLeafIcon() {
            return `<svg class="node-icon" viewBox="0 0 16 16" fill="currentColor">
    <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v8.086a1.5 1.5 0 0 1-.44 1.06l-3.914 3.914A1.5 1.5 0 0 1 9.586 15H2.5A1.5 1.5 0 0 1 1 13.5v-11zm1.5-.5a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5H9v-2.5A1.5 1.5 0 0 1 10.5 9H13V2.5a.5.5 0 0 0-.5-.5h-11z"/>
  </svg>`;
        }

        function render() {
            const visTree = getVisibleTree(DATA, state.expanded);
            const positions = {};
            layoutTree(visTree, 0, 0, positions);
            state.nodePositions = positions;

            // Update canvas size
            let maxX = 0, maxY = 0;
            for (const id in positions) {
                const p = positions[id];
                maxX = Math.max(maxX, p.x + p.w + 60);
                maxY = Math.max(maxY, p.y + p.h + 60);
            }
            canvas.style.width = maxX + "px";
            canvas.style.height = maxY + "px";
            svgLayer.setAttribute("width", maxX);
            svgLayer.setAttribute("height", maxY);

            // Remove nodes no longer in positions
            for (const id in state.nodeEls) {
                if (!positions[id]) {
                    const el = state.nodeEls[id];
                    el.classList.add("exiting");
                    setTimeout(() => { el.remove(); }, 200);
                    delete state.nodeEls[id];
                }
            }

            // Create or update nodes
            const allVisNodes = [];
            collectVisible(visTree, allVisNodes);

            for (const node of allVisNodes) {
                const pos = positions[node.id];
                if (!pos) continue;
                let el = state.nodeEls[node.id];
                const isNew = !el;

                if (isNew) {
                    el = document.createElement("div");
                    el.dataset.id = node.id;
                    canvas.appendChild(el);
                    state.nodeEls[node.id] = el;
                    setTimeout(() => el.classList.add("entering"), 10);
                    setTimeout(() => el.classList.remove("entering"), 300);
                }

                el.className = getNodeClass(node, positions);
                if (state.searchQuery && nodeMatchesSearch(node, state.searchQuery)) {
                    el.classList.add("highlight");
                }

                el.style.left = pos.x + "px";
                el.style.top = pos.y + "px";
                el.style.width = pos.w + "px";
                el.style.minHeight = pos.h + "px";

                const hasChildren = node.children && node.children.length > 0;
                el.innerHTML = `
      ${node.leaf ? makeLeafIcon() : ""}
      <span class="node-label">${node.label}</span>
      ${hasChildren ? makeChevron() : ""}
    `;

                el.onclick = (e) => { e.stopPropagation(); handleNodeClick(node); };
            }

            // Draw connectors
            svgLayer.innerHTML = "";
            drawConnectors(visTree, positions);
        }

        function collectVisible(visNode, acc) {
            acc.push(visNode);
            if (visNode.visibleChildren) visNode.visibleChildren.forEach(c => collectVisible(c, acc));
        }

        function drawConnectors(visNode, positions) {
            if (!visNode.visibleChildren || visNode.visibleChildren.length === 0) return;
            const pp = positions[visNode.id];
            if (!pp) return;

            for (const child of visNode.visibleChildren) {
                const cp = positions[child.id];
                if (!cp) continue;

                const x1 = pp.x + pp.w;
                const y1 = pp.y + pp.h / 2;
                const x2 = cp.x;
                const y2 = cp.y + cp.h / 2;
                const cx = (x1 + x2) / 2;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`);
                path.setAttribute("class", "connector");
                svgLayer.appendChild(path);

                drawConnectors(child, positions);
            }
        }

        // ============================================================
        // INTERACTIONS
        // ============================================================
        function handleNodeClick(node) {
            if (node.leaf) {
                openPanel(node);
                state.selected = node.id;
                render();
                return;
            }
            if (state.expanded.has(node.id)) {
                // Collapse this node and all descendants
                const toCollapse = [];
                const q = [node];
                while (q.length) {
                    const n = q.shift();
                    toCollapse.push(n.id);
                    if (n.children) q.push(...n.children);
                }
                toCollapse.forEach(id => state.expanded.delete(id));
            } else {
                state.expanded.add(node.id);
            }
            render();
        }

        function openPanel(node) {
            document.getElementById("panel-title").textContent = node.title || node.label;
            document.getElementById("panel-body").innerHTML = node.content || "<p>No content available.</p>";
            // Build path
            const path = buildPath(DATA, node.id);
            document.getElementById("panel-path").textContent = path.join(" › ");
            document.getElementById("panel").classList.add("open");
        }

        function buildPath(root, targetId, path = []) {
            if (root.id === targetId) return [...path, root.label];
            if (root.children) {
                for (const child of root.children) {
                    const result = buildPath(child, targetId, [...path, root.label]);
                    if (result) return result;
                }
            }
            return null;
        }

        document.getElementById("panel-close").onclick = () => {
            document.getElementById("panel").classList.remove("open");
            state.selected = null;
            render();
        };

        // ============================================================
        // PAN & ZOOM
        // ============================================================
        const wrap = document.getElementById("canvas-wrap");
        const zoomIndicator = document.getElementById("zoom-indicator");

        function applyTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
            zoomIndicator.textContent = Math.round(state.zoom * 100) + "%";
        }

        wrap.addEventListener("mousedown", (e) => {
            if (e.target.closest(".node")) return;
            state.isDragging = true;
            state.dragStartX = e.clientX;
            state.dragStartY = e.clientY;
            state.panStartX = state.panX;
            state.panStartY = state.panY;
            wrap.classList.add("dragging");
        });

        window.addEventListener("mousemove", (e) => {
            if (!state.isDragging) return;
            state.panX = state.panStartX + (e.clientX - state.dragStartX);
            state.panY = state.panStartY + (e.clientY - state.dragStartY);
            applyTransform();
        });

        window.addEventListener("mouseup", () => {
            state.isDragging = false;
            wrap.classList.remove("dragging");
        });

        wrap.addEventListener("wheel", (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const rect = wrap.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const newZoom = Math.min(3, Math.max(0.2, state.zoom * delta));
            state.panX = mx - (mx - state.panX) * (newZoom / state.zoom);
            state.panY = my - (my - state.panY) * (newZoom / state.zoom);
            state.zoom = newZoom;
            applyTransform();
        }, { passive: false });

        // Touch support
        let lastTouchDist = null;
        wrap.addEventListener("touchstart", (e) => {
            if (e.touches.length === 1) {
                state.isDragging = true;
                state.dragStartX = e.touches[0].clientX;
                state.dragStartY = e.touches[0].clientY;
                state.panStartX = state.panX;
                state.panStartY = state.panY;
            }
        }, { passive: true });
        wrap.addEventListener("touchmove", (e) => {
            if (e.touches.length === 1 && state.isDragging) {
                state.panX = state.panStartX + (e.touches[0].clientX - state.dragStartX);
                state.panY = state.panStartY + (e.touches[0].clientY - state.dragStartY);
                applyTransform();
            }
        }, { passive: true });
        wrap.addEventListener("touchend", () => { state.isDragging = false; });

        // Toolbar buttons
        document.getElementById("btn-zoom-in").onclick = () => { state.zoom = Math.min(3, state.zoom * 1.2); applyTransform(); };
        document.getElementById("btn-zoom-out").onclick = () => { state.zoom = Math.max(0.2, state.zoom / 1.2); applyTransform(); };
        document.getElementById("btn-reset").onclick = () => { state.zoom = 1; state.panX = 60; state.panY = 80; applyTransform(); };

        document.getElementById("btn-expand-all").onclick = () => {
            state.allNodes.forEach(n => state.expanded.add(n.id));
            render();
        };
        document.getElementById("btn-collapse-all").onclick = () => {
            state.expanded.clear();
            state.expanded.add("root");
            render();
        };

        // ============================================================
        // THEME
        // ============================================================
        const savedTheme = localStorage.getItem("mindmap-theme") || "dark";
        document.body.dataset.theme = savedTheme;
        updateThemeIcon(savedTheme);

        document.getElementById("btn-theme").onclick = () => {
            const cur = document.body.dataset.theme;
            const next = cur === "dark" ? "light" : "dark";
            document.body.dataset.theme = next;
            localStorage.setItem("mindmap-theme", next);
            updateThemeIcon(next);
        };

        function updateThemeIcon(theme) {
            document.getElementById("icon-dark").style.display = theme === "dark" ? "block" : "none";
            document.getElementById("icon-light").style.display = theme === "light" ? "block" : "none";
        }

        // ============================================================
        // SEARCH
        // ============================================================
        const searchInput = document.getElementById("search-input");
        const searchResultsEl = document.getElementById("search-results");

        function nodeMatchesSearch(node, q) {
            return node.label.toLowerCase().includes(q.toLowerCase()) ||
                (node.title && node.title.toLowerCase().includes(q.toLowerCase()));
        }

        searchInput.addEventListener("input", () => {
            const q = searchInput.value.trim();
            state.searchQuery = q;

            if (!q) {
                searchResultsEl.classList.remove("show");
                searchResultsEl.innerHTML = "";
                render();
                return;
            }

            const matches = state.allNodes.filter(n => nodeMatchesSearch(n, q));
            if (matches.length === 0) {
                searchResultsEl.innerHTML = `<div class="sr-item" style="color:var(--text-muted)">No results found</div>`;
            } else {
                searchResultsEl.innerHTML = matches.map(n => {
                    const label = n.label.replace(new RegExp(q, "gi"), m => `<mark>${m}</mark>`);
                    const path = buildPath(DATA, n.id);
                    return `<div class="sr-item" data-id="${n.id}">
        ${label}
        <div class="sr-path">${path ? path.slice(0, -1).join(" › ") : ""}</div>
      </div>`;
                }).join("");
            }
            searchResultsEl.classList.add("show");
            render();
        });

        searchResultsEl.addEventListener("click", (e) => {
            const item = e.target.closest(".sr-item[data-id]");
            if (!item) return;
            const id = item.dataset.id;
            // Expand path to this node
            const path = buildPath(DATA, id);
            if (path) {
                // Expand all nodes along path
                expandToNode(DATA, id);
                render();
                // Navigate to node
                setTimeout(() => {
                    const pos = state.nodePositions[id];
                    if (pos) {
                        const wrapW = wrap.clientWidth;
                        const wrapH = wrap.clientHeight;
                        state.panX = wrapW / 2 - (pos.x + pos.w / 2) * state.zoom;
                        state.panY = wrapH / 2 - (pos.y + pos.h / 2) * state.zoom;
                        applyTransform();
                    }
                }, 50);
            }
            searchResultsEl.classList.remove("show");
            searchInput.value = "";
            state.searchQuery = "";
        });

        function expandToNode(root, targetId) {
            if (root.id === targetId) { state.expanded.add(root.id); return true; }
            if (root.children) {
                for (const child of root.children) {
                    if (expandToNode(child, targetId)) { state.expanded.add(root.id); return true; }
                }
            }
            return false;
        }

        document.addEventListener("click", (e) => {
            if (!e.target.closest("#search-box") && !e.target.closest("#search-results")) {
                searchResultsEl.classList.remove("show");
            }
        });

        // ============================================================
        // EXPORT PNG
        // ============================================================
        document.getElementById("btn-export").onclick = () => {
            // Simple approach: use html2canvas style without dependency
            const link = document.createElement("a");
            const svgData = svgLayer.outerHTML;
            const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
            link.href = URL.createObjectURL(svgBlob);
            link.download = "privacy-mindmap.svg";
            link.click();
            URL.revokeObjectURL(link.href);
        };

        // ============================================================
        // INIT
        // ============================================================
        state.allNodes = getAllNodes(DATA);
        render();
        applyTransform();
    </script>

">
