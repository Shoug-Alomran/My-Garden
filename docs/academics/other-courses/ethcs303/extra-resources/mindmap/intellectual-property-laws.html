    <script>
        const DATA = {
            id: 'ip_root', label: 'Intellectual Property Laws', level: 0,
            children: [
                {
                    id: 'copyrights', label: 'Copyright Law', level: 1, tag: 'copyright',
                    children: [
                        { id: 'copy_basics', label: 'What is Copyright?', level: 2, tag: 'copyright', leaf: true, content: '<h4>Copyright Protection</h4><p>Protects original works of authorship fixed in a tangible medium: literature, music, drama, art, sculpture, motion pictures, sound recordings, architecture, and software.</p><p><strong>Automatic protection:</strong> Once a creation appears in a fixed medium, it is automatically copyrighted. No registration needed.</p><p><strong>Duration:</strong> Lifetime of author + 50 years (Saudi law: 50 years after death).</p>' },
                        { id: 'rights', label: 'Four Exclusive Rights', level: 2, tag: 'copyright', leaf: true, content: '<h4>Author’s Rights</h4><ul><li><strong>Reproduction rights:</strong> copying, printing, photocopying, digital duplication.</li><li><strong>Derivative rights:</strong> translations, adaptations (movie from novel).</li><li><strong>Performance rights:</strong> public performance, broadcasting, streaming.</li><li><strong>Distribution rights:</strong> sale, rental, lease, lending of copies.</li></ul><p>Saudi Copyright Law (Royal Decree M/41, 2003) aligns with these principles.</p>' },
                        { id: 'infringement', label: 'Copyright Infringement', level: 2, tag: 'copyright', leaf: true, content: '<h4>Infringement Conditions</h4><p>1. Valid copyright exists.<br>2. Access to copyrighted work.<br>3. Duplication beyond exceptions.</p><h4>Software Piracy</h4><p>Unauthorized use/copying of software. Even sharing over internet without financial gain can be infringement under modern law.</p><p><strong>First Sale Doctrine:</strong> Owner can resell physical copy, but does NOT apply to ebooks or DRM-protected content.</p>' },
                        { id: 'fairuse', label: 'Fair Use Doctrine', level: 2, tag: 'copyright', leaf: true, content: '<h4>Fair Use Exceptions</h4><p>Allows limited use without permission for: criticism, comment, news reporting, teaching, scholarship, research.</p><p><strong>Four Factors:</strong><br>1. Purpose (commercial vs nonprofit)<br>2. Nature of work<br>3. Portion used<br>4. Effect on potential market.</p><p>Fair use does NOT apply to unpublished works.</p>' },
                        { id: 'dmca', label: 'DMCA & DRM', level: 2, tag: 'copyright', leaf: true, content: '<h4>Digital Rights Management (DRM)</h4><p>Technologies that lock content to specific devices (e.g., Kindle books). Encryption prevents unauthorized access.</p><h4>Digital Millennium Copyright Act (DMCA)</h4><p>Anti-circumvention clause: illegal to bypass DRM even for personal use. Prohibits distributing tools that crack protection.</p>' }
                    ]
                },
                {
                    id: 'patents', label: 'Patent Law', level: 1, tag: 'patent',
                    children: [
                        { id: 'pat_basics', label: 'What is Patentable?', level: 2, tag: 'patent', leaf: true, content: '<h4>Patent Requirements</h4><p>Invention must be: useful, novel, non-obvious, and fall into one of five classes: process, machine, manufacture, composition of matter, or new improvement.</p><p><strong>Cannot patent:</strong> abstract ideas, laws of nature, natural phenomena.</p><p><strong>Duration:</strong> 20 years from filing date. Prevents independent creation (unlike copyright).</p>' },
                        { id: 'software_patents', label: 'Software Patents', level: 2, tag: 'patent', leaf: true, content: '<h4>Controversy</h4><p>Software patents cover processes, flowcharts, decision trees executed on a computer. Entire programs rarely patented — individual features may be.</p><p><strong>Criticisms:</strong><br>1. Protects abstract ideas with vague boundaries.<br>2. May reduce innovation due to dependencies.<br>3. No global consensus on patentable software.</p>' },
                        { id: 'pat_infringement', label: 'Patent Infringement', level: 2, tag: 'patent', leaf: true, content: '<h4>Types of Infringement</h4><ul><li><strong>Direct:</strong> Unauthorized making, using, selling.</li><li><strong>Indirect/Induced:</strong> Aiding infringement.</li><li><strong>Contributory:</strong> Providing components with no other reasonable use.</li><li><strong>Literal:</strong> Direct correspondence.</li><li><strong>Willful:</strong> Purposeful violation (triple damages possible).</li></ul><p>Major lawsuits: Oracle vs Google ($6B), Apple vs Samsung ($1.1B).</p><p><strong>Cross-licensing agreements</strong> prevent litigation (e.g., Apple-HTC 10-year deal).</p>' }
                    ]
                },
                {
                    id: 'trademarks', label: 'Trademark Law', level: 1, tag: 'trademark',
                    children: [
                        { id: 'tm_basics', label: 'Trademark Definition', level: 2, tag: 'trademark', leaf: true, content: '<h4>Protection for Brand Identity</h4><p>Trademark protects logos, words, letters, symbols, sounds, colors, shapes, or packaging that distinguishes goods/services. Prevents consumer confusion.</p><p>Registration required for full protection, but unregistered marks can gain protection through market reputation. Indefinite duration with renewal.</p><p><strong>Trade dress:</strong> look & feel of product/packaging (some websites claim trade dress).</p>' },
                        { id: 'cybersquatting', label: 'Cybersquatting', level: 2, tag: 'trademark', leaf: true, content: '<h4>Domain Name Abuse</h4><p>Cybersquatting: registering a domain identical/similar to a trademark with bad faith intent to profit. Examples: misspelled domains, different extensions, selling back to brand owner.</p><p><strong>ICANN</strong> provides dispute resolution; <strong>ACPA</strong> (Anti-Cybersquatting Consumer Protection Act) allows trademark owners to sue foreign squatters. Four elements: bad faith profit intent, well-known trademark, identical domain.</p>' }
                    ]
                },
                {
                    id: 'tradesecrets', label: 'Trade Secrets', level: 1, tag: 'secret',
                    children: [
                        { id: 'ts_def', label: 'Definition & Value', level: 2, tag: 'secret', leaf: true, content: '<h4>What is a Trade Secret?</h4><p>Formula, practice, process, design, or compilation not generally known that gives economic advantage. Must have economic value, require effort to develop, and be kept confidential.</p><p><strong>Advantages over patents:</strong> No time limit, no filing fees, no risk of invalidation. Disadvantage: reverse engineering is legal if discovered independently.</p>' },
                        { id: 'ts_protection', label: 'Legal Protection', level: 2, tag: 'secret', leaf: true, content: '<h4>NDAs & Non-compete</h4><p>Companies use Non-Disclosure Agreements (NDAs) and non-compete clauses to protect secrets. Employees sign agreements not to reveal proprietary info, assign inventions to employer, and avoid competitors for a period.</p><p>Violation carries heavy financial penalties. Trade secret law varies by country; Saudi SAIP consolidates IP enforcement.</p>' }
                    ]
                },
                {
                    id: 'plagiarism_ci', label: 'Plagiarism & Ethics', level: 1, tag: 'issue',
                    children: [
                        { id: 'plag_def', label: 'Plagiarism vs Copyright', level: 2, tag: 'issue', leaf: true, content: '<h4>Plagiarism ≠ Copyright Infringement</h4><p>Plagiarism = stealing ideas/passing off as one’s own (academic/ethical violation). Copyright infringement = using protected work without permission (legal violation). Example: paying a friend to write an essay = plagiarism but not infringement (with permission). Using professional photo without license = infringement but not plagiarism if credited.</p><p>Detection tools: Turnitin, SafeAssign, iThenticate.</p>' },
                        { id: 'competitive_intel', label: 'Competitive Intelligence', level: 2, tag: 'issue', leaf: true, content: '<h4>Ethical Information Gathering</h4><p>Competitive Intelligence (CI) uses published/non-published sources ethically to anticipate market moves. Tools: Rapportive, Crunchbase, CORI contracts DB, ThomasNet, WhoGotFunded.</p><p>Distinct from industrial espionage — CI respects legal boundaries and trade secret laws.</p>' },
                        { id: 'reverse_eng', label: 'Reverse Engineering', level: 2, tag: 'issue', leaf: true, content: '<h4>Legal & Ethical Boundaries</h4><p>Reverse engineering: deconstructing hardware/software to understand or improve it. Generally legal for interoperability, but may violate licenses/EULAs. Microsoft accused of reverse engineering Mac UI, Google search methods for Bing.</p><p>Trade secret law does not protect against lawful reverse engineering, but patents and contracts may restrict it.</p>' }
                    ]
                }
            ]
        };

        let nodes = {}, expanded = new Set(['ip_root']);
        let selectedId = null;
        let tf = { x: 70, y: 80, scale: 0.85 }, isPanning = false, panStart = {};
        const cw = document.getElementById('cw'), canvas = document.getElementById('canvas'), linesEl = document.getElementById('lines');
        const NW = 185, NH = 48, HG = 280, VG = 62;

        function flatten(n, d = 0) { nodes[n.id] = { ...n, depth: d }; if (n.children) n.children.forEach(c => flatten(c, d + 1)); }
        flatten(DATA);

        function countH(n) {
            if (!n.children || !expanded.has(n.id)) return 1;
            let t = 0;
            n.children.forEach(c => t += countH(nodes[c.id] || c));
            return Math.max(t, 1);
        }

        function layout() {
            let pos = {};
            function assign(n, x, yOff) {
                pos[n.id] = { x, yOff, y: 0 };
                if (n.children && expanded.has(n.id)) {
                    let sy = yOff;
                    n.children.forEach(c => {
                        let cn = nodes[c.id] || c;
                        let ch = countH(cn);
                        assign(cn, x + HG, sy);
                        sy += ch;
                    });
                }
            }
            assign(DATA, 0, 0);
            function computeY(n) {
                if (!n.children || !expanded.has(n.id)) { pos[n.id].y = pos[n.id].yOff * VG; return; }
                n.children.forEach(c => computeY(nodes[c.id] || c));
                let kids = n.children.map(c => nodes[c.id] || c);
                let topY = pos[kids[0].id].y, botY = pos[kids[kids.length - 1].id].y;
                pos[n.id].y = (topY + botY) / 2;
            }
            computeY(DATA);
            return pos;
        }

        function render() {
            let pos = layout();
            let existing = {};
            canvas.querySelectorAll('.node').forEach(el => { existing[el.dataset.id] = el; });
            let vis = new Set();
            function collect(n) { vis.add(n.id); if (n.children && expanded.has(n.id)) n.children.forEach(c => collect(nodes[c.id] || c)); }
            collect(DATA);
            Object.keys(existing).forEach(id => { if (!vis.has(id)) existing[id].remove(); });
            vis.forEach(id => {
                let nd = nodes[id], p = pos[id];
                if (!p) return;
                let el = existing[id];
                let isNew = !el;
                if (isNew) { el = document.createElement('div'); el.className = 'node'; el.dataset.id = id; canvas.appendChild(el); }
                let lvlClass = id === 'ip_root' ? 'root' : (nd.level === 1 ? 'l1' : (nd.level === 2 ? 'l2' : 'l3'));
                el.className = `node ${lvlClass} ${selectedId === id ? 'selected' : ''}`;
                el.style.left = p.x + 'px';
                el.style.top = (p.y - NH / 2) + 'px';
                el.style.width = NW + 'px';
                let hasChildren = nd.children && nd.children.length > 0 && !nd.leaf;
                let icon = hasChildren ? `<svg class="chev ${expanded.has(id) ? 'open' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M6 4l4 4-4 4" stroke-width="2"/></svg>` : (nd.leaf ? `<svg class="li" viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="3.5"/></svg>` : '');
                el.innerHTML = `<span class="nl">${nd.label.replace(/\n/g, '<br>')}</span>${icon}`;
                if (isNew) el.classList.add('entering');
                el.onclick = (e) => { e.stopPropagation(); onClick(id); };
            });
            drawLines(pos, vis);
        }

        function drawLines(pos, vis) {
            let paths = [];
            vis.forEach(id => {
                let nd = nodes[id];
                if (!nd.children || !expanded.has(id)) return;
                nd.children.forEach(c => {
                    let cid = (nodes[c.id] || c).id;
                    if (!vis.has(cid)) return;
                    let p1 = pos[id], p2 = pos[cid];
                    if (!p1 || !p2) return;
                    let x1 = p1.x + NW, y1 = p1.y;
                    let x2 = p2.x, y2 = p2.y;
                    let mx = x1 + (x2 - x1) * 0.5;
                    paths.push(`<path class="pl" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`);
                });
            });
            linesEl.innerHTML = paths.join('');
        }

        function onClick(id) {
            let nd = nodes[id];
            if (nd.leaf || (nd.children && nd.children.length === 0)) { selectedId = id; openPanel(id); render(); return; }
            if (nd.children && nd.children.length) {
                expanded.has(id) ? expanded.delete(id) : expanded.add(id);
                render();
            }
        }

        function openPanel(id) {
            let nd = nodes[id];
            document.getElementById('ptitle').innerHTML = nd.label.replace(/\n/g, ' ');
            let tagDiv = document.getElementById('ptag');
            let tagMap = { copyright: 'COPYRIGHT', patent: 'PATENT', trademark: 'TRADEMARK', secret: 'TRADE SECRET', issue: 'ISSUE' };
            let raw = tagMap[nd.tag] || 'IP';
            tagDiv.textContent = raw;
            let cls = `tag-${nd.tag === 'copyright' ? 'copyright' : (nd.tag === 'patent' ? 'patent' : (nd.tag === 'trademark' ? 'trademark' : (nd.tag === 'secret' ? 'secret' : 'issue')))}`;
            tagDiv.className = cls;
            tagDiv.style.display = 'inline-flex';
            document.getElementById('pb').innerHTML = nd.content || '<p>Intellectual property concept.</p>';
            document.getElementById('panel').classList.add('open');
        }

        document.getElementById('pc').onclick = () => { document.getElementById('panel').classList.remove('open'); selectedId = null; render(); };
        cw.addEventListener('mousedown', e => { if (e.target.closest('.node') || e.target.closest('#panel')) return; isPanning = true; cw.classList.add('panning'); panStart = { x: e.clientX - tf.x, y: e.clientY - tf.y }; });
        window.addEventListener('mousemove', e => { if (!isPanning) return; tf.x = e.clientX - panStart.x; tf.y = e.clientY - panStart.y; applyTf(); });
        window.addEventListener('mouseup', () => { isPanning = false; cw.classList.remove('panning'); });
        cw.addEventListener('wheel', e => { e.preventDefault(); let delta = -e.deltaY * 0.001; let ns = Math.min(2.2, Math.max(0.3, tf.scale + delta)); let rect = cw.getBoundingClientRect(); let mx = e.clientX - rect.left, my = e.clientY - rect.top; tf.x = mx - (mx - tf.x) * (ns / tf.scale); tf.y = my - (my - tf.y) * (ns / tf.scale); tf.scale = ns; applyTf(); }, { passive: false });
        function applyTf() { canvas.style.transform = `translate(${tf.x}px, ${tf.y}px) scale(${tf.scale})`; document.getElementById('zl').innerText = Math.round(tf.scale * 100) + '%'; }
        document.getElementById('zi').onclick = () => { tf.scale = Math.min(2.2, tf.scale + 0.12); applyTf(); };
        document.getElementById('zo').onclick = () => { tf.scale = Math.max(0.3, tf.scale - 0.12); applyTf(); };
        document.getElementById('rb').onclick = () => { tf = { x: 60, y: 70, scale: 0.85 }; applyTf(); };
        document.getElementById('eab').onclick = () => { function ea(n) { if (n.children) { expanded.add(n.id); n.children.forEach(c => ea(nodes[c.id] || c)); } } ea(DATA); render(); };
        document.getElementById('cab').onclick = () => { expanded.clear(); expanded.add('ip_root'); selectedId = null; document.getElementById('panel').classList.remove('open'); render(); };
        const searchInput = document.getElementById('search'), srDiv = document.getElementById('sr');
        function allNodes() { let res = []; function walk(n) { res.push({ id: n.id, label: n.label.replace(/\n/g, ' ') }); if (n.children) n.children.forEach(c => walk(nodes[c.id] || c)); } walk(DATA); return res; }
        searchInput.addEventListener('input', () => {
            let q = searchInput.value.trim().toLowerCase();
            if (!q) { srDiv.classList.remove('v'); return; }
            let matches = allNodes().filter(n => n.label.toLowerCase().includes(q)).slice(0, 8);
            if (!matches.length) { srDiv.innerHTML = '<div class="sri">No results</div>'; srDiv.classList.add('v'); return; }
            srDiv.innerHTML = matches.map(m => `<div class="sri" data-id="${m.id}">${m.label.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark>$1</mark>')}</div>`).join('');
            srDiv.classList.add('v');
        });
        srDiv.addEventListener('click', e => { let it = e.target.closest('.sri'); if (it?.dataset.id) { srDiv.classList.remove('v'); searchInput.value = ''; navTo(it.dataset.id); } });
        function navTo(id) {
            function findPath(n, target, path = []) { if (n.id === target) return [...path, n.id]; if (n.children) for (let c of n.children) { let res = findPath(nodes[c.id] || c, target, [...path, n.id]); if (res) return res; } return null; }
            let p = findPath(DATA, id);
            if (p) { p.forEach(pid => expanded.add(pid)); selectedId = id; render(); setTimeout(() => { let el = canvas.querySelector(`[data-id="${id}"]`); if (el) { let rect = el.getBoundingClientRect(), cwRect = cw.getBoundingClientRect(); tf.x += (cwRect.width / 2) - (rect.left + rect.width / 2 - cwRect.left); tf.y += (cwRect.height / 2) - (rect.top + rect.height / 2 - cwRect.top); applyTf(); } if (nodes[id] && nodes[id].leaf) openPanel(id); }, 100); }
        }
        let isDark = true;
        document.getElementById('tb').onclick = () => { isDark = !isDark; document.documentElement.setAttribute('data-theme', isDark ? '' : 'light'); document.getElementById('tb').textContent = isDark ? '🌙' : '☀️'; };
        tf = { x: 80, y: 90, scale: 0.88 };
        render(); applyTf();
    </script>

    <script src="/javascripts/mindmap-controls.js"></script>
</body>

</html>
