            border-radius: 8px;
            font-size: .88rem;

        }

        .results-panel {

            margin-top: 32px;

        }

        .result-score {

        }

        .q-feedback.no {
            color: var(--wrong)
        }

        .mock-panel {

            border-radius: 12px;
            overflow: hidden;
            background: var(--surface)
        }

        .mock-panel summary {
            cursor: pointer;

        }

        .mock-body {
            padding: 18px;

        }

        .mock-group {

        }

        .mock-group h3 {
            background: var(--section-head);

        .mock-list {

            border-bottom: 1px solid var(--border);

        }

        .mock-list li:last-child {
            border-bottom: 0;
            padding-bottom: 0
        }

        .mock-num {
            color: var(--accent2);
            font-family: 'JetBrains Mono', monospace;
            font-size: .78rem;
            font-weight: 500
        }

        .mock-answer {
            color: var(--correct);
            font-weight: 600
        }

        @media(max-width:600px) {
            .exam-header {
                padding-left: 16px;
                padding-right: 16px
            }

            .exam-header h1 {
                font-size: 1.25rem
            }

            .timer-bar {

            }

            .matching-grid {

            }

            }

                right: 10px;

                padding: 6px 12px
            }

            .result-score {
                font-size: 2.5rem
            }
        }

    <script>

        const matchAns = ['e', 'd', 'a', 'b', 'c', 'g', 'h', 'i', 'j', 'k', 'f', 'm'];
        const fib = [
            ['Lecture 2', 'The three economic systems studied are: Capitalism, Socialism, and <input class="blank-line" id="fib1a" placeholder="___________"> economy.', 'fib1a', ['islamic', 'islam']],
            ['Lecture 5', 'Zakat was decided in the <input class="blank-line" id="fib2a" placeholder="___________"> year of the Hijra, after fasting the month of Ramadan.', 'fib2a', ['second', '2nd', '2']],
            ['Lecture 6', 'The three factors of production (economic resources) are: Work, Capital, and <input class="blank-line" id="fib3a" placeholder="___________"> resources.', 'fib3a', ['natural']],
            ['Lecture 9', 'The Quranic verse that permits trade but prohibits usury states: "Allah allows the <input class="blank-line" id="fib4a" placeholder="___________"> and prohibited <input class="blank-line" id="fib4b" placeholder="___________">."', 'fib4a|fib4b', [['sale', 'trade', 'selling', 'bay'], ['usury', 'riba', 'interest']]],
            ['Lecture 11', 'The first stage of money development was <input class="blank-line" id="fib5a" placeholder="___________"> money, where animals were used as an exchange means.', 'fib5a', ['commodity']],
            ['Lecture 3', 'Commodities are divided into two main categories: <input class="blank-line" id="fib6a" placeholder="___________"> goods and <input class="blank-line" id="fib6b" placeholder="___________"> goods.', 'fib6a|fib6b', [['consumer'], ['production']]],
            ['Lecture 10', 'According to the law of supply and demand, there is an <input class="blank-line" id="fib7a" placeholder="___________"> relationship between price and quantity demanded.', 'fib7a', ['inverse']],
            ['Lecture 4', 'Public loans that represent a government debt to creditors are also called <input class="blank-line" id="fib8a" placeholder="___________"> debt or sovereign debt.', 'fib8a', ['national']]
        ];
        const had = [
            ['Lecture 1', 'Write the Hadith about the five things a person will be questioned about on the Day of Resurrection.', 'Man feet will not move on the Day of Resurrection before he is asked about his life, his knowledge, his wealth, and his body.', ['life', 'knowledge', 'wealth', 'earned', 'body', 'resurrection']],
            ['Lecture 7', 'Write the Hadith related to the virtue of earning from one own labor (mentioning Prophet David / Dawud).', 'No one has ever eaten better food than what he eats as a result of the labor of his hands. Prophet David used to eat from what he worked for with his hands.', ['labor', 'hands', 'david', 'better', 'food', 'worked']],
            ['Lecture 8', 'Write the Hadith that prohibits eating and drinking in gold or silver utensils.', 'Do not drink in silver or gold utensils, and do not eat in plates of such metals, for such things are for them in this worldly life and for you in the Hereafter.', ['gold', 'silver', 'utensils', 'drink', 'eat', 'hereafter']],
            ['Lecture 2', 'Write the Hadith about the five things a slave of Allah shall be questioned about.', 'The feet of the slave of Allah shall not move on the Day of Judgement until he is asked about his life, knowledge, wealth, and body.', ['life', 'knowledge', 'wealth', 'earned', 'body', 'judgement']]
        ];
        const sw = [
            ['Lecture 2', 'Compare the Capitalist economy and the Islamic economy in terms of their doctrines of life and approach to rationalism. Mention at least three differences.', 'Capitalism considers worldly life and makes self-interest and rationalism the main authority. Islam considers worldly life and the Hereafter, and filters individual interest through religion, moral values, honest earning, social justice, and satisfaction of Allah.', ['worldly', 'hereafter', 'self-interest', 'allah', 'religion', 'honest', 'earning', 'rationalism', 'capitalism', 'islamic']],
            ['Lecture 5', 'Explain the concept of Zakat: its definition, its rank in Islam, the rate, and name at least four categories of Zakat recipients.', 'Zakat is the allocated amount in wealth of certain individuals for a certain group at a certain time. It is the third pillar of Islam and is 2.5% above nisab. Recipients include the poor, needy, administrators, hearts to reconcile, captives, debtors, those in jehad, and stranded travelers.', ['pillar', '2.5', 'nisab', 'poor', 'needy', 'administrators', 'captives', 'debtors', 'jehad', 'traveler', 'third']],
            ['Lecture 9', 'What is usury (Riba) in sales? Explain the rules for exchanging the same type and different types of usurious assets.', 'Riba in sales involves increase or delay in exchanging ribawi goods. Same type, such as gold for gold, requires equality and immediate hand-to-hand exchange. Different types, such as gold for silver, may differ in amount but must still be immediate.', ['riba', 'increase', 'delay', 'gold', 'silver', 'same', 'equality', 'immediate', 'different', 'hand']],
            ['Lecture 12', 'Define banks and describe the three main types of banks and their primary functions.', 'A bank is an institution or joint-stock company established for dealing in money and credit. Issuing or central banks issue paper money and supervise the system. Specialized banks finance sectors such as real estate, agriculture, or industry. Commercial banks accept deposits, grant loans and credit, and invest in securities.', ['institution', 'issuing', 'central', 'specialized', 'commercial', 'deposits', 'loans', 'credit', 'money']]
        ];
        let totalSeconds = 7200, timerInterval = null, examSubmitted = false, tfState = {};
        const letters = ['a', 'b', 'c', 'd'];
        function section(title, pts, inst, body) { return `<section class="section-card"><div class="section-header"><span class="section-title">${title}</span><span class="section-pts">${pts}</span></div><div class="section-inst">${inst}</div><div class="section-body">${body}</div></section>` }
        function qwrap(id, lec, num, stem, body) { return `<div class="q-item" id="${id}"><span class="lec-tag">${lec}</span><div class="q-stem"><span class="q-num">${num}.</span> ${stem}</div>${body}<div class="q-feedback" id="${id}-fb"></div></div>` }
        function cleanPrompt(text) { return text.replace(/<input[^>]+>/g, '_____') }
        function fibAnswerText(q) {
            let ans = Array.isArray(q[3][0]) ? q[3] : [q[3]];
            return ans.map(a => a[0]).join(' / ');
        }
        function mockList(title, items) {
            return `<div class="mock-group"><h3>${title}</h3><ol class="mock-list">${items.join('')}</ol></div>`;
        }
        function renderMockAnswers() {
            const mcqItems = mcq.map((q, i) => {
                const letter = q[3].toUpperCase();
                const answer = q[2][letters.indexOf(q[3])];
                return `<li><span class="mock-num">${i + 1}.</span> <span class="mock-answer">${letter}</span> - ${answer}</li>`;
            });
            const tfItems = tf.map((q, i) => `<li><span class="mock-num">${i + 13}.</span> <span class="mock-answer">${q[2] === 'T' ? 'True' : 'False'}</span></li>`);
            const matchItems = matchTerms.map((term, i) => `<li><span class="mock-num">${i + 1}.</span> ${term}: <span class="mock-answer">${matchAns[i]}) ${matchOptions[matchAns[i]]}</span></li>`);
            const fibItems = fib.map((q, i) => `<li><span class="mock-num">${i + 25}.</span> ${cleanPrompt(q[1])}<br><span class="mock-answer">Mock answer: ${fibAnswerText(q)}</span></li>`);
            const hadItems = had.map((q, i) => `<li><span class="mock-num">${i + 33}.</span> ${q[1]}<br><span class="mock-answer">Mock answer:</span> ${q[2]}</li>`);
            const swItems = sw.map((q, i) => `<li><span class="mock-num">${i + 37}.</span> ${q[1]}<br><span class="mock-answer">Mock answer:</span> ${q[2]}</li>`);
            return `<details class="mock-panel"><summary>Mock Answers / Study Key</summary><div class="mock-body">${mockList('Section A - Multiple Choice', mcqItems)}${mockList('Section B - True or False', tfItems)}${mockList('Section C - Matching', matchItems)}${mockList('Section D - Fill in the Blank', fibItems)}${mockList('Section E - Hadith / Quranic Verse', hadItems)}${mockList('Section F - Short Written Answer', swItems)}</div></details>`;
        }
        function render() {
            let n = 1; let mbody = mcq.map((q, i) => qwrap(`q${i + 1}`, q[0], n++, q[1], `<div class="options">${q[2].map((o, j) => `<label class="option-label"><input type="radio" name="q${i + 1}" value="${letters[j]}"><span class="opt-letter">${letters[j].toUpperCase()}</span>${o}</label>`).join('')}</div>`)).join('');
            let tfbody = tf.map((q, i) => qwrap(`tf${i + 1}`, q[0], n++, q[1], `<div class="tf-group"><button class="tf-btn" onclick="selectTF('tf${i + 1}','T')">True</button><button class="tf-btn" onclick="selectTF('tf${i + 1}','F')">False</button></div>`)).join('');
            let matchbody = `<div class="matching-grid">${matchTerms.map((t, i) => `<div class="match-term">${i + 1}. ${t}</div><div class="match-arrow">→</div><select class="match-select" id="m${i + 1}"><option value="">- Select -</option>${Object.entries(matchOptions).map(([k, v]) => `<option value="${k}">${k}) ${v}</option>`).join('')}</select>`).join('')}</div><div class="q-feedback" id="match-fb" style="margin-top:12px"></div>`;
            let fibbody = fib.map((q, i) => qwrap(`fib${i + 1}`, q[0], n++, q[1], '')).join('');
            let hadbody = had.map((q, i) => qwrap(`had${i + 1}`, q[0], n++, q[1], `<textarea class="written-area" id="had${i + 1}-ans" placeholder="Write the Hadith here..." rows="4"></textarea><div class="answer-reveal" id="had${i + 1}-reveal"></div>`)).join('');
            let swbody = sw.map((q, i) => qwrap(`sw${i + 1}`, q[0], n++, q[1], `<textarea class="written-area" id="sw${i + 1}-ans" placeholder="Your answer..." rows="5"></textarea><div class="answer-reveal" id="sw${i + 1}-reveal"></div>`)).join('');
            document.getElementById('examBody').innerHTML = section('Section A - Multiple Choice Questions', '12 Points · 1 pt each', 'Choose the best answer for each question.', mbody) + section('Section B - True or False', '6 Points · 0.5 pt each', 'Determine whether each statement is True or False.', tfbody) + section('Section C - Matching', '6 Points · 0.5 pt each', 'Match each term with the correct definition or description.', matchbody) + section('Section D - Fill in the Blank', '4 Points · 0.5 pt each', 'Complete each sentence with the correct word or phrase.', fibbody) + section('Section E - Write the Hadith / Quranic Verse', '4 Points · 1 pt each', 'Write the full Hadith or Quranic verse related to each topic. Graded on keyword inclusion.', hadbody) + section('Section F - Short Written Answer', '8 Points · 2 pts each', 'Answer each question in 3-6 sentences. Graded on keyword matching.', swbody) + `<div class="submit-section"><p style="color:var(--muted);font-size:.85rem;margin-bottom:16px">Review all answers before submitting. Once submitted, the exam is graded immediately.</p><button class="submit-btn" id="submitBtn" onclick="submitExam()">Submit Exam</button><div class="results-panel" id="resultsPanel"><p style="font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">بسم الله الرحمن الرحيم</p><div class="result-score" id="resultScore">-</div><div class="result-grade" id="resultGrade">- / 40 points</div><div class="result-msg" id="resultMsg"></div><div class="result-breakdown" id="resultBreakdown"></div></div>${renderMockAnswers()}</div>`;
            document.querySelectorAll('.option-label').forEach(label => label.addEventListener('click', function () { if (examSubmitted) return; let name = this.querySelector('input').name; document.querySelectorAll(`input[name="${name}"]`).forEach(r => r.closest('.option-label').classList.remove('selected')); this.querySelector('input').checked = true; this.classList.add('selected') }))
        }
        function selectTF(qid, val) { if (examSubmitted) return; tfState[qid] = val; let btns = document.querySelectorAll(`#${qid} .tf-btn`); btns.forEach(b => b.classList.remove('selected')); btns[val === 'T' ? 0 : 1].classList.add('selected') }
        function toggleTheme() { let html = document.documentElement, isDark = html.getAttribute('data-theme') === 'dark'; html.setAttribute('data-theme', isDark ? '' : 'dark'); document.getElementById('themeBtn').textContent = isDark ? 'LIGHT / DARK' : 'DARK / LIGHT' }
        function startTimer() { timerInterval = setInterval(() => { if (examSubmitted) { clearInterval(timerInterval); return } totalSeconds--; updateTimerDisplay(); updateProgress(); if (totalSeconds <= 0) { clearInterval(timerInterval); submitExam() } }, 1000) }
        function updateTimerDisplay() { let h = Math.floor(totalSeconds / 3600), m = Math.floor((totalSeconds % 3600) / 60), s = totalSeconds % 60, disp = document.getElementById('timerDisplay'); disp.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`; if (totalSeconds < 600) disp.classList.add('warning') }
        function updateProgress() { document.getElementById('progressFill').style.width = ((7200 - totalSeconds) / 7200 * 100) + '%' } function pad(n) { return String(n).padStart(2, '0') }
        function fb(id, ok, msg) { let el = document.getElementById(`${id}-fb`); if (el) { el.textContent = msg; el.className = 'q-feedback show ' + (ok ? 'ok' : 'no') } }
        function gradeMCQ() { let score = 0; mcq.forEach((q, i) => { let id = `q${i + 1}`, correct = q[3], sel = document.querySelector(`input[name="${id}"]:checked`); document.querySelectorAll(`input[name="${id}"]`).forEach(inp => { let lbl = inp.closest('.option-label'); if (inp.value === correct) lbl.classList.add('correct'); if (sel && inp.value === sel.value && inp.value !== correct) lbl.classList.add('wrong') }); let ok = sel && sel.value === correct; if (ok) score++; fb(id, ok, ok ? 'Correct' : sel ? 'Incorrect' : 'Not answered') }); return score }
        function gradeTF() { let score = 0; tf.forEach((q, i) => { let id = `tf${i + 1}`, correct = q[2], given = tfState[id], btns = document.querySelectorAll(`#${id} .tf-btn`); btns.forEach((b, j) => { let v = j === 0 ? 'T' : 'F'; if (v === correct) b.classList.add('correct'); if (given && v === given && given !== correct) b.classList.add('wrong') }); let ok = given === correct; if (ok) score += .5; fb(id, ok, ok ? 'Correct' : given ? 'Incorrect' : 'Not answered') }); return score }
        function gradeMatching() { let score = 0, correct = 0; matchAns.forEach((ans, i) => { let sel = document.getElementById(`m${i + 1}`); if (sel.value === ans) { sel.classList.add('correct-ans'); score += .5; correct++ } else sel.classList.add('wrong-ans') }); let el = document.getElementById('match-fb'); el.textContent = `${correct}/${matchAns.length} matching pairs correct`; el.className = 'q-feedback show ' + (correct === matchAns.length ? 'ok' : 'no'); return score }
        function okText(val, keys) { val = val.trim().toLowerCase(); return keys.some(k => val.includes(k.toLowerCase())) }
        function gradeFIB() { let score = 0; fib.forEach((q, i) => { let ids = q[2].split('|'), ans = Array.isArray(q[3][0]) ? q[3] : [q[3]], all = true; ids.forEach((id, j) => { let inp = document.getElementById(id), ok = okText(inp.value, ans[j]); inp.classList.add(ok ? 'correct-ans' : 'wrong-ans'); inp.disabled = true; if (ok) score += .5; else all = false }); fb(`fib${i + 1}`, all, all ? 'Correct' : 'Check your answer') }); return score }
        function gradeWritten(rows, prefix, ptsEach, fullFactor) { let score = 0; rows.forEach((q, i) => { let id = `${prefix}${i + 1}`, ta = document.getElementById(`${id}-ans`), reveal = document.getElementById(`${id}-reveal`), val = ta.value.toLowerCase(), count = q[3].filter(k => val.includes(k.toLowerCase())).length, threshold = Math.ceil(q[3].length * fullFactor), pts = ptsEach === 1 ? (count >= threshold ? 1 : 0) : (count >= threshold * 2 ? 2 : count >= threshold ? 1 : 0); ta.classList.add(pts > 0 ? 'correct-ans' : 'wrong-ans'); ta.disabled = true; reveal.innerHTML = `<strong>${pts === ptsEach ? 'Full credit' : pts > 0 ? 'Partial credit' : 'Review required'} (${pts}/${ptsEach})</strong>Model Answer: ${q[2]}`; reveal.className = 'answer-reveal show ' + (pts > 0 ? 'correct-reveal' : 'wrong-reveal'); score += pts }); return score }
        function submitExam() { if (examSubmitted) return; examSubmitted = true; clearInterval(timerInterval); document.getElementById('submitBtn').disabled = true; document.getElementById('submitBtn').textContent = 'Exam Submitted'; let sMCQ = gradeMCQ(), sTF = gradeTF(), sMatch = gradeMatching(), sFIB = gradeFIB(), sHad = gradeWritten(had, 'had', 1, .4), sSW = gradeWritten(sw, 'sw', 2, .3), total = sMCQ + sTF + sMatch + sFIB + sHad + sSW, pct = (total / 40 * 100).toFixed(1); let grade, msg; if (pct >= 90) { grade = 'A'; msg = 'Excellent work! A comprehensive understanding of Islamic economic principles.' } else if (pct >= 80) { grade = 'B'; msg = 'Good performance. Review the topics where points were lost for complete mastery.' } else if (pct >= 70) { grade = 'C'; msg = 'Satisfactory. Focus on Hadith memorization and comparison questions.' } else if (pct >= 60) { grade = 'D'; msg = 'Passing, but additional review of all 12 lectures is recommended.' } else { grade = 'F'; msg = 'More study is needed. Please revisit all lecture materials carefully.' } document.getElementById('resultScore').textContent = total.toFixed(1) + ' / 40'; document.getElementById('resultGrade').textContent = `Grade: ${grade} (${pct}%)`; document.getElementById('resultMsg').textContent = msg; document.getElementById('liveScore').textContent = `Score: ${total.toFixed(1)} / 40`; document.getElementById('resultBreakdown').innerHTML = `<span class="breakdown-pill">MCQ: ${sMCQ}/12</span><span class="breakdown-pill">T/F: ${sTF}/6</span><span class="breakdown-pill">Matching: ${sMatch}/6</span><span class="breakdown-pill">Fill-Blank: ${sFIB}/4</span><span class="breakdown-pill">Hadith: ${sHad}/4</span><span class="breakdown-pill">Written: ${sSW}/8</span>`; document.getElementById('resultsPanel').classList.add('show'); document.getElementById('resultsPanel').scrollIntoView({ behavior: 'smooth' }) }
        render(); startTimer();
    </script>
