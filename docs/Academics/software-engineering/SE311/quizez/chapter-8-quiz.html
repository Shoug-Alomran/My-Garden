<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SE311 – Chapter 8 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --bg2: #eeeae2;
  --card: #ffffff;
  --text: #1a1612;
  --text2: #5a5550;
  --text3: #888380;
  --border: #ddd9d0;
  --accent: #b03a2e;
  --accent2: #2471a3;
  --correct: #1e8449;
  --correct-bg: #eafaf1;
  --correct-border: #a9dfbf;
  --wrong: #b03a2e;
  --wrong-bg: #fdedec;
  --wrong-border: #f1948a;
  --partial: #d68910;
  --partial-bg: #fef9e7;
  --partial-border: #f9e79f;
  --shadow: 0 2px 16px rgba(0,0,0,0.07);
  --radius: 12px;
  --mono: 'JetBrains Mono', monospace;
}
[data-theme="dark"] {
  --bg: #111009;
  --bg2: #1a1815;
  --card: #1f1c18;
  --text: #f0ebe2;
  --text2: #a09890;
  --text3: #6a6460;
  --border: #2e2a24;
  --accent: #e05c50;
  --accent2: #5dade2;
  --correct: #27ae60;
  --correct-bg: #0d2b1a;
  --correct-border: #1e6b3a;
  --wrong: #e05c50;
  --wrong-bg: #2b0e0b;
  --wrong-border: #7a2020;
  --partial: #f39c12;
  --partial-bg: #2b1f05;
  --partial-border: #7a5510;
  --shadow: 0 2px 16px rgba(0,0,0,0.35);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { width: 100%; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; width: 100%; overflow-x: hidden; transition: background 0.3s, color 0.3s; }

header {
  background: var(--text);
  color: var(--bg);
  padding: 2.5rem 2rem 1.8rem;
  position: relative;
  overflow: hidden;
}
header::before {
  content: 'Q';
  position: absolute; right: -0.05em; top: -0.2em;
  font-family: 'Playfair Display', serif;
  font-size: 13rem; font-weight: 700;
  color: rgba(255,255,255,0.04);
  pointer-events: none; line-height: 1;
}
.header-inner { width: min(100%, 1040px); margin: 0 auto; position: relative; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
.header-text .course-tag {
  display: inline-block; font-family: var(--mono); font-size: 0.68rem;
  letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--accent); color: #fff;
  padding: 0.25em 0.7em; border-radius: 4px; margin-bottom: 0.8rem;
}
header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 4vw, 2.4rem); line-height: 1.2; margin-bottom: 0.3rem; }
header p { font-size: 0.9rem; opacity: 0.6; font-weight: 300; }

.toggle-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.85); border-radius: 50px;
  padding: 0.4rem 1rem; font-family: var(--mono); font-size: 0.75rem;
  cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
  transition: all 0.2s; white-space: nowrap; margin-top: 0.3rem;
}
.toggle-btn:hover { background: rgba(255,255,255,0.18); }

main { width: min(100%, 1040px); margin: 0 auto; padding: 2rem clamp(1rem, 4vw, 2rem) 5rem; }

/* PROGRESS */
.progress-bar-wrap { background: var(--bg2); border-radius: 50px; height: 6px; margin-bottom: 0.6rem; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--accent); border-radius: 50px; transition: width 0.4s ease; }
.progress-meta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 0.72rem; color: var(--text3); margin-bottom: 2rem; }

/* SCORE PANEL */
.score-panel {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 2rem;
}
.score-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 0.9rem 1rem; text-align: center; box-shadow: var(--shadow);
}
.score-card .num { font-size: 1.6rem; font-weight: 600; line-height: 1; margin-bottom: 0.2rem; }
.score-card .lbl { font-size: 0.75rem; color: var(--text3); font-family: var(--mono); letter-spacing: 0.05em; }
.score-card.s-correct .num { color: var(--correct); }
.score-card.s-wrong .num { color: var(--wrong); }
.score-card.s-total .num { color: var(--accent2); }

/* QUESTION CARD */
.q-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 1.4rem;
  box-shadow: var(--shadow); overflow: hidden;
  animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.q-header {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 1rem 1.4rem; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap;
}
.q-num {
  font-family: var(--mono); font-size: 0.7rem; color: var(--accent);
  background: rgba(176,58,46,0.1); padding: 0.2em 0.6em; border-radius: 4px; white-space: nowrap;
}
.q-text { font-size: 0.95rem; font-weight: 500; color: var(--text); flex: 1; line-height: 1.5; }
.tag { display: inline-block; font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.2em 0.55em; border-radius: 4px; font-weight: 500; }
.tag.past { background: rgba(176,58,46,0.1); color: var(--accent); border: 1px solid rgba(176,58,46,0.25); }
.tag.mcq { background: rgba(36,113,163,0.1); color: var(--accent2); border: 1px solid rgba(36,113,163,0.25); }
.tag.written { background: rgba(100,80,20,0.1); color: var(--partial); border: 1px solid rgba(212,136,16,0.25); }
.tag.tf { background: rgba(30,132,73,0.1); color: var(--correct); border: 1px solid rgba(30,132,73,0.25); }

.q-body { padding: 1.2rem 1.4rem; }

/* MCQ OPTIONS */
.options { display: flex; flex-direction: column; gap: 0.5rem; }
.opt {
  display: flex; align-items: flex-start; gap: 0.8rem;
  padding: 0.75rem 1rem; border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  background: var(--bg); font-size: 0.9rem; color: var(--text2);
}
.opt:hover:not(.disabled) { border-color: var(--accent2); color: var(--text); background: var(--card); }
.opt .opt-letter {
  font-family: var(--mono); font-size: 0.72rem; font-weight: 500;
  min-width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px; transition: all 0.15s;
  color: var(--text3);
}
.opt.selected { border-color: var(--accent2); background: rgba(36,113,163,0.05); color: var(--text); }
.opt.selected .opt-letter { background: var(--accent2); color: #fff; border-color: var(--accent2); }
.opt.correct-ans { border-color: var(--correct); background: var(--correct-bg); color: var(--text); }
.opt.correct-ans .opt-letter { background: var(--correct); color: #fff; border-color: var(--correct); }
.opt.wrong-ans { border-color: var(--wrong); background: var(--wrong-bg); color: var(--text); }
.opt.wrong-ans .opt-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }
.opt.disabled { cursor: default; }

/* TRUE/FALSE */
.tf-options { display: flex; gap: 0.8rem; }
.tf-btn {
  flex: 1; padding: 0.75rem; border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  background: var(--bg); font-size: 0.9rem; font-weight: 500;
  color: var(--text2); text-align: center; font-family: 'DM Sans', sans-serif;
}
.tf-btn:hover:not(.disabled) { border-color: var(--accent2); color: var(--text); background: var(--card); }
.tf-btn.selected { border-color: var(--accent2); background: rgba(36,113,163,0.07); color: var(--accent2); }
.tf-btn.correct-ans { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
.tf-btn.wrong-ans { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
.tf-btn.disabled { cursor: default; }

/* WRITTEN */
.written-area {
  width: 100%; min-height: 110px; padding: 0.85rem 1rem;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; line-height: 1.6; resize: vertical;
  transition: border-color 0.2s;
}
.written-area:focus { outline: none; border-color: var(--accent2); }
.written-area.disabled { opacity: 0.8; cursor: default; }
.keyword-hint { font-size: 0.78rem; color: var(--text3); font-family: var(--mono); margin-top: 0.4rem; }
.keyword-found { display: inline-block; margin: 0.15rem; padding: 0.15em 0.5em; border-radius: 4px; font-size: 0.72rem; }
.keyword-found.hit { background: var(--correct-bg); color: var(--correct); border: 1px solid var(--correct-border); }
.keyword-found.miss { background: var(--wrong-bg); color: var(--wrong); border: 1px solid var(--wrong-border); }

.mock-answer-wrap { margin-top: 0.8rem; }
.mock-toggle {
  font-family: var(--mono); font-size: 0.72rem; color: var(--accent2);
  cursor: pointer; border: none; background: none; padding: 0; text-decoration: underline; text-underline-offset: 3px;
}
.mock-answer {
  margin-top: 0.6rem; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.88rem;
  color: var(--text2); line-height: 1.65; display: none;
}
.mock-answer.visible { display: block; }

/* FEEDBACK */
.feedback {
  margin-top: 0.9rem; padding: 0.85rem 1rem;
  border-radius: 8px; font-size: 0.88rem; line-height: 1.6; display: none;
}
.feedback.correct { background: var(--correct-bg); border: 1px solid var(--correct-border); color: var(--correct); }
.feedback.wrong { background: var(--wrong-bg); border: 1px solid var(--wrong-border); color: var(--wrong); }
.feedback.partial { background: var(--partial-bg); border: 1px solid var(--partial-border); color: var(--partial); }
.feedback.visible { display: block; }
.feedback .fb-title { font-weight: 600; margin-bottom: 0.3rem; display: block; }
.feedback .fb-body { color: var(--text2); }

/* CHECK BUTTON */
.check-btn {
  margin-top: 1rem; padding: 0.6rem 1.4rem;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
  transition: opacity 0.2s;
}
.check-btn:hover { opacity: 0.82; }
.check-btn:disabled { opacity: 0.35; cursor: default; }

/* RESULT PANEL */
.result-panel {
  display: none; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 2rem; text-align: center;
  box-shadow: var(--shadow); margin-top: 2rem;
}
.result-panel.visible { display: block; }
.result-panel h2 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.4rem; }
.result-panel .score-big { font-family: var(--mono); font-size: 3.5rem; font-weight: 500; line-height: 1; margin: 1rem 0 0.3rem; }
.result-panel .score-label { font-size: 0.88rem; color: var(--text3); margin-bottom: 1.2rem; }
.result-panel .grade { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }
.restart-btn {
  padding: 0.7rem 2rem; background: var(--text); color: var(--bg);
  border: none; border-radius: 8px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 500;
}
.restart-btn:hover { opacity: 0.82; }

/* SUBMIT ALL */
.submit-all-wrap { text-align: center; margin-top: 2rem; }
.submit-all-btn {
  padding: 0.85rem 2.5rem; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500;
  transition: opacity 0.2s; box-shadow: var(--shadow);
}
.submit-all-btn:hover { opacity: 0.88; }

footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: var(--text3); font-family: var(--mono); border-top: 1px solid var(--border); }
footer span { color: var(--accent); }
img, svg, canvas, video { max-width: 100%; height: auto; }
@media (max-width: 680px) {
  header { padding: 2rem 1rem 1.4rem; }
  .header-inner { flex-direction: column; }
  .toggle-btn { align-self: flex-start; }
  .score-panel { grid-template-columns: 1fr; }
  .q-header { align-items: flex-start; }
  .q-actions { flex-direction: column; }
  .btn { width: 100%; }
}

/* SE311 responsive + embedded theme bridge */
html, body {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;

body {
  transition: background-color 0.25s ease, color 0.25s ease;

.container,
.quiz-container,

.quiz-content,
main,
header,
.header,

.container,

}
.table-wrap,

html[data-theme="dark"] .question-block,

html[data-parent-theme="dark"] .content,

html[data-parent-theme="dark"] .quiz-info,

<body>

<header>
  <div class="header-inner">
    <div class="header-text">
      <div class="course-tag">SE311 · Chapter 8</div>
      <h1>Requirements Specification Quiz</h1>
      <p>20 questions · MCQ, True/False, and Written · Auto-graded</p>
    </div>
    <button class="toggle-btn" onclick="toggleDark()" id="darkBtn">
      <span id="darkIcon">🌙</span><span id="darkLabel">Dark</span>
    </button>
  </div>
</header>

<main>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="progress-meta">
    <span id="progressText">0 / 20 answered</span>
    <span id="progressPct">0%</span>
  </div>

  <div class="score-panel">
    <div class="score-card s-correct"><div class="num" id="sc-correct">0</div><div class="lbl">Correct</div></div>
    <div class="score-card s-wrong"><div class="num" id="sc-wrong">0</div><div class="lbl">Wrong</div></div>
    <div class="score-card s-total"><div class="num" id="sc-pct">0%</div><div class="lbl">Score</div></div>
  </div>

  <div id="quiz-container"></div>

  <div class="submit-all-wrap">
    <button class="submit-all-btn" onclick="submitAll()">Submit All &amp; See Results</button>
  </div>

  <div class="result-panel" id="resultPanel">
    <h2>Quiz Complete</h2>
    <div class="score-big" id="finalScore">—</div>
    <div class="score-label">out of 20</div>
    <div class="grade" id="finalGrade"></div>
    <button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
  </div>
</main>

<footer>SE311 · Software Requirements Engineering · Chapter 8 Quiz<br>Prepared by: <span>Shoug Alomran</span></footer>

<script>
const questions = [
  {
    id: 1,
    type: "mcq",
    past: true,
    text: "A good Software Requirements Specification (SRS) should avoid:",
    options: [
      "Describing functional behavior",
      "Stating measurable constraints",
      "Mixing design decisions with requirements",
      "Identifying external interfaces"
    ],
    answer: 2,
    explanation: "An SRS states WHAT the system should do, not HOW. Design decisions (architecture, implementation choices) belong in design documents, not the SRS. All other options are valid contents of a good SRS."
  },
  {
    id: 2,
    type: "mcq",
    past: true,
    text: "If every requirement in the SRS has only one possible interpretation, the SRS is said to be:",
    options: ["Correct", "Unambiguous", "Consistent", "Verifiable"],
    answer: 1,
    explanation: "Unambiguous means each requirement has exactly one interpretation. Verifiable means it can be tested. Consistent means no contradictions. These are all distinct quality properties of a good SRS."
  },
  {
    id: 3,
    type: "mcq",
    past: true,
    text: "The phrase 'The interface shall load quickly' violates which characteristic of good requirements?",
    options: ["Feasibility", "Verifiability", "Consistency", "Completeness"],
    answer: 1,
    explanation: "'Load quickly' cannot be measured or tested — there's no threshold. A verifiable version would be: 'The interface shall load within 3 seconds on a standard broadband connection.' This is a classic exam question."
  },
  {
    id: 4,
    type: "mcq",
    past: false,
    text: "Which section of the SRS template is used to document the logical data model (e.g., a UML class diagram or ER diagram)?",
    options: ["§2 Overall Description", "§3 System Features", "§4 Data Requirements", "§5 External Interface Requirements"],
    answer: 2,
    explanation: "§4 Data Requirements contains: 4.1 Logical data model (ER/UML diagrams), 4.2 Data dictionary, 4.3 Reports, and 4.4 Data acquisition, integrity, retention, and disposal."
  },
  {
    id: 5,
    type: "mcq",
    past: false,
    text: "Where do design and implementation constraints (e.g., 'the system must be built in Python') belong in the SRS template?",
    options: ["§1.2 Document Conventions", "§2.4 Design and Implementation Constraints", "§6 Quality Attributes", "§8 Other Requirements"],
    answer: 1,
    explanation: "§2.4 Design and Implementation Constraints records factors that restrict developer options, such as programming language requirements, required code libraries, and their rationale. Beware of including unnecessary constraints."
  },
  {
    id: 6,
    type: "mcq",
    past: false,
    text: "A member of the Movie Shop system must be able to login to access member-only services. Where does this belong in the SRS?",
    options: [
      "§3 System Features — as a separate use case 'Login'",
      "§6.3 Security — as a non-functional security requirement",
      "§2.3 Operating Environment",
      "§4 Data Requirements"
    ],
    answer: 1,
    explanation: "Login is a security (non-functional) requirement, not a use case. It is an access control mechanism. Adding 'Login' as a separate system feature/use case is a common mistake in SE311 assignments."
  },
  {
    id: 7,
    type: "mcq",
    past: true,
    text: "Which requirement best expresses a data-quality constraint? (Past Exam: Major-2 Term 251)",
    options: [
      "The system shall respond within 3 seconds",
      "Each employee record shall contain a valid, unique national-ID number",
      "The system shall encrypt all communications",
      "The interface shall be user-friendly"
    ],
    answer: 1,
    explanation: "A data-quality constraint restricts the content or format of stored data. Option B specifies that each record must have a valid, unique national-ID — a concrete, verifiable data rule. Option A is performance, C is security, D is vague usability."
  },
  {
    id: 8,
    type: "mcq",
    past: false,

let answered = new Array(questions.length).fill(false);
let correctCount = 0;
let wrongCount = 0;
let selectedAnswers = new Array(questions.length).fill(null);

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  answered = new Array(questions.length).fill(false);
  correctCount = 0; wrongCount = 0;
  selectedAnswers = new Array(questions.length).fill(null);
  updateScore();

  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'q-' + idx;
    card.style.animationDelay = (idx * 0.04) + 's';

    const typeLbl = q.type === 'mcq' ? '<span class="tag mcq">MCQ</span>' :
                    q.type === 'tf'  ? '<span class="tag tf">True / False</span>' :
                                       '<span class="tag written">Written</span>';
    const pastLbl = q.past ? '<span class="tag past">Past Exam</span>' : '';
    const qTextFormatted = q.text.replace(/\n/g, '<br>');

    let bodyHTML = '';

    if (q.type === 'mcq') {
      bodyHTML = `<div class="options">` +
        q.options.map((opt, i) =>
          `<div class="opt" id="opt-${idx}-${i}" onclick="selectMCQ(${idx},${i})">
            <span class="opt-letter">${String.fromCharCode(65+i)}</span>
            <span>${opt}</span>
          </div>`
        ).join('') +
      `</div>`;
    } else if (q.type === 'tf') {
      bodyHTML = `<div class="tf-options">
        <button class="tf-btn" id="tf-${idx}-true" onclick="selectTF(${idx}, true)">True</button>
        <button class="tf-btn" id="tf-${idx}-false" onclick="selectTF(${idx}, false)">False</button>
      </div>`;
    } else {
      const kw = q.keywords.flat().slice(0,8).join(', ');
      bodyHTML = `
        <textarea class="written-area" id="written-${idx}" placeholder="Type your answer here..." oninput="selectWritten(${idx})"></textarea>
        <div class="keyword-hint">Key concepts to address: <em>${kw}${q.keywords.flat().length > 8 ? '...' : ''}</em></div>
        <div id="kw-display-${idx}" style="margin-top:0.4rem;"></div>
        <div class="mock-answer-wrap">
          <button class="mock-toggle" onclick="toggleMock(${idx})">Show model answer</button>
          <div class="mock-answer" id="mock-${idx}">${q.mockAnswer.replace(/\n/g, '<br>')}</div>
        </div>`;
    }

    bodyHTML += `<button class="check-btn" id="check-${idx}" onclick="checkAnswer(${idx})" ${q.type==='written'?'':'disabled'}>Check Answer</button>`;
    bodyHTML += `<div class="feedback" id="fb-${idx}"><span class="fb-title" id="fb-title-${idx}"></span><span class="fb-body" id="fb-body-${idx}"></span></div>`;

    card.innerHTML = `
      <div class="q-header">
        <span class="q-num">Q${q.id}</span>
        <span class="q-text">${qTextFormatted}</span>
        ${typeLbl}${pastLbl}
      </div>
      <div class="q-body">${bodyHTML}</div>`;
    container.appendChild(card);
  });

  document.getElementById('resultPanel').classList.remove('visible');
}

function selectMCQ(qIdx, optIdx) {
  if (answered[qIdx]) return;
  selectedAnswers[qIdx] = optIdx;
  const q = questions[qIdx];
  q.options.forEach((_, i) => {
    const el = document.getElementById(`opt-${qIdx}-${i}`);
    el.classList.remove('selected');
  });
  document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected');
  document.getElementById(`check-${qIdx}`).disabled = false;
}

function selectTF(qIdx, val) {
  if (answered[qIdx]) return;
  selectedAnswers[qIdx] = val;
  document.getElementById(`tf-${qIdx}-true`).classList.remove('selected');
  document.getElementById(`tf-${qIdx}-false`).classList.remove('selected');
  document.getElementById(`tf-${qIdx}-${val}`).classList.add('selected');
  document.getElementById(`check-${qIdx}`).disabled = false;
}

function selectWritten(qIdx) {
  const val = document.getElementById(`written-${qIdx}`).value.trim();
  selectedAnswers[qIdx] = val;
  if (!answered[qIdx]) {
    document.getElementById(`check-${qIdx}`).disabled = (val.length < 5);
  }
}

function checkAnswer(qIdx) {
  if (answered[qIdx]) return;
  const q = questions[qIdx];
  answered[qIdx] = true;
  document.getElementById(`check-${qIdx}`).disabled = true;

  let isCorrect = false;
  let isPartial = false;
  const fb = document.getElementById(`fb-${qIdx}`);
  const fbTitle = document.getElementById(`fb-title-${qIdx}`);
  const fbBody = document.getElementById(`fb-body-${qIdx}`);

  if (q.type === 'mcq') {
    const sel = selectedAnswers[qIdx];
    isCorrect = sel === q.answer;
    q.options.forEach((_, i) => {
      const el = document.getElementById(`opt-${qIdx}-${i}`);
      el.classList.add('disabled');
      el.classList.remove('selected');
      if (i === q.answer) el.classList.add('correct-ans');
      else if (i === sel && !isCorrect) el.classList.add('wrong-ans');
    });
  } else if (q.type === 'tf') {
    const sel = selectedAnswers[qIdx];
    isCorrect = sel === q.answer;
    ['true','false'].forEach(v => {
      const el = document.getElementById(`tf-${qIdx}-${v}`);
      el.classList.add('disabled');
      el.classList.remove('selected');
      const boolV = v === 'true';
      if (boolV === q.answer) el.classList.add('correct-ans');
      else if (boolV === sel && !isCorrect) el.classList.add('wrong-ans');
    });
  } else {
    const userText = (selectedAnswers[qIdx] || '').toLowerCase();
    document.getElementById(`written-${qIdx}`).classList.add('disabled');
    document.getElementById(`written-${qIdx}`).disabled = true;

    let groupsHit = 0;
    const displayEl = document.getElementById(`kw-display-${qIdx}`);
    displayEl.innerHTML = '<div style="font-size:0.78rem;color:var(--text3);font-family:var(--mono);margin-bottom:0.3rem;">Keywords detected:</div>';

    q.keywords.forEach(group => {
      const hit = group.some(kw => userText.includes(kw.toLowerCase()));
      if (hit) groupsHit++;
      const span = document.createElement('span');
      span.className = 'keyword-found ' + (hit ? 'hit' : 'miss');
      span.textContent = group[0];
      displayEl.appendChild(span);
    });

    if (groupsHit >= q.minKeywords) { isCorrect = true; }
    else if (groupsHit >= Math.floor(q.minKeywords / 2)) { isPartial = true; }
  }

  fb.classList.remove('correct','wrong','partial');
  if (isCorrect) {
    fb.classList.add('correct','visible');
    fbTitle.textContent = 'Correct!';
    fbBody.textContent = q.explanation;
    correctCount++;
  } else if (isPartial) {
    fb.classList.add('partial','visible');
    fbTitle.textContent = 'Partially correct — keep going!';
    fbBody.textContent = 'You covered some key concepts but missed others. Review the model answer. — ' + q.explanation;
  } else {
    fb.classList.add('wrong','visible');
    fbTitle.textContent = 'Not quite.';
    fbBody.textContent = q.explanation;
    wrongCount++;
  }

  updateScore();
  updateProgress();
}

function submitAll() {
  questions.forEach((_, idx) => {
    if (!answered[idx] && selectedAnswers[idx] !== null) checkAnswer(idx);
    else if (!answered[idx]) {
      answered[idx] = true;
      const fb = document.getElementById(`fb-${idx}`);
      const fbTitle = document.getElementById(`fb-title-${idx}`);
      const fbBody = document.getElementById(`fb-body-${idx}`);
      fb.classList.add('wrong','visible');
      fbTitle.textContent = 'Not answered.';
      fbBody.textContent = questions[idx].explanation;
      wrongCount++;
      updateScore();
      updateProgress();
    }
  });

  const resultPanel = document.getElementById('resultPanel');
  resultPanel.classList.add('visible');
  const pct = Math.round((correctCount / questions.length) * 100);
  document.getElementById('finalScore').textContent = correctCount;
  document.getElementById('finalGrade').textContent =
    pct >= 90 ? 'Excellent — A' :
    pct >= 80 ? 'Great — B' :
    pct >= 70 ? 'Good — C' :
    pct >= 60 ? 'Passing — D' : 'Needs Review — F';
  document.getElementById('finalGrade').style.color =
    pct >= 80 ? 'var(--correct)' : pct >= 60 ? 'var(--partial)' : 'var(--wrong)';
  resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateScore() {
  document.getElementById('sc-correct').textContent = correctCount;
  document.getElementById('sc-wrong').textContent = wrongCount;
  const graded = correctCount + wrongCount;
  const pct = graded > 0 ? Math.round((correctCount / graded) * 100) : 0;
  document.getElementById('sc-pct').textContent = pct + '%';
}

function updateProgress() {
  const done = answered.filter(Boolean).length;
  const pct = Math.round((done / questions.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + questions.length + ' answered';
  document.getElementById('progressPct').textContent = pct + '%';
}

function toggleMock(idx) {
  const el = document.getElementById('mock-' + idx);
  el.classList.toggle('visible');
}

function restartQuiz() {
  document.getElementById('resultPanel').classList.remove('visible');
  correctCount = 0; wrongCount = 0;
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const root = document.documentElement;
const systemTheme = window.matchMedia('(prefers-color-scheme: dark)');

function setTheme(theme) {
  const next = theme === 'dark' ? 'dark' : 'light';
  root.setAttribute('data-theme', next);
  document.getElementById('darkLabel').textContent = next === 'dark' ? 'Light' : 'Dark';
  document.getElementById('darkIcon').textContent = next === 'dark' ? '☀️' : '🌙';
}

function toggleDark() {
  setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

function syncParentTheme() {
  const parentTheme = root.getAttribute('data-parent-theme');
  if (parentTheme === 'dark' || parentTheme === 'light') {
    setTheme(parentTheme);
    return true;
  }
  return false;
}

if (!syncParentTheme()) {
  setTheme(systemTheme.matches ? 'dark' : 'light');
}

systemTheme.addEventListener('change', event => {
  if (!root.getAttribute('data-parent-theme')) {
    setTheme(event.matches ? 'dark' : 'light');
  }
});

new MutationObserver(syncParentTheme).observe(root, {
  attributes: true,
  attributeFilter: ['data-parent-theme']
});

buildQuiz();
</script>

<script id="se311-theme-bridge">
(() => {
  const root = document.documentElement;
  const systemTheme = window.matchMedia('(prefers-color-scheme: dark)');

  function setTheme(theme) {
    root.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
  }

  function syncParentTheme() {
    const parentTheme = root.getAttribute('data-parent-theme');
    if (parentTheme === 'dark' || parentTheme === 'light') {
      setTheme(parentTheme);
      return true;
    }
    return false;
  }

  if (!syncParentTheme()) {
    setTheme(systemTheme.matches ? 'dark' : 'light');
  }

  systemTheme.addEventListener('change', (event) => {
    if (!root.getAttribute('data-parent-theme')) {
      setTheme(event.matches ? 'dark' : 'light');
    }
  });

  new MutationObserver(syncParentTheme).observe(root, {
    attributes: true,
    attributeFilter: ['data-parent-theme']
  });
})();
</script>
