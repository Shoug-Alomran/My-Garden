<title>SE311 Midterm Cheat Sheet</title>
<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* THEME TOKENS */
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f8f9fa;
  --bg-card: #ffffff;

  --text-primary: #212529;
  --text-secondary: #6c757d;

  --border-color: #dee2e6;

  --accent: #0d6efd;
  --accent-hover: #0b5ed7;

  --success: #198754;
  --warning: #ffc107;
  --danger: #dc3545;

  --shadow: rgba(0, 0, 0, 0.1);
}

[data-theme="dark"] {
  --bg-primary: #1a1a1a;
  --bg-secondary: #2d2d2d;
  --bg-card: #242424;

  --text-primary: #e9ecef;
  --text-secondary: #adb5bd;

  --border-color: #495057;

  --accent: #4dabf7;
  --accent-hover: #74c0fc;

  --success: #51cf66;
  --warning: #ffd43b;
  --danger: #ff6b6b;

  --shadow: rgba(0, 0, 0, 0.3);
}

/* BASE */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
    Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  transition: all 0.3s ease;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
}

/* HEADER */
header {
  background: var(--bg-card);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 2px 8px var(--shadow);
  margin-bottom: 30px;
  position: sticky;
  top: 10px;
  z-index: 1000;
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 15px;
}

h1 {
  color: var(--accent);
  font-size: 2em;
  margin-bottom: 5px;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 0.9em;
}

.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

button {
  background: var(--accent);
  color: #ffffff;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.3s;
}

button:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
}

/* THEME TOGGLE */
.toggle-switch {
  position: relative;
  width: 60px;
  height: 30px;
  background: var(--border-color);
  border-radius: 15px;
  cursor: pointer;
  transition: background 0.3s;
}

.toggle-switch::after {
  content: "";
  position: absolute;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #ffffff;
  top: 3px;
  left: 3px;
  transition: transform 0.3s;
}

.toggle-switch.active {
  background: var(--accent);
}

.toggle-switch.active::after {
  transform: translateX(30px);
}

/* SEARCH */
.search-box {
  width: 100%;
  max-width: 300px;
  padding: 10px 15px;
  border: 2px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 14px;
}

.search-box:focus {
  outline: none;
  border-color: var(--accent);
}

/* NAV TABS */
.nav-tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  overflow-x: auto;
  padding: 10px 0;
}

.nav-tab {
  background: var(--bg-secondary);
  color: var(--text-primary);
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.3s;
  border: 2px solid transparent;
  font-weight: 600;
}

.nav-tab:hover {
  background: var(--accent);
  color: #ffffff;
}

.nav-tab.active {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent-hover);
}

/* CHAPTERS */
.chapter {
  display: none;
}

.chapter.active {
  display: block;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* SECTIONS */
.section {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px var(--shadow);
  border-left: 4px solid var(--accent);
}

.section h2 {
  color: var(--accent);
  margin-bottom: 15px;
  font-size: 1.5em;
}

.section h3 {
  color: var(--text-primary);
  margin: 15px 0 10px 0;
  font-size: 1.2em;
}

/* SPECIAL BOXES */
.tip-box,
.warning-box,
.exam-tip,
.mnemonic,
.example-box {
  padding: 15px;
  border-radius: 8px;
  margin: 15px 0;
  font-weight: 500;
}

.tip-box {
  background: linear-gradient(135deg, var(--success) 0%, #20c997 100%);
  color: #ffffff;
}

.warning-box {
  background: linear-gradient(135deg, var(--danger) 0%, #f06595 100%);
  color: #ffffff;
}

.exam-tip {
  background: linear-gradient(135deg, #9775fa 0%, #845ef7 100%);
  color: #ffffff;
}

.mnemonic {
  background: linear-gradient(135deg, var(--warning) 0%, #fab005 100%);
  color: #1a1a1a;
  font-size: 1.1em;
}

.example-box {
  background: var(--bg-secondary);
  border-left: 4px solid var(--accent);
}

/* TABLES */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 15px 0;
}

th,
td {
  padding: 12px;
  text-align: left;
  border: 1px solid var(--border-color);
}

th {
  background: var(--accent);
  color: #ffffff;
  font-weight: 600;
}

tr:nth-child(even) {
  background: var(--bg-secondary);
}

/* LISTS */
ul,
ol {
  margin-left: 25px;
  margin-top: 10px;
}

li {
  margin-bottom: 8px;
}

/* HIGHLIGHTS */
.highlight {
  background: var(--warning);
  color: #1a1a1a;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}

code {
  background: var(--bg-secondary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: "Courier New", monospace;
  font-size: 0.9em;
}

strong {
  color: var(--accent);
}

/* RTL SUPPORT */
[dir="rtl"] {
  direction: rtl;
}

[dir="rtl"] .nav-tabs {
  flex-direction: row-reverse;
}

[dir="rtl"] ul,
[dir="rtl"] ol {
  margin-right: 25px;
  margin-left: 0;
}

[dir="rtl"] .section {
  border-left: none;
  border-right: 4px solid var(--accent);
}

[dir="rtl"] .example-box {
  border-left: none;
  border-right: 4px solid var(--accent);
}

/* PRINT */
@media print {
  .controls,
  .nav-tabs,
  button,
  .toggle-switch,
  .search-box {
    display: none !important;
  }

  .chapter {
    display: block !important;
    page-break-after: always;
  }

  header {
    position: relative;
    top: 0;
  }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  h1 {
    font-size: 1.5em;
  }

  .header-content {
    flex-direction: column;
    align-items: stretch;
  }

  .controls {
    justify-content: space-between;
  }

  table {
    font-size: 0.9em;
  }

  .nav-tab {
    font-size: 0.9em;
    padding: 10px 16px;
  }
}
</style>

// State
let currentLang = localStorage.getItem('language') || 'en';
let currentChapter = 1;

// Initialize
function init() {
    const savedTheme = localStorage.getItem('theme') || detectSystemTheme();
    document.documentElement.setAttribute('data-theme', savedTheme);
    if (savedTheme === 'dark') document.getElementById('themeToggle').classList.add('active');
    
    setLanguage(currentLang);
    renderTabs();
    renderChapters();
    showChapter(1);
}

function detectSystemTheme() {
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('language', lang);
    
    const html = document.documentElement;
    html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    html.setAttribute('lang', lang);
    
    const data = content[lang];
    document.getElementById('mainTitle').textContent = data.mainTitle;
    document.getElementById('subtitle').textContent = data.subtitle;
    document.getElementById('printBtn').textContent = data.printBtn;
    document.getElementById('langToggle').textContent = data.langToggle;
    document.getElementById('searchBox').placeholder = data.searchPlaceholder;
    
    renderTabs();
    renderChapters();
    showChapter(currentChapter);
}

function renderTabs() {
    const tabsContainer = document.getElementById('navTabs');
    const data = content[currentLang];
    
    tabsContainer.innerHTML = data.chapters.map((ch, i) => 
        `<div class="nav-tab ${i === 0 ? 'active' : ''}" onclick="showChapter(${ch.id})">${ch.title}</div>`
    ).join('');
}

function renderChapters() {
    const container = document.getElementById('chaptersContainer');
    const data = content[currentLang];
    
    container.innerHTML = data.chapters.map((ch, i) => 
        `<div class="chapter ${i === 0 ? 'active' : ''}" id="chapter${ch.id}">${ch.sections}</div>`
    ).join('');
}

function showChapter(n) {
    currentChapter = n;
    
    document.querySelectorAll('.chapter').forEach(c => c.classList.remove('active'));
    document.getElementById(`chapter${n}`).classList.add('active');
    
    document.querySelectorAll('.nav-tab').forEach((t, i) => {
        t.classList.toggle('active', i + 1 === n);
    });
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Theme toggle
document.getElementById('themeToggle').addEventListener('click', function() {
    const html = document.documentElement;
    const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    this.classList.toggle('active');
});

// Language toggle
document.getElementById('langToggle').addEventListener('click', () => {
    setLanguage(currentLang === 'en' ? 'ar' : 'en');
});

// Search
document.getElementById('searchBox').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    if (term.length < 2) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'block');
        return;
    }
    document.querySelectorAll('.section').forEach(s => {
        s.style.display = s.textContent.toLowerCase().includes(term) ? 'block' : 'none';
    });
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key >= '1' && e.key <= '6') {
        e.preventDefault();
        showChapter(parseInt(e.key));
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
        e.preventDefault();
        document.getElementById('themeToggle').click();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
        e.preventDefault();
        document.getElementById('langToggle').click();
    }
});

// Initialize on load
init();

console.log('🎓 SE311 Loaded! Shortcuts: Ctrl+1-6 (chapters), Ctrl+D (theme), Ctrl+L (language)');
</script>
