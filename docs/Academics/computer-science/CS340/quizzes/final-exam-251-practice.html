<!doctype html>
<html lang="en">

<head>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/favicon.png">
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CS340 Final Exam Practice - Interactive</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #5d667a;
      --line: #d9deea;
      --accent: #2563eb;
      --accent2: #0f766e;
      --good: #087f5b;
      --bad: #b42318;
      --warn: #a15c07;
      --soft: #eef4ff;
      --code: #f3f5f9;
      --shadow: 0 18px 45px rgba(31, 41, 55, .08);
    }

    body.dark {
      color-scheme: dark;
      --bg: #111827;
      --panel: #182235;
      --ink: #eef3ff;
      --muted: #a9b4c7;
      --line: #334155;
      --accent: #7aa2ff;
      --accent2: #5eead4;
      --good: #6ee7b7;
      --bad: #fca5a5;
      --warn: #fbbf24;
      --soft: #172a4a;
      --code: #0f172a;
      --shadow: 0 18px 45px rgba(0, 0, 0, .28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .header {
      position: relative;
      z-index: 2;
      backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      max-width: 1080px;
      margin: auto;
      padding: 18px clamp(16px, 3vw, 30px);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent2);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: .76rem;
    }

    h1 {
      margin: .1rem 0 .2rem;
      font-size: clamp(1.35rem, 2.6vw, 2.35rem);
      line-height: 1.08;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      max-width: 76ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      min-height: 40px;
      box-shadow: 0 1px 0 rgba(0, 0, 0, .03);
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .progress-wrap {
      grid-column: 1/-1;
      display: grid;
      gap: 7px;
    }

    .progress-line {
      height: 10px;
      border-radius: 999px;
      background: var(--line);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .2s ease;
    }

    .progress-meta {
      color: var(--muted);
      font-size: .9rem;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px clamp(16px, 3vw, 30px) 42px;
    }

    .summary {
      display: none;
      margin-bottom: 18px;
      padding: 16px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .summary.show {
      display: block;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 8px;
      padding: 12px;
    }

    .metric b {
      display: block;
      font-size: clamp(1.3rem, 3vw, 2rem);
    }

    .section-title {
      margin: 34px 0 14px;
      font-size: 1rem;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .question {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(16px, 2.2vw, 26px);
      margin: 16px 0;
      box-shadow: var(--shadow);
    }

    .q-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      justify-content: flex-start;
    }

    .q-id {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--accent);
      font-weight: 800;
      border-radius: 8px;
      padding: 5px 9px;
    }

    .q-prompt {
      margin: 0;
      font-weight: 720;
    }

    .note {
      border-left: 4px solid var(--warn);
      background: color-mix(in srgb, var(--warn) 11%, transparent);
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--ink);
      margin: 12px 0;
    }

    .figure {
      margin: 18px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      background: var(--code);
    }

    .image-open {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: #fff;
      cursor: zoom-in;
    }

    .figure img {
      display: block;
      width: 100%;
      height: auto;
      min-width: min(760px, 100%);
      max-height: none;
      object-fit: contain;
      background: #fff;
    }

    .image-open:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
    }

    .figure figcaption {
      padding: 9px 12px;
      color: var(--muted);
      font-size: .9rem;
      border-top: 1px solid var(--line);
    }

    .figure figcaption::after {
      content: "Click image to enlarge";
      float: right;
      color: var(--accent);
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }

    .option {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      cursor: pointer;
      background: color-mix(in srgb, var(--panel) 94%, var(--soft));
      min-height: 48px;
    }

    .option input {
      margin-top: 4px;
    }

    .option:hover {
      border-color: var(--accent);
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--code);
      color: var(--ink);
      margin-top: 12px;
    }

    .feedback {
      display: none;
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .feedback.show {
      display: block;
    }

    .feedback.correct .status {
      color: var(--good);
    }

    .feedback.incorrect .status {
      color: var(--bad);
    }

    .status {
      font-weight: 850;
    }

    .code {
      white-space: pre-wrap;
      overflow: auto;
      background: var(--code);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: .92rem;
    }

    .kwords {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 8px 0;
    }

    .kword {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: .82rem;
      color: var(--muted);
    }

    .kword.hit {
      color: var(--good);
      border-color: color-mix(in srgb, var(--good) 55%, var(--line));
    }

    .kword.miss {
      color: var(--bad);
      border-color: color-mix(in srgb, var(--bad) 55%, var(--line));
    }

    .footer-actions {
      background: transparent;
      border-top: 1px solid var(--line);
      margin: 32px 0 0;
      padding: 22px 0 0;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      grid-template-rows: auto 1fr;
      background: rgba(9, 14, 25, .88);
      padding: clamp(12px, 2vw, 24px);
    }

    .image-modal.show {
      display: grid;
    }

    .image-modal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
      margin-bottom: 12px;
    }

    .image-modal-title {
      margin: 0;
      font-weight: 800;
    }

    .image-modal-close {
      border: 1px solid rgba(255, 255, 255, .35);
      background: rgba(255, 255, 255, .12);
      color: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .image-modal-body {
      min-height: 0;
      overflow: auto;
      border-radius: 8px;
      background: #fff;
    }

    .image-modal-body img {
      display: block;
      width: max(100%, 1200px);
      height: auto;
      max-width: none;
      background: #fff;
    }

    @media (max-width:760px) {
      .header-inner {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .q-head {
        flex-direction: column;
      }

      .footer-actions {
        justify-content: flex-start;
      }

      .figure figcaption::after {
        content: "";
      }
    }

    @media (max-width:460px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .option {
        grid-template-columns: 1fr;
      }
    }
  </style>

<body>
  <header class="header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">CS340 final exam practice</p>
        <h1>Interactive Database Systems Final</h1>
        <p class="sub">Practice version based on the provided exam. Feedback appears under each question after
          submission, with model SQL and written answers where needed.</p>
      </div>
      <div class="actions">
        <button class="btn" id="modeBtn" type="button">Toggle dark mode</button>
        <button class="btn" id="jumpUnanswered" type="button">First unanswered</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-line">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-meta"><span id="progressText">0 answered</span><span id="scoreText">Not submitted</span>
        </div>
      </div>
    </div>
  </header>
  <main>
    <section class="summary" id="summary"></section>
    <form id="examForm"></form>
    <div class="footer-actions">
      <button class="btn primary" id="submitBtn" type="button">Submit exam</button>
      <button class="btn" id="resetBtn" type="button">Reset / retry</button>
    </div>
  </main>
  <div class="image-modal" id="imageModal" aria-hidden="true" role="dialog" aria-label="Expanded diagram viewer">
    <div class="image-modal-bar">
      <p class="image-modal-title" id="imageModalTitle">Diagram</p>
      <button class="image-modal-close" id="imageModalClose" type="button">Close</button>
    </div>
    <div class="image-modal-body">
      <img id="imageModalImg" src="" alt="Expanded diagram" loading="lazy" decoding="async">
    </div>
  </div>
  <script>
    const QUESTIONS = [{ "type": "mcq", "id": "1.1", "section": "Question 1: Core Concepts", "prompt": "Which component of DBMS architecture is responsible for converting logical plans into physical execution plans?", "options": { "A": "Parser", "B": "Query Optimizer", "C": "Execution Engine", "D": "Transaction Manager" }, "answer": "B", "accepted": ["B"], "explanation": "The optimizer chooses an efficient physical execution plan for a parsed logical query plan.", "note": null, "figure": null }, { "type": "mcq", "id": "1.2", "section": "Question 1: Core Concepts", "prompt": "A relation R(A, B, C, D) has functional dependencies A -> B, B -> C, and C -> D. What is a candidate key?", "options": { "A": "A", "B": "AB", "C": "ABC", "D": "ABCD" }, "answer": "A", "accepted": ["A"], "explanation": "A determines B, then C, then D, so A+ = ABCD. No smaller set exists.", "note": null, "figure": null }, { "type": "mcq", "id": "1.3", "section": "Question 1: Core Concepts", "prompt": "Horizontal scaling (scaling out) in NoSQL means:", "options": { "A": "Adding more servers to distribute data and load", "B": "Adding more CPU/RAM to existing servers", "C": "Increasing disk space", "D": "Upgrading to faster hardware" }, "answer": "A", "accepted": ["A"], "explanation": "Horizontal scaling distributes data and workload across multiple machines.", "note": null, "figure": null }, { "type": "mcq", "id": "1.4", "section": "Question 1: Core Concepts", "prompt": "NoSQL databases are commonly used because they:", "options": { "A": "Do not support any data model", "B": "Are slower than relational DBs", "C": "Support flexibility in schema and distributed scalability", "D": "Cannot handle large data" }, "answer": "C", "accepted": ["C"], "explanation": "A major NoSQL motivation is flexible schema design and distributed scale.", "note": null, "figure": null }, { "type": "mcq", "id": "1.5", "section": "Question 1: Core Concepts", "prompt": "Given R(A, B) = {(1,2), (3,4)} and S(B, C) = {(2,5), (6,7)}, what is R natural join S?", "options": { "A": "{(1,2,5)}", "B": "{(1,2,5), (3,4,7)}", "C": "{(2,5)}", "D": "Empty set" }, "answer": "A", "accepted": ["A"], "explanation": "Only B = 2 appears in both relations, producing tuple (A=1, B=2, C=5).", "note": null, "figure": null }, { "type": "mcq", "id": "1.6", "section": "Question 1: Core Concepts", "prompt": "Relational algebra is:", "options": { "A": "The original theoretical foundation for SQL", "B": "A query optimizer", "C": "A query compiler", "D": "A type of DBMS architecture" }, "answer": "A", "accepted": ["A"], "explanation": "Relational algebra is the formal query model that underlies relational query languages.", "note": null, "figure": null }, { "type": "mcq", "id": "1.7", "section": "Question 1: Core Concepts", "prompt": "A database system enforces atomicity and durability but not consistency and isolation. Which scenario is possible?", "options": { "A": "Two transactions see each other's uncommitted changes, leading to dirty reads", "B": "A transaction is partially committed after a system crash", "C": "The database violates a foreign key constraint after a successful transaction", "D": "All of the above" }, "answer": "A", "accepted": ["A", "C"], "explanation": "Missing isolation permits dirty reads; missing consistency could also permit constraint violations. Atomicity makes option B false, so D is false.", "note": "This printed MCQ is ambiguous: both A and C are conceptually possible when isolation and consistency are not enforced.", "figure": null }, { "type": "mcq", "id": "1.8", "section": "Question 1: Core Concepts", "prompt": "In a three-tier database architecture, where does business logic primarily reside?", "options": { "A": "Application/Logic tier", "B": "Presentation tier", "C": "Data tier", "D": "Distributed across all tiers" }, "answer": "A", "accepted": ["A"], "explanation": "The middle/application tier normally contains business rules and application logic.", "note": null, "figure": null }, { "type": "mcq", "id": "1.9", "section": "Question 1: Core Concepts", "prompt": "Which of the following is not a property of a good decomposition in normalization?", "options": { "A": "Lossless join", "B": "Dependency preservation", "C": "Maximum number of relations", "D": "Elimination of redundancy" }, "answer": "C", "accepted": ["C"], "explanation": "Good decomposition aims for lossless join, dependency preservation when possible, and reduced redundancy, not simply more tables.", "note": null, "figure": null }, { "type": "mcq", "id": "1.10", "section": "Question 1: Core Concepts", "prompt": "Denormalization is typically done to:", "options": { "A": "Eliminate data redundancy", "B": "Enforce referential integrity", "C": "Improve query performance at the cost of redundancy", "D": "Achieve higher normal forms" }, "answer": "C", "accepted": ["C"], "explanation": "Denormalization deliberately reintroduces redundancy to reduce joins or speed up read-heavy workloads.", "note": null, "figure": null }, { "type": "mcq", "id": "1.11", "section": "Question 1: Core Concepts", "prompt": "Which scenario is best suited for a document database like MongoDB?", "options": { "A": "Banking transactions requiring strict ACID guarantees", "B": "Content management systems with flexible schemas", "C": "Real-time bidirectional relationships such as social networks", "D": "High-frequency trading systems" }, "answer": "B", "accepted": ["B"], "explanation": "Document databases fit semi-structured content with flexible document shapes.", "note": null, "figure": null }, { "type": "mcq", "id": "1.12", "section": "Question 1: Core Concepts", "prompt": "An OODBMS is most suitable for applications requiring:", "options": { "A": "Complex object structures and behavior", "B": "Only numeric processing", "C": "Simple data types", "D": "Flat tabular records only" }, "answer": "A", "accepted": ["A"], "explanation": "Object-oriented DBMSs are useful when data is naturally represented as complex objects with identity and behavior.", "note": null, "figure": null }, { "type": "mcq", "id": "2.1", "section": "Question 2: ER to Relational Mapping", "prompt": "The User entity has a multivalued composite attribute Interests with sub-attributes music and movies. Which mapping strategy is most normalized and flexible for adding new interests?", "options": { "A": "User_Interests(UserId, interest_type, interest_value) with PK(UserId, interest_type, interest_value)", "B": "User_Music(UserId, music_interest) and User_Movies(UserId, movie_interest)", "C": "User_Interests(UserId, music, movies)", "D": "Interests(interest_id, interest_type, interest_value) and User_Interests(UserId, interest_id)" }, "answer": "D", "accepted": ["D"], "explanation": "A separate Interests lookup plus associative table avoids repeating interest values and supports new interest types flexibly.", "note": null, "figure": { "src": "assets/final-exam-251/social-blogging-er.png", "caption": "Source ER diagram for Question 2, Part 1" } }, { "type": "mcq", "id": "2.2", "section": "Question 2: ER to Relational Mapping", "prompt": "Blog_Posting is a weak entity identified through User -> Blog and Blog -> Blog_Posting. Which schema correctly maps Blog_Posting?", "options": { "A": "Blog_Posting(timestamp, msg) with PK(timestamp)", "B": "Blog_Posting(URL, timestamp, msg) with PK(URL, timestamp) and FK(URL) references Blog(URL)", "C": "Blog_Posting(UserId, URL, timestamp, msg) with PK(UserId, URL, timestamp) and FK(UserId, URL) references Blog(UserId, URL)", "D": "Blog_Posting(PostingId, URL, timestamp, msg) with surrogate PK(PostingId)" }, "answer": "C", "accepted": ["C"], "explanation": "A weak entity key includes the owner key plus its partial key. Under the stated chain, Blog is identified by UserId and URL, so Blog_Posting uses UserId, URL, timestamp.", "note": null, "figure": null }, { "type": "mcq", "id": "2.3", "section": "Question 2: ER to Relational Mapping", "prompt": "Which relational schema maps Friendship and enforces that a user cannot be friends with themselves?", "options": { "A": "Friendship(sender_id, recipient_id, status), PK(sender_id, recipient_id), two FKs to User", "B": "Friendship(friendship_id, sender_id, recipient_id, status), PK(friendship_id), two FKs to User, CHECK(sender_id <> recipient_id)", "C": "Friendship(sender_id, recipient_id, status), PK(sender_id, recipient_id), two FKs to User, CHECK(sender_id <= recipient_id)", "D": "Friendship(sender_id, recipient_id, status), PK(sender_id), two FKs to User, CHECK(sender_id <> recipient_id)" }, "answer": "B", "accepted": ["B"], "explanation": "The self-friend rule requires CHECK(sender_id <> recipient_id). A production design should also add UNIQUE(sender_id, recipient_id) if duplicate pairs are not allowed.", "note": "Option B enforces the self-friend constraint. It would be stronger with an additional unique constraint on sender_id and recipient_id.", "figure": null }, { "type": "mcq", "id": "2.4", "section": "Question 2: ER to Relational Mapping", "prompt": "Announce connects User (1) to Event (N). Event has total participation and User has partial participation. Which implementation is most appropriate?", "options": { "A": "Put nullable announcer_id in Event", "B": "Put NOT NULL announcer_id in Event as FK to User(UserId)", "C": "Put derived event_count in User", "D": "Create Announce(UserId, EventId) with PK(EventId)" }, "answer": "B", "accepted": ["B"], "explanation": "For a 1:N relationship, place the FK on the N side. Total participation of Event means the FK is NOT NULL.", "note": null, "figure": null }, { "type": "mcq", "id": "2.5", "section": "Question 2: ER to Relational Mapping", "prompt": "Has between User and Blog is 1:1. Blog participation is total, User participation is partial, and Blog has dependent weak entities. Which mapping is optimal?", "options": { "A": "Merge User and Blog, making Blog attributes nullable", "B": "Place UserId as NOT NULL FK in Blog; do not merge because Blog has dependent weak entities", "C": "Place URL as nullable FK in User", "D": "Create Has(UserId, URL) as separate table" }, "answer": "B", "accepted": ["B"], "explanation": "For 1:1 with total participation on Blog, a NOT NULL FK in Blog works well. Keeping Blog separate preserves its dependent weak entities.", "note": null, "figure": null }, { "type": "mcq", "id": "2.6", "section": "Question 2: Relational to ER Mapping", "prompt": "BORROW has composite PK {ItemID, BorrowerID, RequestDate}. What does including RequestDate indicate?", "options": { "A": "BORROW is a weak entity identified by ITEM and SWAPPER", "B": "The same swapper can borrow the same item multiple times on different dates", "C": "RequestDate is a partial key of a weak entity BORROW", "D": "There is a ternary relationship among ITEM, SWAPPER, and DATE" }, "answer": "B", "accepted": ["B"], "explanation": "If ItemID and BorrowerID alone are not enough, RequestDate distinguishes repeated borrow requests for the same item and borrower.", "note": null, "figure": { "src": "assets/final-exam-251/relational-to-er-schema.png", "caption": "Source relational schema for Question 2, Part 2" } }, { "type": "mcq", "id": "2.7", "section": "Question 2: Relational to ER Mapping", "prompt": "BORROW has ReturnCondition as a nullable FK referencing CONDITION. In the ER model, this best represents:", "options": { "A": "Total participation of BORROW with CONDITION", "B": "A mandatory attribute of BORROW", "C": "Partial participation of BORROW in a relationship with CONDITION", "D": "CONDITION is a weak entity dependent on BORROW" }, "answer": "C", "accepted": ["C"], "explanation": "A nullable foreign key means a BORROW tuple may exist without a related CONDITION tuple.", "note": null, "figure": null }, { "type": "mcq", "id": "2.8", "section": "Question 2: Relational to ER Mapping", "prompt": "ITEM has OwnerID referencing SWAPPER, and BORROW has BorrowerID referencing SWAPPER. In ER terms, this represents:", "options": { "A": "A recursive relationship on SWAPPER", "B": "Two distinct binary relationships between SWAPPER and ITEM", "C": "A multivalued attribute of ITEM", "D": "SWAPPER participating in two different roles: owner and borrower" }, "answer": "D", "accepted": ["D"], "explanation": "The same entity type SWAPPER plays different roles: owner through ITEM.OwnerID and borrower through BORROW.BorrowerID.", "note": null, "figure": null }, { "type": "mcq", "id": "2.9", "section": "Question 2: Relational to ER Mapping", "prompt": "GROUP_MEMBERSHIP between SWAPPER and SWAPPER_GROUP has cardinality:", "options": { "A": "1:1 because each combination appears once", "B": "1:N from SWAPPER_GROUP to SWAPPER", "C": "M:N because both foreign keys form the composite primary key", "D": "Cannot be determined without instance data" }, "answer": "C", "accepted": ["C"], "explanation": "A bridge table whose primary key is the pair of foreign keys maps a many-to-many relationship.", "note": null, "figure": null }, { "type": "mcq", "id": "2.10", "section": "Question 2: Relational to ER Mapping", "prompt": "ITEM.OwnerID is a NOT NULL FK to SWAPPER. This maps to which ER concept?", "options": { "A": "Total participation of ITEM in the OWNS relationship", "B": "Partial participation of SWAPPER in OWNS", "C": "1:1 cardinality between ITEM and SWAPPER", "D": "Key constraint on OWNS" }, "answer": "A", "accepted": ["A"], "explanation": "Every item must reference an owner, so ITEM participates totally in OWNS.", "note": null, "figure": null }, { "type": "mcq", "id": "2.11", "section": "Question 2: Relational to ER Mapping", "prompt": "A student claims BORROW should be ternary because it references ITEM, SWAPPER, and CONDITION. This interpretation is:", "options": { "A": "Correct, because BORROW connects three entities simultaneously", "B": "Incorrect, because CONDITION is optional and represents return status, not a core participant", "C": "Correct, because all three FKs identify a borrow instance", "D": "Incorrect, because ternary relationships cannot have nullable participants" }, "answer": "B", "accepted": ["B"], "explanation": "The identifying participants are item and borrower plus request date. ReturnCondition is optional status information after return, not a core participant.", "note": null, "figure": null }, { "type": "mcq", "id": "3.1", "section": "Question 3: SQL DDL", "prompt": "To create table BOOK with Book_id primary key and Publisher_name referencing PUBLISHER(Name), which statement is correct?", "options": { "A": "PRIMARY KEY Book_id and FOREIGN KEY Publisher_name REFERENCES PUBLISHER(Name)", "B": "CREATE TABLE BOOK (Book_id INT PRIMARY KEY, Title VARCHAR(100), Publisher_name VARCHAR(50), FOREIGN KEY (Publisher_name) REFERENCES PUBLISHER(Name));", "C": "Publisher_name VARCHAR(50) REFERENCES PUBLISHER", "D": "Publisher_name VARCHAR(50) FOREIGN KEY REFERENCES PUBLISHER(Name), PRIMARY KEY(Book_id)" }, "answer": "B", "accepted": ["B"], "explanation": "The FK column is declared, and the table-level foreign key references PUBLISHER(Name) with correct parentheses.", "note": null, "figure": { "src": "assets/final-exam-251/library-database-schema.png", "caption": "LIBRARY database schema used in Question 3" } }, { "type": "mcq", "id": "3.2", "section": "Question 3: SQL DDL", "prompt": "Which statement removes the foreign key constraint named fk_publisher from BOOK?", "options": { "A": "ALTER TABLE BOOK DROP FOREIGN KEY fk_publisher;", "B": "ALTER TABLE BOOK REMOVE CONSTRAINT fk_publisher;", "C": "ALTER TABLE BOOK DELETE FOREIGN KEY fk_publisher;", "D": "DROP CONSTRAINT fk_publisher FROM BOOK;" }, "answer": "A", "accepted": ["A"], "explanation": "In MySQL-style syntax, DROP FOREIGN KEY constraint_name removes a foreign key constraint.", "note": null, "figure": null }, { "type": "mcq", "id": "3.3", "section": "Question 3: SQL DDL", "prompt": "Rename column Address to Location in LIBRARY_BRANCH.", "options": { "A": "ALTER TABLE LIBRARY_BRANCH RENAME Address TO Location;", "B": "ALTER TABLE LIBRARY_BRANCH CHANGE COLUMN Address Location VARCHAR;", "C": "ALTER TABLE LIBRARY_BRANCH RENAME COLUMN Address TO Location;", "D": "ALTER TABLE LIBRARY_BRANCH ALTER Address RENAME Location;" }, "answer": "C", "accepted": ["C"], "explanation": "Standard syntax is ALTER TABLE table RENAME COLUMN old_name TO new_name.", "note": null, "figure": null }, { "type": "mcq", "id": "3.4", "section": "Question 3: SQL DDL", "prompt": "Create a view AVAILABLE_BOOKS showing books whose total copies across branches is greater than zero.", "options": { "A": "CREATE VIEW AVAILABLE_BOOKS AS SELECT B.Book_id, B.Title, SUM(BC.No_of_copies) AS Total FROM BOOK B JOIN BOOK_COPIES BC ON B.Book_id = BC.Book_id GROUP BY B.Book_id, B.Title HAVING SUM(BC.No_of_copies) > 0;", "B": "CREATE AVAILABLE_BOOKS VIEW AS ... HAVING Total > 0;", "C": "VIEW AVAILABLE_BOOKS CREATE AS ... WHERE SUM(...) > 0;", "D": "CREATE VIEW AVAILABLE_BOOKS FROM ... SELECT ..." }, "answer": "A", "accepted": ["A"], "explanation": "Views use CREATE VIEW name AS SELECT. Aggregate filters belong in HAVING, not WHERE.", "note": null, "figure": null }, { "type": "mcq", "id": "3.5", "section": "Question 3: SQL DDL", "prompt": "Which statement changes BORROWER.Phone from VARCHAR(15) to VARCHAR(20)?", "options": { "A": "ALTER TABLE BORROWER CHANGE Phone VARCHAR(20);", "B": "ALTER TABLE BORROWER MODIFY Phone VARCHAR(20);", "C": "ALTER TABLE BORROWER ALTER COLUMN Phone VARCHAR(20);", "D": "ALTER TABLE BORROWER UPDATE COLUMN Phone TYPE VARCHAR(20);" }, "answer": "B", "accepted": ["B"], "explanation": "In MySQL-style syntax, MODIFY changes a column definition while keeping the name.", "note": null, "figure": null }, { "type": "mcq", "id": "3.6", "section": "Question 3: SQL DDL", "prompt": "Create LIBRARY_BRANCH where Branch_name cannot be NULL or the empty string.", "options": { "A": "Branch_name VARCHAR(50) NOT NULL NO EMPTY", "B": "Branch_name VARCHAR(50) NOT NULL CHECK (Branch_name <> '')", "C": "Branch_name VARCHAR(50) NULL CHECK (LENGTH(Branch_name) > 0)", "D": "Both B and C are correct" }, "answer": "B", "accepted": ["B"], "explanation": "NOT NULL prevents missing names and CHECK prevents empty strings. Option C still allows NULL in many SQL systems because CHECK evaluates UNKNOWN.", "note": null, "figure": null }, { "type": "sql", "id": "3.7", "section": "Question 3: SQL DML", "prompt": "Find borrowers who have never borrowed any book.", "model": "SELECT b.*\nFROM BORROWER b\nWHERE NOT EXISTS (\n  SELECT 1\n  FROM BOOK_LOANS l\n  WHERE l.Card_no = b.Card_no\n);", "keywordGroups": [["select", "from", "borrower"], ["not exists", "left join"], ["book_loans"], ["card_no"]], "figure": null }, { "type": "sql", "id": "3.8", "section": "Question 3: SQL DML", "prompt": "Find the publisher(s) that published the maximum number of books.", "model": "SELECT Publisher_name\nFROM BOOK\nGROUP BY Publisher_name\nHAVING COUNT(*) >= ALL (\n  SELECT COUNT(*)\n  FROM BOOK\n  GROUP BY Publisher_name\n);", "keywordGroups": [["select", "publisher"], ["from", "book"], ["group by"], ["count"], ["having", "all", "max"]], "figure": null }, { "type": "sql", "id": "3.9", "section": "Question 3: SQL DML", "prompt": "Find pairs of borrowers who have borrowed the same book. Return each pair only once.", "model": "SELECT DISTINCT l1.Card_no AS borrower1, l2.Card_no AS borrower2, l1.Book_id\nFROM BOOK_LOANS l1\nJOIN BOOK_LOANS l2\n  ON l1.Book_id = l2.Book_id\n AND l1.Card_no < l2.Card_no;", "keywordGroups": [["book_loans"], ["join"], ["book_id"], ["card_no"], ["<", "distinct"]], "figure": null }, { "type": "sql", "id": "3.10", "section": "Question 3: SQL DML", "prompt": "Find books along with the total copies across all branches.", "model": "SELECT b.Book_id, b.Title, SUM(bc.No_of_copies) AS total_copies\nFROM BOOK b\nJOIN BOOK_COPIES bc ON b.Book_id = bc.Book_id\nGROUP BY b.Book_id, b.Title;", "keywordGroups": [["book"], ["book_copies"], ["join"], ["sum"], ["group by"]], "figure": null }, { "type": "sql", "id": "3.11", "section": "Question 3: SQL DML", "prompt": "Complete the query to find book-branch combinations with copies exceeding the average.", "model": "SELECT Book_id, Branch_id, No_of_copies\nFROM BOOK_COPIES\nWHERE No_of_copies > (\n  SELECT AVG(No_of_copies)\n  FROM BOOK_COPIES\n)\nORDER BY No_of_copies DESC;", "keywordGroups": [["select", "book_id", "branch_id", "no_of_copies"], ["from", "book_copies"], ["where"], ["avg"], ["order by"]], "figure": null }, { "type": "mcq", "id": "4.1", "section": "Question 4: ER and EER", "prompt": "Paper has relationships with Author (n:1) and Periodical (n:1). What can we infer about a Paper?", "options": { "A": "A Paper can exist without any Author or Periodical", "B": "A Paper has association with many Authors and exactly one Periodical", "C": "A Paper can have only one Author", "D": "A Paper can appear in multiple Periodicals" }, "answer": "B", "accepted": ["B"], "explanation": "Reading the shown cardinalities, a paper can be associated with many authors and one periodical.", "note": null, "figure": { "src": "assets/final-exam-251/library-management-er.png", "caption": "Library management ER diagram used in Question 4" } }, { "type": "mcq", "id": "4.2", "section": "Question 4: ER and EER", "prompt": "Tag has n:n relationships with both Book and Periodical. Which statement best describes Tag?", "options": { "A": "Tag is a weak entity dependent on Book and Periodical", "B": "Tag is a categorization/classification mechanism shared across publication types", "C": "Each Tag belongs to exactly one Book or Periodical", "D": "Tag should be a relationship attribute, not an entity" }, "answer": "B", "accepted": ["B"], "explanation": "A shared Tag entity supports many-to-many classification of both books and periodicals.", "note": null, "figure": null }, { "type": "mcq", "id": "4.3", "section": "Question 4: ER and EER", "prompt": "Why might the designer use two separate Borrow relationships instead of a generalized BorrowableItem superclass?", "options": { "A": "To allow different attributes/constraints for borrowing different item types", "B": "Because ER diagrams cannot represent generalization of relationships", "C": "To improve query performance", "D": "This is always a modeling flaw" }, "answer": "A", "accepted": ["A"], "explanation": "Separate relationships can represent different rules, attributes, or constraints for books and periodicals.", "note": null, "figure": null }, { "type": "mcq", "id": "4.4", "section": "Question 4: ER and EER", "prompt": "Author has only Id and Name. To track an author affiliation, what ER modification is needed?", "options": { "A": "Add affiliation as an attribute to Author", "B": "Create a new entity Affiliation", "C": "Add affiliation to the Has relationship", "D": "Create weak entity AuthorAffiliation" }, "answer": "A", "accepted": ["A"], "explanation": "If each author has one simple affiliation value, an Author attribute is enough. A separate entity is only needed for richer or multiple affiliations.", "note": null, "figure": null }, { "type": "mcq", "id": "4.5", "section": "Question 4: ER and EER", "prompt": "If a new Paper is added, based on the shown cardinalities, which associations are mandatory?", "options": { "A": "Only Author association is mandatory", "B": "Only Periodical association is mandatory", "C": "Both Author and Periodical associations are mandatory", "D": "Neither is mandatory" }, "answer": "C", "accepted": ["C"], "explanation": "The diagram and question wording imply Paper must be connected to both its author side and its containing periodical.", "note": null, "figure": null }, { "type": "mcq", "id": "4.6", "section": "Question 4: ER and EER", "prompt": "Borrow between User and Book is n:n. To ensure a User cannot borrow the same Book twice simultaneously, what does this imply?", "options": { "A": "Change the relationship to 1:n", "B": "Add a constraint not fully expressed in basic ER notation", "C": "Change cardinality to 1:1", "D": "Add only a Status attribute" }, "answer": "B", "accepted": ["B"], "explanation": "This is a temporal/business rule, usually enforced by a key or assertion over active loans rather than simple cardinality alone.", "note": null, "figure": null }, { "type": "diagram", "id": "4.7", "section": "Question 4: EER Design", "prompt": "Design an EER hierarchy that removes redundancy by creating Publication, adds Thesis, allows overlap, requires every publication to be in at least one subclass, and moves shared relationships upward.", "model": "Create superclass Publication with common attributes such as PublicationId, Title, Year, and possibly ISBN/identifier when shared. Make Book, Periodical, and Thesis subclasses. Thesis has Degree, University, Advisor, and DefenseDate. The specialization is total and overlapping: every Publication must be at least one subtype, and a Publication may belong to more than one subtype if the domain allows it. Move relationships shared by Book and Periodical, such as Borrow by User, Has Tag, and Has Publisher, to Publication. Keep subtype-specific relationships such as Periodical containing Paper at the Periodical level.", "keywordGroups": [["publication", "superclass"], ["book", "periodical", "thesis"], ["degree", "university", "advisor", "defensedate"], ["total"], ["overlap", "overlapping"], ["borrow", "tag", "publisher"]], "figure": null }, { "type": "diagram", "id": "4.8", "section": "Question 4: EER Design", "prompt": "Allow users to borrow both Publications and Equipment through a unified borrowing system. Equipment and Publication share no common attributes, but share borrowable behavior. Not all items must be borrowable.", "model": "Use a category/union type or shared role entity named BorrowableItem whose superclasses are Publication and Equipment. Equipment has EquipmentId, Name, SerialNumber, PurchaseDate, and Condition. Because not all Publications or Equipment are borrowable, membership in BorrowableItem is partial. Relate User to BorrowableItem through Borrow, with attributes BorrowDate, DueDate, ItemType, and ItemName. ItemType can identify whether the borrowed item came from Publication or Equipment; ItemName may be derived from the source item.", "keywordGroups": [["category", "union", "borrowableitem"], ["publication", "equipment"], ["partial"], ["borrowdate", "duedate"], ["itemtype", "itemname"], ["user", "borrow"]], "figure": null }, { "type": "diagram", "id": "4.9", "section": "Question 4: EER Design", "prompt": "Authors can be Individual Authors or Organizational Authors. Some Individual Authors are also Users. Model this using EER constructs.", "model": "Model Author as a category or superclass with two disjoint subtypes: IndividualAuthor and OrganizationalAuthor. IndividualAuthor has PId, BirthDate, Nationality, and ORCID. OrganizationalAuthor has Id, FoundedYear, Headquarters, and Type. Since some IndividualAuthors are also Users, create an overlapping relationship/category between IndividualAuthor and User, or model Person as a shared superclass with User and IndividualAuthor as overlapping roles/subclasses.", "keywordGroups": [["author"], ["individualauthor", "organizationalauthor"], ["disjoint"], ["pid", "birthdate", "nationality", "orcid"], ["foundedyear", "headquarters", "type"], ["user", "overlap"]], "figure": null }, { "type": "mcq", "id": "5.1", "section": "Question 5: Normalization", "prompt": "For R(CustomerID, CustomerName, SaleID, SaleDate, ProductID, ProductName, RegionID, RegionName), which is a valid candidate key?", "options": { "A": "(CustomerID, SaleID)", "B": "(SaleID)", "C": "(CustomerID, ProductID)", "D": "(SaleID, RegionID)" }, "answer": "A", "accepted": ["A"], "explanation": "CustomerID gives CustomerName; SaleID gives ProductID; ProductID gives ProductName; the pair CustomerID, SaleID gives SaleDate and RegionID, and RegionID gives RegionName.", "note": null, "figure": null }, { "type": "written", "id": "5.2", "section": "Question 5: Normalization", "prompt": "Show that there is or is not a second candidate key.", "model": "There is no second candidate key from the given FDs. SaleID alone determines ProductID and ProductName, but not CustomerID, CustomerName, SaleDate, RegionID, or RegionName. CustomerID alone determines only CustomerName. ProductID and RegionID determine only their descriptive names. The only minimal set that determines all attributes is (CustomerID, SaleID).", "keywordGroups": [["no second", "only"], ["candidate key"], ["customerid"], ["saleid"], ["closure", "determines"]], "figure": null }, { "type": "written", "id": "5.3", "section": "Question 5: Normalization", "prompt": "Decompose R to BCNF and show the main steps.", "model": "One BCNF decomposition is:\nR1(CustomerID, CustomerName) for CustomerID -> CustomerName\nR2(ProductID, ProductName) for ProductID -> ProductName\nR3(RegionID, RegionName) for RegionID -> RegionName\nR4(SaleID, ProductID) for SaleID -> ProductID\nR5(CustomerID, SaleID, SaleDate, RegionID) where (CustomerID, SaleID) is the key.\nEach determinant in these relations is a key, so the result is in BCNF.", "keywordGroups": [["customerid", "customername"], ["productid", "productname"], ["regionid", "regionname"], ["saleid", "productid"], ["customerid", "saleid", "saledate", "regionid"], ["bcnf"]], "figure": null }, { "type": "mcq", "id": "5.4", "section": "Question 5: Normalization", "prompt": "Which of the following is part of the BCNF final decomposition?", "options": { "A": "R(CustomerID, SaleID, ProductID, SaleDate, RegionID)", "B": "R(CustomerID, SaleID)", "C": "R(SaleID, ProductID, SaleDate)", "D": "R(CustomerID, ProductID)" }, "answer": "A", "accepted": ["A"], "explanation": "Strictly applying FD5 means A still violates BCNF because SaleID -> ProductID and SaleID is not a superkey. So none of the listed options is fully correct; A is the closest expected exam choice before splitting SaleID -> ProductID.", "note": "Concept note: a fully correct BCNF answer should include R4(SaleID, ProductID) and R5(CustomerID, SaleID, SaleDate, RegionID), so this printed MCQ is not ideal.", "figure": null }, { "type": "mcq", "id": "5.5", "section": "Question 5: Normalization", "prompt": "Which option exhibits an insert anomaly?", "options": { "A": "R(CustomerID, RegionID, RegionName)", "B": "R(CustomerID, SaleID)", "C": "R(SaleID, ProductID, SaleDate)", "D": "R(CustomerID, ProductID)" }, "answer": "A", "accepted": ["A"], "explanation": "Because RegionName depends on RegionID, storing it only with CustomerID makes it hard to insert a new region unless a customer row exists.", "note": null, "figure": null }, { "type": "mcq", "id": "5.7", "section": "Question 5: MongoDB", "prompt": "Which query returns all orders where status is shipped?", "options": { "A": "db.orders.find({status: \"shipped\"})", "B": "db.orders.find({\"orders.status\": \"shipped\"})", "C": "db.orders.find({$status: \"shipped\"})", "D": "db.orders.find({status: {$eq: [\"shipped\"]}})" }, "answer": "A", "accepted": ["A"], "explanation": "status is a top-level scalar field, so match it directly.", "note": null, "figure": null }, { "type": "mcq", "id": "5.8", "section": "Question 5: MongoDB", "prompt": "Which query returns all orders that do not contain any item with product Mouse?", "options": { "A": "db.orders.find({\"items.product\": {$nin: [\"Mouse\"]}})", "B": "db.orders.find({product: {$nin: [\"Mouse\"]}})", "C": "db.orders.find({\"items\": {$nin: [\"Mouse\"]}})", "D": "db.orders.find({\"items.product\": \"Mouse\"}, {$nin: true})" }, "answer": "A", "accepted": ["A"], "explanation": "Using dot notation on items.product with $nin excludes documents where the array contains Mouse. {$not: {$elemMatch: {product:\"Mouse\"}}} is another robust form.", "note": null, "figure": null }, { "type": "mcq", "id": "5.9", "section": "Question 5: MongoDB", "prompt": "Which query selects orders that are shipped and made by a VIP customer?", "options": { "A": "db.orders.find({status: \"shipped\", \"customer.vip\": true})", "B": "db.orders.find({\"status.shipped\": true, \"vip\": true})", "C": "db.orders.find({$and: [{shipped: true}, {\"customer.vip\": true}]})", "D": "db.orders.find({status: {$eq: [\"shipped\"]}, vip: true})" }, "answer": "A", "accepted": ["A"], "explanation": "status is top-level, and customer.vip is a nested field addressed with dot notation.", "note": null, "figure": null }, { "type": "mcq", "id": "5.10", "section": "Question 5: MongoDB", "prompt": "Which aggregation pipeline returns total revenue per product, sorted highest to lowest?", "options": { "A": "Group by $items.product and sum $items.price, then sort", "B": "Group by $items.product and sum $multiply of qty and price, then sort", "C": "Project product and revenue, then sort", "D": "Unwind items, use $sum as a stage, then sort" }, "answer": "B", "accepted": ["B"], "explanation": "The correct idea is group revenue by product using qty * price, but a fully correct MongoDB pipeline must first unwind items, then group and sort.", "note": "A fully correct pipeline is: [{$unwind:\"$items\"}, {$group:{_id:\"$items.product\", total:{$sum:{$multiply:[\"$items.qty\",\"$items.price\"]}}}}, {$sort:{total:-1}}]. Option B is closest but incomplete without $unwind.", "figure": null }];

      QUESTIONS.forEach((q, idx) => {
        if (q.section !== current) { current = q.section; form.insertAdjacentHTML('beforeend', `<h2 class="section-title">${escapeHtml(current)}</h2>`); }
        const fig = q.figure ? `<figure class="figure"><button class="image-open" type="button" data-src="${q.figure.src}" data-caption="${escapeHtml(q.figure.caption)}" aria-label="Open larger view of ${escapeHtml(q.figure.caption)}"><img src="${q.figure.src}" alt="${escapeHtml(q.figure.caption)}" loading="lazy" decoding="async"></button><figcaption>${escapeHtml(q.figure.caption)}</figcaption></figure>` : '';
        const note = q.note ? `<div class="note">${escapeHtml(q.note)}</div>` : '';
        let body = '';
        if (q.type === 'mcq') {
          body = `<div class="options">${Object.entries(q.options).map(([k, v]) => `<label class="option"><input type="radio" name="${q.id}" value="${k}"><span><b>${k}.</b> ${escapeHtml(v)}</span></label>`).join('')}</div>`;
        } else {
          const ph = q.type === 'sql' ? 'Type your SQL query here...' : q.type === 'diagram' ? 'Type the entities, relationships, cardinalities, constraints, and EER constructs here...' : 'Type your answer here...';
          body = `<textarea name="${q.id}" placeholder="${ph}"></textarea>`;
        }
        form.insertAdjacentHTML('beforeend', `<article class="question" id="q-${q.id.replaceAll('.', '-')}" data-qid="${q.id}"><div class="q-head"><span class="q-id">${q.id}</span><p class="q-prompt">${escapeHtml(q.prompt)}</p></div>${note}${fig}${body}<div class="feedback" id="fb-${q.id.replaceAll('.', '-')}"></div></article>`);
      });
    }
    function getAnswer(q) {
      if (q.type === 'mcq') { const el = form.querySelector(`input[name="${CSS.escape(q.id)}"]:checked`); return el ? el.value : ''; }
      const ta = form.querySelector(`textarea[name="${CSS.escape(q.id)}"]`); return ta ? ta.value.trim() : '';
    }
    function normalize(s) { return String(s).toLowerCase().replace(/[“”]/g, '"').replace(/[‘’]/g, "'").replace(/[_\s]+/g, ' ').trim(); }
    function hasTerm(text, term) {
      const t = normalize(text); const x = normalize(term);
      if (['<', '>', '<=', '>=', '<>'].includes(term)) return text.includes(term);
      return t.includes(x);
    }
    function gradeKeywords(q, answer) {
      let hits = [];
      q.keywordGroups.forEach((group, i) => {
        const ok = group.some(term => hasTerm(answer, term));
        hits.push({ label: group.join(' / '), ok });
      });
      const count = hits.filter(h => h.ok).length;
      const total = hits.length;
      return { score: total ? count / total : 0, count, total, hits };
    }
    function feedbackFor(q) {
      const ans = getAnswer(q);
      if (q.type === 'mcq') {
        const ok = q.accepted.includes(ans);
        const correctText = q.accepted.length > 1 ? q.accepted.join(' or ') : q.answer;
        return { score: ok ? 1 : 0, possible: 1, ok, html: `<p class="status">${ok ? 'Correct' : 'Incorrect'}</p><p><b>Your answer:</b> ${escapeHtml(ans || 'No answer')}</p><p><b>Correct answer:</b> ${escapeHtml(correctText)}</p><p>${escapeHtml(q.explanation)}</p>` };
      }
      const g = gradeKeywords(q, ans);
      const ok = g.score >= .75;
      const chips = g.hits.map(h => `<span class="kword ${h.ok ? 'hit' : 'miss'}">${h.ok ? 'Included:' : 'Missing:'} ${escapeHtml(h.label)}</span>`).join('');
      const label = q.type === 'sql' ? 'Model SQL' : q.type === 'diagram' ? 'Model diagram explanation' : 'Model answer';
      return { score: g.score, possible: 1, ok, html: `<p class="status">${ok ? 'Mostly correct' : 'Needs work'}</p><p><b>Keyword credit:</b> ${g.count} / ${g.total}</p><div class="kwords">${chips}</div><p><b>${label}:</b></p><pre class="code">${escapeHtml(q.model)}</pre>` };
    }
    function updateProgress() {
      const answered = QUESTIONS.filter(q => getAnswer(q)).length;
      const pct = Math.round(answered / QUESTIONS.length * 100);
      progressBar.style.width = pct + '%';
      progressText.textContent = `${answered} of ${QUESTIONS.length} answered`;
    }
    function submitExam() {
      submitted = true;
      let earned = 0, possible = 0, mcqEarned = 0, mcqTotal = 0, writtenEarned = 0, writtenTotal = 0;
      QUESTIONS.forEach(q => {
        const fb = feedbackFor(q);
        earned += fb.score; possible += fb.possible;
        if (q.type === 'mcq') { mcqEarned += fb.score; mcqTotal += 1; } else { writtenEarned += fb.score; writtenTotal += 1; }
        const el = document.getElementById(`fb-${q.id.replaceAll('.', '-')}`);
        el.className = `feedback show ${fb.ok ? 'correct' : 'incorrect'}`;
        el.innerHTML = fb.html;
      });
      const pct = Math.round((earned / possible) * 100);
      scoreText.textContent = `Score: ${earned.toFixed(1)} / ${possible} (${pct}%)`;
      summary.className = 'summary show';
      summary.innerHTML = `<h2>Score summary</h2><p>This score uses exact grading for MCQ/true-false and flexible keyword grading for SQL, diagram, and written questions.</p><div class="summary-grid"><div class="metric"><b>${pct}%</b>Total</div><div class="metric"><b>${earned.toFixed(1)}/${possible}</b>Points</div><div class="metric"><b>${mcqEarned}/${mcqTotal}</b>MCQ</div><div class="metric"><b>${writtenEarned.toFixed(1)}/${writtenTotal}</b>Written/SQL</div></div>`;
      summary.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    function resetExam() {
      form.reset(); submitted = false; scoreText.textContent = 'Not submitted'; summary.className = 'summary'; summary.innerHTML = '';
      document.querySelectorAll('.feedback').forEach(el => { el.className = 'feedback'; el.innerHTML = ''; });
      updateProgress(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function firstUnanswered() {
      const q = QUESTIONS.find(x => !getAnswer(x));
      if (q) document.getElementById(`q-${q.id.replaceAll('.', '-')}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    document.getElementById('submitBtn').addEventListener('click', submitExam);
    document.getElementById('resetBtn').addEventListener('click', resetExam);
    document.getElementById('jumpUnanswered').addEventListener('click', firstUnanswered);
    document.getElementById('modeBtn').addEventListener('click', () => document.body.classList.toggle('dark'));
    const imageModal = document.getElementById('imageModal');
    const imageModalImg = document.getElementById('imageModalImg');
    const imageModalTitle = document.getElementById('imageModalTitle');
    const imageModalClose = document.getElementById('imageModalClose');
    function openImageModal(src, caption) {
      imageModalImg.src = src;
      imageModalImg.alt = caption;
      imageModalTitle.textContent = caption;
      imageModal.classList.add('show');
      imageModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      imageModalClose.focus();
    }
    function closeImageModal() {
      imageModal.classList.remove('show');
      imageModal.setAttribute('aria-hidden', 'true');
      imageModalImg.src = '';
      document.body.style.overflow = '';
    }
    form.addEventListener('click', (event) => {
      const trigger = event.target.closest('.image-open');
      if (!trigger) return;
      openImageModal(trigger.dataset.src, trigger.dataset.caption);
    });
    imageModalClose.addEventListener('click', closeImageModal);
    imageModal.addEventListener('click', (event) => {
      if (event.target === imageModal) closeImageModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && imageModal.classList.contains('show')) closeImageModal();
    });
    form.addEventListener('input', updateProgress);
    form.addEventListener('change', updateProgress);
    render(); updateProgress();
  </script>
</body>
