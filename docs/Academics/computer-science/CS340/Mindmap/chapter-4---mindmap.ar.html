        .subtitle {

            font-size: 1.2rem;
        }

        .node {
            margin-bottom: 1rem;
        }

            background: linear-gradient(135deg, #2563eb, #1e40af);
            border-right: 4px solid #60a5fa;
            border-left: none;
            padding: 1.2rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            user-select: none;
        }

        .node-header:hover {
            transform: translateX(-5px) scale(1.01);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .node-header:active {
            transform: translateX(-3px) scale(0.99);
        }

        .node.level-1 .node-header {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border-right-color: #38bdf8;
            margin-right: 2rem;
            margin-left: 0;
        }

        .node.level-2 .node-header {
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            border-right-color: #22d3ee;
            margin-right: 4rem;
            margin-left: 0;
        }

        .icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .chevron {
            margin-right: auto;
            margin-left: 0;
            transition: transform 0.3s ease;
            font-size: 1.2rem;
            font-weight: bold;
            color: #93c5fd;
        }

        .node.open .chevron {
            transform: rotate(-90deg);
        }

        .node-title {
            font-size: 1.15rem;
            font-weight: 600;
            flex: 1;
            letter-spacing: 0.02em;
        }

        .node-content {
            display: none;
            margin-right: 2rem;
            margin-left: 0;
            margin-top: 1rem;
            animation: slideDown 0.3s ease;
        }

        .node.open .node-content {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

            background: #1e293b;

            border-radius: 0.5rem;
            padding: 1rem;

        .content-title.pink { color: #f472b6; }

            content: "•";
            color: #60a5fa;
            font-weight: bold;
            position: absolute;
            right: 0;
            left: auto;
        }

        .diagram-box {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #fbbf24;
            border-radius: 0.5rem;
            padding: 1rem;

            border-radius: 0.25rem;
            color: #60a5fa;

        function box(b) {
            if (b.isDiagram) {
                return `<div class="diagram-box"><div class="diagram-title">📊 ${b.title}</div><div class="diagram-content">${b.content}</div></div>`;
            }
            return `<div class="content-box"><div class="content-title ${b.color||''}">${b.title}</div><ul class="content-list">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
        }

        function node(n) {
            const show = (n.children && n.children.length) || (n.content && n.content.length);
            let h = `<div class="node level-${n.level} ${n.open?'open':''}" data-id="${Math.random()}"><div class="node-header">`;
            if (show) h += '<span class="chevron">▶</span>';
            h += `<span class="icon">${n.icon}</span><span class="node-title">${n.title}</span></div><div class="node-content">`;
            if (n.content) h += n.content.map(box).join('');
            if (n.children) h += n.children.map(node).join('');
            return h + '</div></div>';
        }

        document.getElementById('mindmap').innerHTML = data.map(node).join('');
        document.querySelectorAll('.node-header').forEach(h => {
            h.addEventListener('click', e => {
                e.currentTarget.parentElement.classList.toggle('open');
            });
