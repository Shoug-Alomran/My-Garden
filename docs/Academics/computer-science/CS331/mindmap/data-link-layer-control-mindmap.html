<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Data Link Layer Control Mind Map</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel2: #1f2937;
            --text: #e5eefc;
            --muted: #94a3b8;
            --line: #334155;
            --accent: #60a5fa;
            --accent2: #22d3ee;
            --root: #172554;
            --node: #1e293b;
            --leaf: #162033;
            --hit: #facc15;
            --shadow: 0 18px 45px rgba(0, 0, 0, .35)
        }

        [data-theme="light"] {
            --bg: #f8fafc;
            --panel: #fff;
            --panel2: #eef2f7;
            --text: #0f172a;
            --muted: #526071;
            --line: #cbd5e1;
            --accent: #2563eb;
            --accent2: #0891b2;
            --root: #dbeafe;
            --node: #fff;
            --leaf: #f8fafc;
            --hit: #ca8a04;
            --shadow: 0 18px 45px rgba(15, 23, 42, .12)
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at 12% 18%, rgba(96, 165, 250, .14), transparent 28%), var(--bg);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif
        }

        button,
        input {
            font: inherit
        }

        #toolbar {
            position: fixed;
            z-index: 30;
            inset: 0 0 auto 0;
            min-height: 64px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            background: color-mix(in srgb, var(--panel) 88%, transparent);
            backdrop-filter: blur(16px)
        }

        .brand {
            font-weight: 800;
            color: var(--accent);
            min-width: 210px
        }

        .brand span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600
        }

        .search-wrap {
            position: relative;
            width: min(320px, 32vw);
            min-width: 170px
        }

        #searchInput {
            width: 100%;
            height: 38px;
            border: 1px solid var(--line);
            border-radius: 11px;
            background: var(--panel2);
            color: var(--text);
            padding: 0 12px;
            outline: none
        }

        #searchResults {
            position: absolute;
            top: 46px;
            left: 0;
            width: min(420px, 80vw);
            max-height: 340px;
            overflow: auto;
            display: none;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--panel);
            box-shadow: var(--shadow);
            padding: 8px
        }

        .result {
            padding: 10px;
            border-radius: 10px;
            cursor: pointer
        }

        .result:hover {
            background: var(--panel2)
        }

        .result small {
            display: block;
            color: var(--muted)
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
            overflow-x: auto
        }

        .btn {
            height: 38px;
            border: 1px solid var(--line);
            border-radius: 11px;
            background: var(--panel2);
            color: var(--text);
            padding: 0 11px;
            cursor: pointer;
            white-space: nowrap
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        #viewport {
            position: fixed;
            inset: 64px 0 0;
            overflow: hidden;
            cursor: grab
        }

        #viewport.dragging {
            cursor: grabbing
        }

        #world {
            position: absolute;
            transform-origin: 0 0;
            transition: transform .18s ease
        }

        #links {
            position: absolute;
            left: 0;
            top: 0;
            overflow: visible;
            pointer-events: none
        }

        .connector {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.4;
            opacity: .58;
            stroke-linecap: round
        }

        #nodes {
            position: absolute;
            left: 0;
            top: 0
        }

        .node {
            position: absolute;
            width: 250px;
            min-height: 60px;
            border: 1px solid var(--line);
            border-left: 5px solid var(--accent);
            border-radius: 14px;
            background: var(--node);
            box-shadow: var(--shadow);
            padding: 10px 12px;
            cursor: pointer;
            transition: left .28s ease, top .28s ease, transform .16s ease
        }

        .node:hover {
            transform: translateY(-2px)
        }

        .node.root {
            width: 285px;
            min-height: 74px;
            background: var(--root);
            border-left-color: var(--accent2)
        }

        .node.leaf {
            background: var(--leaf);
            border-left-color: var(--accent2)
        }

        .node.active {
            outline: 3px solid rgba(96, 165, 250, .34)
        }

        .node.match {
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--hit) 32%, transparent), var(--shadow)
        }

        .node-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            line-height: 1.25
        }

        .chev {
            width: 20px;
            height: 20px;
            border-radius: 7px;
            background: color-mix(in srgb, var(--accent) 18%, transparent);
            display: inline-grid;
            place-items: center;
            color: var(--accent);
            flex: 0 0 auto;
            transition: transform .2s ease
        }

        .node.expanded .chev {
            transform: rotate(90deg)
        }

        .node-desc {
            margin-top: 5px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.35
        }

        #panel {
            position: fixed;
            z-index: 40;
            top: 78px;
            right: 16px;
            bottom: 16px;
            width: min(430px, calc(100vw - 32px));
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: var(--shadow);
            transform: translateX(calc(100% + 32px));
            transition: transform .25s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        #panel.open {
            transform: translateX(0)
        }

        .panel-head {
            padding: 18px;
            border-bottom: 1px solid var(--line);
            display: flex;
            gap: 12px
        }

        #panelTitle {
            margin: 0;
            font-size: 22px;
            line-height: 1.2;
            flex: 1
        }

        #panelBody {
            padding: 18px;
            overflow: auto;
            line-height: 1.65
        }

        .hint {
            position: fixed;
            left: 16px;
            bottom: 16px;
            color: var(--muted);
            background: color-mix(in srgb, var(--panel) 88%, transparent);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 12px;
            font-size: 12px
        }

        @media(max-width:900px) {
            #toolbar {
                flex-wrap: wrap
            }

            #viewport {
                top: 112px
            }

            .actions {
                width: 100%;
                margin-left: 0
            }
        }
    </style>
</head>

<body>
    <div id="toolbar">
        <div class="brand">Data Link Layer Control<span>CS331 chapter mind map</span></div>
        <div class="search-wrap"><input id="searchInput" type="search" placeholder="Search this chapter...">
            <div id="searchResults"></div>
        </div>
        <div class="actions"><button class="btn" id="zoomIn">+</button><button class="btn"
                id="zoomOut">-</button><button class="btn" id="resetView">Reset View</button><button class="btn"
                id="expandAll">Expand All</button><button class="btn" id="collapseAll">Collapse All</button><button
                class="btn" id="exportPng">Export PNG</button><button class="btn" id="themeToggle">Light</button></div>
    </div>
    <main id="viewport">
        <div id="world"><svg id="links" width="2600" height="1600"></svg>
            <div id="nodes"></div>
        </div>
    </main>
    <aside id="panel">
        <div class="panel-head">
            <h2 id="panelTitle"></h2><button class="btn" id="closePanel">x</button>
        </div>
        <div id="panelBody"></div>
    </aside>
    <div class="hint">Drag to pan. Click branches to expand. Click final nodes for explanations.</div>
    <script>
        const mindMapData = { "id": "data-link-layer-control", "title": "Data Link Layer Control", "summary": "Framing, addressing, error detection, error correction, and link-level reliability concepts.", "description": "<p>Framing, addressing, error detection, error correction, and link-level reliability concepts.</p>", "children": [{ "id": "data-link-layer-control-1", "title": "DLL Services", "summary": "Framing/deframing, addressing, error control, and flow control. LAN layer-2 addresses are commo...", "description": "<p>Framing/deframing, addressing, error control, and flow control. LAN layer-2 addresses are commonly called MAC addresses.</p>" }, { "id": "data-link-layer-control-2", "title": "Framing", "summary": "The data-link layer packs bits into frames so one unit can be distinguished from another. A fra...", "description": "<p>The data-link layer packs bits into frames so one unit can be distinguished from another. A frame is like an envelope around a letter.</p>" }, { "id": "data-link-layer-control-3", "title": "Byte Stuffing", "summary": "In character-oriented framing, an ESC byte is inserted when a flag byte appears in the data.", "description": "<p>In character-oriented framing, an ESC byte is inserted when a flag byte appears in the data.</p>" }, { "id": "data-link-layer-control-4", "title": "Bit Stuffing", "summary": "In bit-oriented framing, one 0 is inserted after five consecutive 1s to prevent data from looki...", "description": "<p>In bit-oriented framing, one 0 is inserted after five consecutive 1s to prevent data from looking like the flag pattern.</p>" }, { "id": "data-link-layer-control-5", "title": "Single-Bit vs Burst Error", "summary": "Single-bit means one bit changes. Burst error means two or more bits change across a span; chan...", "description": "<p>Single-bit means one bit changes. Burst error means two or more bits change across a span; changed bits do not have to be consecutive.</p>" }, { "id": "data-link-layer-control-6", "title": "Parity", "summary": "Simple parity adds one redundant bit. It detects all single-bit errors and detects burst errors...", "description": "<p>Simple parity adds one redundant bit. It detects all single-bit errors and detects burst errors only when an odd number of bits changes.</p>" }, { "id": "data-link-layer-control-7", "title": "Two-Dimensional Parity", "summary": "A block is divided into rows and parity is added by row and column for stronger detection.", "description": "<p>A block is divided into rows and parity is added by row and column for stronger detection.</p>" }, { "id": "data-link-layer-control-8", "title": "CRC", "summary": "Cyclic Redundancy Check uses a generator polynomial shared by sender and receiver. It is strong...", "description": "<p>Cyclic Redundancy Check uses a generator polynomial shared by sender and receiver. It is strong for burst-error detection.</p>" }, { "id": "data-link-layer-control-9", "title": "Checksum", "summary": "The sender divides data into words, adds them using one’s complement arithmetic, complements th...", "description": "<p>The sender divides data into words, adds them using one’s complement arithmetic, complements the sum, and sends it as a checksum.</p>" }, { "id": "data-link-layer-control-10", "title": "Error Correction", "summary": "Correction can use retransmission, forward error correction, or interleaving for burst errors.", "description": "<p>Correction can use retransmission, forward error correction, or interleaving for burst errors.</p>" }] };
        const state = { expanded: new Set([mindMapData.id]), active: mindMapData.id, matches: new Set(), scale: 1, panX: 80, panY: 120, dragging: false, lastX: 0, lastY: 0 }; const viewport = document.getElementById('viewport'), world = document.getElementById('world'), nodesEl = document.getElementById('nodes'), linksEl = document.getElementById('links'), panel = document.getElementById('panel'), panelTitle = document.getElementById('panelTitle'), panelBody = document.getElementById('panelBody'), searchInput = document.getElementById('searchInput'), searchResults = document.getElementById('searchResults'); const nodeMap = new Map(), parentMap = new Map(), layout = new Map(), C = { xGap: 330, yGap: 92, nodeW: 250, rootW: 285 }; function index(n, p = null, d = 0) { n.depth = d; nodeMap.set(n.id, n); if (p) parentMap.set(n.id, p.id); (n.children || []).forEach(c => index(c, n, d + 1)); } function leaf(n) { return !n.children || !n.children.length } function exp(n) { return state.expanded.has(n.id) } function tree(n, d = 0, c = { y: 0 }) { let y; if (exp(n) && !leaf(n)) { const ys = n.children.map(ch => tree(ch, d + 1, c)); y = (Math.min(...ys) + Math.max(...ys)) / 2 } else { y = c.y; c.y += C.yGap } layout.set(n.id, { x: d * C.xGap, y, depth: d }); return y } function visible(n = mindMapData, a = []) { a.push(n); if (exp(n) && n.children) n.children.forEach(ch => visible(ch, a)); return a } function conns(n = mindMapData, a = []) { if (exp(n) && n.children) n.children.forEach(ch => { a.push([n, ch]); conns(ch, a) }); return a } function esc(s) { return String(s).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[ch])) } function strip(h) { const d = document.createElement('div'); d.innerHTML = h; return d.textContent || '' } function render() { layout.clear(); tree(mindMapData); const ns = visible(); linksEl.innerHTML = conns().map(([a, b]) => { const pa = layout.get(a.id), pb = layout.get(b.id), aw = a.depth === 0 ? C.rootW : C.nodeW, x1 = pa.x + aw, y1 = pa.y + 30, x2 = pb.x, y2 = pb.y + 30, m = (x1 + x2) / 2; return `<path class="connector" d="M ${x1} ${y1} C ${m} ${y1}, ${m} ${y2}, ${x2} ${y2}"></path>` }).join(''); nodesEl.innerHTML = ns.map(n => { const p = layout.get(n.id), cl = ['node']; if (n.depth === 0) cl.push('root'); if (leaf(n)) cl.push('leaf'); if (exp(n) && !leaf(n)) cl.push('expanded'); if (state.active === n.id) cl.push('active'); if (state.matches.has(n.id)) cl.push('match'); return `<div class="${cl.join(' ')}" data-id="${n.id}" style="left:${p.x}px;top:${p.y}px"><div class="node-title"><span class="chev">${leaf(n) ? 'i' : '›'}</span><span>${esc(n.title)}</span></div><div class="node-desc">${esc(n.summary || '')}</div></div>` }).join(''); nodesEl.querySelectorAll('.node').forEach(el => el.onclick = e => { e.stopPropagation(); select(el.dataset.id, true) }); apply() } function select(id, user = false) { const n = nodeMap.get(id); state.active = id; if (leaf(n)) openPanel(n); else if (user) { state.expanded.has(id) ? state.expanded.delete(id) : state.expanded.add(id); closePanel() } render() } function openPanel(n) { panelTitle.textContent = n.title; panelBody.innerHTML = n.description || `<p>${esc(n.summary || '')}</p>`; panel.classList.add('open') } function closePanel() { panel.classList.remove('open') } function ancestors(id) { const a = []; let c = id; while (parentMap.has(c)) { c = parentMap.get(c); a.push(c) } return a } function focus(id) { ancestors(id).forEach(a => state.expanded.add(a)); state.active = id; render(); const p = layout.get(id), r = viewport.getBoundingClientRect(); state.panX = r.width / 2 - (p.x + 120) * state.scale; state.panY = r.height / 2 - (p.y + 30) * state.scale; apply(); if (leaf(nodeMap.get(id))) openPanel(nodeMap.get(id)) } function apply() { world.style.transform = `translate(${state.panX}px,${state.panY}px) scale(${state.scale})` } function zoom(v) { state.scale = Math.min(1.8, Math.max(.45, v)); apply() } function expandAll() { nodeMap.forEach(n => { if (!leaf(n)) state.expanded.add(n.id) }); render() } function collapseAll() { state.expanded = new Set([mindMapData.id]); closePanel(); render() } function search(q) { q = q.trim().toLowerCase(); state.matches.clear(); searchResults.innerHTML = ''; if (!q) { searchResults.style.display = 'none'; render(); return } const res = []; nodeMap.forEach(n => { if (`${n.title} ${n.summary || ''} ${strip(n.description || '')}`.toLowerCase().includes(q)) { state.matches.add(n.id); res.push(n) } }); searchResults.innerHTML = res.map(n => `<div class="result" data-id="${n.id}"><strong>${esc(n.title)}</strong><small>${esc(n.summary || '')}</small></div>`).join('') || '<div class="result">No matches</div>'; searchResults.style.display = 'block'; searchResults.querySelectorAll('[data-id]').forEach(el => el.onclick = () => { searchResults.style.display = 'none'; focus(el.dataset.id) }); render() } function exportPng() { const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700"><rect width="100%" height="100%" fill="#0f172a"/><text x="40" y="70" fill="#e5eefc" font-family="Arial" font-size="34" font-weight="700">${esc(mindMapData.title)}</text><text x="40" y="115" fill="#94a3b8" font-family="Arial" font-size="18">Export from CS331 chapter mind map</text></svg>`; const img = new Image(), url = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' })); img.onload = () => { const c = document.createElement('canvas'); c.width = 1200; c.height = 700; const x = c.getContext('2d'); x.drawImage(img, 0, 0); URL.revokeObjectURL(url); const a = document.createElement('a'); a.download = 'data-link-layer-control-mindmap.png'; a.href = c.toDataURL('image/png'); a.click() }; img.src = url } function initTheme() { const s = localStorage.getItem('cs331-chapter-mindmap-theme') || 'dark'; document.documentElement.dataset.theme = s; document.getElementById('themeToggle').textContent = s === 'dark' ? 'Light' : 'Dark' } index(mindMapData); render(); initTheme(); document.getElementById('zoomIn').onclick = () => zoom(state.scale + .12); document.getElementById('zoomOut').onclick = () => zoom(state.scale - .12); document.getElementById('resetView').onclick = () => { state.scale = 1; state.panX = 80; state.panY = 120; apply() }; document.getElementById('expandAll').onclick = expandAll; document.getElementById('collapseAll').onclick = collapseAll; document.getElementById('exportPng').onclick = exportPng; document.getElementById('closePanel').onclick = closePanel; document.getElementById('themeToggle').onclick = () => { const n = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'; document.documentElement.dataset.theme = n; localStorage.setItem('cs331-chapter-mindmap-theme', n); document.getElementById('themeToggle').textContent = n === 'dark' ? 'Light' : 'Dark' }; searchInput.oninput = e => search(e.target.value); viewport.onmousedown = e => { if (e.target.closest('.node')) return; state.dragging = true; state.lastX = e.clientX; state.lastY = e.clientY; viewport.classList.add('dragging') }; window.onmousemove = e => { if (!state.dragging) return; state.panX += e.clientX - state.lastX; state.panY += e.clientY - state.lastY; state.lastX = e.clientX; state.lastY = e.clientY; apply() }; window.onmouseup = () => { state.dragging = false; viewport.classList.remove('dragging') }; viewport.addEventListener('wheel', e => { e.preventDefault(); zoom(state.scale + (e.deltaY < 0 ? .08 : -.08)) }, { passive: false });
    </script>
</body>

</html>
