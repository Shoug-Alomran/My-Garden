    <script>
        const DATA = {
            id: 'root', label: 'Ethical Issues\nSA & Software\nEngineering', level: 0,
            children: [
                {
                    id: 'roles', label: 'Roles &\nOverview', level: 1, tag: 'roles',
                    children: [
                        {
                            id: 'sa', label: 'Systems Analyst', level: 2, tag: 'roles', leaf: true,
                            content: '<h4>Definition</h4><p>A business professional who uses analysis and design techniques to solve business problems using information technology.</p><h4>Skills Required</h4><ul><li><strong>Technical</strong> knowledge and skills</li><li><strong>Business</strong> knowledge and skills</li><li><strong>People</strong> knowledge and skills</li></ul><h4>Job Titles</h4><p>Systems analyst, programmer analyst, systems consultant, systems engineer, web developer, and more.'
                        },
                        {
                            id: 'se', label: 'Software Engineer', level: 2, tag: 'roles', leaf: true,
                            content: '<h4>Definition</h4><p>A person who applies the principles of software engineering to the design, development, maintenance, testing, and evaluation of software that makes computers or devices work.</p><h4>SA vs SE</h4><p>Both are heavy technological positions but require different skill sets. If working together, the software engineer would <strong>design and code</strong> an application while the systems analyst would <strong>design and build the hardware</strong> to run it.</p>'
                        },
                        {
                            id: 'ethical-def', label: 'Ethical Behaviour', level: 2, tag: 'roles', leaf: true,
                            content: '<h4>Definition</h4><p>Ethical behaviour refers to how an individual or organization ensures that all its decisions, actions, and stakeholder interactions conform to moral and professional principles.</p><h4>Foundation</h4><p>These principles should support all applicable laws and regulations and form the foundation of an individual\'s or organization\'s culture and values — defining right from wrong.</p><h4>Obligations of a Software Professional</h4><ul><li>Self</li><li>Society / Public</li><li>Colleagues</li><li>Client</li><li>Employer</li><li>Profession</li><li>Product</li></ul>'
                        }
                    ]
                },
                {
                    id: 'problems', label: 'Problems Faced\nby SA / SE', level: 1, tag: 'problems',
                    children: [
                        {
                            id: 'spec', label: 'Software\nSpecification', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>The Problem</h4><p>Most errors found in software can be traced back to requirements shortages — above all, their <strong>incompleteness</strong>.</p><h4>Complete Specifications</h4><p>Software requirements specifications are complete when they can clearly separate software "desirable" behaviour from unwanted program behaviour. Gaps in specification lead to defects later in the lifecycle at far greater cost.</p>'
                        },
                        {
                            id: 'design', label: 'Software Design', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>The Communication Gap</h4><p>When a computer is used, the machine design is typically made by someone who is not an expert in the actual domain.</p><h4>Example</h4><p>An expert on car-brake design determines how brakes should work, but then passes this information to a programmer who is expert in software design — but not in brakes. The programmer then specifies the brakes design. <strong>This extra communication step is the primary problem with software today.</strong></p>'
                        },
                        {
                            id: 'pressure', label: 'Extreme Pressure', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>Time-to-Market Pressure</h4><p>Software companies feel extreme pressure to reduce the time to market for their products — while known bugs go unaddressed.</p><h4>Consequences</h4><ul><li>Resources and time needed to ensure quality are cut.</li><li>Bugs are deliberately shipped to meet deadlines.</li><li>Quality is traded off against speed and cost.</li></ul>'
                        },
                        {
                            id: 'unauth', label: 'Unauthorized\nSoftware', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>The Issue</h4><ul><li>Using open-source code without properly crediting the source.</li><li>Using illegal/pirated software to perform job tasks.</li><li>Difficult to maintain software built on unauthorized components.</li></ul><h4>Ethical Implication</h4><p>Using unauthorized software violates intellectual property rights and exposes the organization to legal liability while creating technical debt that is hard to manage.</p>'
                        },
                        {
                            id: 'changes', label: 'Software Changes', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>What "Software Change" Really Means</h4><p>Software maintenance refers to changes in software design — either to correct a fault or in response to a specification change. This is entirely different from replacing failed hardware, which simply restores original functionality.</p><h4>The Risk</h4><p>The removal of a software fault <strong>represents a change to the system\'s design</strong>. Many recorded examples of so-called "small" fixes have caused serious reductions in system reliability.</p>'
                        },
                        {
                            id: 'staff', label: 'Insufficient\nStaff', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>Contributing Factors</h4><ul><li>Inadequate or no project management methodology</li><li>Bad planning and estimating</li><li>Insufficient senior staff on the team</li></ul><h4>Consequences</h4><p>Software defects in certain systems can have <strong>deadly consequences</strong>. Ethical decisions involving trade-offs between quality, cost, ease-of-use, and time-to-market require extremely serious examination when human lives are at stake.</p>'
                        },
                        {
                            id: 'redlies', label: 'Red Lies', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>Definition</h4><p>Red lies occur during meetings with clients or management when representatives make statements about a product or project that are <strong>known to be untrue</strong>.</p><h4>Example</h4><p>Stating that a project\'s delivery is on schedule to customers when the team already knows they cannot deliver on time.</p>'
                        },
                        {
                            id: 'rug', label: 'Sweep It\nUnder the Rug', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>Definition</h4><p>This syndrome occurs when unforeseen issues arise that could potentially damage a project or company, but to keep things running smoothly, management and/or staff <strong>ignore the issues</strong> in the hope they will vanish.</p><h4>Why It\'s Dangerous</h4><p>Deferred problems almost always grow larger. Ignoring known defects is an ethical failure that may lead to much greater harm down the line.</p>'
                        },
                        {
                            id: 'vacation', label: 'Cancelled\nVacation Syndrome', level: 2, tag: 'problems', leaf: true,
                            content: '<h4>Definition</h4><p>Cancelled vacation syndrome arises when managers pressure staff members at the last minute to cancel planned trips or otherwise sacrifice their personal time — and possibly money through non-refundable reservations — to meet a short-term deadline.</p><h4>Ethical Dimension</h4><p>This is a form of workplace pressure that disrespects employee well-being and personal commitments in favor of business convenience.</p>'
                        }
                    ]
                },
                {
                    id: 'safety', label: 'Safety-Critical\nSystems', level: 1, tag: 'safety',
                    children: [
                        {
                            id: 'sc-def', label: 'Definition', level: 2, tag: 'safety', leaf: true,
                            content: '<h4>What Are Safety-Critical Systems?</h4><p>Systems whose failure may cause <strong>injury or death</strong> are called safety-critical systems. Safe operation relies on the flawless performance of software.</p><h4>Examples</h4><ul><li>Antilock braking systems (ABS)</li><li>Nuclear power plant reactors</li><li>Airplane navigation systems</li><li>Elevators</li><li>Medical devices: MRI, CT Scan, etc.</li></ul>'
                        },
                        {
                            id: 'sc-process', label: 'Development\nProcess', level: 2, tag: 'safety', leaf: true,
                            content: '<h4>Requirements</h4><p>While developing a safety-critical system, the Software Development Process is strongly adhered to and requires:</p><ul><li>Rigorous and time-consuming development process</li><li>More thorough documentation</li><li>Vigilant checking and rechecking</li></ul><h4>Team Roles</h4><ul><li><strong>System safety engineer</strong>: Uses a logging and monitoring system to track hazards from project start to finish.</li><li><strong>Hazard log</strong>: Used to assess how detected hazards have been accounted for.</li></ul>'
                        },
                        {
                            id: 'sc-risk', label: 'Risk Analysis', level: 2, tag: 'safety', leaf: true,
                            content: '<h4>Formal Risk Analysis</h4><p>When designing, building, and operating a safety-critical system, a formal risk analysis must be conducted.</p><h4>What It Considers</h4><ul><li>What can go wrong</li><li>The likelihood and consequences of such occurrences</li><li>How risk can be averted, mitigated, or detected</li><li>How users can be warned of hazards</li></ul>'
                        },
                        {
                            id: 'sc-redundancy', label: 'Redundancy &\nN-Version', level: 2, tag: 'safety', leaf: true,
                            content: '<h4>Redundancy</h4><p>Software should provide multiple interchangeable software components to perform a single function in order to cope with failures and errors.</p><h4>N-Version Programming</h4><p>An approach to minimizing the impact of software errors by independently implementing the same set of user requirements <em>N</em> times.</p><ul><li>Different versions run in parallel.</li><li>If outputs vary, a <strong>"voting algorithm"</strong> determines which result to use.</li><li>Multiple versions are unlikely to fail simultaneously under the same conditions.</li></ul><h4>Emergency Procedures</h4><p>Consequences of failure can be mitigated by devising emergency procedures and evacuation plans.</p>'
                        }
                    ]
                },
                {
                    id: 'integrity', label: 'Integrity\n& Ethics', level: 1, tag: 'ethics',
                    children: [
                        {
                            id: 'int-why', label: 'Why It Matters', level: 2, tag: 'ethics', leaf: true,
                            content: '<h4>Importance</h4><p>Integrity and ethical behavior are crucial to the success of the analyst. Students in IT often underestimate the importance of personal integrity and ethics.</p><h4>Confidentiality Duties</h4><ul><li>Confidentiality of employees\' data in an organization.</li><li>Confidentiality of corporate information.</li></ul><p>Analysts and engineers are expected to uphold the highest ethical standards regarding private proprietary information — whether as employees or outside consultants.</p>'
                        },
                        {
                            id: 'int-how', label: 'Ethical Practice', level: 2, tag: 'ethics', leaf: true,
                            content: '<h4>Ethics in Practice Includes</h4><ul><li><strong>Follow-through on commitments</strong></li><li>Dealing directly with mistakes and gaps in relevant knowledge and skills</li><li>Practicing open and honest communication</li></ul><h4>The Analyst\'s Responsibility</h4><p>Because an analyst is a pivotal member of the development team, their lack of follow-through can cause problems that reverberate throughout the project. An analyst must take honest stock of their strengths, weaknesses, and performance — asking for help when needed and providing it to others.</p>'
                        },
                        {
                            id: 'guidance', label: 'Sources of\nEthical Guidance', level: 2, tag: 'ethics', leaf: true,
                            content: '<h4>Deontological Approach</h4><p>Using a rules-based (deontological) approach to professional ethics provides clear guidance on conduct.</p><h4>Sources of Rules</h4><ul><li><strong>Professional bodies</strong>: Promote codes of practice and conduct among members.</li><li><strong>Information systems methodologies</strong>: Provide a framework for systems analysts to ensure thoroughness and completeness of IT projects. Methodologies can be extended to analyze ethical issues of IT projects.</li></ul>'
                        },
                        {
                            id: 'avoid', label: 'How to Avoid\nProblems', level: 2, tag: 'ethics', leaf: true,
                            content: '<h4>Use Software Development Methodology</h4><p>A standard work process enables controlled progress while developing high-quality software.</p><ul><li>Reduces the number of software errors</li><li>If an organization follows widely accepted development methods, negligence is harder to prove legally</li></ul><h4>Quality Assurance (QA)</h4><p>QA methods within the development cycle are designed to guarantee reliable operation of a product. Catching defects early dramatically reduces cost — defects found in Operation phase cost ~1000x more than those found in Investigation.</p>'
                        }
                    ]
                },
                {
                    id: 'sysadmin', label: 'IT System\nAdministrator', level: 1, tag: 'sysadmin',
                    children: [
                        {
                            id: 'sa-role', label: 'Role &\nResponsibilities', level: 2, tag: 'sysadmin', leaf: true,
                            content: '<h4>Who Is a System Administrator?</h4><p>The person responsible for setting up and maintaining the system or server. They are protectors of the digital world, preventing cybercrimes and maintaining employers\' digital reputation.</p><h4>Key Responsibilities</h4><ul><li>User administration (setup and maintaining accounts)</li><li>Monitor system performance</li><li>Install software and update systems</li><li>Monitor network communication</li><li>Setup and implement security policies</li><li>Password and identity management</li><li>Manage cloud infrastructure</li></ul>'
                        },
                        {
                            id: 'sa-power', label: 'Privileged\nAccess', level: 2, tag: 'sysadmin', leaf: true,
                            content: '<h4>What Makes It Special</h4><p>System admins have access to nearly every piece of data on the company network — servers, cloud, hosted, or physical. They can see what information every user is accessing and their usage patterns.</p><h4>Confidential Access Includes</h4><ul><li>Databases</li><li>Usernames and passwords</li><li>Email communications</li></ul><p>They have <strong>unrestricted access to the root account</strong> — root can even remove critical system files. This power can be abused either deliberately or inadvertently with serious consequences.</p>'
                        },
                        {
                            id: 'sa-ethics', label: 'Ethical Issues', level: 2, tag: 'sysadmin',
                            children: [
                                {
                                    id: 'privacy', label: 'Invasion of\nPrivacy', level: 3, tag: 'sysadmin', leaf: true,
                                    content: '<h4>The Dilemma</h4><p>A company might assign a network administrator to monitor browser activity and emails of employees to enforce Internet usage policies. The admin may feel this is an unethical invasion of privacy.</p><h4>The Nuance</h4><p>However, if the company\'s employment contract states that activities may be reviewed, employees were forewarned not to use company computers for private matters. Context and informed consent matter greatly.</p>'
                                },
                                {
                                    id: 'equality', label: 'Equality in\nReporting', level: 3, tag: 'sysadmin', leaf: true,
                                    content: '<h4>The Dilemma</h4><p>When reviewing employee browsing and email usage, should the administrator report <strong>every single infraction</strong> no matter how small, or only serious ones?</p><p>The administrator may use personal values to determine what constitutes a "serious" infraction — and these values decide which employees face disciplinary action. This creates potential for bias and inconsistency.</p>'
                                },
                                {
                                    id: 'sensitive', label: 'Sensitive\nInformation', level: 3, tag: 'sysadmin', leaf: true,
                                    content: '<h4>The Dilemma</h4><p>A network administrator must know everything about their employer\'s technology infrastructure — including proprietary technologies and business practices.</p><p>If the admin starts a new job, they may find themselves able to use knowledge from previous employment for gain. They must seek ethical <strong>and legal</strong> guidance from any non-disclosure agreements signed at the previous company.</p>'
                                },
                                {
                                    id: 'whistle', label: 'Whistle Blower\nSituations', level: 3, tag: 'sysadmin', leaf: true,
                                    content: '<h4>The Dilemma</h4><p>With unlimited file access, a network admin may come across information implicating their company in activities that are either unethical or strictly illegal.</p><p>The admin may be torn between reporting their employer and protecting their own job security. They must balance:</p><ul><li>Whether the activity is strictly <strong>illegal</strong> vs. merely unethical</li><li>Constraints of any non-disclosure agreements</li><li>Personal ethical responsibility to the public</li></ul>'
                                },
                                {
                                    id: 'security-comp', label: 'Compromising\nSecurity', level: 3, tag: 'sysadmin', leaf: true,
                                    content: '<h4>The Dilemma</h4><p>A client asks a systems administrator to save money by cutting some of the security measures that were recommended, even though the analysis shows sensitive information will be at risk.</p><p>Should the admin configure the network in a less secure manner, even after explaining the risk? This creates tension between <strong>client autonomy</strong> and <strong>professional responsibility</strong>.</p>'
                                },
                                {
                                    id: 'fees', label: 'Consultation\nFees', level: 3, tag: 'sysadmin', leaf: true,
                                    content: '<h4>The Dilemma</h4><p>The proliferation of network attacks, hacks, and viruses has caused many companies to be afraid of security threats. As a security consultant, it may be easy to play on that fear to convince companies to spend far more money than they actually need.</p><p>This represents an ethical failure — exploiting client fear for financial gain, even if the client agrees to the expenditure.</p>'
                                },
                                {
                                    id: 'slope', label: 'The Slippery\nSlope', level: 3, tag: 'sysadmin', leaf: true,
                                    content: '<h4>Definition</h4><p>The ease with which a person can go from doing something that seems harmless to doing things that are increasingly unethical.</p><h4>Example Progression</h4><ol style="padding-left:16px;"><li style="margin-bottom:5px;">Scanning employees\' email "just for fun"</li><li style="margin-bottom:5px;">Making small changes to their messages</li><li style="margin-bottom:5px;">Diverting messages to the wrong recipient</li><li style="margin-bottom:5px;">Using information for blackmail or political advantage</li></ol><p>Each step seems small — but the cumulative effect is serious misconduct.</p>'
                                }
                            ]
                        }
                    ]
                },
                {
                    id: 'conduct', label: 'Codes of\nConduct', level: 1, tag: 'conduct',
                    children: [
                        {
                            id: 'lopsa', label: 'LOPSA Code\nof Ethics', level: 2, tag: 'conduct', leaf: true,
                            content: '<h4>About LOPSA</h4><p>The League of Professional System Administrators (LOPSA) announced a Code of Ethics in the early 2000s, committing members to the highest standards of ethical and professional conduct.</p><h4>10 Principles</h4><ol style="padding-left:16px;"><li style="margin-bottom:4px;">Professionalism</li><li style="margin-bottom:4px;">Personal Integrity</li><li style="margin-bottom:4px;">Privacy</li><li style="margin-bottom:4px;">Laws and Policies</li><li style="margin-bottom:4px;">Communication</li><li style="margin-bottom:4px;">System Integrity</li><li style="margin-bottom:4px;">Education</li><li style="margin-bottom:4px;">Responsibility to Computing Community</li><li style="margin-bottom:4px;">Social Responsibility</li><li style="margin-bottom:4px;">Ethical Responsibility</li></ol>'
                        },
                        {
                            id: 'user-conduct', label: 'User Code\nof Conduct', level: 2, tag: 'conduct', leaf: true,
                            content: '<h4>Purpose</h4><p>Each organization needs guidelines for the acceptable use of its computing systems.</p><h4>Key Questions to Address</h4><ul><li>Under what circumstances is personal use of equipment/software permitted?</li><li>What types of personal use are forbidden?</li><li>What websites are restricted from browsing?</li><li>How do the rules change if using equipment from home?</li><li>What constitutes harassing communications?</li></ul>'
                        },
                        {
                            id: 'priv-conduct', label: 'Privileged Access\nCode of Conduct', level: 2, tag: 'conduct', leaf: true,
                            content: '<h4>For Users with Elevated Privileges</h4><p>Some users need privileged access — installing software, updating databases, publishing webpages. A conduct code must address:</p><ul><li>Require acknowledgment that privileged access comes with responsibility to use it properly.</li><li>Limitations on the type of work done with elevated privileges.</li></ul><h4>Mistake Management</h4><p>The company should acknowledge that mistakes happen and put in place approaches to minimize damage:</p><ul><li><strong>Backups</strong></li><li><strong>Retain software sources</strong></li></ul>'
                        },
                        {
                            id: 'culture', label: 'Security\nCulture', level: 2, tag: 'conduct', leaf: true,
                            content: '<h4>Beyond Technology</h4><p>Information security is not comprised only of technological superiority — it should be treated as a <strong>culture</strong> within organizations and among all employees.</p><h4>Principles</h4><ul><li>All employees should be security-conscious at all times.</li><li>All employees assist their security departments in preventing hacking attempts.</li><li>System administrators — with authority to monitor any activity — must especially adhere to a code of ethics.</li></ul><h4>Informed Consent Policy</h4><ul><li>People should know the rules under which they operate.</li><li>Users need to know how the system will handle various situations.</li></ul>'
                        }
                    ]
                }
            ]
        };

        const TAGS = { overview: { label: 'Overview', cls: 'tag-overview' }, roles: { label: 'Roles', cls: 'tag-roles' }, problems: { label: 'Problem', cls: 'tag-problems' }, safety: { label: 'Safety-Critical', cls: 'tag-safety' }, ethics: { label: 'Ethics', cls: 'tag-ethics' }, sysadmin: { label: 'Sys Admin', cls: 'tag-sysadmin' }, conduct: { label: 'Conduct', cls: 'tag-conduct' } };
        const HG = 255, VG = 52, NW = 195, NH = 46;
        let nodes = {}, expanded = new Set(['root']), selectedId = null;
        let tf = { x: 80, y: 80, scale: 1 }, isPanning = false, panStart = {};
        const cw = document.getElementById('cw'), canvas = document.getElementById('canvas'), linesEl = document.getElementById('lines');

        function flatten(n, d = 0) { nodes[n.id] = { ...n, depth: d }; if (n.children) n.children.forEach(c => flatten(c, d + 1)); }
        flatten(DATA);

        function countH(n) { if (!n.children || !expanded.has(n.id)) return 1; let t = 0; n.children.forEach(c => { t += countH(nodes[c.id] || c); }); return Math.max(t, 1); }

        function layout() {
            let pos = {};
            function assign(n, x, yOff) {
                pos[n.id] = { x, yOff, y: 0 };
                if (!n.leaf && n.children && expanded.has(n.id)) {
                    let s = yOff;
                    n.children.forEach(c => {
                        let cn = nodes[c.id] || c, ch = countH(cn);
                        assign(cn, x + HG, s); s += ch;
                    });
                }
            }
            assign(DATA, 0, 0);
            function cy(n) {
                if (!n.children || !expanded.has(n.id)) { pos[n.id].y = pos[n.id].yOff * VG; return; }
                n.children.forEach(c => cy(nodes[c.id] || c));
                let ch = n.children.map(c => nodes[c.id] || c);
                pos[n.id].y = (pos[ch[0].id].y + pos[ch[ch.length - 1].id].y) / 2;
            }
            cy(DATA);
            return pos;
        }

        function render() {
            let pos = layout();
            let existing = {};
            canvas.querySelectorAll('.node').forEach(el => { existing[el.dataset.id] = el; });
            let vis = new Set();
            function wv(n) { vis.add(n.id); if (!n.leaf && n.children && expanded.has(n.id)) n.children.forEach(c => wv(nodes[c.id] || c)); }
            wv(DATA);
            Object.keys(existing).forEach(id => { if (!vis.has(id)) { let el = existing[id]; el.classList.add('leaving'); setTimeout(() => el.remove(), 200); } });
            vis.forEach(id => {
                let nd = nodes[id], p = pos[id]; if (!p) return;
                let el = existing[id], isNew = !el;
                if (isNew) { el = document.createElement('div'); el.className = 'node'; el.dataset.id = id; canvas.appendChild(el); }
                let lc = id === 'root' ? 'root' : ['', 'l1', 'l2', 'l3'][nd.level] || 'l3';
                el.className = 'node ' + lc + (selectedId === id ? ' selected' : '');
                el.style.left = p.x + 'px'; el.style.top = (p.y - NH / 2) + 'px'; el.style.width = NW + 'px';
                let lbl = nd.label.replace(/\n/g, '<br>');
                let hasC = nd.children && nd.children.length > 0 && !nd.leaf;
                let icon = hasC ? `<svg class="chev ${expanded.has(id) ? 'open' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4l4 4-4 4"/></svg>` : nd.leaf ? `<svg class="li" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="5"/><path d="M8 5v3l2 2"/></svg>` : '';
                el.innerHTML = `<span class="nl">${lbl}</span>${icon}`;
                if (isNew) { el.classList.add('entering'); setTimeout(() => el.classList.remove('entering'), 400); }
                el.onclick = e => { e.stopPropagation(); onClick(id); };
            });
            drawLines(pos, vis);
        }

        function drawLines(pos, vis) {
            let paths = [];
            vis.forEach(id => {
                let nd = nodes[id]; if (!nd.children || !expanded.has(id)) return;
                nd.children.forEach(c => {
                    let cid = (nodes[c.id] || c).id || c.id; if (!vis.has(cid)) return;
                    let p1 = pos[id], p2 = pos[cid]; if (!p1 || !p2) return;
                    let x1 = p1.x + NW, y1 = p1.y, x2 = p2.x, y2 = p2.y, mx = x1 + (x2 - x1) * 0.5;
                    paths.push(`<path class="pl" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`);
                });
            });
            linesEl.innerHTML = paths.join('');
        }

        function onClick(id) {
            let nd = nodes[id];
            if (nd.leaf) { selectedId = id; openPanel(id); render(); return; }
            if (nd.children && nd.children.length) { expanded.has(id) ? expanded.delete(id) : expanded.add(id); render(); }
        }

        function openPanel(id) {
            let nd = nodes[id];
            document.getElementById('ptitle').textContent = nd.label.replace(/\n/g, ' ');
            let ti = TAGS[nd.tag], te = document.getElementById('ptag');
            if (ti) { te.textContent = ti.label; te.className = 'tag ' + ti.cls; te.style.display = 'inline-flex'; } else { te.style.display = 'none'; }
            document.getElementById('pb').innerHTML = nd.content || '<p>No details available.</p>';
            document.getElementById('panel').classList.add('open');
        }

        document.getElementById('pc').onclick = () => { document.getElementById('panel').classList.remove('open'); selectedId = null; render(); };

        cw.addEventListener('mousedown', e => { if (e.target.closest('.node') || e.target.closest('#panel')) return; isPanning = true; cw.classList.add('panning'); panStart = { x: e.clientX - tf.x, y: e.clientY - tf.y }; });
        window.addEventListener('mousemove', e => { if (!isPanning) return; tf.x = e.clientX - panStart.x; tf.y = e.clientY - panStart.y; applyTf(); });
        window.addEventListener('mouseup', () => { isPanning = false; cw.classList.remove('panning'); });
        cw.addEventListener('wheel', e => { e.preventDefault(); let d = -e.deltaY * 0.001, ns = Math.min(2.5, Math.max(0.2, tf.scale + d)), r = cw.getBoundingClientRect(), mx = e.clientX - r.left, my = e.clientY - r.top; tf.x = mx - (mx - tf.x) * (ns / tf.scale); tf.y = my - (my - tf.y) * (ns / tf.scale); tf.scale = ns; applyTf(); }, { passive: false });

        function applyTf() { canvas.style.transform = `translate(${tf.x}px,${tf.y}px) scale(${tf.scale})`; document.getElementById('zl').textContent = Math.round(tf.scale * 100) + '%'; }

        document.getElementById('zi').onclick = () => { tf.scale = Math.min(2.5, tf.scale + 0.15); applyTf(); };
        document.getElementById('zo').onclick = () => { tf.scale = Math.max(0.2, tf.scale - 0.15); applyTf(); };
        document.getElementById('rb').onclick = () => { tf = { x: window.innerWidth * 0.07, y: window.innerHeight * 0.25, scale: 0.9 }; applyTf(); };
        document.getElementById('eab').onclick = () => { function ea(n) { if (n.children) { expanded.add(n.id); n.children.forEach(c => ea(nodes[c.id] || c)); } } ea(DATA); render(); };
        document.getElementById('cab').onclick = () => { expanded.clear(); expanded.add('root'); document.getElementById('panel').classList.remove('open'); selectedId = null; render(); };

        const si = document.getElementById('search'), srEl = document.getElementById('sr');
        function allNodes() { let r = []; function w(n) { r.push({ id: n.id, label: n.label.replace(/\n/g, ' '), tag: n.tag }); if (n.children) n.children.forEach(c => w(nodes[c.id] || c)); } w(DATA); return r; }
        si.addEventListener('input', () => {
            let q = si.value.trim().toLowerCase(); if (!q) { srEl.classList.remove('v'); return; }
            let m = allNodes().filter(n => n.label.toLowerCase().includes(q)).slice(0, 8);
            if (!m.length) { srEl.innerHTML = '<div class="sri" style="color:var(--text3)">No results</div>'; srEl.classList.add('v'); return; }
            srEl.innerHTML = m.map(n => { let h = n.label.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>'); return `<div class="sri" data-id="${n.id}">${h}</div>`; }).join('');
            srEl.classList.add('v');
        });
        srEl.addEventListener('click', e => { let it = e.target.closest('.sri'); if (!it || !it.dataset.id) return; srEl.classList.remove('v'); si.value = ''; navTo(it.dataset.id); });
        document.addEventListener('click', e => { if (!e.target.closest('#search-wrap')) srEl.classList.remove('v'); });

        function navTo(id) {
            function fp(n, t, p = []) { if (n.id === t) return [...p, n.id]; if (n.children) { for (let c of n.children) { let r = fp(nodes[c.id] || c, t, [...p, n.id]); if (r) return r; } } return null; }
            let path = fp(DATA, id);
            if (path) {
                path.forEach(pid => expanded.add(pid)); selectedId = id; render();
                setTimeout(() => { let el = canvas.querySelector(`[data-id="${id}"]`); if (el) { let r = el.getBoundingClientRect(), wr = cw.getBoundingClientRect(); tf.x += (wr.width / 2) - (r.left + r.width / 2 - wr.left); tf.y += (wr.height / 2) - (r.top + r.height / 2 - wr.top); applyTf(); } if (nodes[id] && nodes[id].leaf) openPanel(id); }, 100);
            }
        }

        let isDark = true;
        document.getElementById('tb').onclick = () => { isDark = !isDark; document.documentElement.setAttribute('data-theme', isDark ? '' : 'light'); document.getElementById('tb').textContent = isDark ? '🌙' : '☀️'; localStorage.setItem('cm4t', isDark ? 'dark' : 'light'); };
        (() => { let s = localStorage.getItem('cm4t'); if (s === 'light') { isDark = false; document.documentElement.setAttribute('data-theme', 'light'); document.getElementById('tb').textContent = '☀️'; } })();

        tf = { x: window.innerWidth * 0.07, y: window.innerHeight * 0.25, scale: 0.9 };
        render(); applyTf();
    </script>
</body>

</html>
