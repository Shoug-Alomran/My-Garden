<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Contract Theory — Mind Map</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1f2937;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #d2a8ff;
            --accent4: #ffa657;
            --accent5: #ff7b72;
            --accent6: #79c0ff;
            --node-root: #1a2744;
            --node-root-border: #58a6ff;
            --node-l1: #1a2a1e;
            --node-l1-border: #3fb950;
            --node-l2: #2a1f3d;
            --node-l2-border: #d2a8ff;
            --node-l3: #2a1f18;
            --node-l3-border: #ffa657;
            --node-selected: #0d2442;
            --node-selected-border: #58a6ff;
            --shadow: rgba(0, 0, 0, 0.5);
            --connector: #30363d;
            --panel-bg: #161b22;
            --panel-border: #30363d;
            --toolbar-bg: rgba(13, 17, 23, 0.92);
            --search-bg: #21262d;
            --search-border: #30363d;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg: #f6f8fa;
            --surface: #ffffff;
            --surface2: #f0f2f5;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
            --accent2: #1a7f37;
            --accent3: #8250df;
            --accent4: #bc4c00;
            --accent5: #cf222e;
            --accent6: #0550ae;
            --node-root: #dbeafe;
            --node-root-border: #0969da;
            --node-l1: #dcfce7;
            --node-l1-border: #1a7f37;
            --node-l2: #ede9fe;
            --node-l2-border: #8250df;
            --node-l3: #fff7ed;
            --node-l3-border: #bc4c00;
            --node-selected: #bfdbfe;
            --node-selected-border: #0969da;
            --shadow: rgba(0, 0, 0, 0.12);
            --connector: #c8d1da;
            --panel-bg: #ffffff;
            --panel-border: #d0d7de;
            --toolbar-bg: rgba(246, 248, 250, 0.92);
            --search-bg: #f6f8fa;
            --search-border: #d0d7de;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            user-select: none;
        }

        /* TOOLBAR */
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--toolbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            height: 56px;
            transition: background var(--transition), border-color var(--transition);
        }

        .toolbar-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 16px;
            color: var(--text);
            white-space: nowrap;
            margin-right: 8px;
            letter-spacing: -0.3px;
        }

        .toolbar-brand span {
            color: var(--accent);
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        #search-wrap {
            position: relative;
            flex: 1;
            max-width: 280px;
        }

        #search-wrap svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
            pointer-events: none;
        }

        #search {
            width: 100%;
            background: var(--search-bg);
            border: 1px solid var(--search-border);
            border-radius: 8px;
            padding: 6px 12px 6px 34px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s, background var(--transition);
        }

        #search:focus {
            border-color: var(--accent);
        }

        #search::placeholder {
            color: var(--text-muted);
        }

        .tb-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 11px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .tb-btn:hover {
            background: var(--border);
            transform: translateY(-1px);
        }

        .tb-btn:active {
            transform: translateY(0);
        }

        .tb-btn svg {
            flex-shrink: 0;
        }

        #theme-toggle {
            font-size: 16px;
            padding: 6px 10px;
        }

        #search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px var(--shadow);
            z-index: 200;
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }

        .sr-item {
            padding: 9px 14px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sr-item:last-child {
            border-bottom: none;
        }

        .sr-item:hover {
            background: var(--surface2);
        }

        .sr-item .sr-path {
            font-size: 11px;
            color: var(--text-muted);
        }

        .sr-item mark {
            background: transparent;
            color: var(--accent);
            font-weight: 600;
        }

        /* CANVAS */
        #canvas-wrap {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            cursor: grab;
        }

        #canvas-wrap.grabbing {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 4000px;
            height: 4000px;
            transform-origin: 0 0;
        }

        #svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* NODES */
        .node {
            position: absolute;
            border-radius: 14px;
            border: 2px solid;
            cursor: pointer;
            transition:
                box-shadow 0.25s,
                transform 0.25s,
                background 0.25s,
                border-color 0.25s,
                opacity 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            max-width: 220px;
            min-width: 120px;
        }

        .node:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 24px var(--shadow);
            z-index: 10;
        }

        .node.root {
            background: var(--node-root);
            border-color: var(--node-root-border);
            font-family: 'DM Serif Display', serif;
            font-size: 15px;
            min-width: 160px;
            max-width: 240px;
            box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.15), 0 4px 20px var(--shadow);
        }

        .node.level-1 {
            background: var(--node-l1);
            border-color: var(--node-l1-border);
            font-size: 13px;
            font-weight: 500;
        }

        .node.level-2 {
            background: var(--node-l2);
            border-color: var(--node-l2-border);
            font-size: 12.5px;
        }

        .node.level-3 {
            background: var(--node-l3);
            border-color: var(--node-l3-border);
            font-size: 12px;
        }

        .node.selected {
            background: var(--node-selected) !important;
            border-color: var(--node-selected-border) !important;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3), 0 6px 24px var(--shadow) !important;
            z-index: 20;
        }

        .node.highlighted {
            box-shadow: 0 0 0 3px var(--accent4), 0 4px 16px var(--shadow) !important;
        }

        .node-text {
            flex: 1;
            line-height: 1.35;
            word-break: break-word;
        }

        .chevron {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            opacity: 0.6;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        }

        .node.expanded .chevron {
            transform: rotate(90deg);
            opacity: 1;
        }

        .leaf-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .node.selected .leaf-dot,
        .node:hover .leaf-dot {
            background: var(--accent);
        }

        /* CONNECTOR LINES */
        .connector {
            fill: none;
            stroke: var(--connector);
            stroke-width: 1.5;
            transition: stroke var(--transition);
        }

        /* PANEL */
        #panel {
            position: fixed;
            top: 56px;
            right: -440px;
            width: 420px;
            bottom: 0;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            z-index: 90;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition), border-color var(--transition);
            box-shadow: -8px 0 40px var(--shadow);
        }

        #panel.open {
            right: 0;
        }

        #panel-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #panel-title {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            line-height: 1.3;
            flex: 1;
            color: var(--text);
        }

        #panel-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #panel-close:hover {
            color: var(--text);
            background: var(--surface2);
        }

        #panel-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.75;
            font-size: 14px;
            color: var(--text);
        }

        #panel-body p {
            margin-bottom: 14px;
        }

        #panel-body strong {
            color: var(--accent);
            font-weight: 600;
        }

        #panel-body em {
            color: var(--accent3);
            font-style: italic;
        }

        .panel-tag {
            display: inline-block;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* ZOOM BADGE */
        #zoom-badge {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            color: var(--text-muted);
            z-index: 50;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /* FOOTER */
        #footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--toolbar-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            z-index: 100;
            font-size: 12px;
            color: var(--text-muted);
            gap: 6px;
            transition: background var(--transition), border-color var(--transition);
        }

        #footer span {
            font-weight: 600;
            color: var(--text);
            font-family: 'DM Serif Display', serif;
            letter-spacing: 0.2px;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* NODE ANIMATION */
        @keyframes nodeIn {
            from {
                opacity: 0;
                transform: translateX(-12px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .node {
            animation: nodeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
        }
    </style>
</head>

    <script>
        const DATA = {
            id: 'root',
            label: 'Social Contract Theory',
            children: [
                {
                    id: 'foundation',
                    label: 'Foundation',
                    children: [
                        { id: 'f1', label: 'Thomas Hobbes', desc: '<span class="panel-tag">Origin</span><p><strong>Thomas Hobbes</strong> is the primary architect of Social Contract Theory.</p><p>He argued that without rules and a means of enforcing them, people would not bother to create anything of value — because nobody could be sure of keeping what they created.</p><p>Instead, people would be consumed with <em>taking</em> what they needed and <em>defending</em> themselves against others.</p>' },
                        { id: 'f2', label: 'State of Nature', desc: '<span class="panel-tag">Hobbes</span><p>Hobbes described life without rules as a <strong>"state of nature"</strong> — a war of all against all.</p><p>In this condition, life would be "solitary, poor, nasty, brutish, and short." The social contract is humanity\'s escape from this chaos.</p>' },
                        { id: 'f3', label: 'The Social Contract', desc: '<span class="panel-tag">Definition</span><p>Hobbes argued that everyone living in a civilized society has <strong>implicitly agreed</strong> to two things:</p><p>1. The establishment of a set of <em>moral rules</em> to govern relations among citizens.<br>2. A <em>government</em> capable of enforcing these rules.</p><p>He called this arrangement the <strong>social contract</strong>.</p>' },
                        { id: 'f4', label: 'Core Definition', desc: '<span class="panel-tag">Definition</span><p>Social Contract Theory is the view that persons\' <strong>moral and/or political obligations</strong> are dependent upon a contract or agreement among them to form the society in which they live.</p><p>Moral rules are not given by God or nature — they arise from <em>collective rational agreement</em>.</p>' },
                        { id: 'f5', label: 'No One Above the Rules', desc: '<span class="panel-tag">Key Principle</span><p>The community determines rules for its members, and each member is <strong>obliged to obey the rules</strong>.</p><p><strong>No one is above the rules</strong> — not rulers, not the wealthy, not the powerful. This is the foundation of equal justice under law.</p>' }
                    ]
                },
                {
                    id: 'justice',
                    label: 'Justice & Rights',
                    children: [
                        {
                            id: 'rights',
                            label: 'Kinds of Rights',
                            children: [
                                { id: 'r1', label: 'Negative Rights', desc: '<span class="panel-tag">Negative Right</span><p>A <strong>negative right</strong> is a right that another person can guarantee simply by <em>leaving you alone</em> to exercise it.</p><p><strong>Example:</strong> The right of free expression — others need only refrain from silencing you; no positive action is required of them.</p>' },
                                { id: 'r2', label: 'Positive Rights', desc: '<span class="panel-tag">Positive Right</span><p>A <strong>positive right</strong> obligates others to <em>do something</em> on your behalf — it requires active provision, not just non-interference.</p><p><strong>Example:</strong> The right to free education — society must actively provide and fund educational institutions.</p>' }
                            ]
                        },
                        {
                            id: 'rawls',
                            label: "John Rawls's Principles",
                            children: [
                                { id: 'raw1', label: '1st Principle — Equal Liberties', desc: '<span class="panel-tag">Rawls — Principle 1</span><p>Each person may claim a <strong>"fully adequate" number of basic rights and liberties</strong>, as long as these claims are consistent with everyone else having a claim to the same rights and liberties.</p><p>In other words: your rights end where another\'s equal rights begin. Freedom is universal and equally distributed.</p>' },
                                { id: 'raw2', label: '2nd Principle — Fair Inequality', desc: '<span class="panel-tag">Rawls — Principle 2</span><p>Any social and economic inequalities must meet two conditions:<br><strong>1.</strong> Be associated with positions that everyone has a <em>fair and equal opportunity</em> to achieve.<br><strong>2.</strong> Be to the <em>greatest benefit of the least-advantaged</em> members of society — the <strong>Difference Principle</strong>.</p>' },
                                { id: 'raw3', label: 'The Difference Principle', desc: '<span class="panel-tag">Rawls</span><p>Rawls\'s <strong>Difference Principle</strong> holds that inequality is only just if it benefits the <em>least well-off</em> in society.</p><p>Applied to taxation (Plan A vs Plan B): a progressive tax system (Plan B) where the wealthy pay more to fund services for the poor aligns with the Difference Principle and is therefore more just.</p>' }
                            ]
                        }
                    ]
                },
                {
                    id: 'scenario',
                    label: 'DVD Rental Scenario',
                    children: [
                        { id: 'sc1', label: 'The Situation', desc: '<span class="panel-tag">Case Study</span><p><strong>Bill</strong> owns a chain of DVD rental stores. He collects information about customer rentals, constructs customer profiles, and <strong>sells those profiles</strong> to direct marketing firms.</p><p>Some customers are happy to receive more catalogs. Others are unhappy about increased "junk mail."</p>' },
                        { id: 'sc2', label: 'SCT Analysis', desc: '<span class="panel-tag">SCT Evaluation</span><p>Social Contract Theory asks us to consider the <strong>rights</strong> of Bill, customers, and marketing companies.</p><p>Key questions:<br>• Does the customer have the right to expect their name/address kept confidential?<br>• Who owns the information about a rental transaction?</p>' },
                        { id: 'sc3', label: 'Verdict', desc: '<span class="panel-tag">SCT Verdict</span><p><strong>If Bill and customers have equal rights</strong> to the transaction information → Bill did nothing wrong in selling it.</p><p><strong>If customers have a right to confidentiality</strong> without giving explicit permission → Bill was <em>wrong</em> to sell the information without asking.</p><p>SCT makes the ethical answer hinge on which rights the social contract recognizes.</p>' }
                    ]
                },
                {
                    id: 'vs_kantian',
                    label: 'SCT vs. Kantianism',
                    children: [
                        { id: 'sk1', label: 'Shared Focus on Rules', desc: '<span class="panel-tag">Similarity</span><p>Both Social Contract Theory and <strong>Kantianism (Deontology)</strong> are based on the notion of <em>universal moral rules</em>.</p><p>Neither grounds morality in consequences — both appeal to principles that apply universally.</p>' },
                        { id: 'sk2', label: 'How Rules Are Derived', desc: '<span class="panel-tag">Key Difference</span><p><strong>Kantianism:</strong> A moral rule is right for me to follow if it can be <em>universalized</em> — i.e., it works logically when everyone follows it (the Categorical Imperative).</p><p><strong>SCT:</strong> A moral rule is right if <em>rational people would collectively accept it</em> because of its benefits to the community.</p>' },
                        { id: 'sk3', label: 'Basis of Obligation', desc: '<span class="panel-tag">Key Difference</span><p>Kantian ethics grounds obligation in <strong>reason and duty</strong> — the good will acting from pure moral principle.</p><p>Social Contract Theory grounds obligation in <strong>collective rational agreement</strong> — what free people would choose together for mutual benefit.</p>' }
                    ]
                },
                {
                    id: 'for',
                    label: 'Case For SCT',
                    children: [
                        { id: 'pro1', label: 'Language of Rights', desc: '<span class="panel-tag">Strength</span><p>SCT is <strong>framed in the language of rights</strong> — a powerful, intuitive moral vocabulary that resonates across cultures and political systems.</p>' },
                        { id: 'pro2', label: 'Explains Self-Interest', desc: '<span class="panel-tag">Strength</span><p>SCT explains why people act in self-interest <em>without</em> common agreement.</p><p><strong>Example:</strong> A city facing a gasoline shortage could be solved if every citizen uses public transport two days a week — but without a contract, no one will act first.</p>' },
                        { id: 'pro3', label: 'Government Analysis', desc: '<span class="panel-tag">Strength</span><p>Provides <strong>clear ethical analysis</strong> of citizen/government problems — for example, justifying criminal punishment (imprisonment) as a legitimate enforcement of the social contract.</p>' },
                        { id: 'pro4', label: 'Mutual Benefits & Burdens', desc: '<span class="panel-tag">Strength</span><p>SCT ensures everyone receives <strong>certain benefits</strong> in return for bearing certain burdens.</p><p>This reciprocity — taxes for public services, laws for security — is the essence of a fair society.</p>' },
                        { id: 'pro5', label: 'Workable Theory', desc: '<span class="panel-tag">Strength</span><p>Despite limitations, SCT is a <strong>practical and workable ethical theory</strong> — widely used in political philosophy, constitutional law, and organizational governance.</p>' }
                    ]
                },
                {
                    id: 'against',
                    label: 'Case Against SCT',
                    children: [
                        { id: 'con1', label: 'No One Signed It', desc: '<span class="panel-tag">Weakness</span><p>The most fundamental objection: <strong>no one actually signed the social contract</strong>.</p><p>We are born into societies with pre-existing rules. Calling this "implicit agreement" is a legal fiction that may not be morally binding.</p>' },
                        { id: 'con2', label: 'Multiple Characterizations', desc: '<span class="panel-tag">Weakness</span><p>Some actions have <strong>multiple characterizations</strong> — many valid points of view — making it hard to define a single social agreement.</p><p><strong>Example:</strong> Mandatory schooling for children — is it protection or coercion?</p>' },
                        { id: 'con3', label: 'Conflicting Rights', desc: '<span class="panel-tag">Weakness</span><p>SCT faces a <strong>conflicting rights problem</strong> when two legitimate rights clash.</p><p><strong>Example:</strong> The abortion debate — a mother\'s right to privacy vs. a fetus\'s right to life. SCT alone cannot resolve which right takes precedence.</p>' },
                        { id: 'con4', label: 'Excludes the Vulnerable', desc: '<span class="panel-tag">Weakness</span><p>SCT may <strong>unjustly treat people who cannot uphold the contract</strong> — such as drug addicts, criminals, or the mentally ill.</p><p>If moral standing depends on participating in the contract, those who cannot participate may be excluded from moral consideration.</p>' }
                    ]
                },
                {
                    id: 'summary',
                    label: 'Theory Summary',
                    children: [
                        { id: 'sum1', label: 'SCT in One Line', desc: '<span class="panel-tag">Summary</span><p><strong>Social Contract Theory:</strong> We should promote collective rights — such as the rights to life, liberty, and property — through mutually agreed rules that no one is above.</p>' },
                        { id: 'sum2', label: 'Kantianism', desc: '<span class="panel-tag">Comparison Summary</span><p><strong>Kantianism:</strong> Interactions with other people should respect them as rational beings — treat people as ends in themselves, never merely as means.</p>' },
                        { id: 'sum3', label: 'Utilitarianism', desc: '<span class="panel-tag">Comparison Summary</span><p><strong>Utilitarianism:</strong> You should consider the consequences of an action before deciding whether it\'s right or wrong — maximize happiness for the greatest number.</p>' }
                    ]
                }
            ]
        };

        // ─────────────────────────────────────────────
        // STATE
        // ─────────────────────────────────────────────
        const state = {
            expanded: new Set(['root']),
            selected: null,
            panX: 0,
            panY: 0,
            scale: 1,
            dragging: false,
            dragStartX: 0,
            dragStartY: 0,
            dragStartPanX: 0,
            dragStartPanY: 0
        };

        const NODE_W = 200;
        const NODE_H = 44;
        const H_GAP = 80;
        const V_GAP = 28;

        function estimateNodeHeight(node) {
            const text = String(node.label || "");
            const charsPerLine = node._level === 0 ? 22 : 18;
            const lines = Math.max(1, Math.ceil(text.length / charsPerLine));
            return Math.max(NODE_H, 24 + lines * 22);
        }

        // ─────────────────────────────────────────────
        // LAYOUT ENGINE
        // ─────────────────────────────────────────────
        function shiftSubtree(node, deltaY) {
            node._y += deltaY;
            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(child => shiftSubtree(child, deltaY));
            }
        }

        function computeLayout(node, level = 0, x = 100, y = 0) {
            node._level = level;
            node._x = x;
            node._y = y;
            node._w = NODE_W;
            node._h = estimateNodeHeight(node);

            if (!node.children || !state.expanded.has(node.id)) {
                node._subtreeH = node._h;
                return node._subtreeH;
            }

            const childX = x + NODE_W + H_GAP;
            let totalH = 0;
            node.children.forEach(child => {
                totalH += computeLayout(child, level + 1, childX, 0);
                totalH += V_GAP;
            });
            totalH -= V_GAP;

            let cy = y + (node._h / 2) - (totalH / 2);
            node.children.forEach(child => {
                const nextY = cy + (child._subtreeH / 2) - (child._h / 2);
                shiftSubtree(child, nextY - child._y);
                cy += child._subtreeH + V_GAP;
            });

            node._subtreeH = Math.max(node._h, totalH);
            return node._subtreeH;
        }

        // ─────────────────────────────────────────────
        // RENDER
        // ─────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const svgLayer = document.getElementById('svg-layer');
        let nodeEls = {};

        function render() {
            computeLayout(DATA, 0, 100, 2000);
            renderNodes(DATA);
            renderConnectors(DATA);
        }

        function renderNodes(node) {
            let el = nodeEls[node.id];
            if (!el) {
                el = document.createElement('div');
                el.className = 'node';
                el.dataset.id = node.id;
                el.innerHTML = buildNodeHTML(node);
                el.addEventListener('click', () => onNodeClick(node));
                canvas.appendChild(el);
                nodeEls[node.id] = el;
            }

            const levelClass = node._level === 0 ? 'root' : `level-${Math.min(node._level, 3)}`;
            el.className = `node ${levelClass}${state.selected === node.id ? ' selected' : ''}${state.expanded.has(node.id) ? ' expanded' : ''}`;
            el.style.left = node._x + 'px';
            el.style.top = node._y + 'px';
            el.style.width = node._w + 'px';
            el.style.minHeight = node._h + 'px';
            el.style.display = 'flex';

            if (node.children && state.expanded.has(node.id)) {
                node.children.forEach(renderNodes);
            }

            // Remove orphaned children
            if (!node.children || !state.expanded.has(node.id)) {
                collapseChildren(node);
            }
        }

        function buildNodeHTML(node) {
            const isParent = node.children && node.children.length > 0;
            const icon = isParent
                ? `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`
                : `<div class="leaf-dot"></div>`;
            return `<div class="node-text">${node.label}</div>${icon}`;
        }

        function collapseChildren(node) {
            if (!node.children) return;
            node.children.forEach(child => {
                if (nodeEls[child.id]) {
                    nodeEls[child.id].style.display = 'none';
                }
                collapseChildren(child);
            });
        }

        function renderConnectors(node) {
            svgLayer.innerHTML = '';
            drawConnectors(node);
        }

        function drawConnectors(node) {
            if (!node.children || !state.expanded.has(node.id)) return;
            node.children.forEach(child => {
                const x1 = node._x + node._w;
                const y1 = node._y + node._h / 2;
                const x2 = child._x;
                const y2 = child._y + child._h / 2;
                const cx1 = x1 + (x2 - x1) * 0.55;
                const cx2 = x2 - (x2 - x1) * 0.55;
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('class', 'connector');
                path.setAttribute('d', `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`);
                svgLayer.appendChild(path);
                drawConnectors(child);
            });
        }

        // ─────────────────────────────────────────────
        // INTERACTION
        // ─────────────────────────────────────────────
        function onNodeClick(node) {
            if (node.children && node.children.length > 0) {
                if (state.expanded.has(node.id)) {
                    state.expanded.delete(node.id);
                } else {
                    state.expanded.add(node.id);
                }
                state.selected = node.id;
                render();
            } else {
                state.selected = node.id;
                render();
                openPanel(node);
            }
        }

        function openPanel(node) {
            document.getElementById('panel-title').textContent = node.label;
            document.getElementById('panel-body').innerHTML = node.desc || `<p>No description available.</p>`;
            document.getElementById('panel').classList.add('open');
        }

        function closePanel() {
            document.getElementById('panel').classList.remove('open');
            state.selected = null;
            render();
        }

        // ─────────────────────────────────────────────
        // PAN & ZOOM
        // ─────────────────────────────────────────────
        const wrap = document.getElementById('canvas-wrap');

        function applyTransform() {
            canvas.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
            document.getElementById('zoom-badge').textContent = Math.round(state.scale * 100) + '%';
        }

        wrap.addEventListener('mousedown', e => {
            if (e.target.closest('.node')) return;
            state.dragging = true;
            state.dragStartX = e.clientX;
            state.dragStartY = e.clientY;
            state.dragStartPanX = state.panX;
            state.dragStartPanY = state.panY;
            wrap.classList.add('grabbing');
        });

        window.addEventListener('mousemove', e => {
            if (!state.dragging) return;
            state.panX = state.dragStartPanX + (e.clientX - state.dragStartX);
            state.panY = state.dragStartPanY + (e.clientY - state.dragStartY);
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            state.dragging = false;
            wrap.classList.remove('grabbing');
        });

        wrap.addEventListener('wheel', e => {
            e.preventDefault();
            const delta = e.deltaY < 0 ? 0.1 : -0.1;
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }, { passive: false });

        function zoom(delta) {
            state.scale = Math.max(0.2, Math.min(2.5, state.scale + delta));
            applyTransform();
        }

        function resetView() {
            state.panX = 0;
            state.panY = 0;
            state.scale = 1;
            applyTransform();
        }

        // ─────────────────────────────────────────────
        // EXPAND / COLLAPSE ALL
        // ─────────────────────────────────────────────
        function collectIds(node, ids = []) {
            ids.push(node.id);
            if (node.children) node.children.forEach(c => collectIds(c, ids));
            return ids;
        }

        function expandAll() {
            collectIds(DATA).forEach(id => state.expanded.add(id));
            render();
        }

        function collapseAll() {
            state.expanded.clear();
            state.expanded.add('root');
            render();
        }

        // ─────────────────────────────────────────────
        // SEARCH
        // ─────────────────────────────────────────────
        const searchInput = document.getElementById('search');
        const searchResults = document.getElementById('search-results');

        function flatNodes(node, path = [], results = []) {
            results.push({ node, path: [...path, node.label] });
            if (node.children) node.children.forEach(c => flatNodes(c, [...path, node.label], results));
            return results;
        }

        const allNodes = flatNodes(DATA);

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            // Clear highlights
            Object.values(nodeEls).forEach(el => el.classList.remove('highlighted'));

            if (!q) {
                searchResults.style.display = 'none';
                return;
            }

            const matches = allNodes.filter(({ node }) => node.label.toLowerCase().includes(q));
            if (matches.length === 0) {
                searchResults.innerHTML = '<div class="sr-item" style="cursor:default;color:var(--text-muted)">No results found</div>';
                searchResults.style.display = 'block';
                return;
            }

            searchResults.innerHTML = matches.slice(0, 10).map(({ node, path }) => {
                const hl = node.label.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
                const trail = path.slice(0, -1).join(' › ');
                return `<div class="sr-item" data-id="${node.id}"><div>${hl}</div>${trail ? `<div class="sr-path">${trail}</div>` : ''}</div>`;
            }).join('');

            searchResults.querySelectorAll('.sr-item[data-id]').forEach(el => {
                el.addEventListener('click', () => {
                    const id = el.dataset.id;
                    navigateTo(id);
                    searchResults.style.display = 'none';
                    searchInput.value = '';
                });
            });

            matches.forEach(({ node }) => {
                if (nodeEls[node.id]) nodeEls[node.id].classList.add('highlighted');
            });

            searchResults.style.display = 'block';
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('#search-wrap')) searchResults.style.display = 'none';
        });

        function navigateTo(id) {
            // Expand path to node
            function findPath(node, targetId, path = []) {
                if (node.id === targetId) return [...path, node.id];
                if (node.children) {
                    for (const c of node.children) {
                        const r = findPath(c, targetId, [...path, node.id]);
                        if (r) return r;
                    }
                }
                return null;
            }
            const path = findPath(DATA, id);
            if (path) path.forEach(pid => state.expanded.add(pid));
            state.selected = id;
            render();
            // Center on node
            setTimeout(() => {
                function findNode(node, id) {
                    if (node.id === id) return node;
                    if (node.children) for (const c of node.children) { const r = findNode(c, id); if (r) return r; }
                    return null;
                }
                const n = findNode(DATA, id);
                if (n) {
                    const vpW = wrap.clientWidth;
                    const vpH = wrap.clientHeight;
                    state.panX = vpW / 2 - (n._x + n._w / 2) * state.scale;
                    state.panY = vpH / 2 - (n._y + n._h / 2) * state.scale;
                    applyTransform();
                }
            }, 100);
        }

        // ─────────────────────────────────────────────
        // THEME
        // ─────────────────────────────────────────────
        const themeBtn = document.getElementById('theme-toggle');
        let isDark = true;

        function applyTheme(dark) {
            document.body.dataset.theme = dark ? 'dark' : 'light';
            themeBtn.textContent = dark ? '🌙' : '☀️';
            localStorage.setItem('mm-theme', dark ? 'dark' : 'light');
        }

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            applyTheme(isDark);
        });

        // Restore
        const saved = localStorage.getItem('mm-theme');
        if (saved === 'light') { isDark = false; applyTheme(false); }

        // ─────────────────────────────────────────────
        // EXPORT PNG
        // ─────────────────────────────────────────────
        async function exportPNG() {
            const msg = document.createElement('div');
            msg.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;';
            msg.textContent = 'Preparing export… (open browser print for full export)';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
            window.print();
        }

        // ─────────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────────
        function init() {
            state.panX = 40;
            state.panY = -1820;
            applyTransform();
            render();
        }

        init();
    </script>
</body>

</html>
