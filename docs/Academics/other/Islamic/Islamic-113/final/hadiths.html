<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hadiths  -  ISC 103 Islamic Economic System</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0e8;
      --bg2: #ede7d9;
      --card: #ffffff;
      --card-border: #d9cfc0;
      --text: #1a1612;
      --text-muted: #7a6e5e;
      --accent: #8b4513;
      --accent-light: #c27843;
      --accent-glow: rgba(139, 69, 19, 0.12);
      --tag-bg: #f0e8d8;
      --tag-text: #6b4c2a;
      --search-bg: #fff;
      --search-border: #c8b89a;
      --divider: rgba(139, 69, 19, 0.15);
      --shadow: 0 2px 16px rgba(80, 40, 10, 0.10);
      --shadow-hover: 0 8px 32px rgba(80, 40, 10, 0.16);
      --num-bg: #8b4513;
      --num-text: #fff;
      --quote-border: #c27843;
      --header-bg: linear-gradient(135deg, #3d1f0a 0%, #6b3318 60%, #8b4513 100%);
    }

    [data-theme="dark"] {
      --bg: #130f0a;
      --bg2: #1c160e;
      --card: #221a10;
      --card-border: #3a2e1e;
      --text: #f0e6d3;
      --text-muted: #a0906e;
      --accent: #d4924a;
      --accent-light: #e8b070;
      --accent-glow: rgba(212, 146, 74, 0.12);
      --tag-bg: #2e2010;
      --tag-text: #d4924a;
      --search-bg: #1c160e;
      --search-border: #4a3820;
      --divider: rgba(212, 146, 74, 0.15);
      --shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.5);
      --num-bg: #d4924a;
      --num-text: #1a1000;
      --quote-border: #d4924a;
      --header-bg: linear-gradient(135deg, #0a0602 0%, #1a0e04 60%, #2a1506 100%);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.35s, color 0.35s;
      line-height: 1.7;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--header-bg);
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 1;
    }

    .header-ornament {
      font-family: 'Amiri', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      position: relative;
    }

    .site-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: #fff;
      font-weight: 600;
      letter-spacing: -0.01em;
      position: relative;
      line-height: 1.2;
    }

    .site-header h1 em {
      font-style: italic;
      color: #e8c890;
    }

    .site-header .subtitle {
      margin-top: 0.6rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      position: relative;
    }

    .header-line {
      width: 60px;
      height: 2px;
      background: rgba(232, 200, 144, 0.5);
      margin: 1.2rem auto 0;
      position: relative;
    }

    /* ── CONTROLS ── */
    .controls {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg2);
      border-bottom: 1px solid var(--divider);
      padding: 0.8rem 1.5rem;
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
      transition: background 0.35s;
    }

    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 1rem;
    }

    #search {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      border-radius: 8px;
      border: 1.5px solid var(--search-border);
      background: var(--search-bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.35s;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #search::placeholder {
      color: var(--text-muted);
    }

    .filter-wrap {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.4rem 0.85rem;
      border-radius: 20px;
      border: 1.5px solid var(--card-border);
      background: transparent;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      white-space: nowrap;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .theme-toggle {
      background: var(--card);
      border: 1.5px solid var(--card-border);
      border-radius: 8px;
      width: 40px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
    }

    /* ── MAIN ── */
    .main-content {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.2rem 4rem;
    }

    .stats-bar {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .stat strong {
      color: var(--accent);
      font-size: 1.1rem;
      font-weight: 600;
      font-family: 'Playfair Display', serif;
    }

    #no-results {
      display: none;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
    }

    /* ── CARDS ── */
    .hadith-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 1.5rem 1.6rem;
      margin-bottom: 1.1rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.25s, transform 0.25s, background 0.35s, border-color 0.35s;
      animation: fadeIn 0.35s ease both;
    }

    .hadith-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      margin-bottom: 1rem;
    }

    .hadith-num {
      min-width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--num-bg);
      color: var(--num-text);
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.02em;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      flex: 1;
    }

    .tag {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.73rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: background 0.35s, color 0.35s;
    }

    .tag.lecture-tag {
      background: var(--accent-glow);
      color: var(--accent);
      border: 1px solid var(--divider);
    }

    .hadith-arabic {
      font-family: 'Amiri', serif;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--accent-light);
      text-align: right;
      direction: rtl;
      line-height: 1.9;
      margin-bottom: 0.9rem;
      padding: 0.6rem 0.8rem;
      border-right: 3px solid var(--quote-border);
      background: var(--accent-glow);
      border-radius: 0 8px 8px 0;
      display: none;
    }

    .hadith-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: var(--text);
      line-height: 1.8;
      border-left: 3px solid var(--quote-border);
      padding-left: 1rem;
      font-style: italic;
      margin-bottom: 0.85rem;
    }

    .hadith-narrator {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: normal;
      font-family: 'DM Sans', sans-serif;
      margin-top: 0.5rem;
    }

    .hadith-narrator strong {
      color: var(--text);
      font-weight: 500;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--divider);
    }

    .context-label {
      font-size: 0.76rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .context-label span {
      color: var(--text);
      font-weight: 500;
    }

    /* ── SECTION DIVIDER ── */
    .lecture-section-head {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 2rem 0 1rem;
    }

    .lecture-section-head h2 {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--divider);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 520px) {
      .controls {
        padding: 0.7rem 1rem;
      }

      .filter-wrap {
        gap: 0.3rem;
      }

      .filter-btn {
        padding: 0.35rem 0.65rem;
        font-size: 0.73rem;
      }

      .hadith-card {
        padding: 1.1rem 1.1rem;
      }

      .card-header {
        gap: 0.6rem;
      }
    }
  </style>
    <script src="/javascripts/html-theme-sync.js"></script>
</head>

<body>

  <header class="site-header">
    <div class="header-ornament">﷽</div>
    <h1>Hadiths of the<br><em>Islamic Economic System</em></h1>
    <p class="subtitle">ISC 103 &nbsp;·&nbsp; Dr. Amal Sharaf &nbsp;·&nbsp; Lectures 1 - 12</p>
    <div class="header-line"></div>
  </header>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search by keyword, narrator, or topic…" autocomplete="off" />
    </div>
    <div class="filter-wrap" id="filter-wrap">
      <button class="filter-btn active" data-filter="all">All</button>
    </div>
    <button class="theme-toggle" id="themeBtn" title="Toggle dark/light mode">🌙</button>
  </div>

  <main class="main-content">
    <div class="stats-bar">
      <div class="stat"><strong id="visible-count">14</strong> Hadiths</div>
      <div class="stat" id="filter-stat" style="display:none">from <strong id="filter-label">All</strong></div>
    </div>

    <div id="hadith-list"></div>
    <div id="no-results">No hadiths found matching your search.</div>
  </main>

  <script>
    const hadiths = [
      {
        id: 1,
        lecture: 1,
        topic: "Accountability of Wealth",
        narrator: "Messenger of Allah (ﷺ)",
        text: "Man's feet will not move on the Day of Resurrection before he is asked about his life, how did he consume it, his knowledge, what did he do with it, his wealth, how did he earn it and how did he dispose of it, and about his body, how did he wear it out.",
        context: "Money belongs to Allah; humans are guardians and will be held accountable.",
      },
      {
        id: 2,
        lecture: 1,
        topic: "Prohibition of Intercepting Traders / Protecting Market Price",
        narrator: "Allah's Messenger (ﷺ), narrated by Ibn ʿAbbās (RA)",
        text: "Do not go out to meet riders (to conduct business with them), and a city-dweller must not sell for a man from the desert.",
        context: "Protecting both private and public property by preventing price manipulation.",
      },
      {
        id: 3,
        lecture: 1,
        topic: "Condemnation of Materialism",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "May he be miserable, the worshipper of the dinar and dirham, and the worshipper of the striped silk cloak. If he is given anything, he is satisfied; but if not, he is unsatisfied.",
        context: "Illustrating that Islam limits the pursuit of material wealth.",
      },
      {
        id: 4,
        lecture: 2,
        topic: "Accountability of Wealth (Five Questions)",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "The feet of the slave of Allah shall not move [on the Day of Judgement] until he is asked about five things: about his life and what he did with it, about his knowledge and what he did with it, about his wealth and how he earned it and where he spent it on, about his body and for what did he wear it out.",
        context: "Restricted economic liberty  -  legitimate regulations in earning and spending.",
      },
      {
        id: 5,
        lecture: 7,
        topic: "Excellence of Earning by One's Own Labour",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "No one has ever eaten better food than what he eats as a result of the labor of his hands. God's prophet David used to eat from what he had worked for with his hands.",
        context: "Production motive  -  Islam links earning through work to worship.",
      },
      {
        id: 6,
        lecture: 7,
        topic: "Intention Behind Actions",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "The value of an action depends on the intention behind it. A man will be rewarded only for what he intended.",
        context: "Production becomes an act of worship when paired with sincere intention.",
      },
      {
        id: 7,
        lecture: 7,
        topic: "Leaving Heirs in Good Standing",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "If you leave your heirs independent of means, that is better than if you leave them poor and holding out their hands to people.",
        context: "Encouraging long-term production for future generations.",
      },
      {
        id: 8,
        lecture: 7,
        topic: "Excellence in Work",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "Indeed, Allah loves that when one of you do a job, he does it with excellence.",
        context: "Work ethics from an Islamic perspective  -  mastering one's craft.",
      },
      {
        id: 9,
        lecture: 7,
        topic: "The Trustworthy Treasurer",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "The trustworthy treasurer who fulfills what Allah has commanded willingly is one of the charitable givers.",
        context: "Honesty and sincerity as work ethics in Islam.",
      },
      {
        id: 10,
        lecture: 7,
        topic: "Musaqah  -  Agreement of Khaybar",
        narrator: "Abdullah ibn Umar (RA)",
        text: "The Messenger of Allah (peace and blessings be upon him) made an agreement with the people of Khaybar for half of what came out of their land, whether fruit or crops.",
        context: "Permissibility of Musaqah (sharecropping by irrigation and care).",
      },
      {
        id: 11,
        lecture: 8,
        topic: "Prohibition of Gold & Silver Utensils",
        narrator: "Allah's Messenger (ﷺ)",
        text: "Do not drink in silver or gold utensils, and do not eat in plates of such metals, for such things are for them (the disbelievers) in this worldly life and for you in the Hereafter.",
        context: "Prohibition of exaggeration and luxury life (Taraf) in consumption.",
      },
      {
        id: 12,
        lecture: 8,
        topic: "Moderation in Spending",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "Eat, give charity and clothe yourselves, without being extravagant, and without showing off.",
        context: "Moderation in expenditure  -  avoiding Israf and Tabthear.",
      },
      {
        id: 13,
        lecture: 9,
        topic: "Honesty in Trade  -  Condemnation of Cheating",
        narrator: "Prophet Muhammad (ﷺ)",
        text: "The one who cheats is not one of us.",
        context: "Honesty in market dealings and avoiding deception.",
      },
      {
        id: 14,
        lecture: 9,
        topic: "Prohibition of False Bidding & Envy",
        narrator: "Messenger of Allah (ﷺ)",
        text: "Do not envy one another; do not inflate prices by overbidding against one another; do not hate one another. A Muslim is the brother of another Muslim; he neither oppresses him nor does he look down upon him, nor does he humiliate him.",
        context: "Ethics of the market  -  prohibition of Najsh (false bidding).",
      },
      {
        id: 15,
        lecture: 9,
        topic: "Prohibition of Intercepting Traders",
        narrator: "Messenger of Allah (ﷺ)",
        text: "Do not go out to meet riders to enter into transaction with them.",
        context: "Protecting newcomer merchants from being cheated on market prices.",
      },
      {
        id: 16,
        lecture: 9,
        topic: "Prohibition of Selling What You Do Not Own",
        narrator: "Hakim ibn Hizam (RA)",
        text: "I said: 'O Messenger of Allah, a man is asking me to sell him something that I do not possess; shall I sell it to him?' He said: 'Do not sell what is not with you.'",
        context: "Prohibition of selling products before fulfilling full ownership.",
      },
      {
        id: 17,
        lecture: 9,
        topic: "Prohibition of Monopoly",
        narrator: "ʿUmar (RA) reports from Allah's Messenger (ﷺ)",
        text: "If anyone withholds grain for forty days thereby desiring a high price, he has renounced God and God has renounced him.",
        context: "Prohibition of monopolistic hoarding of goods.",
      },
      {
        id: 18,
        lecture: 9,
        topic: "Leniency in Trade Transactions",
        narrator: "Allah's Messenger (ﷺ)",
        text: "May Allah's mercy be on him who is lenient in his buying, selling, and in demanding back his money.",
        context: "Facilitating ease in selling, buying, and payment processes.",
      },
      {
        id: 19,
        lecture: 10,
        topic: "Prohibition of Price-Fixing  -  Allah Sets Prices",
        narrator: "Anas ibn Malik (RA)",
        text: "Prices rose during the time of the Prophet (peace and blessings be upon him), and the people said, 'O Messenger of God, prices have risen, so set a price for us.' The Messenger of God (peace and blessings be upon him) replied, 'Indeed, God is the One who sets prices, the One who withholds and bestows, the Provider. And I hope to meet God with none of you having a claim against me for injustice in blood or property.'",
        context: "Pricing in Islam  -  non-interference with natural market prices.",
      },
      {
        id: 20,
        lecture: 11,
        topic: "Prohibition of Usury in Exchange (Riba al-Fadl)",
        narrator: "ʿUbada ibn As-Samit (RA) reports from Allah's Messenger (ﷺ)",
        text: "Do not sell gold for gold, or silver for silver, or wheat for wheat, or barley for barley, or dates for dates, or salt for salt except equal for equal, kind for kind, payment being made on the spot; but sell gold for silver, silver for gold, wheat for barley, barley for wheat, dates for salt and salt for dates, payment being made on the spot, as you wish.",
        context: "Rules on cash money  -  prohibition of riba (usury) in exchange.",
      },
    ];

    const lectureColors = {
      1: '#7b6d3c', 2: '#3c7b60', 3: '#3c587b', 4: '#6b3c7b',
      5: '#7b3c3c', 6: '#5a7b3c', 7: '#7b5a3c', 8: '#3c6b7b',
      9: '#7b3c5a', 10: '#4a7b3c', 11: '#3c4a7b', 12: '#7b4a3c',
    };

    const list = document.getElementById('hadith-list');
    const searchEl = document.getElementById('search');
    const filterWrap = document.getElementById('filter-wrap');
    const noResults = document.getElementById('no-results');
    const visibleCount = document.getElementById('visible-count');
    const themeBtn = document.getElementById('themeBtn');

    // Gather unique lectures
    const lectures = [...new Set(hadiths.map(h => h.lecture))].sort((a, b) => a - b);
    lectures.forEach(lec => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = lec;
      btn.textContent = `Lec ${lec}`;
      filterWrap.appendChild(btn);
    });

    let currentFilter = 'all';
    let currentSearch = '';

    function render() {
      const q = currentSearch.toLowerCase();
      let shown = 0;
      list.innerHTML = '';

      let prevLecture = null;
      hadiths.forEach((h, idx) => {
        const matchFilter = currentFilter === 'all' || String(h.lecture) === String(currentFilter);
        const matchSearch = !q ||
          h.text.toLowerCase().includes(q) ||
          h.narrator.toLowerCase().includes(q) ||
          h.topic.toLowerCase().includes(q) ||
          h.context.toLowerCase().includes(q) ||
          String(h.lecture).includes(q);

        if (!matchFilter || !matchSearch) return;

        // Section header when lecture changes
        if (h.lecture !== prevLecture && currentFilter === 'all') {
          const sec = document.createElement('div');
          sec.className = 'lecture-section-head';
          sec.innerHTML = `<div class="section-line"></div><h2>Lecture ${h.lecture}</h2><div class="section-line"></div>`;
          list.appendChild(sec);
          prevLecture = h.lecture;
        }

        const card = document.createElement('div');
        card.className = 'hadith-card';
        card.style.animationDelay = (shown * 0.04) + 's';

        card.innerHTML = `
      <div class="card-header">
        <div class="hadith-num">${shown + 1}</div>
        <div class="card-meta">
          <span class="tag lecture-tag">Lecture ${h.lecture}</span>
          <span class="tag">${h.topic}</span>
        </div>
      </div>
      <div class="hadith-text">${h.text}</div>
      <div class="hadith-narrator">Narrated by / Attributed to: <strong>${h.narrator}</strong></div>
      <div class="card-footer">
        <div class="context-label">Context: <span>${h.context}</span></div>
      </div>
    `;
        list.appendChild(card);
        shown++;
      });

      visibleCount.textContent = shown;
      noResults.style.display = shown === 0 ? 'block' : 'none';
    }

    // Search
    searchEl.addEventListener('input', e => {
      currentSearch = e.target.value;
      render();
    });

    // Filters
    filterWrap.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });

    // Dark/light toggle
    const html = document.documentElement;
    themeBtn.addEventListener('click', () => {
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      themeBtn.textContent = isDark ? '🌙' : '☀️';
    });

    render();
  </script>
</body>

</html>
