<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islamic Economic Intellect — Interactive Mind Map</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0b0e13;
      --surface: #111520;
      --card: #161c28;
      --border: #1e2740;
      --accent-gold: #c9a96e;
      --accent-teal: #4ec9b0;
      --accent-blue: #5b9bd5;
      --accent-rose: #c97b8a;
      --accent-green: #7ec994;
      --text: #ddd9cc;
      --text-muted: #7a7d8a;
      --text-dim: #3a3d4a;
      --line: #1e2740;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201, 169, 110, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 500;
      color: var(--accent-gold);
      letter-spacing: 0.03em;
      margin-bottom: 0.4rem;
    }

    .header p {
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 1.2rem;
      font-size: 0.76rem;
      color: var(--text-dim);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px 14px;
    }

    .hint-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-gold);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(0.8)
      }
    }

    /* ── MAP WRAPPER ── */
    .map-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
      position: relative;
    }

    /* ── ROOT NODE ── */
    .root {
      display: flex;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .root-node {
      background: linear-gradient(135deg, #1a1f30, #1e2438);
      border: 1px solid var(--accent-gold);
      border-radius: 12px;
      padding: 1rem 2rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(201, 169, 110, 0.12), 0 4px 20px rgba(0, 0, 0, 0.4);
      position: relative;
    }

    .root-node::after {
      content: '';
      position: absolute;
      bottom: -2rem;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 2rem;
      background: linear-gradient(to bottom, var(--accent-gold), var(--border));
    }

    .root-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent-gold);
      letter-spacing: 0.05em;
    }

    .root-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── COLUMNS ── */
    .columns {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── BRANCH (top-level) ── */
    .branch {
      flex: 1;
      min-width: 200px;
      max-width: 240px;
    }

    .branch-btn {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .branch-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent-color, var(--accent-gold));
      border-radius: 2px 0 0 2px;
      transform: scaleY(0);
      transition: transform 0.22s ease;
    }

    .branch-btn:hover {
      border-color: var(--accent-color, var(--accent-gold));
      background: #1a1f2e;
    }

    .branch-btn:hover::before,
    .branch-btn.open::before {
      transform: scaleY(1);
    }

    .branch-btn.open {
      border-color: var(--accent-color, var(--accent-gold));
      background: #1a1f2e;
    }

    .branch-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: color-mix(in srgb, var(--accent-color, var(--accent-gold)) 15%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .branch-label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      flex: 1;
      line-height: 1.3;
    }

    .branch-arrow {
      font-size: 0.6rem;
      color: var(--text-dim);
      transition: transform 0.22s ease;
      flex-shrink: 0;
    }

    .branch-btn.open .branch-arrow {
      transform: rotate(180deg);
      color: var(--accent-color, var(--accent-gold));
    }

    /* ── CHILDREN ── */
    .children {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .children.open {
      max-height: 2000px;
    }

    .children-inner {
      padding: 0.5rem 0 0.5rem 0.8rem;
      border-left: 1px solid var(--border);
      margin: 0.4rem 0 0 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    /* ── SUB-BRANCH ── */
    .sub-btn {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      transition: all 0.18s ease;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
    }

    .sub-btn:hover {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .sub-btn.open {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .sub-label {
      flex: 1;
      line-height: 1.3;
    }

    .sub-arrow {
      font-size: 0.55rem;
      transition: transform 0.18s ease;
      flex-shrink: 0;
    }

    .sub-btn.open .sub-arrow {
      transform: rotate(180deg);
      color: var(--accent-color, var(--accent-gold));
    }

    /* ── LEAVES ── */
    .leaves {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .leaves.open {
      max-height: 600px;
    }

    .leaves-inner {
      padding: 0.35rem 0 0.35rem 0.7rem;
      border-left: 1px dashed var(--border);
      margin: 0.25rem 0 0 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .leaf {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.6rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      line-height: 1.3;
      border-radius: 6px;
      animation: leafIn 0.25s ease both;
      transition: color 0.15s;
    }

    .leaf:hover {
      color: var(--text-muted);
    }

    @keyframes leafIn {
      from {
        opacity: 0;
        transform: translateX(-6px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .leaf-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-color, var(--accent-gold));
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* ── CONNECTOR LINE ── */
    .connector {
      width: 1px;
      background: var(--border);
      margin: 0 auto;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    footer strong {
      color: var(--accent-gold);
    }

    @media (max-width: 700px) {
      .columns {
        flex-direction: column;
        align-items: stretch;
      }

      .branch {
        max-width: 100%;
      }

      .map-wrapper {
        padding: 2rem 1rem 4rem;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Islamic Economic Intellect</h1>
    <p>Interactive Mind Map · Lectures 6 – 10</p>
    <div class="hint"><span class="hint-dot"></span> Click any branch to expand its concepts</div>
  </div>

  <div class="map-wrapper">

    <div class="root">
      <div class="root-node">
        <div class="root-label">Islamic Economic Intellect</div>
        <div class="root-sub">Core Framework</div>
      </div>
    </div>

    <div class="columns" id="mindmap"></div>

  </div>

  <footer>Prepared by <strong>Shoug Alomran</strong> · Midterm 2 Preparation</footer>

  <script>
    const data = [
      {
        label: "The Economic Dilemma",
        icon: "⚖️",
        color: "#c9a96e",
        children: [
          {
            label: "Relative Scarcity",
            leaves: ["Motive for work", "Test from Allah", "Sufficiency of resources worldwide"]
          },
          {
            label: "Production Factors",
            leaves: ["Work: human effort", "Capital: tools and buildings", "Natural resources: land and minerals"]
          },
          {
            label: "Human Needs",
            leaves: ["Allowed needs", "Basic requirements", "Spiritual needs", "Limited by moderation"]
          }
        ]
      },
      {
        label: "Consumption & Consumer Conduct",
        icon: "🛒",
        color: "#c97b8a",
        children: [
          {
            label: "Rationalization",
            leaves: ["Prohibiting luxury (Taraf)", "Prohibiting waste (Israf)", "Prohibiting spendthrift (Tabthear)", "Moderation in expenditure"]
          },
          {
            label: "Economic Liberty",
            leaves: ["Rational freedom", "Balanced interests"]
          },
          {
            label: "Interest and Gratification",
            leaves: ["Material and spiritual enjoyment", "Legitimate commodities"]
          }
        ]
      },
      {
        label: "The Islamic Market",
        icon: "🏛️",
        color: "#5b9bd5",
        children: [
          {
            label: "Market Ethics",
            leaves: ["Fair scales and measures", "Honesty in dealings", "Facilitating payment"]
          },
          {
            label: "Prohibitions",
            leaves: ["Usury (Riba)", "False bidding", "Monopoly", "Cheating new merchants", "Selling what is not possessed"]
          }
        ]
      },
      {
        label: "Production in Islam",
        icon: "🌱",
        color: "#7ec994",
        children: [
          {
            label: "Motives",
            leaves: ["Worship methodology", "Succession (Caliph) on earth", "Universe subservience"]
          },
          {
            label: "Work Ethics",
            leaves: ["Mastering (Excellence)", "Strength and trustworthiness", "Willingness and sincerity"]
          },
          {
            label: "Capital Formation",
            leaves: ["Investment over hoarding", "Cash and real assets", "Joint partnerships (Brokerage)"]
          },
          {
            label: "Land Utilization",
            leaves: ["Musaqah (Crops)", "Muzara'ah (Cultivation)"]
          }
        ]
      },
      {
        label: "Pricing & Supply/Demand",
        icon: "📊",
        color: "#4ec9b0",
        children: [
          {
            label: "Price Determination",
            leaves: ["Freedom of pricing", "Supply and Demand law", "Allah is the price setter"]
          },
          {
            label: "State Interference",
            leaves: ["Combating monopoly", "Ensuring fairness", "Cracking down on cheaters"]
          }
        ]
      }
    ];

    function buildLeaves(leaves, color) {
      const wrap = document.createElement('div');
      wrap.className = 'leaves';
      const inner = document.createElement('div');
      inner.className = 'leaves-inner';
      leaves.forEach((l, i) => {
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        leaf.style.animationDelay = (i * 0.04) + 's';
        leaf.innerHTML = `<span class="leaf-dot" style="background:${color}"></span><span>${l}</span>`;
        inner.appendChild(leaf);
      });
      wrap.appendChild(inner);
      return wrap;
    }

    function buildSub(sub, color) {
      const wrap = document.createElement('div');

      const btn = document.createElement('button');
      btn.className = 'sub-btn';
      btn.style.setProperty('--accent-color', color);
      btn.innerHTML = `<span class="sub-label">${sub.label}</span><span class="sub-arrow">▼</span>`;

      const leavesEl = buildLeaves(sub.leaves || [], color);

      btn.addEventListener('click', () => {
        const isOpen = btn.classList.contains('open');
        btn.classList.toggle('open', !isOpen);
        leavesEl.classList.toggle('open', !isOpen);
      });

      wrap.appendChild(btn);
      wrap.appendChild(leavesEl);
      return wrap;
    }

    function buildBranch(item) {
      const branch = document.createElement('div');
      branch.className = 'branch';

      const btn = document.createElement('button');
      btn.className = 'branch-btn';
      btn.style.setProperty('--accent-color', item.color);
      btn.innerHTML = `
    <span class="branch-icon">${item.icon}</span>
    <span class="branch-label">${item.label}</span>
    <span class="branch-arrow">▼</span>
  `;

      const children = document.createElement('div');
      children.className = 'children';
      const inner = document.createElement('div');
      inner.className = 'children-inner';

      (item.children || []).forEach(sub => {
        inner.appendChild(buildSub(sub, item.color));
      });

      children.appendChild(inner);

      btn.addEventListener('click', () => {
        const isOpen = btn.classList.contains('open');
        btn.classList.toggle('open', !isOpen);
        children.classList.toggle('open', !isOpen);
      });

      branch.appendChild(btn);
      branch.appendChild(children);
      return branch;
    }

    const map = document.getElementById('mindmap');
    data.forEach(item => map.appendChild(buildBranch(item)));
  </script>

</body>

</html>
