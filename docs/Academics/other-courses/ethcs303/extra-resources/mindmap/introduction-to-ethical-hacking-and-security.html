    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0e1a;
            --bg2: #111827;
            --bg3: #1e293b;
            --panel: #0f172a;
            --border: #2d3748;
            --border2: #334155;
            --text: #f1f5f9;
            --text2: #cbd5e1;
            --text3: #94a3b8;
            --accent: #ef4444;
            --accent2: #f87171;
            --accent-dim: rgba(239, 68, 68, 0.12);
            --line: rgba(248, 113, 113, 0.35);
            --node-root-bg: #450a0a;
            --node-root-b: #ef4444;
            --node-root-t: #fca5a5;
            --node-l1-bg: #1e1b2e;
            --node-l1-b: #8b5cf6;
            --node-l1-t: #c4b5fd;
            --node-l2-bg: #1a2f2f;
            --node-l2-b: #14b8a6;
            --node-l2-t: #5eead4;
            --node-l3-bg: #2d1a2a;
            --node-l3-b: #ec4899;
            --node-l3-t: #f9a8d4;
            --highlight-b: #fbbf24;
            --shadow: 0 8px 28px rgba(0, 0, 0, 0.6);
            --toolbar-h: 56px;
            --footer-h: 36px;
            --tr: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        [data-theme="light"] {
            --bg: #fef2f2;
            --bg2: #ffffff;
            --bg3: #f1f5f9;
            --panel: #ffffff;
            --border: #e2e8f0;
            --border2: #cbd5e1;
            --text: #1e293b;
            --text2: #475569;
            --text3: #94a3b8;
            --accent: #dc2626;
            --accent2: #ef4444;
            --accent-dim: rgba(220, 38, 38, 0.08);
            --line: rgba(220, 38, 38, 0.3);
            --node-root-bg: #fee2e2;
            --node-root-b: #dc2626;
            --node-root-t: #991b1b;
            --node-l1-bg: #ede9fe;
            --node-l1-b: #6d28d9;
            --node-l1-t: #4c1d95;
            --node-l2-bg: #ccfbf1;
            --node-l2-b: #0f766e;
            --node-l2-t: #115e59;
            --node-l3-bg: #fce7f3;
            --node-l3-b: #db2777;
            --node-l3-t: #831843;
            --highlight-b: #eab308;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            transition: background var(--tr), color var(--tr);
        }

        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--toolbar-h);
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 20px;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .tb-logo {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent2);
            white-space: nowrap;
            background: var(--accent-dim);
            padding: 5px 12px;
            border-radius: 40px;
        }

        .tb-sep {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 6px;
        }

        #search-wrap {
            position: relative;
            flex: 1;
            max-width: 270px;
        }

        #search {
            width: 100%;
            height: 36px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 32px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 0 12px 0 34px;
            outline: none;
        }

        #search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        .si {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
        }

        #sr {
            position: absolute;
            top: 44px;
            left: 0;
            right: 0;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            z-index: 200;
            max-height: 260px;
            overflow-y: auto;
            display: none;
        }

        #sr.v {
            display: block;
        }

        .sri {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
        }

        .sri:hover {
            background: var(--accent-dim);
            color: var(--accent2);
        }

        .sri mark {
            background: none;
            color: var(--accent2);
            font-weight: 500;
        }

        .tb-btn {
            height: 34px;
            padding: 0 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 28px;
            color: var(--text2);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .tb-btn:hover {
            background: var(--accent-dim);
            color: var(--text);
            border-color: var(--accent);
        }

        .spacer {
            flex: 1;
        }

        #cw {
            position: fixed;
            top: var(--toolbar-h);
            left: 0;
            right: 0;
            bottom: var(--footer-h);
            overflow: hidden;
            cursor: grab;
        }

        #cw.panning {
            cursor: grabbing;
        }

        #canvas {
            position: absolute;
            transform-origin: 0 0;
            will-change: transform;
        }

        svg#lines {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: visible;
        }

        .node {
            position: absolute;
            border-radius: 20px;
            padding: 10px 18px;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            border: 1.5px solid;
            min-width: 160px;
            max-width: 210px;
            display: flex;
            align-items: center;
            gap: 8px;
            word-break: break-word;
            backdrop-filter: blur(2px);
        }

        .node:hover {
            transform: translateY(-2px) scale(1.02);
            border-color: var(--accent2);
        }

        .node.root {
            background: var(--node-root-bg);
            border-color: var(--node-root-b);
            padding: 14px 24px;
            min-width: 210px;
            border-radius: 32px;
        }

        .node.root .nl {
            color: var(--node-root-t);
            font-size: 15px;
            font-weight: 700;
        }

        .node.l1 {
            background: var(--node-l1-bg);
            border-color: var(--node-l1-b);
        }

        .node.l1 .nl {
            color: var(--node-l1-t);
            font-weight: 600;
        }

        .node.l2 {
            background: var(--node-l2-bg);
            border-color: var(--node-l2-b);
        }

        .node.l3 {
            background: var(--node-l3-bg);
            border-color: var(--node-l3-b);
        }

        .node.selected {
            box-shadow: 0 0 0 3px var(--accent), var(--shadow);
        }

        .nl {
            flex: 1;
            line-height: 1.4;
            font-size: 12.5px;
            font-weight: 500;
        }

        .chev {
            width: 16px;
            height: 16px;
            transition: transform 0.25s;
            opacity: 0.7;
        }

        .chev.open {
            transform: rotate(90deg);
        }

        .li {
            width: 12px;
            height: 12px;
            opacity: 0.5;
        }

        .node.entering {
            animation: nIn 0.3s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes nIn {
            from {
                opacity: 0;
                transform: scale(0.75) translateX(-12px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateX(0);
            }
        }

        #panel {
            position: fixed;
            top: var(--toolbar-h);
            right: 0;
            bottom: var(--footer-h);
            width: 390px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 90;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 28px rgba(0, 0, 0, 0.4);
        }

        #panel.open {
            transform: translateX(0);
        }

        #ph {
            padding: 20px 20px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        #ptag {
            display: inline-flex;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .tag-cia {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .tag-terminology {
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
        }

        .tag-threats {
            background: rgba(20, 184, 166, 0.2);
            color: #5eead4;
        }

        .tag-attack {
            background: rgba(236, 72, 153, 0.2);
            color: #f9a8d4;
        }

        .tag-exploit {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        #ptitle {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }

        #pc {
            width: 32px;
            height: 32px;
            border-radius: 40px;
            background: var(--bg3);
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pc:hover {
            background: var(--accent-dim);
            color: var(--accent2);
        }

        #pb {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            line-height: 1.7;
            font-size: 13.5px;
            color: var(--text2);
            scrollbar-width: thin;
        }

        #pb h4 {
            color: var(--accent2);
            font-size: 13px;
            font-weight: 600;
            margin: 16px 0 6px;
        }

        #pb strong {
            color: var(--text);
        }

        #pb ul,
        #pb ol {
            padding-left: 20px;
            margin: 8px 0;
        }

        #zc {
            position: fixed;
            bottom: calc(var(--footer-h) + 16px);
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 80;
        }

        .zb {
            width: 38px;
            height: 38px;
            border-radius: 28px;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            cursor: pointer;
            font-size: 20px;
            transition: 0.2s;
            box-shadow: var(--shadow);
        }

        .zb:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }

        #zl {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 8px;
            font-size: 11px;
            font-family: monospace;
            text-align: center;
        }

        .pl {
            fill: none;
            stroke: var(--line);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-dasharray: 4 2;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--footer-h);
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text3);
            font-family: monospace;
            z-index: 100;
        }
    </style>

    <script>
        const DATA = {
            id: 'eh_root', label: 'Introduction to Ethical Hacking', level: 0,
            children: [
                {
                    id: 'cia_triad', label: 'CIA Triad', level: 1, tag: 'cia',
                    children: [
                        { id: 'confidentiality', label: 'Confidentiality', level: 2, tag: 'cia', leaf: true, content: '<h4>Confidentiality</h4><p>Preserving authorized restrictions on information access and disclosure. Protects personal privacy and proprietary information.</p><p><strong>Risks:</strong> Loss of privacy, unauthorized access, identity theft.</p><p><strong>Controls:</strong> Encryption, authentication, access control.</p>' },
                        { id: 'integrity', label: 'Integrity', level: 2, tag: 'cia', leaf: true, content: '<h4>Integrity</h4><p>Guarding against improper information modification or destruction. Includes non-repudiation and authenticity.</p><p><strong>Risks:</strong> Information no longer reliable, fraud.</p><p><strong>Controls:</strong> Maker/Checker, Quality Assurance, Audit Logs.</p>' },
                        { id: 'availability', label: 'Availability', level: 2, tag: 'cia', leaf: true, content: '<h4>Availability</h4><p>Ensuring timely and reliable access to information and systems.</p><p><strong>Risks:</strong> Business disruption, loss of customer confidence, revenue loss.</p><p><strong>Controls:</strong> Business continuity plans, backup storage, sufficient capacity.</p>' },
                        { id: 'nonrepudiation', label: 'Non-Repudiation', level: 2, tag: 'cia', leaf: true, content: '<h4>Non-Repudiation</h4><p>One of the Information Assurance pillars. Guarantees the transmission and receipt of information between sender and receiver via digital signatures, audit trails, and cryptographic techniques. Prevents parties from denying actions.</p>' }
                    ]
                },
                {
                    id: 'terminology', label: 'Key Terminology', level: 1, tag: 'terminology',
                    children: [
                        { id: 'hack_value', label: 'Hack Value', level: 2, tag: 'terminology', leaf: true, content: '<h4>Hack Value</h4><p>The attractiveness or worth of a target to a hacker. Higher value targets (e.g., financial systems, government databases) are more appealing.</p>' },
                        { id: 'zero_day', label: 'Zero-Day Attack', level: 2, tag: 'terminology', leaf: true, content: '<h4>Zero-Day Attack</h4><p>Exploits a vulnerability before the developer identifies or releases a patch. The attacker strikes on "day zero" — before defenders even know the flaw exists.</p>' },
                        { id: 'vulnerability', label: 'Vulnerability', level: 2, tag: 'terminology', leaf: true, content: '<h4>Vulnerability</h4><p>A weak point or loophole in a system/network that attackers exploit as an entry point to reach their target.</p>' },
                        { id: 'exploit', label: 'Exploit', level: 2, tag: 'terminology', leaf: true, content: '<h4>Exploit</h4><p>A breach of system security through vulnerabilities, zero-day attacks, or hacking techniques. Exploits leverage weaknesses to execute unauthorized actions.</p>' },
                        { id: 'payload', label: 'Payload', level: 2, tag: 'terminology', leaf: true, content: '<h4>Payload</h4><p>The actual malicious section of code that causes harmful activity: opening backdoors, hijacking systems, or data exfiltration. The "damage" part of an exploit.</p>' },
                        { id: 'bot', label: 'Bot / Botnet', level: 2, tag: 'terminology', leaf: true, content: '<h4>Bot & Botnet</h4><p>A bot is software that controls a target remotely, executing automated scripts. Botnets are networks of compromised devices (zombies) controlled by a botmaster to perform DDoS attacks, spam, data theft, or cryptomining.</p>' },
                        { id: 'doxing', label: 'Doxing', level: 2, tag: 'terminology', leaf: true, content: '<h4>Doxing</h4><p>Publishing private or identifying information about an individual collected from public databases, social media, and OSINT sources. Often used for harassment or intimidation.</p>' },
                        { id: 'daisy_chaining', label: 'Daisy Chaining', level: 2, tag: 'terminology', leaf: true, content: '<h4>Daisy Chaining</h4><p>A sequence of hacking attempts where each successful breach provides information used for the next attack. Enables lateral movement through networks.</p>' }
                    ]
                },
                {
                    id: 'threat_categories', label: 'Threat Categories', level: 1, tag: 'threats',
                    children: [
                        { id: 'network_threats', label: 'Network Level', level: 2, tag: 'threats', leaf: true, content: '<h4>Network Threats</h4><p>Target routers, switches, firewalls. Top threats: Scanning, Session Hijacking, Sniffing/Eavesdropping, Man-in-the-Middle (MITM), Spoofing, DNS/ARP attacks.</p>' },
                        { id: 'host_threats', label: 'Host Level (OS)', level: 2, tag: 'threats', leaf: true, content: '<h4>Host-Level Threats</h4><p>Target OS vulnerabilities: unpatched systems, insecure configurations, malware, password attacks, arbitrary code execution, login bypass, privilege escalation, backdoors.</p>' },
                        { id: 'app_threats', label: 'Application Level', level: 2, tag: 'threats', leaf: true, content: '<h4>Application Threats</h4><p>Improper input validation, broken authentication, SQL injection, broken session management, buffer overflows, cryptography failures, security misconfiguration, improper error handling.</p>' }
                    ]
                },
                {
                    id: 'attack_types', label: 'Modern Cyber Attacks', level: 1, tag: 'attack',
                    children: [
                        { id: 'cloud_threats', label: 'Cloud Threats', level: 2, tag: 'attack', leaf: true, content: '<h4>Cloud Computing Threats</h4><p>Data breaches, misconfigured cloud settings, insecure APIs, unauthorized access. Shared responsibility model adds complexity — securing cloud environments is critical.</p>' },
                        { id: 'apt', label: 'Advanced Persistent Threat (APT)', level: 2, tag: 'attack', leaf: true, content: '<h4>APT</h4><p>Sophisticated, long-term targeted attack where attacker gains access and remains undetected for extended periods. Typically state-sponsored or highly skilled groups targeting strategic objectives.</p>' },
                        { id: 'insider_threat', label: 'Insider Threat', level: 2, tag: 'attack', leaf: true, content: '<h4>Insider Threat</h4><p>Employee, contractor, or partner misusing authorized access. May be malicious (intentional) or negligent (unintentional). Harder to detect because insiders have legitimate privileges.</p>' },
                        { id: 'virus_worm', label: 'Viruses & Worms', level: 2, tag: 'attack', leaf: true, content: '<h4>Viruses & Worms</h4><p>Malicious software designed to spread. Viruses attach to other files; worms self-replicate across networks without user action.</p>' },
                        { id: 'mobile_threats', label: 'Mobile Threats', level: 2, tag: 'attack', leaf: true, content: '<h4>Mobile Device Threats</h4><p>Data leakage, phishing attacks, unsecured Wi-Fi, spyware, network spoofing, broken cryptography. Smartphones are increasingly targeted.</p>' }
                    ]
                },
                {
                    id: 'exploit_techniques', label: 'Exploitation Techniques', level: 1, tag: 'exploit',
                    children: [
                        { id: 'shrinkwrap', label: 'Shrink-Wrap Code Exploits', level: 2, tag: 'exploit', leaf: true, content: '<h4>Shrink-Wrap Code Exploits</h4><p>Attackers exploit known vulnerabilities in widely distributed off-the-shelf software (COTS) that remains unpatched. Targets: unpatched OSes, commercial applications, poorly designed software.</p>' },
                        { id: 'motives_methods', label: 'Motive, Method, Vulnerability', level: 2, tag: 'exploit', leaf: true, content: '<h4>Attack Components</h4><p><strong>Motive:</strong> Financial gain, espionage, disruption.<br><strong>Method:</strong> Phishing, malware, SQL injection.<br><strong>Vulnerability:</strong> Weakness exploited to achieve objective.</p><p>Ethical hacking uses similar techniques but with authorization and defensive intent.</p>' }
                    ]
                },
                {
                    id: 'info_warfare', label: 'Information Warfare', level: 1, tag: 'exploit',
                    children: [
                        { id: 'defensive_iw', label: 'Defensive Information Warfare', level: 2, tag: 'exploit', leaf: true, content: '<h4>Defensive Information Warfare</h4><p>Actions to protect information systems from attacks: security controls, monitoring, incident response, vulnerability management, and proactive defense.</p>' },
                        { id: 'offensive_iw', label: 'Offensive Information Warfare', level: 2, tag: 'exploit', leaf: true, content: '<h4>Offensive Information Warfare</h4><p>Proactive actions against adversaries to disrupt, manipulate, or destroy their information systems and operations. Includes cyber attacks, misinformation campaigns, and strategic disruption.</p>' }
                    ]
                },
                {
                    id: 'security_triangle', label: 'Security-Functionality-Usability', level: 1, tag: 'terminology',
                    children: [
                        { id: 'triangle', label: 'The Balancing Act', level: 2, tag: 'terminology', leaf: true, content: '<h4>Security, Functionality, Usability Triangle</h4><p>Strong security often reduces usability and functionality. Systems must balance these three components. If the ball moves toward Security, functionality and usability suffer. Effective security finds equilibrium that meets requirements without over-constraining users.</p>' }
                    ]
                }
            ]
        };

        let nodes = {}, expanded = new Set(['eh_root']);
        let selectedId = null;
        let tf = { x: 70, y: 80, scale: 0.85 }, isPanning = false, panStart = {};
        const cw = document.getElementById('cw'), canvas = document.getElementById('canvas'), linesEl = document.getElementById('lines');
        const NW = 185, NH = 48, HG = 280, VG = 62;

        function flatten(n, d = 0) { nodes[n.id] = { ...n, depth: d }; if (n.children) n.children.forEach(c => flatten(c, d + 1)); }
        flatten(DATA);

        function countH(n) {
            if (!n.children || !expanded.has(n.id)) return 1;
            let t = 0;
            n.children.forEach(c => t += countH(nodes[c.id] || c));
            return Math.max(t, 1);
        }

        function layout() {
            let pos = {};
            function assign(n, x, yOff) {
                pos[n.id] = { x, yOff, y: 0 };
                if (n.children && expanded.has(n.id)) {
                    let sy = yOff;
                    n.children.forEach(c => {
                        let cn = nodes[c.id] || c;
                        let ch = countH(cn);
                        assign(cn, x + HG, sy);
                        sy += ch;
                    });
                }
            }
            assign(DATA, 0, 0);
            function computeY(n) {
                if (!n.children || !expanded.has(n.id)) { pos[n.id].y = pos[n.id].yOff * VG; return; }
                n.children.forEach(c => computeY(nodes[c.id] || c));
                let kids = n.children.map(c => nodes[c.id] || c);
                let topY = pos[kids[0].id].y, botY = pos[kids[kids.length - 1].id].y;
                pos[n.id].y = (topY + botY) / 2;
            }
            computeY(DATA);
            return pos;
        }

        function render() {
            let pos = layout();
            let existing = {};
            canvas.querySelectorAll('.node').forEach(el => { existing[el.dataset.id] = el; });
            let vis = new Set();
            function collect(n) { vis.add(n.id); if (n.children && expanded.has(n.id)) n.children.forEach(c => collect(nodes[c.id] || c)); }
            collect(DATA);
            Object.keys(existing).forEach(id => { if (!vis.has(id)) existing[id].remove(); });
            vis.forEach(id => {
                let nd = nodes[id], p = pos[id];
                if (!p) return;
                let el = existing[id];
                let isNew = !el;
                if (isNew) { el = document.createElement('div'); el.className = 'node'; el.dataset.id = id; canvas.appendChild(el); }
                let lvlClass = id === 'eh_root' ? 'root' : (nd.level === 1 ? 'l1' : (nd.level === 2 ? 'l2' : 'l3'));
                el.className = `node ${lvlClass} ${selectedId === id ? 'selected' : ''}`;
                el.style.left = p.x + 'px';
                el.style.top = (p.y - NH / 2) + 'px';
                el.style.width = NW + 'px';
                let hasChildren = nd.children && nd.children.length > 0 && !nd.leaf;
                let icon = hasChildren ? `<svg class="chev ${expanded.has(id) ? 'open' : ''}" viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M6 4l4 4-4 4" stroke-width="2"/></svg>` : (nd.leaf ? `<svg class="li" viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="3.5"/></svg>` : '');
                el.innerHTML = `<span class="nl">${nd.label.replace(/\n/g, '<br>')}</span>${icon}`;
                if (isNew) el.classList.add('entering');
                el.onclick = (e) => { e.stopPropagation(); onClick(id); };
            });
            drawLines(pos, vis);
        }

        function drawLines(pos, vis) {
            let paths = [];
            vis.forEach(id => {
                let nd = nodes[id];
                if (!nd.children || !expanded.has(id)) return;
                nd.children.forEach(c => {
                    let cid = (nodes[c.id] || c).id;
                    if (!vis.has(cid)) return;
                    let p1 = pos[id], p2 = pos[cid];
                    if (!p1 || !p2) return;
                    let x1 = p1.x + NW, y1 = p1.y;
                    let x2 = p2.x, y2 = p2.y;
                    let mx = x1 + (x2 - x1) * 0.5;
                    paths.push(`<path class="pl" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`);
                });
            });
            linesEl.innerHTML = paths.join('');
        }

        function onClick(id) {
            let nd = nodes[id];
            if (nd.leaf || (nd.children && nd.children.length === 0)) { selectedId = id; openPanel(id); render(); return; }
            if (nd.children && nd.children.length) {
                expanded.has(id) ? expanded.delete(id) : expanded.add(id);
                render();
            }
        }

        function openPanel(id) {
            let nd = nodes[id];
            document.getElementById('ptitle').innerHTML = nd.label.replace(/\n/g, ' ');
            let tagDiv = document.getElementById('ptag');
            let tagMap = { cia: 'CIA TRIAD', terminology: 'TERMINOLOGY', threats: 'THREATS', attack: 'ATTACKS', exploit: 'EXPLOIT' };
            let raw = tagMap[nd.tag] || 'SECURITY';
            tagDiv.textContent = raw;
            let cls = `tag-${nd.tag === 'cia' ? 'cia' : (nd.tag === 'terminology' ? 'terminology' : (nd.tag === 'threats' ? 'threats' : (nd.tag === 'attack' ? 'attack' : 'exploit')))}`;
            tagDiv.className = cls;
            tagDiv.style.display = 'inline-flex';
            document.getElementById('pb').innerHTML = nd.content || '<p>Information security concept.</p>';
            document.getElementById('panel').classList.add('open');
        }

        document.getElementById('pc').onclick = () => { document.getElementById('panel').classList.remove('open'); selectedId = null; render(); };
        cw.addEventListener('mousedown', e => { if (e.target.closest('.node') || e.target.closest('#panel')) return; isPanning = true; cw.classList.add('panning'); panStart = { x: e.clientX - tf.x, y: e.clientY - tf.y }; });
        window.addEventListener('mousemove', e => { if (!isPanning) return; tf.x = e.clientX - panStart.x; tf.y = e.clientY - panStart.y; applyTf(); });
        window.addEventListener('mouseup', () => { isPanning = false; cw.classList.remove('panning'); });
        cw.addEventListener('wheel', e => { e.preventDefault(); let delta = -e.deltaY * 0.001; let ns = Math.min(2.2, Math.max(0.3, tf.scale + delta)); let rect = cw.getBoundingClientRect(); let mx = e.clientX - rect.left, my = e.clientY - rect.top; tf.x = mx - (mx - tf.x) * (ns / tf.scale); tf.y = my - (my - tf.y) * (ns / tf.scale); tf.scale = ns; applyTf(); }, { passive: false });
        function applyTf() { canvas.style.transform = `translate(${tf.x}px, ${tf.y}px) scale(${tf.scale})`; document.getElementById('zl').innerText = Math.round(tf.scale * 100) + '%'; }
        document.getElementById('zi').onclick = () => { tf.scale = Math.min(2.2, tf.scale + 0.12); applyTf(); };
        document.getElementById('zo').onclick = () => { tf.scale = Math.max(0.3, tf.scale - 0.12); applyTf(); };
        document.getElementById('rb').onclick = () => { tf = { x: 60, y: 70, scale: 0.85 }; applyTf(); };
        document.getElementById('eab').onclick = () => { function ea(n) { if (n.children) { expanded.add(n.id); n.children.forEach(c => ea(nodes[c.id] || c)); } } ea(DATA); render(); };
        document.getElementById('cab').onclick = () => { expanded.clear(); expanded.add('eh_root'); selectedId = null; document.getElementById('panel').classList.remove('open'); render(); };
        const searchInput = document.getElementById('search'), srDiv = document.getElementById('sr');
        function allNodes() { let res = []; function walk(n) { res.push({ id: n.id, label: n.label.replace(/\n/g, ' ') }); if (n.children) n.children.forEach(c => walk(nodes[c.id] || c)); } walk(DATA); return res; }
        searchInput.addEventListener('input', () => {
            let q = searchInput.value.trim().toLowerCase();
            if (!q) { srDiv.classList.remove('v'); return; }
            let matches = allNodes().filter(n => n.label.toLowerCase().includes(q)).slice(0, 8);
            if (!matches.length) { srDiv.innerHTML = '<div class="sri">No results</div>'; srDiv.classList.add('v'); return; }
            srDiv.innerHTML = matches.map(m => `<div class="sri" data-id="${m.id}">${m.label.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark>$1</mark>')}</div>`).join('');
            srDiv.classList.add('v');
        });
        srDiv.addEventListener('click', e => { let it = e.target.closest('.sri'); if (it?.dataset.id) { srDiv.classList.remove('v'); searchInput.value = ''; navTo(it.dataset.id); } });
        function navTo(id) {
            function findPath(n, target, path = []) { if (n.id === target) return [...path, n.id]; if (n.children) for (let c of n.children) { let res = findPath(nodes[c.id] || c, target, [...path, n.id]); if (res) return res; } return null; }
            let p = findPath(DATA, id);
            if (p) { p.forEach(pid => expanded.add(pid)); selectedId = id; render(); setTimeout(() => { let el = canvas.querySelector(`[data-id="${id}"]`); if (el) { let rect = el.getBoundingClientRect(), cwRect = cw.getBoundingClientRect(); tf.x += (cwRect.width / 2) - (rect.left + rect.width / 2 - cwRect.left); tf.y += (cwRect.height / 2) - (rect.top + rect.height / 2 - cwRect.top); applyTf(); } if (nodes[id] && nodes[id].leaf) openPanel(id); }, 100); }
        }
        let isDark = true;
        document.getElementById('tb').onclick = () => { isDark = !isDark; document.documentElement.setAttribute('data-theme', isDark ? '' : 'light'); document.getElementById('tb').textContent = isDark ? '🌙' : '☀️'; };
        tf = { x: 80, y: 90, scale: 0.88 };
        render(); applyTf();
    </script>
</body>

</html>
