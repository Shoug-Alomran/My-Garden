  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHOUG.TECH // My Progress</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="/javascripts/course-manifest.js"></script>
  <style>
    :root {
      --bg:     #050508; --surface:#0a0514; --raised:#110822;
      --brand:  #b829ea; --red:#ff2a4b; --green:#22c55e;
      --text:   #f8f7fb; --dim:#8f8b9a; --muted:#4a4258;
      --border: rgba(255,255,255,0.07);
      --cs:#3b82f6; --cys:#ff2a4b; --se:#b829ea; --other:#f59e0b;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-top:0;}
    .page{max-width:1200px;margin:0 auto;padding:48px 32px 100px;}

    .breadcrumb{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.1em;margin-bottom:28px;display:flex;align-items:center;gap:8px;}
    .breadcrumb a{color:var(--muted);text-decoration:none;transition:color 150ms;}.breadcrumb a:hover{color:var(--brand);}
    .breadcrumb-sep{opacity:.4;}.breadcrumb-cur{color:var(--brand);}

    .page-eyebrow{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--brand);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;}
    .page-title{font-family:'JetBrains Mono',monospace;font-size:2.2rem;font-weight:800;letter-spacing:-.02em;margin-bottom:6px;}
    .page-sub{font-size:.875rem;color:var(--dim);margin-bottom:52px;}

    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:48px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);padding:28px 24px;position:relative;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;width:28px;height:2px;}
    .stat-card:nth-child(1)::before{background:var(--brand);}
    .stat-card:nth-child(2)::before{background:var(--cs);}
    .stat-card:nth-child(3)::before{background:var(--green);}
    .stat-card:nth-child(4)::before{background:var(--red);}
    .stat-num{font-family:'JetBrains Mono',monospace;font-size:2.4rem;font-weight:800;display:block;margin-bottom:4px;}
    .stat-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;}

    /* Overview */
    .overview-row{display:grid;grid-template-columns:200px 1fr;gap:40px;align-items:center;margin-bottom:48px;padding:36px;background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden;}
    .overview-row::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(184,41,234,.08),transparent 70%);pointer-events:none;}
    .ring-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
    .ring-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;}
    .ring-pct{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:800;color:var(--brand);}
    .overview-text h2{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:800;margin-bottom:10px;}
    .overview-text p{font-size:.875rem;color:var(--dim);line-height:1.7;max-width:480px;margin-bottom:20px;}
    .overview-bar-row{display:flex;flex-direction:column;gap:10px;}
    .overview-bar-item{display:flex;align-items:center;gap:12px;}
    .overview-bar-dot{width:8px;height:8px;flex-shrink:0;}
    .overview-bar-name{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--dim);width:140px;flex-shrink:0;}
    .overview-bar-track{flex:1;height:3px;background:rgba(255,255,255,.06);}
    .overview-bar-fill{height:100%;transition:width 800ms cubic-bezier(.4,0,.2,1);}
    .overview-bar-stat{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);width:56px;text-align:right;}

    /* Chart section label */
    .chart-section-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}

    /* Charts row (2-col) */
    .charts-row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
    .chart-card{background:var(--surface);border:1px solid var(--border);padding:28px;}
    .chart-title{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
    .chart-sub{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);margin-bottom:24px;}

    /* Radar */
    .radar-wrap{display:flex;justify-content:center;align-items:center;}
    .radar-bg{fill:none;stroke:rgba(255,255,255,.06);}
    .radar-axis{stroke:rgba(255,255,255,.08);}
    .radar-polygon{fill:rgba(184,41,234,.15);stroke:var(--brand);stroke-width:1.5;stroke-linejoin:round;}
    .radar-dot{fill:var(--brand);}
    .radar-label{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--dim);}
    .radar-pct{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;}

    /* Heatmap */
    .heatmap-wrap{overflow-x:auto;}
    .heatmap-month-labels{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--muted);}
    .heatmap-day-labels{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--muted);}
    .heatmap-cell{rx:2;}
    .heatmap-legend{display:flex;align-items:center;gap:6px;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);}
    .heatmap-legend-cells{display:flex;gap:3px;}
    .heatmap-legend-cell{width:11px;height:11px;border-radius:2px;}

    /* Bar chart */
    .bar-chart-wrap{margin-bottom:20px;}
    .bar-chart-card{background:var(--surface);border:1px solid var(--border);padding:28px;}
    .bar-chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 32px;}
    .bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
    .bar-row:last-child{border-bottom:none;}
    .bar-course-name{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--dim);width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .bar-track{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:1px;overflow:hidden;}
    .bar-fill{height:100%;border-radius:1px;transition:width 800ms cubic-bezier(.4,0,.2,1);}
    .bar-pct{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:700;width:34px;text-align:right;flex-shrink:0;}

    /* Line chart */
    .line-chart-wrap{margin-bottom:48px;}
    .line-chart-card{background:var(--surface);border:1px solid var(--border);padding:28px;}
    .line-area{fill:url(#lineGrad);}
    .line-path{fill:none;stroke:var(--brand);stroke-width:2;stroke-linejoin:round;}
    .line-grid{stroke:rgba(255,255,255,.05);}
    .line-label{font-family:'JetBrains Mono',monospace;font-size:9px;fill:var(--muted);}
    .line-dot{fill:var(--brand);}

    /* Track grid */
    .track-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:56px;}
    .track-card{background:var(--surface);border:1px solid var(--border);padding:28px;cursor:pointer;transition:border-color 200ms,background 200ms;position:relative;}
    .track-card:hover{border-color:rgba(255,255,255,.15);background:var(--raised);}
    .track-card.open{border-color:var(--track-color,var(--brand));}
    .track-card-top{display:flex;align-items:center;gap:20px;}
    .track-ring-wrap{flex-shrink:0;}
    .track-info{flex:1;min-width:0;}
    .track-name{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
    .track-stat{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);}
    .track-pct-label{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:800;margin-top:6px;}
    .track-chevron{position:absolute;top:28px;right:28px;font-size:.7rem;color:var(--muted);transition:transform 200ms;}
    .track-card.open .track-chevron{transform:rotate(180deg);}
    .course-list{display:none;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .track-card:not(.open) .course-list{display:none!important;}
    .course-card{background:var(--raised);border:1px solid var(--border);padding:16px;display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;transition:border-color 150ms,background 150ms;}
    .course-card:hover{border-color:rgba(255,255,255,.14);background:rgba(255,255,255,.02);}
    .course-info{flex:1;min-width:0;}
    .course-code{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
    .course-name{font-size:.72rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .course-stat{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:4px;}

    /* SVG rings */
    .ring-bg{fill:none;stroke:rgba(255,255,255,.06);}
    .ring-fg{fill:none;stroke-linecap:round;transition:stroke-dashoffset 900ms cubic-bezier(.4,0,.2,1);}

    /* States */
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 0;text-align:center;gap:14px;}
    .state-tag{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;}
    .state-msg{font-family:'JetBrains Mono',monospace;font-size:.95rem;color:var(--dim);}
    .state-btn{display:inline-flex;align-items:center;height:36px;padding:0 20px;border:1px solid var(--brand);background:transparent;color:var(--brand);font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:background 150ms;margin-top:6px;}
    .state-btn:hover{background:rgba(184,41,234,.12);}

    /* Profile card */
    .profile-card{background:var(--surface);border:1px solid var(--border);padding:24px 28px;margin-bottom:32px;display:flex;align-items:center;gap:20px;position:relative;}
    .profile-avatar{width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:800;flex-shrink:0;border-radius:0;}
    .profile-info{flex:1;min-width:0;}
    .profile-displayname{font-family:'JetBrains Mono',monospace;font-size:.88rem;font-weight:800;letter-spacing:.04em;margin-bottom:2px;}
    .profile-username{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);}
    .profile-bio{font-size:.78rem;color:var(--dim);margin-top:6px;}
    .profile-actions{display:flex;gap:10px;align-items:center;flex-shrink:0;}
    .profile-link{height:32px;display:inline-flex;align-items:center;padding:0 14px;font-family:'JetBrains Mono',monospace;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border:1px solid rgba(184,41,234,.4);color:#b829ea;transition:background 150ms;}
    .profile-link:hover{background:rgba(184,41,234,.1);}
    /* Profile setup banner */
    .setup-banner{background:var(--surface);border:1px solid rgba(184,41,234,.25);padding:24px 28px;margin-bottom:32px;}
    .setup-banner-top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;}
    .setup-banner-title{font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);}
    .setup-banner-sub{font-size:.8rem;color:var(--dim);margin-top:3px;}
    .setup-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
    .setup-input{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem;padding:9px 12px;outline:none;width:100%;box-sizing:border-box;transition:border-color 150ms;}
    .setup-input:focus{border-color:rgba(184,41,234,.5);}
    .setup-label{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px;}
    .setup-field{display:flex;flex-direction:column;}
    .setup-error{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--red);min-height:16px;margin-bottom:8px;}
    .setup-submit{height:36px;padding:0 20px;background:var(--brand);color:#0a0514;border:none;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background 150ms;}
    .setup-submit:hover{background:#c940f5;}
    .setup-submit:disabled{opacity:.5;cursor:not-allowed;}
    .setup-avatar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:10px;max-width:420px;}
    .setup-avatar-item{background:#0a0514;border:2px solid rgba(255,255,255,.07);cursor:pointer;padding:0;transition:border-color 150ms,background 150ms;aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .setup-avatar-item:hover{border-color:rgba(184,41,234,.45);}
    .setup-avatar-item.selected{border-color:#b829ea;box-shadow:0 0 0 1px #b829ea inset;}
    .setup-avatar-item img{width:100%;height:100%;display:block;object-fit:cover;}

    /* Light mode */
    body.shoug-light-mode{background:#f6f4fb;color:#16111f;}
    body.shoug-light-mode .stat-card,body.shoug-light-mode .overview-row,
    body.shoug-light-mode .track-card,body.shoug-light-mode .chart-card,
    body.shoug-light-mode .bar-chart-card,body.shoug-light-mode .line-chart-card{background:#fff;border-color:rgba(22,17,31,.1);}
    body.shoug-light-mode .course-card{background:#f0ecfb;}
    body.shoug-light-mode .ring-bg,.shoug-light-mode .radar-bg{stroke:rgba(22,17,31,.08);}
    body.shoug-light-mode .radar-label,.shoug-light-mode .line-label,.shoug-light-mode .heatmap-month-labels{fill:#534a61;}
    body.shoug-light-mode .chart-section-label{border-color:rgba(22,17,31,.08);color:#534a61;}
    body.shoug-light-mode .bar-row{border-color:rgba(22,17,31,.05);}
    body.shoug-light-mode .overview-bar-track{background:rgba(0,0,0,.06);}
    body.shoug-light-mode .overview-text h2{color:#16111f;}
    body.shoug-light-mode .chart-title{color:#16111f;}
    body.shoug-light-mode .setup-input{background:rgba(0,0,0,.03);border-color:rgba(22,17,31,.12);color:#16111f;}
    body.shoug-light-mode .state-msg{color:#534a61;}
    body.shoug-light-mode .course-name,
    body.shoug-light-mode .bar-course-name,
    body.shoug-light-mode .overview-bar-name{color:#534a61;}

    @media(max-width:900px){
      .stats-row{grid-template-columns:1fr 1fr;}
      .overview-row{grid-template-columns:1fr;}
      .charts-row-2{grid-template-columns:1fr;}
      .track-grid{grid-template-columns:1fr;}
      .bar-chart-grid{grid-template-columns:1fr;}
    }
    @media(max-width:600px){
      .page{padding:28px 16px 80px;}
      .page-title{font-size:1.5rem;}
      .stats-row{grid-template-columns:1fr 1fr;gap:10px;}
      .course-list{grid-template-columns:1fr;}
    }

    .shoug-lang-btn{position:fixed;top:16px;inset-inline-end:16px;z-index:500;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.12);background:rgba(5,5,8,.7);color:#f8f7fb;text-decoration:none;font-family:'JetBrains Mono',monospace;font-size:.64rem;font-weight:800;letter-spacing:.08em;cursor:pointer;transition:border-color 160ms ease,color 160ms ease,background 160ms ease;}
    .shoug-lang-btn:hover{color:#b829ea;border-color:rgba(184,41,234,.55);}
    body.shoug-light-mode .shoug-lang-btn{color:#16111f;background:rgba(255,255,255,.7);}
  </style>

    langToggle.setAttribute("aria-label", lang==="ar" ? "حول إلى الإنجليزية" : "Switch to Arabic");

    document.documentElement.lang = lang==="ar" ? "ar-SA" : "en";
    document.documentElement.dir = lang==="ar" ? "rtl" : "ltr";
    applyLangUI(lang);
    localStorage.setItem("shoug-lang", lang);
    if (window.__shougRerender) window.__shougRerender();
  }
  var initialLang = localStorage.getItem("shoug-lang")==="ar" ? "ar" : "en";
  setLang(initialLang);
  if(langToggle){
    langToggle.addEventListener("click", function(){
      setLang(curLang()==="ar" ? "en" : "ar");

<script>
(function(){
  var L = window.__shougL;
  var TRACK_META={
    "computer-science":    {label:"Computer Science",    color:"#3b82f6",abbr:"CS"},
    "cybersecurity":       {label:"Cybersecurity",       color:"#ff2a4b",abbr:"CYS"},
    "software-engineering":{label:"Software Engineering",color:"#b829ea",abbr:"SE"},
    "other-courses":       {label:"Other Courses",       color:"#f59e0b",abbr:"OTHER"},
  };

  function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

  var AVATAR_PRESETS = [
    'av-f1.webp','av-f2.webp','av-f3.webp','av-f4.webp','av-f5.webp','av-f6.webp','av-f7.webp',
    'av-m1.webp','av-m2.webp','av-m3.webp','av-m4.webp','av-m5.webp','av-m6.webp','av-m7.webp'
  ];
  function avatarUrl(preset){
    var i = parseInt(preset, 10);
    return (!isNaN(i) && AVATAR_PRESETS[i]) ? '/assets/avatars/'+AVATAR_PRESETS[i] : null;
  }

  function ring(r,pct,color,size){
    size=size||(r*2+8);
    var cx=size/2,cy=size/2,circ=2*Math.PI*r,offset=circ*(1-pct/100);
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'"><circle class="ring-bg" cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke-width="4"/><circle class="ring-fg" cx="'+cx+'" cy="'+cy+'" r="'+r+'" stroke="'+color+'" stroke-width="4" stroke-dasharray="'+circ.toFixed(2)+'" stroke-dashoffset="'+offset.toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')"/></svg>';
  }

  // ── Build page map from generated academic content inventory ──────────
  function buildPageMap(pages){
    var map={};
    pages.forEach(function(item){
      if(!item.track||!item.course||!item.url)return;
      var track=item.track,course=item.course;
      if(!map[track])map[track]={};
      if(!map[track][course])map[track][course]={total:0,title:item.courseTitle||course.toUpperCase(),url:item.courseUrl||("/academics/"+track+"/"+course+"/"),pages:[]};
      map[track][course].total++;
      map[track][course].pages.push(item);
    });
    return map;
  }

  // ── i18n re-render cache ────────────────────────────────────────────
  var _rrProgress=null, _rrGrandDone=0, _rrGrandTotal=0, _rrOverallPct=0, _rrCompletedDates=null, _rrUserProfile=null, _rrUid=null;

  function calcProgress(pageMap,completedSet){
    var result={};
    Object.keys(pageMap).forEach(function(track){
      result[track]={};
      Object.keys(pageMap[track]).forEach(function(course){
        var info=pageMap[track][course],total=info.total,done=0;
        info.pages.forEach(function(page){ if(completedSet[page.url]) done++; });
        result[track][course]={total:total,done:done,pct:total?Math.round(done/total*100):0,title:info.title,url:info.url};
      });
    });
    return result;
  }

  // ── 1. Stats ─────────────────────────────────────────────────────────
  function renderStats(grandDone,grandTotal,overallPct){
    document.getElementById("stats-row").innerHTML=[
      sCard(grandDone,L().pagesCompleted,"#b829ea"),
      sCard(grandTotal,L().totalPages,"#3b82f6"),
      sCard(overallPct+"%",L().overallProgress,"#22c55e"),
      sCard(Object.keys(TRACK_META).length,L().activeTracks,"#ff2a4b"),
    ].join("");
  }
  function sCard(val,label,color){
    return '<div class="stat-card"><span class="stat-num" style="color:'+color+'">'+val+'</span><span class="stat-label">'+label+'</span></div>';
  }

  // ── 2. Overview ───────────────────────────────────────────────────────
  function renderOverview(progress,grandDone,grandTotal,overallPct){
    var bars=Object.keys(TRACK_META).map(function(track){
      var meta=TRACK_META[track],courses=progress[track]||{},tDone=0,tTotal=0;
      Object.keys(courses).forEach(function(c){tDone+=courses[c].done;tTotal+=courses[c].total;});
      var tPct=tTotal?Math.round(tDone/tTotal*100):0;
      return '<div class="overview-bar-item"><div class="overview-bar-dot" style="background:'+meta.color+'"></div><span class="overview-bar-name">'+escHtml(L().trackLabels[track])+'</span><div class="overview-bar-track"><div class="overview-bar-fill" style="width:'+tPct+'%;background:'+meta.color+'"></div></div><span class="overview-bar-stat">'+tDone+"/"+tTotal+'</span></div>';
    }).join("");
    document.getElementById("overview-row").innerHTML=
      '<div class="ring-wrap">'+ring(60,overallPct,"#b829ea",140)+'<div class="ring-label">'+L().overall+'</div><div class="ring-pct">'+overallPct+'%</div></div>'+
      '<div class="overview-text"><h2>'+L().overviewHeading(grandDone,grandTotal)+'</h2><p>'+L().overviewParagraph+'</p><div class="overview-bar-row">'+bars+'</div></div>';
  }

  // ── 3. Radar Chart ────────────────────────────────────────────────────
  function renderRadar(progress){
    var W=280,H=280,cx=140,cy=140,R=100;
    var tracks=["computer-science","software-engineering","cybersecurity","other-courses"];
    var angles=[-90,0,90,180]; // degrees: top, right, bottom, left

    function pt(i,pct){
      var rad=angles[i]*Math.PI/180;
      return {x:cx+Math.cos(rad)*R*(pct/100),y:cy+Math.sin(rad)*R*(pct/100)};
    }

    // Grid circles
    var gridLines="";
    [25,50,75,100].forEach(function(g){
      gridLines+='<circle class="radar-bg" cx="'+cx+'" cy="'+cy+'" r="'+(R*g/100)+'" stroke-width="1"/>';
    });
    // Pct labels on grid
    var gridLabels='<text x="'+(cx+4)+'" y="'+(cy-R*0.5+4)+'" class="radar-label" opacity=".5">50%</text>';

    // Axis lines
    var axes=tracks.map(function(_,i){
      var end=pt(i,100);
      return '<line class="radar-axis" x1="'+cx+'" y1="'+cy+'" x2="'+end.x+'" y2="'+end.y+'" stroke-width="1"/>';
    }).join("");

    // Data polygon
    var pcts=tracks.map(function(track){
      var courses=progress[track]||{},tDone=0,tTotal=0;
      Object.keys(courses).forEach(function(c){tDone+=courses[c].done;tTotal+=courses[c].total;});
      return tTotal?Math.round(tDone/tTotal*100):0;
    });
    var polyPts=tracks.map(function(_,i){var p=pt(i,Math.max(pcts[i],2));return p.x+","+p.y;}).join(" ");
    var polygon='<polygon class="radar-polygon" points="'+polyPts+'"/>';

    // Dots + labels
    var dots="",labels="";
    tracks.forEach(function(track,i){
      var meta=TRACK_META[track];
      var p=pt(i,Math.max(pcts[i],2));
      dots+='<circle class="radar-dot" cx="'+p.x+'" cy="'+p.y+'" r="4" fill="'+meta.color+'"/>';
      // Label position (slightly beyond the axis end)
      var lp=pt(i,115);
      var anchor=i===1?"start":i===3?"end":"middle";
      var dy=i===0?"-6":i===2?"14":"4";
      labels+='<text x="'+lp.x+'" y="'+lp.y+'" class="radar-label" text-anchor="'+anchor+'" dy="'+dy+'" fill="'+meta.color+'">'+meta.abbr+' '+pcts[i]+'%</text>';
    });

    var padX=45,padY=15;
    var svg='<svg width="'+(W+padX*2)+'" height="'+(H+padY*2)+'" viewBox="-'+padX+' -'+padY+' '+(W+padX*2)+' '+(H+padY*2)+'">'+gridLines+axes+polygon+dots+labels+gridLabels+'</svg>';
    return '<div class="chart-card"><div class="chart-title">'+L().trackBalanceTitle+'</div><div class="chart-sub">'+L().trackBalanceSub+'</div><div class="radar-wrap">'+svg+'</div></div>';
  }

  // ── 4. Heatmap ────────────────────────────────────────────────────────
  function renderHeatmap(completedDates){
    var CELL=13,GAP=3,STEP=CELL+GAP;
    var WEEKS=26,DAYS=7;
    var MONTHS=L().months;
    var today=new Date();today.setHours(0,0,0,0);

    // Start date: 26 weeks ago, aligned to Sunday
    var start=new Date(today);
    start.setDate(start.getDate()-(WEEKS*7-1));
    start.setDate(start.getDate()-start.getDay());

    // Count completions per day
    var dayCounts={};
    completedDates.forEach(function(d){
      var key=d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();
      dayCounts[key]=(dayCounts[key]||0)+1;
    });
    var maxCount=Math.max(1,Math.max.apply(null,Object.values(dayCounts).length?Object.values(dayCounts):[1]));

    function cellColor(count){
      if(!count)return "rgba(255,255,255,0.04)";
      var intensity=count/maxCount;
      if(intensity<0.25)return "rgba(184,41,234,0.25)";
      if(intensity<0.5) return "rgba(184,41,234,0.5)";
      if(intensity<0.75)return "rgba(184,41,234,0.75)";
      return "#b829ea";
    }

    var LABEL_W=24;
    var svgW=LABEL_W+WEEKS*STEP+GAP;
    var svgH=24+DAYS*STEP;
    var cells="",monthLabels="",lastMonth=-1;
    var totalDays=0,activeDays=0;

    var cur=new Date(start);
    for(var col=0;col<WEEKS;col++){
      for(var row=0;row<DAYS;row++){
        if(cur>today){cur.setDate(cur.getDate()+1);continue;}
        var key=cur.getFullYear()+"-"+cur.getMonth()+"-"+cur.getDate();
        var count=dayCounts[key]||0;
        var x=LABEL_W+col*STEP,y=24+row*STEP;
        cells+='<rect class="heatmap-cell" x="'+x+'" y="'+y+'" width="'+CELL+'" height="'+CELL+'" fill="'+cellColor(count)+'"><title>'+cur.toDateString()+(count?' — '+count+' '+L().pageWord(count):'')+'</title></rect>';
        if(count>0)activeDays++;
        totalDays++;
        // Month label at first week of each month
        if(cur.getDate()<=7&&cur.getMonth()!==lastMonth){
          monthLabels+='<text class="heatmap-month-labels" x="'+x+'" y="14">'+MONTHS[cur.getMonth()]+'</text>';
          lastMonth=cur.getMonth();
        }
        cur.setDate(cur.getDate()+1);
      }
    }

    // Day labels
    var dayLabels=L().days.map(function(d,i){
      return i%2===1?'<text class="heatmap-day-labels" x="8" y="'+(24+i*STEP+CELL-2)+'">'+d+'</text>':"";
    }).join("");

    var svg='<svg width="'+svgW+'" height="'+svgH+'" viewBox="0 0 '+svgW+' '+svgH+'">'+monthLabels+dayLabels+cells+'</svg>';
    var legend='<div class="heatmap-legend">'+L().less+' <div class="heatmap-legend-cells"><div class="heatmap-legend-cell" style="background:rgba(255,255,255,.04)"></div><div class="heatmap-legend-cell" style="background:rgba(184,41,234,.25)"></div><div class="heatmap-legend-cell" style="background:rgba(184,41,234,.5)"></div><div class="heatmap-legend-cell" style="background:rgba(184,41,234,.75)"></div><div class="heatmap-legend-cell" style="background:#b829ea"></div></div> '+L().more+'</div>';
    return '<div class="chart-card"><div class="chart-title">'+L().studyActivityTitle+'</div><div class="chart-sub">'+L().studyActivitySub+'</div><div class="heatmap-wrap">'+svg+'</div>'+legend+'</div>';
  }

  // ── 5. Bar Chart ──────────────────────────────────────────────────────
  function renderBarChart(progress){
    var all=[];
    Object.keys(TRACK_META).forEach(function(track){
      var courses=progress[track]||{};
      Object.keys(courses).forEach(function(courseKey){
        var c=courses[courseKey],parts=c.title.split("//");
        all.push({code:(parts[0]||courseKey).trim(),pct:c.pct,color:TRACK_META[track].color,done:c.done,total:c.total});
      });
    });
    all.sort(function(a,b){return b.pct-a.pct;});

    // Split into 2 columns
    var half=Math.ceil(all.length/2);
    var col1=all.slice(0,half),col2=all.slice(half);
    function barRow(item){
      return '<div class="bar-row"><span class="bar-course-name" title="'+escHtml(item.code)+'" style="color:'+item.color+'">'+escHtml(item.code)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+item.pct+'%;background:'+item.color+'"></div></div><span class="bar-pct" style="color:'+item.color+'">'+item.pct+'%</span></div>';
    }
    var col1Html=col1.map(barRow).join("");
    var col2Html=col2.map(barRow).join("");
    document.getElementById("bar-chart-wrap").innerHTML='<div class="bar-chart-card"><div class="chart-title">'+L().courseRankingsTitle+'</div><div class="chart-sub">'+L().courseRankingsSub+'</div><div class="bar-chart-grid"><div>'+col1Html+'</div><div>'+col2Html+'</div></div></div>';
  }

  // ── 6. Line Graph ─────────────────────────────────────────────────────
  function renderLineGraph(completedDates){
    var DAYS=90;
    var W=1100,H=180,PAD={t:16,r:16,b:32,l:40};
    var chartW=W-PAD.l-PAD.r,chartH=H-PAD.t-PAD.b;

    var today=new Date();today.setHours(0,0,0,0);
    var buckets=[];
    for(var i=DAYS-1;i>=0;i--){
      var d=new Date(today);d.setDate(d.getDate()-i);
      buckets.push({date:d,count:0,label:""});
    }

    // Count completions per day (normalize to midnight so same-day completions land correctly)
    completedDates.forEach(function(d){
      var dn=new Date(d);dn.setHours(0,0,0,0);
      var diff=Math.round((today-dn)/(1000*60*60*24));
      var idx=DAYS-1-diff;
      if(idx>=0&&idx<DAYS)buckets[idx].count++;
    });

    // Cumulative
    var cum=0,cumBuckets=buckets.map(function(b){cum+=b.count;return{date:b.date,cum:cum};});
    var maxCum=Math.max(1,cum);

    function bx(i){return PAD.l+i*(chartW/(DAYS-1));}
    function by(v){return PAD.t+chartH-(v/maxCum)*chartH;}

    // Area path
    var area="M"+bx(0)+","+by(0);
    cumBuckets.forEach(function(b,i){area+=" L"+bx(i)+","+by(b.cum);});
    area+=" L"+bx(DAYS-1)+","+(PAD.t+chartH)+" L"+bx(0)+","+(PAD.t+chartH)+" Z";

    // Line path
    var line="M"+bx(0)+","+by(0);
    cumBuckets.forEach(function(b,i){line+=" L"+bx(i)+","+by(b.cum);});

    // Y grid + labels
    var yLines=[0,25,50,75,100].map(function(p){
      var v=Math.round(maxCum*p/100),y=by(v);
      return '<line class="line-grid" x1="'+PAD.l+'" y1="'+y+'" x2="'+(PAD.l+chartW)+'" y2="'+y+'" stroke-dasharray="3,3"/><text class="line-label" x="'+(PAD.l-6)+'" y="'+(y+4)+'" text-anchor="end">'+v+'</text>';
    }).join("");

    // X labels every 2 weeks
    var xLabels="";
    var MONTHS=L().months;
    cumBuckets.forEach(function(b,i){
      if(i%14===0||i===DAYS-1){
        xLabels+='<text class="line-label" x="'+bx(i)+'" y="'+(H-6)+'" text-anchor="middle">'+MONTHS[b.date.getMonth()]+" "+b.date.getDate()+'</text>';
      }
    });

    // Dot at last point
    var lastX=bx(DAYS-1),lastY=by(cum);
    var dot=cum>0?'<circle class="line-dot" cx="'+lastX+'" cy="'+lastY+'" r="4"/>':'';

    var svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none"><defs><linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b829ea" stop-opacity=".25"/><stop offset="100%" stop-color="#b829ea" stop-opacity="0"/></linearGradient></defs>'+yLines+xLabels+'<path class="line-area" d="'+area+'"/><path class="line-path" d="'+line+'"/>'+dot+'</svg>';

    document.getElementById("line-chart-wrap").innerHTML='<div class="line-chart-card"><div class="chart-title">'+L().progressOverTimeTitle+'</div><div class="chart-sub">'+L().progressOverTimeSub+'</div>'+svg+'</div>';
  }

  // ── 7. Track Grid ─────────────────────────────────────────────────────
  function renderTrackGrid(progress){
    var html=Object.keys(TRACK_META).map(function(track){
      var meta=TRACK_META[track],courses=progress[track]||{};
      var tDone=0,tTotal=0;
      Object.keys(courses).forEach(function(c){tDone+=courses[c].done;tTotal+=courses[c].total;});
      var tPct=tTotal?Math.round(tDone/tTotal*100):0;
      var courseCards=Object.keys(courses).map(function(courseKey){
        var c=courses[courseKey],parts=c.title.split("//");
        var code=parts[0]?parts[0].trim():courseKey.toUpperCase();
        var name=parts[1]?parts[1].trim():"";
        var url="/account/course/?track="+encodeURIComponent(track)+"&course="+encodeURIComponent(courseKey);
        return '<a class="course-card" href="'+escHtml(url)+'"><div>'+ring(18,c.pct,meta.color,44)+'</div><div class="course-info"><div class="course-code" style="color:'+meta.color+'">'+escHtml(code)+'</div><div class="course-name">'+escHtml(name||code)+'</div><div class="course-stat">'+c.done+'/'+c.total+' &middot; '+c.pct+'%</div></div></a>';
      }).join("");
      return '<div class="track-card" style="--track-color:'+meta.color+'" data-track="'+track+'"><div class="track-card-top"><div class="track-ring-wrap">'+ring(32,tPct,meta.color,76)+'</div><div class="track-info"><div class="track-name" style="color:'+meta.color+'">'+escHtml(L().trackLabels[track])+'</div><div class="track-stat">'+tDone+'/'+tTotal+' '+L().pageWord(2)+'</div><div class="track-pct-label" style="color:'+meta.color+'">'+tPct+'%</div></div></div><div class="track-chevron">&#9660;</div><div class="course-list">'+courseCards+'</div></div>';
    }).join("");
    document.getElementById("track-grid").innerHTML=html;
    document.querySelectorAll(".track-card").forEach(function(card){
      card.addEventListener("click",function(e){if(!e.target.closest(".course-card"))card.classList.toggle("open");});
    });
  }

  // ── Boot ─────────────────────────────────────────────────────────────
  function show(id){
    ["loading-state","signed-out-state","empty-state","dashboard"].forEach(function(s){
      var el=document.getElementById(s);
      if(el)el.style.display=s===id?(s==="dashboard"?"block":"flex"):"none";
    });
  }

  var _shown = false;

  // ── Profile setup / display ───────────────────────────────────────────
  function renderProfileSetup(uid) {
    var el = document.getElementById("profile-setup-banner");
    el.style.display = "block";
    el.innerHTML = [
      '<div class="setup-banner">',
      '  <div class="setup-banner-top">',
      '    <div><div class="setup-banner-title">'+L().joinCommunity+'</div>',
      '    <div class="setup-banner-sub">'+L().joinCommunitySub+'</div></div>',
      '    <a class="profile-link" href="/community/">'+L().browseCommunity+'</a>',
      '  </div>',
      '  <div class="setup-form-row">',
      '    <div class="setup-field"><label class="setup-label">'+L().usernameLabel+' <span style="color:var(--muted);font-size:.52rem">'+L().usernameHint+'</span></label>',
      '      <input class="setup-input" id="su-username" placeholder="'+L().usernamePlaceholder+'" maxlength="20"></div>',
      '    <div class="setup-field"><label class="setup-label">'+L().displayNameLabel+'</label>',
      '      <input class="setup-input" id="su-displayname" placeholder="'+L().namePlaceholder+'" maxlength="40"></div>',
      '  </div>',
      '  <div class="setup-field" style="margin-bottom:12px"><label class="setup-label">'+L().bioLabel+' <span style="color:var(--muted)">'+L().optional+'</span></label>',
      '    <input class="setup-input" id="su-bio" placeholder="'+L().bioPlaceholder+'" maxlength="160"></div>',
      '  <div class="setup-field" style="margin-bottom:12px"><label class="setup-label">'+L().avatarLabel+' <span style="color:var(--muted)">'+L().optional+'</span></label>',
      '    <input type="hidden" id="su-avatarid" value="">',
      '    <div class="setup-avatar-grid">',
      AVATAR_PRESETS.map(function(file, i){
        return '<button type="button" class="setup-avatar-item" data-avid="'+i+'" aria-label="Choose avatar '+(i+1)+'"><img src="/assets/avatars/'+file+'" loading="lazy" alt="" decoding="async"></button>';
      }).join(""),
      '    </div></div>',
      '  <div class="setup-error" id="su-error"></div>',
      '  <button class="setup-submit" id="su-submit">'+L().createProfile+'</button>',
      '</div>',
    ].join("");

    document.getElementById("su-username").addEventListener("input", function(){
      this.value = this.value.toLowerCase().replace(/[^a-z0-9_]/g,"");
    });
    el.querySelectorAll(".setup-avatar-item[data-avid]").forEach(function(item){
      item.addEventListener("click", function(){
        el.querySelectorAll(".setup-avatar-item[data-avid]").forEach(function(i){ i.classList.remove("selected"); });
        item.classList.add("selected");
        document.getElementById("su-avatarid").value = item.dataset.avid;
      });
    });
    document.getElementById("su-submit").addEventListener("click", function(){
      var username = document.getElementById("su-username").value.trim();
      var displayName = document.getElementById("su-displayname").value.trim();
      var bio = document.getElementById("su-bio").value.trim();
      var avatarPresetRaw = document.getElementById("su-avatarid").value;
      var avatarPreset = avatarPresetRaw !== "" ? parseInt(avatarPresetRaw, 10) : null;
      var errEl = document.getElementById("su-error");
      errEl.textContent = "";
      if (!username || username.length < 3) { errEl.textContent = L().usernameTooShort; return; }
      if (!displayName) { errEl.textContent = L().displayNameRequired; return; }
      var btn = document.getElementById("su-submit");
      btn.disabled = true; btn.textContent = L().checking;
      var COLORS = ["#b829ea","#3b82f6","#22c55e","#f59e0b","#ff2a4b","#06b6d4","#ec4899"];
      var color = COLORS[Math.floor(Math.random()*COLORS.length)];
      var db = firebase.firestore();
      db.collection("usernames").doc(username).get().then(function(doc){
        if (doc.exists) { errEl.textContent = L().usernameTaken; btn.disabled=false; btn.textContent=L().createProfile; return; }
        btn.textContent = L().saving;
        var profile = { username:username, displayName:displayName, bio:bio, avatarColor:color, totalCompleted:0,
          createdAt:firebase.firestore.FieldValue.serverTimestamp(), updatedAt:firebase.firestore.FieldValue.serverTimestamp() };
        if (avatarPreset !== null) profile.avatarPreset = avatarPreset;
        return Promise.all([
          db.collection("users").doc(uid).set(profile),
          db.collection("usernames").doc(username).set({ uid:uid }),
        ]).then(function(){
          renderProfileCard(profile);
          el.style.display = "none";
        });
      }).catch(function(err){ errEl.textContent = err.message; btn.disabled=false; btn.textContent=L().createProfile; });
    });
  }

  function renderProfileCard(profile) {
    var el = document.getElementById("profile-card");
    el.style.display = "flex";
    var c = profile.avatarColor || "#b829ea";
    var initials = (profile.displayName||profile.username||"?")[0].toUpperCase();
    var avatarImgUrl = avatarUrl(profile.avatarPreset);
    var avatarHtml = avatarImgUrl
      ? '<div class="profile-avatar" style="padding:0;overflow:hidden;border:1px solid '+c+'55;background:#0d0720;"><img src="'+avatarImgUrl+'" style="width:100%;height:100%;display:block;object-fit:cover;" loading="lazy" alt="" decoding="async"></div>'
      : '<div class="profile-avatar" style="background:'+c+'1a;border:1px solid '+c+'55;color:'+c+'">'+escHtml(initials)+'</div>';
    el.innerHTML = [
      '<div class="profile-card">',
      '  '+avatarHtml,
      '  <div class="profile-info">',
      '    <div class="profile-displayname" style="color:'+c+'">'+escHtml(profile.displayName||"")+'</div>',
      '    <div class="profile-username">@'+escHtml(profile.username||"")+'</div>',
      (profile.bio ? '    <div class="profile-bio">'+escHtml(profile.bio)+'</div>' : ""),
      '  </div>',
      '  <div class="profile-actions">',
      '    <a class="profile-link" href="/community/">'+L().community+'</a>',
      '  </div>',
      '</div>',
    ].join("");
  }

  function onUser(user) {
    // User confirmed signed in — load and render dashboard
    if (_shown) return;
    _shown = true;
    var signinBtn = document.getElementById("open-signin-btn");
    if (signinBtn) signinBtn.addEventListener("click", function(){
      var btn = document.getElementById("shoug-fb-user"); if (btn) btn.click();
    });
    var coursePages = Array.isArray(window.COURSE_PAGES) ? window.COURSE_PAGES : [];
    var validPageUrls = {};
    coursePages.forEach(function(p){ validPageUrls[p.url]=true; });
    Promise.all([
      firebase.firestore().collection("userProgress").doc(user.uid).collection("pages").get(),
      firebase.firestore().collection("users").doc(user.uid).get()
        .catch(function(){ return {exists:false, data:function(){return null;}}; })
    ]).then(function(res){
      var snap=res[0], profileDoc=res[1];
      var userProfile = profileDoc.exists ? profileDoc.data() : null;

      // Show profile card or setup banner
      if (userProfile && userProfile.username) {
        renderProfileCard(userProfile);
      } else {
        renderProfileSetup(user.uid);
      }

      var userPages=[], completedSet={}, completedDates=[];
      snap.forEach(function(doc){
        var d=doc.data();
        var dt=null;
        if(d.completedAt){
          if(typeof d.completedAt.toDate==="function") dt=d.completedAt.toDate();
          else if(d.completedAt instanceof Date) dt=d.completedAt;
          else if(typeof d.completedAt.seconds==="number") dt=new Date(d.completedAt.seconds*1000);
        }
        if(!dt&&d.updatedAt&&d.completed){
          if(typeof d.updatedAt.toDate==="function") dt=d.updatedAt.toDate();
          else if(d.updatedAt instanceof Date) dt=d.updatedAt;
          else if(typeof d.updatedAt.seconds==="number") dt=new Date(d.updatedAt.seconds*1000);
        }
        d.completedAt=dt;
        if(d.completed){
          if(!validPageUrls[d.url]) return;
          userPages.push(d);
          completedSet[d.url]=true;
          if(dt) completedDates.push(dt);
        }
      });
      if(!userPages.length){ show("empty-state"); return; }
      var pageMap=buildPageMap(coursePages);
      var progress=calcProgress(pageMap,completedSet);
      var grandDone=0, grandTotal=0;
      Object.keys(TRACK_META).forEach(function(track){
        var courses=progress[track]||{};
        Object.keys(courses).forEach(function(c){ grandDone+=courses[c].done; grandTotal+=courses[c].total; });
      });
      var overallPct=grandTotal?Math.round(grandDone/grandTotal*100):0;
      renderStats(grandDone,grandTotal,overallPct);
      renderOverview(progress,grandDone,grandTotal,overallPct);
      document.getElementById("charts-row-2").innerHTML=renderRadar(progress)+renderHeatmap(completedDates);
      renderBarChart(progress);
      renderLineGraph(completedDates);
      renderTrackGrid(progress);
      show("dashboard");

      _rrProgress=progress; _rrGrandDone=grandDone; _rrGrandTotal=grandTotal;
      _rrOverallPct=overallPct; _rrCompletedDates=completedDates; _rrUserProfile=userProfile; _rrUid=user.uid;
      window.__shougRerender = function(){
        renderStats(_rrGrandDone,_rrGrandTotal,_rrOverallPct);
        renderOverview(_rrProgress,_rrGrandDone,_rrGrandTotal,_rrOverallPct);
        document.getElementById("charts-row-2").innerHTML=renderRadar(_rrProgress)+renderHeatmap(_rrCompletedDates);
        renderBarChart(_rrProgress);
        renderLineGraph(_rrCompletedDates);
        renderTrackGrid(_rrProgress);
        if (_rrUserProfile && _rrUserProfile.username) {
          renderProfileCard(_rrUserProfile);
        } else {
          renderProfileSetup(_rrUid);
        }
      };
    }).catch(function(){ show("empty-state"); });
  }

  function onNull() {
    // Firebase fired null — could be initial null (before session restore) or genuine sign-out.
    // Wait 1 second: if a user fires within that window, onUser() wins. Otherwise show sign-in.
    setTimeout(function(){ if (!_shown) { _shown=true; show("signed-out-state"); } }, 1000);
  }

  // ── Strategy 1: hook called by new firebase-auth.js (most direct) ─────
  window.__shoug_onAuth = function(user){ if (user) onUser(user); else onNull(); };

  // ── Strategy 2: poll until firebase.app() succeeds, then listen directly
  // (handles old cached firebase-auth.js that lacks the __shoug_onAuth call)
  var _poll = setInterval(function(){
    try {
      firebase.app(); // throws if Firebase not initialized yet
      clearInterval(_poll);
      if (!_shown) {
        firebase.auth().onAuthStateChanged(function(user){
          if (user) onUser(user); else onNull();
        });
      }
    } catch(e) { /* Firebase not ready yet */ }
  }, 200);
  setTimeout(function(){ clearInterval(_poll); if(!_shown){ _shown=true; show("signed-out-state"); } }, 15000);
})();
</script>
</body>
</html>
